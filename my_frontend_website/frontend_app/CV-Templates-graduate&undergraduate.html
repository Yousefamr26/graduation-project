<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CV Templates Download</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6fb;
margin:0;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

.top-bar{
text-align:center;
margin-bottom:40px;
}

.title h1{
margin:0;
font-size:32px;
}

.title p{
color:#777;
margin-top:6px;
}

.templates-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:14px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
padding:22px;
text-align:center;
transition:0.25s;
display:flex;
flex-direction:column;
align-items:center;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 14px 28px rgba(0,0,0,0.12);
}

.preview-box{
height:150px;
width:100%;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:15px;
}

.preview-box i{
font-size:50px;
color:white;
background:rgba(255,255,255,0.25);
padding:18px;
border-radius:50%;
}

.card h3{
margin:8px 0 6px;
font-size:18px;
}

.card p{
color:#666;
font-size:13px;
line-height:1.5;
text-align:center;
max-width:220px;
}

.download-btn{
background:#4e73df;
color:white;
border:none;
padding:9px 18px;
border-radius:6px;
cursor:pointer;
font-size:14px;
margin-top:10px;
transition:.2s;
}

.download-btn:hover{
background:#3f63c9;
}

</style>
</head>

<body>

<div class="container">

<div class="top-bar">

<div class="title">
<h1>CV Templates</h1>
<p>Download editable CV templates and fill in your information easily.</p>
</div>

</div>

<!-- Backend will inject templates here -->

<div id="templatesContainer" class="templates-grid"></div>

</div>

<script>

/* container */

const container = document.getElementById("templatesContainer")

/* ---------- LOAD FROM BACKEND ---------- */

fetch("/api/templates")
.then(response => response.json())
.then(data => {
renderTemplates(data)
})

/* ---------- RENDER ---------- */

function renderTemplates(templates){

container.innerHTML = ""

templates.forEach(t=>{

let card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="preview-box" style="background:${t.color}">
<i class="fa-solid fa-file-word"></i>
</div>

<h3>${t.name}</h3>

<p>${t.description || ''}</p>

<a href="${t.file}" download>
<button class="download-btn">
<i class="fa-solid fa-download"></i> Download
</button>
</a>

`

container.appendChild(card)

})

}

</script>

</body>
</html>
