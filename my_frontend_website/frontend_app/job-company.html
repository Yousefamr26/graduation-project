<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Jobs</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  body { font-family: Arial; background: #f5f7fa; padding: 25px; }
  .header{
    width: 1490px;
    margin-top: -30px;
    margin-left: -30px;
    height: 110px;
    background-color: white;
    padding:20px;box-shadow:0 6px 20px rgba(0,0,0,.06);}
  h2 { margin-bottom:10px; color:#155fc4; margin-top: 12px; }

  .top-bar { display:flex; gap:12px; align-items:center; margin-bottom:18px; flex-wrap:wrap; }
  .top-bar input {
    padding:10px; border-radius:8px; border:1px solid #ccc; width:600px;
    position:absolute; top:55px; left:400px;
  }
  .top-bar select{
    padding:10px; border-radius:8px; border:1px solid #ccc; width:260px;
    position:absolute; top:55px; left:1050px;
  }

  .create-btn {
    background:#155fc4; color:#fff; padding:10px 16px; border-radius:8px;
    border:none; cursor:pointer; position:absolute; top:55px; right:55px;
  }

  .grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(320px,1fr));
          gap:16px; margin-top:12px; }

  .job-card {
    background:#fff; padding:16px; border-radius:12px; border:1px solid #e6e6e6;
    box-shadow:0 4px 15px rgba(0,0,0,0.06);
    transition: transform 0.2s;
  }
  .job-card:hover { transform: translateY(-5px); }

  .job-card img {
    width:100%; height:180px; object-fit:contain;
    border-radius:10px; margin-bottom:12px;
    background:#f7f7f7;
  }

  .job-title { font-weight:700; font-size:18px; margin-bottom:6px; color:#111; }
  .meta { font-size:13px; color:#555; margin-bottom:8px; }

  .job-actions { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
  button.action { padding:8px 12px; border-radius:8px; border:none; cursor:pointer; font-weight:600; }

  .edit { background:#6ab4ff; color:#fff; }
  .delete { background:#ff6b6b; color:#fff; }
  .analysis { background:#4caf50; color:#fff; }

  .analysis-box {
    background:#eef7ff; padding:12px; border-radius:8px;
    margin-top:10px; max-height:0; overflow:hidden; opacity:0;
    transition: max-height 0.5s ease, opacity 0.5s ease;
  }
  .analysis-box.active { max-height:1000px; opacity:1; }

  .analysis-box img {
    width:150px; height:150px; object-fit:contain;
    display:block; margin:10px auto; border-radius:10px; background:#fff;
  }

  .empty { color:#666; margin-top:12px; }

 /* ===== Description Modal ===== */
.modal-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.modal-box {
  background: #fff;
  width: 500px;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,.2);
  animation: fadeIn 0.3s;
  max-height: 90vh;
  overflow-y: auto;
}

.modal-box h3 {
  color: #155fc4;
  margin-bottom: 10px;
}

.modal-content p {
  margin: 8px 0;
  font-size: 14px;
  color: #444;
}

.modal-close {
  background: #ff6b6b;
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  float: right;
  cursor: pointer;
  border: none;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<div class="header">
  <h2><i class="fa-solid fa-briefcase"></i>&nbsp;Job Management</h2>
  <p style="color:#777;">Manage your job postings and track applications</p>

  <div class="top-bar">
    <input id="searchInput" placeholder="Search by title or description..." />
    <select id="dropdownFilter" style="color: #777;"></select>
    <button class="create-btn" onclick="goCreateJob()"><i class="fa-solid fa-plus"></i> Create New Job</button>
  </div>
</div>
<!-- ===== Description Modal ===== -->
<div id="descModal" class="modal-bg">
  <div class="modal-box">
    <button onclick="closeModal()" class="modal-close">Close</button>
    <h3>Job Details</h3>
    <div id="modalContent" class="modal-content"></div>
  </div>
</div>

<div id="jobsGrid" class="grid"></div>
<div id="empty" class="empty" style="display:none;">No jobs found.</div>
<div id="job-list"></div>

<script>
const API_URL = "http://smartcareerhub.runasp.net/api/Jobs";

function goCreateJob() {
  window.location.href = "create-job.html";
}

function editJob(id) {
  window.location.href = `create-job.html?id=${id}`;
}

async function deleteJob(id) {
  if (!confirm("Are you sure you want to delete this job?")) return;

  const res = await fetch(`${API_URL}/${id}`, { method: "DELETE" });

  if (!res.ok) {
    alert("Failed to delete job");
    return;
  }

  alert("Job deleted successfully!");
  loadJobs();
}

function escapeHTML(text) {
  if (!text) return "";
  return text.replace(/[&<>"']/g, m => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
  }[m]));
}

/* ===== Show Description Modal ===== */
function showDescription(job) {

  // قراءة الـ Required Skills مهما كان اسم الحقل
  let skills =
       job.requiredSkills ||
       job.required_skills ||
       job.skills ||
       job.requiredSkill ||
       job.skill;

  if (Array.isArray(skills)) skills = skills.join(", ");
  if (!skills) skills = "Not specified";

  let imgSrc = "https://via.placeholder.com/350x200?text=No+Image";

  if (job.companyLogo) {
    if (job.companyLogo.startsWith("http")) {
        imgSrc = job.companyLogo;
    } else {
        imgSrc = `http://smartcareerhub.runasp.net${job.companyLogo}`;
    }
  }

  const content = document.getElementById("modalContent");
  content.innerHTML = `
    <img src="${imgSrc}" style="width:100%; max-height:200px; object-fit:contain; border-radius:10px; margin-bottom:10px;">

    <p><strong>Title:</strong> ${escapeHTML(job.title)}</p>
    <p><strong>Location:</strong> ${escapeHTML(job.location || "Not specified")}</p>
    <p><strong>Salary:</strong> ${escapeHTML(job.salaryRange || "Not specified")}</p>
    <p><strong>Experience:</strong> ${escapeHTML(job.experienceLevel || "Not specified")}</p>
    <p><strong>Job Type:</strong> ${escapeHTML(job.jobType || "Not specified")}</p>
    <p><strong>Required Skills:</strong> ${escapeHTML(String(skills))}</p>
    <p><strong>Description:</strong> ${escapeHTML(job.description || "Not specified")}</p>
  `;

  document.getElementById("descModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("descModal").style.display = "none";
}

/* Load Jobs */
async function loadJobs() {
  const grid = document.getElementById("jobsGrid");
  const empty = document.getElementById("empty");
  const dropdown = document.getElementById("dropdownFilter");
  const search = document.getElementById("searchInput").value.toLowerCase();

  grid.innerHTML = "";
  dropdown.innerHTML = '<option value="">All jobs</option>';

  const res = await fetch(API_URL);
  if (!res.ok) {
    grid.innerHTML = "<p>Error loading jobs.</p>";
    return;
  }

  let jobs = await res.json();

  dropdown.innerHTML += jobs
    .map(j => `<option value="${j.id}">${escapeHTML(j.title)}</option>`)
    .join("");

  if (dropdown.value !== "") {
    jobs = jobs.filter(j => String(j.id) === String(dropdown.value));
  }

  if (search) {
    jobs = jobs.filter(j =>
      j.title.toLowerCase().includes(search) ||
      j.description.toLowerCase().includes(search)
    );
  }

  if (jobs.length === 0) {
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";

  jobs.forEach(job => {
    let imgSrc = "https://via.placeholder.com/350x200?text=No+Image";

    if (job.companyLogo) {
      if (job.companyLogo.startsWith("http")) {
          imgSrc = job.companyLogo;
      } else {
          imgSrc = `http://smartcareerhub.runasp.net${job.companyLogo}`;
      }
    }

    const card = document.createElement("div");
    card.className = "job-card";

    card.innerHTML = `
      <img src="${imgSrc}" alt="Logo">

      <div class="job-title">${escapeHTML(job.title)}</div>

      <div class="meta"><b>Location:</b> ${escapeHTML(job.location || "Not specified")}</div>
      <div class="meta"><b>Salary:</b> ${escapeHTML(job.salaryRange || "Not specified")}</div>
      <div class="meta"><b>Experience:</b> ${escapeHTML(job.experienceLevel)}</div>
      <div class="meta"><b>Job Type:</b> ${escapeHTML(job.jobType)}</div>

      <div class="meta"><b>Description:</b> ${escapeHTML(job.description.substring(0, 140))}...</div>

      <div class="job-actions">
        <button class="action edit" onclick="editJob('${job.id}')"><i class="fa-solid fa-pen"></i> Edit</button>
        <button class="action delete" onclick="deleteJob('${job.id}')"><i class="fa-solid fa-trash"></i> Delete</button>

        <button class="action analysis" onclick='showDescription(${JSON.stringify(job)})'>
          <i class="fa-solid fa-circle-info"></i> View Details
        </button>
      </div>
    `;

    grid.appendChild(card);
  });
}

document.getElementById("searchInput").addEventListener("input", loadJobs);
document.getElementById("dropdownFilter").addEventListener("change", loadJobs);

loadJobs();

</script>
</body>
</html>
