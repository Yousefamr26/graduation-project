<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Career Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Inter',sans-serif;
background:#f5f7fb;
color:#1e293b;
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:15px;
padding:20px 40px;
border-bottom:1px solid #e5e7eb;
background:white;
}

.logo{
width:45px;
height:45px;
border-radius:10px;
background:#3b82f6;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
}

.header h1{
font-size:22px;
font-weight:600;
}

.header p{
font-size:14px;
color:#64748b;
}

/* MAIN CARD */

.container{
max-width:950px;
margin:40px auto;
background:white;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
overflow:hidden;
}

/* SKILLS HEADER */

.skills-header{
padding:20px 25px;
border-bottom:1px solid #e5e7eb;
}

.skills-header-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.skills-title{
display:flex;
align-items:center;
gap:10px;
font-weight:600;
}

.skills-title i{
color:#3b82f6;
}

/* SKILLS CONTAINER */

.skills{
display:flex;
flex-wrap:wrap;
gap:10px;
}

/* TAG */

.tag{
padding:6px 12px;
border-radius:8px;
font-size:13px;
border:1px solid #d1d5db;
cursor:pointer;
background:#f8fafc;
}

/* CHAT */

.chat-area{
padding:25px;
display:flex;
flex-direction:column;
gap:25px;
min-height:300px;
}

.message-row{
display:flex;
gap:15px;
align-items:flex-start;
}

.bot-icon{
width:40px;
height:40px;
background:#3b82f6;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.message{
background:#f1f5f9;
padding:18px;
border-radius:12px;
max-width:650px;
font-size:14px;
line-height:1.6;
}

/* INPUT */

.input-area{
border-top:1px solid #e5e7eb;
padding:20px;
display:flex;
gap:10px;
}

.input-area input{
flex:1;
padding:12px 14px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:14px;
}

.input-area input:focus{
outline:none;
border-color:#3b82f6;
}

.send-btn{
background:#3b82f6;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
display:flex;
align-items:center;
gap:8px;
font-size:14px;
}

.send-btn:hover{
background:#2563eb;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logo">
<i class="fa-solid fa-robot"></i>
</div>

<div>
<h1 id="assistantTitle">Professional Career Assistant</h1>
<p id="assistantSubtitle"></p>
</div>

</div>

<!-- MAIN CONTAINER -->

<div class="container">

<!-- SKILLS -->

<div class="skills-header">

<div class="skills-header-top">

<div class="skills-title">
<i class="fa-solid fa-sparkles"></i>
Professional Skills & Technologies
</div>

<small>Click to explore learning paths</small>

</div>

<!--
Backend will inject skill tags here
-->

<div class="skills" id="skillsContainer"></div>

</div>


<!-- CHAT AREA -->

<div class="chat-area" id="chatArea">

<!--
Backend will inject messages here

Example:

<div class="message-row">
  <div class="bot-icon"><i class="fa-solid fa-robot"></i></div>
  <div class="message">Hello</div>
</div>

-->

</div>


<!-- INPUT -->

<div class="input-area">

<input id="messageInput" placeholder="Describe your current skills and expertise...">

<button class="send-btn" onclick="sendMessage()">
<i class="fa-solid fa-paper-plane"></i>
Send
</button>

</div>

</div>


<script>

/* SEND MESSAGE TO BACKEND */

function sendMessage(){

let input=document.getElementById("messageInput");
let message=input.value.trim();

if(message==="") return;

/* SEND REQUEST TO BACKEND */

fetch("/api/assistant/message",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:message
})
});

input.value="";

}

</script>

</body>

</html>
