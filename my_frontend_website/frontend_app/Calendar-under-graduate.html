<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Career Hub - Calendar</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f5f7fb;
}

.main{
padding:30px;
}

.calendar-container{
background:white;
border-radius:14px;
padding:25px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.day-header{
font-size:13px;
font-weight:600;
text-align:center;
color:#6c757d;
padding-bottom:8px;
}

.date-box{
height:90px;
background:#fafafa;
border-radius:10px;
padding:6px;
font-size:14px;
position:relative;
transition:0.2s;
border:1px solid #eee;
}

.date-box:hover{
background:#f0f4ff;
transform:translateY(-2px);
}

.date-number{
font-size:13px;
font-weight:600;
}

.event-pill{
display:block;
font-size:11px;
padding:3px 6px;
border-radius:6px;
margin-top:4px;
color:white;
text-decoration:none;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.bg-interview{background:#0d6efd;}
.bg-course{background:#198754;}
.bg-workshop{background:#dc3545;}
.bg-event{background:#ffc107;color:black;}
.bg-project{background:#6f42c1;}

.upcoming-events{
background:white;
border-radius:14px;
padding:20px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.legend-dot{
display:inline-block;
width:12px;
height:12px;
border-radius:50%;
margin-right:5px;
}

</style>
</head>

<body>

<div class="container-fluid">
<div class="row g-0">

<main class="col main">

<div class="container">

<div class="mb-4">
<h3 class="fw-bold">Calendar</h3>
</div>

<div class="row g-4">

<div class="col-lg-9">

<div class="calendar-container">

<div class="d-flex justify-content-between align-items-center mb-4">

<h4 class="mb-0 fw-semibold">November 2025</h4>

<div>
<button class="btn btn-light btn-sm me-2">
<i class="bi bi-chevron-left"></i>
</button>

<button class="btn btn-outline-secondary btn-sm me-2">
Today
</button>

<button class="btn btn-light btn-sm">
<i class="bi bi-chevron-right"></i>
</button>
</div>

</div>

<div class="calendar-grid" id="calendarGrid">

<div class="day-header">Sun</div>
<div class="day-header">Mon</div>
<div class="day-header">Tue</div>
<div class="day-header">Wed</div>
<div class="day-header">Thu</div>
<div class="day-header">Fri</div>
<div class="day-header">Sat</div>

<div class="date-box text-muted"></div>
<div class="date-box text-muted"></div>
<div class="date-box text-muted"></div>
<div class="date-box text-muted"></div>
<div class="date-box text-muted"></div>
<div class="date-box text-muted"></div>

<div class="date-box" data-day="1"><span class="date-number">1</span></div>
<div class="date-box" data-day="2"><span class="date-number">2</span></div>
<div class="date-box" data-day="3"><span class="date-number">3</span></div>
<div class="date-box" data-day="4"><span class="date-number">4</span></div>
<div class="date-box" data-day="5"><span class="date-number">5</span></div>
<div class="date-box" data-day="6"><span class="date-number">6</span></div>
<div class="date-box" data-day="7"><span class="date-number">7</span></div>

<div class="date-box" data-day="8"><span class="date-number">8</span></div>
<div class="date-box" data-day="9"><span class="date-number">9</span></div>
<div class="date-box" data-day="10"><span class="date-number">10</span></div>
<div class="date-box" data-day="11"><span class="date-number">11</span></div>
<div class="date-box" data-day="12"><span class="date-number">12</span></div>
<div class="date-box" data-day="13"><span class="date-number">13</span></div>
<div class="date-box" data-day="14"><span class="date-number">14</span></div>

<div class="date-box" data-day="15"><span class="date-number">15</span></div>
<div class="date-box" data-day="16"><span class="date-number">16</span></div>
<div class="date-box" data-day="17"><span class="date-number">17</span></div>
<div class="date-box" data-day="18"><span class="date-number">18</span></div>
<div class="date-box" data-day="19"><span class="date-number">19</span></div>
<div class="date-box" data-day="20"><span class="date-number">20</span></div>
<div class="date-box" data-day="21"><span class="date-number">21</span></div>

<div class="date-box" data-day="22"><span class="date-number">22</span></div>
<div class="date-box" data-day="23"><span class="date-number">23</span></div>
<div class="date-box" data-day="24"><span class="date-number">24</span></div>
<div class="date-box" data-day="25"><span class="date-number">25</span></div>
<div class="date-box" data-day="26"><span class="date-number">26</span></div>
<div class="date-box" data-day="27"><span class="date-number">27</span></div>
<div class="date-box" data-day="28"><span class="date-number">28</span></div>

<div class="date-box" data-day="29"><span class="date-number">29</span></div>
<div class="date-box" data-day="30"><span class="date-number">30</span></div>

</div>
</div>
</div>

<div class="col-lg-3">

<div class="upcoming-events h-100" id="upcomingEvents">

<h5 class="fw-bold">Upcoming Events</h5>

<div id="eventsContainer"></div>

</div>

</div>

</div>

<div class="mt-5 text-center">

<span class="me-4">
<span class="legend-dot bg-danger"></span> Workshop
</span>

<span class="me-4">
<span class="legend-dot bg-primary"></span> Interview
</span>

<span class="me-4">
<span class="legend-dot bg-success"></span> Course
</span>

<span class="me-4">
<span class="legend-dot bg-warning"></span> Event
</span>

</div>

</div>

</main>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
