<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link rel="stylesheet" href="styles/forget-password.css">
<link rel="stylesheet" href="styles/all.css">
<link rel="stylesheet" href="webfonts/">

<style>
    /* Small inline style for validation */
    .error {
        color: red;
        font-size: 14px;
        margin-top: 0;
    }
    input.invalid {
        border: 2px solid red;
    }
</style>

</head>

<body>

<div class="card">
    <div class="back-btn" onclick="goBackToLogin()">← Back to Login</div>

    <div class="logo">
        <img src="images/forget-password.png" width="180px" height="150px">
    </div>

    <h2>Forgot Password?</h2>
    <p>Enter your email address and we'll send you a</p>
    <p>verification code to reset your password.</p>

    <input type="email" id="email" placeholder="Enter your email" required>

    <!-- Error message -->
    <p id="errorMsg" class="error" style="display:none;">Invalid email address</p>

    <button onclick="sendOTP()">Send OTP</button>
</div>

<div class="footer">© 2025 Smart Career Hub</div>

<script>
function sendOTP() {
    const emailInput = document.getElementById("email");
    const errorMsg = document.getElementById("errorMsg");
    const emailValue = emailInput.value.trim();

    // Email validation regex
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (emailValue === "" || !emailRegex.test(emailValue)) {
        // عرض رسالة الخطأ
        errorMsg.style.display = "block";
        emailInput.classList.add("invalid");
    } else {
        // الايميل صحيح
        errorMsg.style.display = "none";
        emailInput.classList.remove("invalid");

        // الانتقال إلى صفحة OTP
        window.location.href = "otp.html";
    }
}

function goBackToLogin() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
