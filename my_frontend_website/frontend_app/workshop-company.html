<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Workshop Company</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  :root{--accent:#155fc4;--muted:#6b7280;--bg:#f4f6f8}
  body{font-family:"Segoe UI",sans-serif;background:var(--bg);margin:0;padding:24px}
  .wrap{max-width:1100px;margin:0 auto}
  
    .top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
    width: 1470px;
    background-color: white;
    height: 100px;
    padding: 30px;
    margin-left: -215px;
    margin-top: -30px;
    box-shadow:0 6px 20px rgba(0,0,0,.06);
  }
  .top h1{
  margin-top: -25px;
  margin-bottom:10px;}

    .controls{
    display:flex;
    gap:12px;
    align-items:center;
  }

  input.search{
    padding:10px;
    border-radius:8px;
    border:1px solid #cfd0d1;
    width:680px;
  }

  select{
    padding:10px;
    border-radius:8px;
    border:1px solid #cfd0d1;
    width: 150px;
    color: #777;
  }

  button.create{
    background:var(--accent);
    color:#fff;
    padding:10px 14px;
    border-radius:8px;
    border:0;
    cursor:pointer;
  }
  .controls{margin-left:auto;display:flex;gap:8px}
  .search{padding:8px 12px;border-radius:8px;border:1px solid #d6dbe0;background:#fff}
  .btn{padding:8px 12px;border-radius:8px;border:none;cursor:pointer;font-weight:700}
  .btn.primary{background:var(--accent);color:#fff}
  .cards{margin-top:16px;display:grid;grid-template-columns:repeat(2, 1fr);gap:14px}
  .card{background:#fff;border-radius:12px;padding:14px;border:1px solid #eef2f7;box-shadow:0 2px 8px rgba(16,24,40,0.03)}
  .card .title{font-weight:800;color:#0f1724}
  .meta{color:var(--muted);font-size:13px;margin-top:6px}
  .pill{padding:6px 10px;border-radius:999px;background:#f1f5f9;border:1px solid #e6eef6;color:#475569;font-weight:700}
  .analysis{margin-top:10px;padding:10px;border-radius:8px;background:#f8fafc;border:1px solid #e6eef6}
  .no-items{padding:18px;border-radius:8px;background:#fff;border:1px dashed #e6eef6;color:var(--muted)}
  .status-dot{display:inline-block;width:10px;height:10px;border-radius:50%}
  .status-draft{background:#f59e0b}
  .status-pub{background:#10b981}
  @media (max-width:900px){ .cards{grid-template-columns:1fr} }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 style="color:var(--accent)">
          <i class="fa-solid fa-briefcase" style="font-size:26px;color:var(--accent)"></i>&nbsp;Workshops</h1>
        <div style="color: #777;position: absolute; left: 40px; top: 80px;">All your created workshops (drafts & published)</div>
      </div>

      <div class="controls">
        <input id="searchInput" class="search" placeholder="Search by title, university or status..." oninput="renderList()"/>
        <select id="filterSelect" class="search" onchange="renderList()">
          <option value="all">All</option>
          <option value="published">Published</option>
          <option value="draft">Draft</option>
        </select>
        <button class="create" onclick="createNew()"><i class="fa-solid fa-plus"></i> Create New Workshop</button>
      </div>
    </div>

    <div id="list" class="cards"></div>
    <div id="empty" style="display:none" class="no-items">No workshops found.</div>
  </div>

<script>

  const $ = id => document.getElementById(id);

  function loadWorkshops(){ try{return JSON.parse(localStorage.getItem('workshops')||'[]')}catch(e){return[]} }
  function saveWorkshops(arr){ localStorage.setItem('workshops', JSON.stringify(arr)) }

  function createNew(){
    localStorage.removeItem('editWorkshopId');
    window.location.href = 'create-workshop.html';
  }

  function renderList(){
    const arr = loadWorkshops();
    const search = $('searchInput').value.trim().toLowerCase();
    const filter = $('filterSelect').value;
    const list = $('list'); 
    list.innerHTML='';

    let filtered = arr.slice().reverse();

    if(filter !== 'all') filtered = filtered.filter(x => x.status === filter);

    if(search){
      filtered = filtered.filter(x =>
        (x.title || '').toLowerCase().includes(search) ||
        (x.university || '').toLowerCase().includes(search) ||
        (x.status || '').toLowerCase().includes(search)
      );
    }

    if(filtered.length === 0){
      $('empty').style.display='block';
      return;
    } 
    $('empty').style.display='none';

    filtered.forEach(item=>{
      const totalPoints = (item.materials||[]).reduce((s,m)=>s+(m.points||0),0)
                         + (item.activities||[]).reduce((s,a)=>s+(a.points||0),0);

      const card = document.createElement('div');
      card.className='card';

      card.innerHTML = `
        <div style="display:flex;justify-content:space-between;gap:12px">
          <div style="flex:1">
            <div class="title">${escapeHtml(item.title)}</div>
            <div class="meta">${escapeHtml(item.university||'')} • ${escapeHtml(item.workType||'')}</div>
            <div style="color:var(--muted);margin-top:8px">${escapeHtml((item.description||'').slice(0,140))}${(item.description||'').length>140?'...':''}</div>
          </div>

          <div style="text-align:right">
            <div class="pill">${item.status === 'published'
              ? '<span class="status-dot status-pub"></span> Published'
              : '<span class="status-dot status-draft"></span> Draft'}</div>
            <div style="font-weight:700;margin-top:8px">${totalPoints} pts</div>
          </div>
        </div>

        <div class="actions" style="margin-top:12px;display:flex;gap:8px">
          <button class="btn" onclick="triggerEdit(${item.id})"><i class="fa-solid fa-pen-to-square"></i> Edit</button>
          <button class="btn" onclick="toggleAnalysis(${item.id})"><i class="fa-solid fa-chart-simple"></i> Analysis</button>
          <button class="btn" style="background:#fff;border:1px solid #f1a3a3;color:#b91c1c" onclick="confirmDelete(${item.id})"><i class="fa-solid fa-trash"></i> Delete</button>
        </div>

        <div class="analysis" id="analysis-${item.id}" style="display:none"></div>
      `;
      list.appendChild(card);
    });
  }

  function escapeHtml(s){ if(!s) return ''; return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }

  function triggerEdit(id){
    localStorage.setItem('editWorkshopId', String(id));
    window.location.href = 'create-workshop.html';
  }

  function confirmDelete(id){
    if(!confirm('Delete this workshop?')) return;
    let arr = loadWorkshops().filter(x=>x.id !== id);
    saveWorkshops(arr);
    renderList();
  }

  /*  ⭐ FIXED — NOW SHOWS FULL WORKSHOP DATA  */
  function toggleAnalysis(id){
    const arr = loadWorkshops();
    const item = arr.find(x => x.id === id);
    const el = $('analysis-'+id);

    if(el.style.display === 'block'){
      el.style.display = 'none';
      return;
    }

    const materialsHtml = (item.materials||[])
      .map(m=> `<li>${escapeHtml(m.name)} — ${m.points||0} pts</li>`).join('');

    const activitiesHtml = (item.activities||[])
      .map(a=> `<li>${escapeHtml(a.name)} — ${a.points||0} pts</li>`).join('');

    const totalPoints =
      (item.materials||[]).reduce((s,m)=>s+(m.points||0),0) +
      (item.activities||[]).reduce((s,a)=>s+(a.points||0),0);

    el.innerHTML = `
      <b>Title:</b> ${escapeHtml(item.title)}<br>
      <b>University:</b> ${escapeHtml(item.university||'')}<br>
      <b>Status:</b> ${escapeHtml(item.status)}<br>
      <b>Description:</b><br>${escapeHtml(item.description||'')}<br><br>

      <b>Materials:</b>
      <ul>${materialsHtml || '<i>No materials</i>'}</ul>

      <b>Activities:</b>
      <ul>${activitiesHtml || '<i>No activities</i>'}</ul>

      <b>Total Points:</b> ${totalPoints} pts
    `;

    el.style.display = 'block';
  }

  renderList();

</script>
</body>
</html>
