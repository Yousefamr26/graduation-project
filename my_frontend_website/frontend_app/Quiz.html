<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles/Quiz-now.css">

</head>
<body>
    <div class="container py-5">
          <a href="./Dashboard.html" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
  <div class="card border-0 shadow-sm p-4 rounded-4" style="max-width: 800px; margin: auto;">
    
    <div class="mb-4">
      <h4 class="fw-bold d-flex align-items-center">
        <i class="fa-solid fa-sparkles text-primary me-2"></i> Select Question Types
      </h4>
      <p class="text-muted">Choose the types of questions you want to practice with:</p>
    </div>

    <div class="d-grid gap-3 mb-4">
      
      <label class="custom-selection-card p-3 border rounded-3 d-flex align-items-start gap-3">
        <input class="form-check-input mt-1" type="checkbox" checked>
        <div>
          <h6 class="fw-bold mb-1"><i class="fa-solid fa-list-ul text-primary me-2"></i> Multiple Choice Questions (MCQ)</h6>
          <p class="small text-muted mb-0">Test your knowledge with questions that have 4 possible answers. Great for understanding concepts in depth.</p>
        </div>
      </label>

      <label class="custom-selection-card p-3 border rounded-3 d-flex align-items-start gap-3">
        <input class="form-check-input mt-1" type="checkbox" checked>
        <div>
          <h6 class="fw-bold mb-1"><i class="fa-solid fa-square-check text-primary me-2"></i> True/False Questions</h6>
          <p class="small text-muted mb-0">Quick assessment questions to verify your understanding of key concepts and facts.</p>
        </div>
      </label>

      <div class="p-3 bg-light-blue rounded-3 border-blue-dashed">
        <h6 class="fw-bold mb-1 small d-flex align-items-center">
          <i class="fa-solid fa-wand-magic-sparkles text-primary me-2"></i> AI-Generated Questions
        </h6>
        <p class="small text-muted mb-0">All questions are intelligently generated based on your learning materials and course content. You need at least 70% to pass the quiz.</p>
      </div>
    </div>

    <button class="btn btn-primary w-100 py-3 fw-bold rounded-3" style="background-color: #2A83BD;" onclick="goStartQuiz()">
      <i class="fa-solid fa-brain me-2"></i> 
      <a href="./StartQuiz.html" class="text-white text-decoration-none">Start Quiz</a>  
    </button>
  </div>
</div>
</body>
<script>
  function goStartQuiz(){
    window.location.href ="Start-Quiz.html";
  }
</script>
</html>
