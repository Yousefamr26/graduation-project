<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Internships</title>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  font-family:Arial;
  background:#f5f7fb;
  padding:30px
}

.header{
  background:white;
  padding:20px;
  border-radius:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 4px 15px rgba(0,0,0,.05)
}

.btn{
  background:#3498db;
  color:white;
  border:none;
  padding:8px 16px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.btn-close{
  background:#3498db;
  color:white;
  border:none;
  padding:8px 16px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  margin-left: 440px;
}

.toolbar{
  background:white;
  padding:15px;
  border-radius:14px;
  margin-top:15px;
  display:flex;
  gap:12px;
  box-shadow:0 4px 15px rgba(0,0,0,.05)
}

.toolbar input,
.toolbar select{
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:14px
}

.search{ flex:1 }

.grid{
  margin-top:25px;
  display:grid;
  grid-template-columns:repeat(auto-fill, 410px); /* نفس عرض الكارد */
  gap:16px;
}

.card{
  background:white;
  border-radius:18px;
  padding:22px;
  box-shadow:0 6px 20px rgba(0,0,0,.06);
  position:relative;
  transition:.25s;

  width: 350px; 
  height: 350px;  /* 👈 يخليه مربع */
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card:hover{ transform:translateY(-6px) }

.badge{
  position:absolute;
  top:18px;
  right:18px;
  padding:6px 14px;
  border-radius:30px;
  font-size:12px;
  font-weight:600
}

.open{ background:#e8f5e9; color:#2e7d32 }
.closed{ background:#ffebee; color:#c62828 }

.row{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:8px;
  color:#555;
  font-size:14px
}

.skill{
  display:inline-block;
  background:#e3f2fd;
  color:#1565c0;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  margin:6px 6px 0 0;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:18px
}

.icon-btn{
  border:1px solid #ddd;
  background:white;
  padding:8px 10px;
  border-radius:8px;
  cursor:pointer
}

.delete{ color:red }

/* ===== MODAL ===== */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999
}

.modal-content{
  background:white;
  width:520px;
  max-height:90vh;
  overflow:auto;
  padding:30px;
  border-radius:18px;
}
.about-text{
  font-size:13px;
  color:#555;
  margin:8px 0 12px;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="header">
  <div>
    <h2>
      <i class="fa fa-briefcase" style="color:#3498db"></i>
      Internship Management
    </h2>
    <p style="margin-top:6px; color:#666; font-size:14px;">
      Manage your internship postings efficiently in one place
    </p>
  </div>

  <button class="btn" onclick="location='create-internships.html'">
    <i class="fa fa-plus"></i> Create New Internship
  </button>
</div>

<div class="toolbar">
  <input id="searchInput" class="search"
  placeholder="Search..."
  oninput="render()">

  <select id="statusFilter" onchange="render()">
    <option value="">All Status</option>
    <option value="Open">Open</option>
    <option value="Closed">Closed</option>
  </select>

  <select id="typeFilter" onchange="render()">
    <option value="">All Types</option>
    <option value="Onsite">Onsite</option>
    <option value="Remote">Remote</option>
    <option value="Hybrid">Hybrid</option>
  </select>
</div>

<div class="grid" id="cards"></div>

<!-- ===== MODAL ===== -->

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("internships")||"[]");

function safe(val){
  return (val !== undefined && val !== null && val !== "")
    ? val
    : "Not specified";
}

function deleteItem(id){
  if(!confirm("Delete internship?")) return;
  data = data.filter(x=>x.id!==id);
  localStorage.setItem("internships", JSON.stringify(data));
  render();
}

function editItem(id){
  location="create-internships.html?id="+id;
}

function showDetails(id){

const x = data.find(i=>i.id===id);
if(!x) return;

modalContent.innerHTML = `
<button class="btn-close" onclick="closeModal()">Close</button>
<h2 style="margin-top:-20px; margin-bottom:10px;">${safe(x.title)}</h2>

<p><b>Company:</b> ${safe(x.company)}</p>
<p><b>Status:</b> ${safe(x.status)}</p>
<p><b>Type:</b> ${safe(x.type)}</p>
<p><b>Location:</b> ${safe(x.location)}</p>
<p><b>Duration:</b> ${safe(x.duration)}</p>
<p><b>Application Deadline:</b> ${safe(x.deadline)}</p>
<p><b>Max Trainees:</b> ${safe(x.max)}</p>
<p><b>Paid:</b> ${x.paid ? "Yes 💰" : "No"}</p>

<h3>About the Internship</h3>
<p>${safe(x.about)}</p>

<h3>Required Skills</h3>
<p>
${Array.isArray(x.skills) && x.skills.length
  ? x.skills.map(s=>`<span class="skill">${s}</span>`).join("")
  : "No skills specified"}
</p>

<h3>Requirements</h3>
<ul>
${Array.isArray(x.requirements) && x.requirements.length
  ? x.requirements.map(r=>`<li>${r}</li>`).join("")
  : "<li>No requirements specified</li>"}
</ul>
`;
modal.style.display="flex";
}

function closeModal(){
  modal.style.display="none";
}

function render(){

cards.innerHTML="";

const search = (searchInput.value||"").toLowerCase();
const statusVal = statusFilter.value;
const typeVal = document.getElementById("typeFilter").value;

const filtered = data.filter(x=>{

return (!search ||
(x.title||"").toLowerCase().includes(search) ||
(x.company||"").toLowerCase().includes(search))

&& (!statusVal || x.status===statusVal)
&& (!typeVal || x.type===typeVal);

});

if(!filtered.length){
cards.innerHTML="<p>No internships found</p>";
return;
}

filtered.forEach(x=>{

cards.innerHTML+=`
<div class="card">

<span class="badge ${x.status==="Closed"?"closed":"open"}">
${safe(x.status)}
</span>

<div>
<h3>${safe(x.title)}</h3>

<p class="about-text">
${safe(x.about).substring(0,120)}${x.about && x.about.length>120?"...":""}
</p>

<div class="row">
<i class="fa fa-building"></i> ${safe(x.company)}
</div>

<div class="row">
<i class="fa fa-location-dot"></i> ${safe(x.location)}
</div>

<div class="row">
<i class="fa fa-laptop"></i> ${safe(x.type)}
</div>

<div class="row">
<i class="fa fa-clock"></i> ${safe(x.duration)}
</div>

<div class="row">
<i class="fa fa-calendar"></i> Deadline: ${safe(x.deadline)}
</div>

<div style="margin-top:10px">
${Array.isArray(x.skills) && x.skills.length
  ? x.skills.slice(0,3).map(s=>`<span class="skill">${s}</span>`).join("")
  : ""}
</div>
</div>

<div class="actions">
<button class="btn" onclick="showDetails(${x.id})">
Details
</button>

<button class="icon-btn" onclick="editItem(${x.id})">
<i class="fa fa-pen"></i>
</button>

<button class="icon-btn delete" onclick="deleteItem(${x.id})">
<i class="fa fa-trash"></i>
</button>
</div>
</div>
`;
});

}

render();

</script>
</body>
</html>
