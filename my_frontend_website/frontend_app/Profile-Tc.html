<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Training Center Profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family: Arial;
background:#f4f6f9;
margin:0;
padding:30px;
}

.container{
max-width:1100px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.edit-btn{
background:#3498db;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

.card{
background:white;
padding:25px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.05);
}

.profile-top{
display:flex;
gap:30px;
align-items:center;
flex-wrap:wrap;
}

.profile-img{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
}

.contact{
line-height:2;
font-size:18px;
}

.contact i{
color:#3498db;
margin-right:10px;
}

.about-box{
background:#f1f3f6;
padding:15px;
border-radius:6px;
min-height:80px;
}

.tags span{
background:#e3efff;
color:#3478f6;
padding:7px 14px;
border-radius:20px;
margin-right:8px;
font-size:14px;
display:inline-block;
margin-bottom:6px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
width:600px;
max-width:90%;
padding:25px 30px;
border-radius:10px;
max-height:90vh;
overflow:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.input-group{
margin-bottom:12px;
}

.input-group label{
font-size:13px;
display:block;
margin-bottom:3px;
}

.input-group input,
.input-group textarea{
width:100%;
padding:8px;
border:1px solid #ddd;
border-radius:5px;
}

.modal-buttons{
display:flex;
justify-content:space-between;
margin-top:15px;
}

.save{
background:#3498db;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
width:48%;
}

.cancel{
background:#eee;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
width:48%;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>Training Center Profile</h2>
<button class="edit-btn" onclick="openModal()">
<i class="fa fa-pen"></i> Edit Profile
</button>
</div>

<div class="card profile-top">

<img id="centerImage" src="" class="profile-img">

<div class="center-info">
<h2 id="name"></h2>
<p id="tagline" style="color:#666;"></p>
</div>

<div class="contact">
<div><i class="fa fa-location-dot"></i> <span id="location"></span></div>
<div><i class="fa fa-envelope"></i> <span id="email"></span></div>
<div><i class="fa fa-phone"></i> <span id="phone"></span></div>
<div><i class="fa fa-globe"></i> <span id="website"></span></div>
</div>

</div>

<div class="card">
<h3>About</h3>
<div class="about-box" id="about"></div>
</div>

<div class="card">
<h3>Specializations</h3>
<div class="tags" id="specializations"></div>
</div>

</div>


<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-content">

<h3>Edit Training Center Profile</h3>
<p style="color:#666;margin-top:-10px;">
Update your training center information
</p>

<div class="input-group">
<label>Training Center Name</label>
<input id="editName">
</div>

<div class="input-group">
<label>Tagline</label>
<input id="editTagline">
</div>

<div class="input-group">
<label>Email</label>
<input id="editEmail">
</div>

<div class="input-group">
<label>Phone</label>
<input id="editPhone">
</div>

<div class="input-group">
<label>Website</label>
<input id="editWebsite">
</div>

<div class="input-group">
<label>Location</label>
<input id="editLocation">
</div>

<div class="input-group">
<label>About</label>
<textarea id="editAbout"></textarea>
</div>

<div class="input-group">
<label>Specializations (comma separated)</label>
<input id="editSpecs">
</div>

<div class="modal-buttons">
<button class="save" onclick="saveChanges()">Save Changes</button>
<button class="cancel" onclick="closeModal()">Cancel</button>
</div>

</div>

</div>


<script>

function openModal(){

document.getElementById("modal").style.display="flex";

document.getElementById("editName").value =
document.getElementById("name").innerText;

document.getElementById("editTagline").value =
document.getElementById("tagline").innerText;

document.getElementById("editEmail").value =
document.getElementById("email").innerText;

document.getElementById("editPhone").value =
document.getElementById("phone").innerText;

document.getElementById("editWebsite").value =
document.getElementById("website").innerText;

document.getElementById("editLocation").value =
document.getElementById("location").innerText;

document.getElementById("editAbout").value =
document.getElementById("about").innerText;

let specs = [...document.querySelectorAll("#specializations span")]
.map(e=>e.innerText).join(", ");

document.getElementById("editSpecs").value = specs;

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function saveChanges(){

document.getElementById("name").innerText =
document.getElementById("editName").value;

document.getElementById("tagline").innerText =
document.getElementById("editTagline").value;

document.getElementById("email").innerText =
document.getElementById("editEmail").value;

document.getElementById("phone").innerText =
document.getElementById("editPhone").value;

document.getElementById("website").innerText =
document.getElementById("editWebsite").value;

document.getElementById("location").innerText =
document.getElementById("editLocation").value;

document.getElementById("about").innerText =
document.getElementById("editAbout").value;

let specs = document.getElementById("editSpecs").value.split(",");

let specsContainer = document.getElementById("specializations");

specsContainer.innerHTML="";

specs.forEach(spec=>{
let span = document.createElement("span");
span.innerText = spec.trim();
specsContainer.appendChild(span);
});

closeModal();

}

</script>

</body>
</html>
