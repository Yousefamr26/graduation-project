<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    padding: 40px;
    font-family: "Segoe UI", sans-serif;
    background: #f4f6fa;
    color: #222;
}

h2 {
    font-size: 30px;
    margin-top: -10px;
}

.subtitle {
    color: #666;
    margin-top: -5px;
    margin-bottom: 20px;
}

/* NOTIFICATION LIST */

.noti-container {
    max-width: 900px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* notification card (سيتم ملؤها من الباك اند) */

.notification {
    display: flex;
    gap: 20px;
    background: #fff;
    padding: 20px;
    border-radius: 15px;
    align-items: flex-start;
    border: 1px solid #e5e9ef;
}
</style>

</head>
<body>

<h2>Notifications</h2>
<p class="subtitle">Stay updated with applications, interviews, and events</p>

<div class="noti-container">

<!-- Notifications will be loaded here from backend -->

</div>

</body>
</html>
