<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
background:#f5f7fb;
font-family:system-ui;
}

.card{
border:none;
border-radius:14px;
}

.avatar img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
}

.member-badge{
background:#7c3aed;
color:white;
font-size:12px;
padding:4px 10px;
border-radius:20px;
display:inline-block;
}

.info-list p{
font-size:14px;
color:#555;
margin-bottom:8px;
}

.progress{
height:8px;
border-radius:10px;
}

.progress-bar{
background:#0f172a;
}

.skill-row{
margin-bottom:18px;
}

.achievement{
border:1px solid #e6e8ee;
border-radius:12px;
padding:20px;
background:#f8fafc;
}

.history-box{
border:1px solid #e6e8ee;
border-radius:10px;
padding:15px;
margin-bottom:12px;
background:white;
}

.section-title{
font-weight:600;
font-size:16px;
margin-bottom:10px;
}

.points-bar{
height:10px;
background:#e6e8ee;
border-radius:10px;
}

.points-fill{
height:10px;
background:#0f172a;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container py-5">

<div class="d-flex justify-content-between align-items-center mb-4">
<h4>My Profile</h4>

<button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#editModal">
<i class="fa-regular fa-pen-to-square me-1"></i> Edit Info
</button>

</div>

<div class="row g-4">

<!-- LEFT SIDE -->

<div class="col-lg-4">

<div class="card p-4 shadow-sm">

<div class="text-center">

<div class="avatar mb-3">
<img id="avatar" src="">
</div>

<h5 id="name"></h5>

<p class="text-muted small mb-2" id="degree"></p>

<span class="member-badge" id="membership"></span>

</div>

<div class="info-list mt-4">

<p id="email"><i class="fa-regular fa-envelope me-2"></i></p>

<p id="phone"><i class="fa-solid fa-phone me-2"></i></p>

<p id="location"><i class="fa-solid fa-location-dot me-2"></i></p>

<p id="joinDate"><i class="fa-regular fa-calendar me-2"></i></p>

</div>

<hr>

<div>

<div class="d-flex justify-content-between mb-2">
<span>Total Points</span>
<span id="totalPoints"></span>
</div>

<div class="points-bar">
<div class="points-fill" id="pointsBar"></div>
</div>

<small class="text-muted" id="nextLevel"></small>

</div>

</div>

</div>

<!-- RIGHT SIDE -->

<div class="col-lg-8">

<!-- EDUCATION -->

<div class="card p-4 shadow-sm mb-4">

<div class="section-title">
<i class="fa-solid fa-graduation-cap me-2"></i>
Education
</div>

<div id="educationContainer"></div>

</div>

<!-- SKILLS -->

<div class="card p-4 shadow-sm mb-4">

<div class="section-title">
<i class="fa-solid fa-chart-line me-2"></i>
Total Points by Skill
</div>

<div id="skillsContainer"></div>

</div>

<!-- ACHIEVEMENTS -->

<div class="card p-4 shadow-sm mb-4">

<div class="section-title">
<i class="fa-solid fa-award me-2"></i>
Achievements
</div>

<div class="row g-3 text-center" id="achievementsContainer"></div>

</div>

<!-- INTERNSHIP -->

<div class="card p-4 shadow-sm mb-4">

<div class="section-title">
<i class="fa-solid fa-briefcase me-2"></i>
Internship History
</div>

<div id="internshipsContainer"></div>

</div>

<!-- JOBS -->

<div class="card p-4 shadow-sm">

<div class="section-title">
<i class="fa-solid fa-briefcase me-2"></i>
Jobs History
</div>

<div id="jobsContainer"></div>

</div>

</div>

</div>

</div>


<!-- MODAL -->

<div class="modal fade" id="editModal">

<div class="modal-dialog modal-lg modal-dialog-centered">

<div class="modal-content border-0 shadow-lg">

<div class="modal-header border-0">

<h5 class="modal-title fw-semibold">
<i class="fa-regular fa-user me-2"></i>
Edit Profile
</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<div class="row g-3">

<div class="col-md-6">

<label class="form-label small text-muted">Name</label>

<div class="input-group">
<span class="input-group-text">
<i class="fa-regular fa-user"></i>
</span>
<input type="text" id="inName" class="form-control">
</div>

</div>


<div class="col-md-6">

<label class="form-label small text-muted">Email</label>

<div class="input-group">
<span class="input-group-text">
<i class="fa-regular fa-envelope"></i>
</span>
<input type="email" id="inEmail" class="form-control">
</div>

</div>


<div class="col-md-6">

<label class="form-label small text-muted">Phone</label>

<div class="input-group">
<span class="input-group-text">
<i class="fa-solid fa-phone"></i>
</span>
<input type="text" id="inPhone" class="form-control">
</div>

</div>


<div class="col-md-6">

<label class="form-label small text-muted">Location</label>

<div class="input-group">
<span class="input-group-text">
<i class="fa-solid fa-location-dot"></i>
</span>
<input type="text" id="inLocation" class="form-control">
</div>

</div>

</div>

</div>

<div class="modal-footer border-0">

<button class="btn btn-light px-4" data-bs-dismiss="modal">
Cancel
</button>

<button class="btn btn-primary px-4" onclick="saveProfile()">
<i class="fa-solid fa-check me-1"></i>
Save Changes
</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* LOAD PROFILE */

fetch("/api/profile")
.then(res => res.json())
.then(data => {

document.getElementById("name").innerText = data.name

document.getElementById("email").innerHTML += data.email
document.getElementById("phone").innerHTML += data.phone
document.getElementById("location").innerHTML += data.location
document.getElementById("joinDate").innerHTML += data.joinDate

})

/* SAVE PROFILE */

function saveProfile(){

const body = {

name:document.getElementById("inName").value,
email:document.getElementById("inEmail").value,
phone:document.getElementById("inPhone").value,
location:document.getElementById("inLocation").value

}

fetch("/api/profile",{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(body)

})

}

</script>

</body>
</html>
