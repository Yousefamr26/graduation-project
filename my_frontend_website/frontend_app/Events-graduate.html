<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshops & Events</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f8f9fa;
color:#333;
}

/* HEADER AREA */

.header-section{
background:#e9ecef;
padding:40px 0;
margin-bottom:30px;
}

.header-container{
max-width:1200px;
margin:auto;
padding:0 20px;
}

.header-title{
font-weight:700;
font-size:28px;
margin-bottom:6px;
}

.header-subtitle{
color:#6c757d;
margin-bottom:20px;
}

/* SEARCH BAR */

.search-box{
max-width:400px;
position:relative;
}

.search-box input{
border-radius:25px;
padding-left:40px;
}

.search-box i{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
color:#999;
}

/* TOGGLE */

.toggle-container{
background:#ddd;
padding:4px;
border-radius:50px;
display:inline-flex;
}

.toggle-btn{
border:none;
padding:8px 20px;
border-radius:50px;
font-weight:500;
cursor:pointer;
transition:.3s;
background:transparent;
}

.toggle-btn.active{
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* MAIN CONTENT */

.main-content{
max-width:1200px;
margin:auto;
padding:20px;
}

/* EVENT CARD */

.event-card{
border:none;
border-radius:16px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
transition:.2s;
margin-bottom:20px;
}

.event-card:hover{
transform:translateY(-5px);
}

.card-img-top{
height:200px;
object-fit:cover;
}

</style>
</head>

<body>


<!-- HEADER -->

<div class="header-section">

<div class="header-container">

<div class="header-title">
Events
</div>

<div class="header-subtitle">
Discover and join Events from companies and universities
</div>

<div class="d-flex flex-wrap gap-3 align-items-center">

<!-- SEARCH -->

<div class="search-box">
<i class="bi bi-search"></i>
<input type="text" id="searchInput" class="form-control" placeholder="Search Events...">
</div>

<!-- TOGGLE -->

<div class="toggle-container">
<button id="btn-upcoming" class="toggle-btn active">Upcoming</button>
<button id="btn-past" class="toggle-btn">Past</button>
</div>

</div>

</div>

</div>


<!-- MAIN -->

<main class="main-content">

<!-- UPCOMING -->

<div id="upcoming-content" class="row g-4">

<div id="upcomingContainer" class="row">

<!-- Backend inject upcoming events -->

</div>

</div>


<!-- PAST -->

<div id="past-content" class="row g-4 d-none">

<div id="pastContainer" class="row">

<!-- Backend inject past events -->

</div>

</div>

</main>



<!-- MODAL -->

<div class="modal fade" id="enrollModal" tabindex="-1">

<div class="modal-dialog modal-dialog-centered">

<div class="modal-content" style="border-radius:20px;border:none;">

<div class="modal-header border-0 pb-0">
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body px-4 pt-0">

<h4 class="fw-bold mb-1" id="modalTitle"></h4>

<p class="text-muted mb-4">Confirm your enrollment details</p>

<div id="modalEventInfo"></div>

<div class="mb-3">
<label class="form-label fw-bold text-muted small">Your Email</label>
<input type="email" class="form-control">
</div>

<div class="mb-3">
<label class="form-label fw-bold text-muted small">Phone Number</label>
<input type="text" class="form-control">
</div>

<div class="mb-4">
<label class="form-label fw-bold text-muted small">Why do you want to attend?</label>
<textarea class="form-control" rows="3"></textarea>
</div>

<div class="row g-2">

<div class="col-7">
<button class="btn btn-primary w-100 fw-bold">Confirm Enrollment</button>
</div>

<div class="col-5">
<button class="btn btn-light w-100 fw-bold" data-bs-dismiss="modal">Cancel</button>
</div>

</div>

</div>

</div>

</div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const btnUpcoming = document.getElementById("btn-upcoming");
const btnPast = document.getElementById("btn-past");

const upcomingContent = document.getElementById("upcoming-content");
const pastContent = document.getElementById("past-content");

btnUpcoming.addEventListener("click", () => {

btnUpcoming.classList.add("active");
btnPast.classList.remove("active");

upcomingContent.classList.remove("d-none");
pastContent.classList.add("d-none");

});

btnPast.addEventListener("click", () => {

btnPast.classList.add("active");
btnUpcoming.classList.remove("active");

upcomingContent.classList.add("d-none");
pastContent.classList.remove("d-none");

});


/* containers */

const upcomingContainer = document.getElementById("upcomingContainer");
const pastContainer = document.getElementById("pastContainer");


/* example event card */

function createEventCard(event){

const card = `

<div class="col-md-4">

<div class="card event-card">

<img src="${event.image}" class="card-img-top">

<div class="card-body">

<h5 class="fw-bold">${event.title}</h5>

<p class="text-muted">${event.organization}</p>

<button class="btn btn-primary w-100"
data-bs-toggle="modal"
data-bs-target="#enrollModal">
Enroll
</button>

</div>

</div>

</div>

`;

upcomingContainer.innerHTML += card;

}

</script>

</body>
</html>
