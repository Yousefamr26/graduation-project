<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Company Events</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#f4f7fb;
  --card:#fff;
  --accent:#3498db;
}

body{
  font-family:"Segoe UI",sans-serif;
  background:var(--bg);
  margin:0;
  padding:30px;
}

.wrap{width:100%;margin:auto}

/* ===== TOP BAR ===== */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
  background:#fff;
  padding:20px 30px;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,.05);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.controls{display:flex;gap:10px}

input.search{
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  width:500px;
  margin-left: -35px;
}

select{
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  width: 200px;
}

.create{
  background:var(--accent);
  color:#fff;
  border:0;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(350px,1fr));
  gap:20px;
}

.card{
  background:#fff;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 8px 25px rgba(0,0,0,.05);
  position:relative;
  transition:.3s;
}

.card:hover{transform:translateY(-5px)}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.status-badge{
  position:absolute;
  top:15px;
  right:15px;
  padding:6px 14px;
  border-radius:20px;
  font-size:12px;
  font-weight:700;
}

.published{background:#eafff2;color:#0b8f46}
.draft{background:#fff5e6;color:#c67a00}

.card-body{
  padding:18px;
}

.card-body h3{
  margin:0 0 8px;
}

.meta{
  color:#666;
  font-size:13px;
  margin-bottom:10px;
}

.actions{
  display:flex;
  gap:8px;
  margin-top:15px;
}

.actions button{
  flex:1;
  padding:8px;
  border-radius:8px;
  border:0;
  cursor:pointer;
  font-weight:600;
}

.btn-edit{background:#eef2ff;color:#3730a3}
.btn-delete{background:#fee2e2;color:#b91c1c}
.btn-details{background:#e0f2fe;color:#0369a1}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  background:#fff;
  width:630px;
  max-height:85vh;
  overflow:auto;
  border-radius:16px;
  padding:25px;
  position:relative;
}

.modal-content img{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:15px;
}

.close-btn{
  background:#fff;
  border:none;
  padding:6px 14px;
  border-radius:20px;
  cursor:pointer;
  font-weight:600;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
  z-index:10;
  margin-top: -50px;
  margin-left: 530px;
  margin-bottom: 10px;
}

.section{
  margin-top:15px;
}
.section b{color:#333}

.empty{
  text-align:center;
  padding:40px;
  background:#fff;
  border-radius:12px;
}
.actions button{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:0;
  cursor:pointer;
  font-weight:600;
  transition:.2s;
}

.actions button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>
<div class="wrap">

<div class="top">
  <h1 style="margin-top: -10px;"><i class="fa fa-calendar" style="color: #3498db;"></i> Events</h2>
  <p style="margin-left: -260px; margin-top: 70px;color: #555;">Manage events with points-based eligibility and capacity control
</p>

  <div class="controls">
    <input class="search" id="search" placeholder="Search..." oninput="renderEvents()">
    <select id="filter" onchange="renderEvents()">
      <option value="all">All</option>
      <option value="published">Published</option>
      <option value="draft">Draft</option>
    </select>
    <button class="create" onclick="createNew()">
      <i class="fa-solid fa-plus"></i> Create New Event
    </button>
  </div>
</div>

<div id="listArea"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">Close</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>

function createNew(){
  localStorage.removeItem('editEventID');
  window.location.href='create-events-uni.html';
}

function getEvents(){
  return JSON.parse(localStorage.getItem('events')||'[]')
    .sort((a,b)=>b.id-a.id);
}

function renderEvents(){
  const container=document.getElementById('listArea');
  container.innerHTML='';
  const events=getEvents();
  const q=document.getElementById('search').value.toLowerCase();
  const filter=document.getElementById('filter').value;

  let filtered=events.filter(ev=>
    ev.title.toLowerCase().includes(q)
  );

  if(filter!=='all')
    filtered=filtered.filter(ev=>ev.status===filter);

  if(filtered.length===0){
    container.innerHTML=`<div class="empty">No events found.</div>`;
    return;
  }

  const grid=document.createElement('div');
  grid.className='grid';

  filtered.forEach(ev=>{
    const card=document.createElement('div');
    card.className='card';

    card.innerHTML=`
      <div class="status-badge ${ev.status}">
        ${ev.status}
      </div>

      <img src="${ev.image || 'https://images.unsplash.com/photo-1498050108023-c5249f4df085'}">

      <div class="card-body">
        <h3>${ev.title}</h3>
        <div class="meta">
          ${ev.type || ''} • ${ev.startDate || ''}
        </div>
        <p>${ev.description ? ev.description.slice(0,120)+'...' : ''}</p>

        <div class="actions">
  <button class="btn-details" onclick="openDetails('${ev.id}')">
    Details
  </button>

  <button class="btn-edit" onclick="editEvent('${ev.id}')">
    Edit
  </button>

  <button class="btn-delete" onclick="deleteEvent('${ev.id}')">
    Delete
  </button>
</div>
      </div>
    `;

    grid.appendChild(card);
  });

  container.appendChild(grid);
}

/* DETAILS MODAL */
function openDetails(id){
  const ev=getEvents().find(e=>String(e.id)===String(id));
  if(!ev) return;

  document.getElementById('modalBody').innerHTML=`
    <img src="${ev.image || 'https://images.unsplash.com/photo-1498050108023-c5249f4df085'}">

    <h2>${ev.title}</h2>

    <div class="section"><b>Description:</b> ${ev.description}</div>
    <div class="section"><b>Type:</b> ${ev.type}</div>
    <div class="section"><b>Mode:</b> ${ev.mode}</div>
    <div class="section"><b>Date:</b> ${ev.startDate} → ${ev.endDate}</div>
    <div class="section"><b>Time:</b> ${ev.startTime} → ${ev.endTime}</div>
    <div class="section"><b>Min Points:</b> ${ev.minPoints} pts</div>
    <div class="section"><b>Capacity:</b> ${ev.capacity}</div>
    <div class="section"><b>Points Awarded:</b> ${ev.pointsAttend} / ${ev.pointsFull}</div>
    <div class="section"><b>Eligible Students:</b> ${ev.expectedEligible}</div>
    <div class="section"><b>Status:</b> ${ev.status}</div>
  `;

  document.getElementById('modal').style.display='flex';
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}

function editEvent(id){
  localStorage.setItem('editEventID',id);
  window.location.href='create-events-uni.html';
}

function deleteEvent(id){
  if(confirm('Delete this event?')){
    let arr=getEvents().filter(e=>String(e.id)!==String(id));
    localStorage.setItem('events',JSON.stringify(arr));
    renderEvents();
  }
}

renderEvents();

</script>
</body>
</html>
