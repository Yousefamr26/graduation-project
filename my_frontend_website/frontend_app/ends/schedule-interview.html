<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no">
  <title>SmartCareerHub · Schedule Interview</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #f5f7fb 0%, #eef2f7 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
    }

    .overlay {
      width: 100%;
      max-width: 650px;
      margin: 0 auto;
    }

    .modal-card {
      background: white;
      border-radius: 2rem;
      padding: 2.5rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      border: 1px solid #f0f0f0;
    }

    h2 {
      font-weight: 700;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }

    .sub {
      color: #64748b;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .student-badge {
      background: #eef2ff;
      color: #4338ca;
      padding: 0.2rem 1rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-block;
      margin-bottom: 1.5rem;
    }

    label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #334155;
      margin-bottom: 0.4rem;
      display: block;
    }

    .form-control, .form-select {
      border-radius: 1rem;
      border: 1px solid #e2e8f0;
      background: #f9fafb;
      padding: 0.7rem 1rem;
      font-size: 0.95rem;
      transition: 0.2s;
      margin-bottom: 1.2rem;
    }

    .form-control:focus, .form-select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      background: white;
    }

    textarea.form-control {
      resize: vertical;
      min-height: 90px;
    }

    .btn-confirm {
      background: #2563eb;
      border: none;
      color: white;
      border-radius: 2.5rem;
      padding: 0.8rem 2rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: 0.2s;
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.25);
    }

    .btn-confirm:hover {
      background: #1d4ed8;
      color: white;
    }

    .btn-cancel {
      background: white;
      border: 1px solid #e2e8f0;
      color: #475569;
      border-radius: 2.5rem;
      padding: 0.8rem 2rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-cancel:hover {
      background: #f8fafc;
    }

    /* Custom toast popup */
    .custom-toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #1e293b;
      color: white;
      padding: 1rem 2rem;
      border-radius: 3rem;
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
      z-index: 9999;
      transform: translateY(120px);
      opacity: 0;
      transition: 0.3s;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      max-width: 90vw;
    }

    .custom-toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .custom-toast.error {
      background: #b91c1c;
    }

    @media (max-width: 576px) {
      .modal-card {
        padding: 1.8rem;
        border-radius: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="modal-card">
      <h2><i class="fas fa-calendar-plus text-primary"></i> Schedule Interview</h2>
      <p class="sub">Schedule an interview with <span class="student-badge" id="studentNameDisplay">Student</span></p>

      <form id="scheduleForm">
        <!-- Hidden field for student user ID -->
        <input type="hidden" id="studentUserId" value="">

        <div class="row g-3">
          <div class="col-md-6">
            <label for="date">Date</label>
            <input type="date" class="form-control" id="date" required>
          </div>
          <div class="col-md-6">
            <label for="time">Time</label>
            <input type="time" class="form-control" id="time" required>
          </div>
        </div>

        <div class="row g-3">
          <div class="col-md-6">
            <label for="type">Interview Type</label>
            <select class="form-select" id="type" required>
              <option value="">Select type</option>
              <option value="Online">Online (Video Call)</option>
              <option value="Onsite">Onsite</option>
              <option value="Phone">Phone Interview</option>
              <option value="Technical">Technical</option>
              <option value="HR">HR</option>
            </select>
          </div>
          <div class="col-md-6">
            <label for="interviewer">Interviewer Name</label>
            <input type="text" class="form-control" id="interviewer" placeholder="e.g. Eng. Sara" required>
          </div>
        </div>

        <div class="row g-3">
          <div class="col-md-6">
            <label for="studentName">Student Name</label>
            <input type="text" class="form-control" id="studentName" placeholder="e.g. Sarah Doe" required>
          </div>
          <div class="col-md-6">
            <label for="roadmapId">Roadmap ID</label>
            <input type="number" class="form-control" id="roadmapId" placeholder="e.g. 1" value="1" min="1">
          </div>
        </div>

        <label for="location">Location / Meeting Link</label>
        <input type="text" class="form-control" id="location" placeholder="Enter meeting link or office address" required>

        <label for="notes">Additional Notes</label>
        <textarea class="form-control" id="notes" placeholder="Any special instructions or feedback..."></textarea>

        <div class="d-flex gap-3 mt-3">
          <button type="submit" class="btn btn-confirm flex-grow-1">
            <i class="fas fa-check-circle"></i> Confirm Schedule
          </button>
          <button type="button" class="btn btn-cancel flex-grow-1" id="cancelBtn">
            <i class="fas fa-times"></i> Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Popup -->
  <div id="liveToast" class="custom-toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function() {
      const API_BASE_URL = "http://smartcareerhub.runasp.net/api";
      const TOKEN = localStorage.getItem("authToken") || "";

      const toastEl = document.getElementById("liveToast");

      function showToast(message, isError = false) {
        toastEl.textContent = message;
        toastEl.className = `custom-toast ${isError ? 'error' : ''} show`;
        setTimeout(() => toastEl.classList.remove("show"), 4000);
      }

      // Get query parameters (for pre-filling student info)
      const urlParams = new URLSearchParams(window.location.search);
      const studentId = urlParams.get("studentUserId") || "";
      const studentName = urlParams.get("studentName") || "";

      // Pre-fill if available
      if (studentId) {
        document.getElementById("studentUserId").value = studentId;
      }
      if (studentName) {
        document.getElementById("studentName").value = studentName;
        document.getElementById("studentNameDisplay").textContent = studentName;
      }

      // Also check localStorage for previously passed data
      const storedStudent = JSON.parse(localStorage.getItem("selectedStudent") || "{}");
      if (storedStudent.studentUserId && !studentId) {
        document.getElementById("studentUserId").value = storedStudent.studentUserId;
      }
      if (storedStudent.studentName && !studentName) {
        document.getElementById("studentName").value = storedStudent.studentName;
        document.getElementById("studentNameDisplay").textContent = storedStudent.studentName;
      }

      // Form submission
      document.getElementById("scheduleForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const dateVal = document.getElementById("date").value;
        const timeVal = document.getElementById("time").value;
        
        if (!dateVal || !timeVal) {
          showToast("Please select both date and time", true);
          return;
        }

        // Combine date and time into ISO string
        const scheduledDate = new Date(`${dateVal}T${timeVal}:00`).toISOString();

        const payload = {
          studentUserId: document.getElementById("studentUserId").value.trim() || "50710218-a85d-43be-9c7d-ced898e6a1cc",
          studentName: document.getElementById("studentName").value.trim(),
          scheduledDate: scheduledDate,
          interviewType: document.getElementById("type").value,
          interviewerName: document.getElementById("interviewer").value.trim(),
          roadmapId: parseInt(document.getElementById("roadmapId").value) || 1,
          additionalNotes: document.getElementById("notes").value.trim(),
          location: document.getElementById("location").value.trim()
        };

        // Validate required fields
        if (!payload.studentName || !payload.interviewerName || !payload.interviewType || !payload.location) {
          showToast("Please fill in all required fields", true);
          return;
        }

        try {
          const res = await fetch(`${API_BASE_URL}/Interviews`, {
            method: "POST",
            headers: {
              "Authorization": `Bearer ${TOKEN}`,
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          if (!res.ok) {
            const errorData = await res.json().catch(() => ({}));
            throw new Error(errorData.message || "Failed to schedule interview");
          }

          // Success - store minimal data and redirect
          const interviewData = {
            date: dateVal,
            time: timeVal,
            type: payload.interviewType,
            location: payload.location,
            interviewer: payload.interviewerName,
            notes: payload.additionalNotes,
            studentName: payload.studentName
          };
          
          localStorage.setItem("interview", JSON.stringify(interviewData));
          showToast("Interview scheduled successfully! Redirecting...");
          
          setTimeout(() => {
            window.location.href = "calender-company.html";
          }, 1500);

        } catch (err) {
          console.error("Schedule error:", err);
          showToast(err.message || "Could not schedule interview. Please try again.", true);
        }
      });

      // Cancel button
      document.getElementById("cancelBtn").addEventListener("click", function() {
        if (confirm("Are you sure you want to cancel? Any unsaved changes will be lost.")) {
          window.location.href = "interview-company.html";
        }
      });

      // Check authentication
      if (!TOKEN) {
        showToast("Authentication token missing. You may need to log in again.", true);
      }
    })();
  </script>
</body>
</html>
