<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no, viewport-fit=cover">
  <title>Roadmap Explorer </title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --primary: #3498DB;
      --primary-light: #3498DB;
      --surface: #ffffff;
      --bg: #f5f7fe;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e8edf5;
      --shadow-sm: 0 8px 20px rgba(0,0,0,0.04);
      --shadow-md: 0 20px 35px rgba(0,0,0,0.08);
      --shadow-lg: 0 30px 50px rgba(0,0,0,0.12);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image: 
        radial-gradient(ellipse at 5% 15%, rgba(79,70,229,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 80%, rgba(124,58,237,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(37,99,235,0.02) 0%, transparent 60%);
      line-height: 1.5;
    }

    .container-main {
      padding: 32px 24px;
      max-width: 1500px;
      margin: 0 auto;
    }
    @media (min-width: 992px) {
      .container-main { padding: 48px 52px; }
    }

    /* Header Section */
    .page-header { margin-bottom: 32px; }
    .page-header h4 {
      font-weight: 800;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      letter-spacing: -0.8px;
      background: linear-gradient(135deg, #3498DB 0%, #3498DB 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-header p {
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 1rem;
      margin-top: 4px;
    }

    /* Stats Overview Card */
    .stats-overview {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 28px 36px;
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .stats-overview::before {
      content: '';
      position: absolute;
      top: -30px;
      right: -30px;
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, rgba(79,70,229,0.08), rgba(124,58,237,0.06));
      border-radius: 50%;
      pointer-events: none;
    }
    .stats-overview .stat-item {
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 1;
    }
    .stats-overview .stat-icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.7rem;
      color: white;
      background: linear-gradient(135deg, #3498DB, #3498DB);
      box-shadow: 0 14px 24px rgba(79,70,229,0.3);
    }
    .stats-overview .stat-info small {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      font-size: 0.72rem;
      color: var(--text-secondary);
    }
    .stats-overview .stat-info h5 {
      font-weight: 800;
      font-size: 2rem;
      color: var(--text);
      margin: 0;
      letter-spacing: -0.5px;
    }

    /* Search & Filters */
    .search-filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      margin-bottom: 32px;
    }
    .search-wrapper {
      flex: 1;
      min-width: 280px;
    }
    .input-group {
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      background: var(--surface);
      border: 1.5px solid var(--border);
      transition: var(--transition);
    }
    .input-group:focus-within {
      border-color: var(--primary);
      box-shadow: 0 8px 24px rgba(79,70,229,0.12);
    }
    .input-group-text {
      background: var(--surface);
      border: none;
      padding-left: 20px;
      color: #94a3b8;
      font-size: 1rem;
    }
    .form-control {
      border: none;
      height: 54px;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      background: var(--surface);
    }
    .form-control::placeholder { color: #94a3b8; font-weight: 400; }
    .form-control:focus { box-shadow: none; outline: none; }

    .filter-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .filter-btn {
      border-radius: 36px;
      padding: 11px 26px;
      font-weight: 600;
      font-size: 0.82rem;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      letter-spacing: 0.4px;
      white-space: nowrap;
    }
    .filter-btn.active {
      background: linear-gradient(135deg, #3498DB, #3498DB);
      color: white;
      border-color: transparent;
      box-shadow: 0 10px 22px rgba(79,70,229,0.35);
      transform: scale(1.03);
    }
    .filter-btn:hover:not(.active) {
      background: #f8fafc;
      border-color: #cbd5e1;
      transform: translateY(-1px);
    }

    /* Roadmap Cards Grid */
    .roadmaps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }
    @media (max-width: 576px) {
      .roadmaps-grid { grid-template-columns: 1fr; }
    }

    .roadmap-card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1.5px solid transparent;
      position: relative;
    }
    .roadmap-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(79,70,229,0.2);
    }
    .roadmap-card .card-img-wrapper {
      position: relative;
      height: 200px;
      overflow: hidden;
      background: #eef2f6;
    }
    .roadmap-card .card-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .roadmap-card:hover .card-img-wrapper img { transform: scale(1.06); }
    .roadmap-card .enrolled-ribbon {
      position: absolute;
      top: 16px;
      right: 16px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      padding: 6px 16px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.5px;
      box-shadow: 0 6px 16px rgba(16,185,129,0.4);
      z-index: 2;
    }
    .roadmap-card .card-content {
      padding: 22px 20px 20px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .roadmap-card .card-title {
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--text);
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }
    .roadmap-card .card-subtitle {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
      margin-bottom: 18px;
    }
    .roadmap-card .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f1f5f9;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text);
      border: 1px solid #e9eef3;
      transition: var(--transition);
    }
    .stat-pill i { font-size: 0.85rem; color: var(--primary); }
    .stat-pill.points i { color: #f59e0b; }
    .stat-pill.skills i { color: #3b82f6; }
    .stat-pill.projects i { color: #8b5cf6; }
    .stat-pill.materials i { color: #10b981; }
    .stat-pill.quizzes i { color: #ef4444; }

    .roadmap-card .actions-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: auto;
    }
    .roadmap-card .actions-row .btn {
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.76rem;
      padding: 10px 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: var(--transition);
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .btn-outline-muted {
      border: 1.5px solid #e2e8f0;
      color: var(--text);
      background: var(--surface);
    }
    .btn-outline-muted:hover {
      background: #f8fafc;
      border-color: #94a3b8;
    }
    .btn-primary-gradient {
      background: linear-gradient(135deg, #3498DB, #3498DB);
      color: white;
      border: none;
      box-shadow: 0 8px 18px rgba(79,70,229,0.3);
    }
    .btn-primary-gradient:hover {
      box-shadow: 0 12px 24px rgba(79,70,229,0.4);
      transform: scale(1.02);
    }
    .btn-danger-outline {
      border: 1.5px solid #fecaca;
      color: #dc2626;
      background: var(--surface);
    }
    .btn-danger-outline:hover {
      background: #fef2f2;
      border-color: #ef4444;
    }

    /* Pagination */
    .pagination-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 32px;
      flex-wrap: wrap;
    }
    .pagination-container .btn {
      border-radius: 14px;
      font-weight: 600;
      padding: 10px 20px;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: var(--transition);
    }
    .pagination-container .btn:hover:not(:disabled) {
      background: #f8fafc;
      border-color: var(--primary);
      color: var(--primary);
    }
    .pagination-container .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .pagination-container .btn.active-page {
      background: linear-gradient(135deg, #3498DB, #3498DB);
      color: white;
      border-color: transparent;
      box-shadow: 0 6px 16px rgba(79,70,229,0.3);
      pointer-events: none;
    }
    .pagination-container .page-info {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 0.85rem;
      padding: 0 8px;
    }
    .page-size-select {
      border-radius: 14px;
      border: 1.5px solid var(--border);
      padding: 10px 16px;
      font-weight: 600;
      font-size: 0.85rem;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: var(--transition);
    }

    /* Toast */
    #toastContainer {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .toast-popup {
      background: #0f172a;
      color: white;
      padding: 16px 30px;
      border-radius: 50px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideUp 0.35s ease;
      font-size: 0.9rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      max-width: 380px;
    }
    .toast-popup.error { background: #dc2626; }
    .toast-popup.success { background: #059669; }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Skeleton Loader */
    .skeleton {
      background: linear-gradient(90deg, #e9edf5 25%, #f0f4fa 50%, #e9edf5 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 28px;
      height: 420px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Modal Styling */
    .modal-content {
      border-radius: 32px;
      border: none;
      box-shadow: 0 40px 70px rgba(0,0,0,0.25);
      overflow: hidden;
    }
    .modal-header {
      padding: 28px 28px 8px;
      border-bottom: none;
    }
    .modal-body {
      padding: 20px 28px 28px;
    }
    .list-group-item {
      border-radius: 14px !important;
      margin-bottom: 6px;
      border: 1px solid #edf2f9;
      padding: 14px 18px;
      font-weight: 500;
    }
    .detail-badge {
      background: #f1f5f9;
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .text-purple { color: #3498DB; }
  </style>
</head>
<body>
<div class="container-main">
  <!-- Header -->
  <div class="page-header">
    <h4>🚀 Roadmap Explorer</h4>
    <p>Structured career paths with all learning activities in one place</p>
  </div>

  <!-- Stats Overview -->
  <div class="stats-overview">
    <div class="stat-item">
      <div class="stat-icon"><i class="bi bi-graph-up-arrow"></i></div>
      <div class="stat-info">
        <small>Total Roadmaps</small>
        <h5 id="totalCount">0</h5>
      </div>
    </div>
    <div class="stat-item">
      <div class="stat-icon" style="background:linear-gradient(135deg,#f59e0b,#d97706);"><i class="bi bi-star-fill"></i></div>
      <div class="stat-info">
        <small>Current Page</small>
        <h5 id="currentPageDisplay">1</h5>
      </div>
    </div>
    <div class="stat-item">
      <div class="stat-icon" style="background:linear-gradient(135deg,#10b981,#059669);"><i class="bi bi-collection"></i></div>
      <div class="stat-info">
        <small>Page Size</small>
        <h5 id="pageSizeDisplay">10</h5>
      </div>
    </div>
  </div>

  <!-- Search & Filters -->
  <div class="search-filter-row">
    <div class="search-wrapper">
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control" placeholder="Search by title, role, or company..." id="searchInput">
      </div>
    </div>
    <div class="filter-group" id="filterButtons">
      <button class="filter-btn active" data-filter="all">ALL</button>
      <button class="filter-btn" data-filter="ai">AI</button>
      <button class="filter-btn" data-filter="web">WEB</button>
      <button class="filter-btn" data-filter="data">DATA</button>
      <button class="filter-btn" data-filter="mobile">MOBILE</button>
    </div>
  </div>

  <!-- Roadmaps Grid -->
  <div class="roadmaps-grid" id="roadmapsContainer"></div>

  <!-- Pagination -->
  <div class="pagination-container" id="paginationContainer"></div>
</div>

<!-- Toast Container -->
<div id="toastContainer"></div>

<script>
  (function() {
    const API_BASE = "http://smartcareerhub.runasp.net/api";
    const TOKEN = localStorage.getItem("authToken") || "";

    // State
    let roadmaps = [];
    let activeFilter = "all";
    let enrolledIds = new Set();
    let isLoading = false;
    
    // Pagination state
    let currentPage = 1;
    let pageSize = 10;
    let totalPages = 1;
    let totalCount = 0;

    // DOM Elements
    const searchInput = document.getElementById("searchInput");
    const container = document.getElementById("roadmapsContainer");
    const totalCountSpan = document.getElementById("totalCount");
    const currentPageDisplay = document.getElementById("currentPageDisplay");
    const pageSizeDisplay = document.getElementById("pageSizeDisplay");
    const paginationContainer = document.getElementById("paginationContainer");
    const filterBtns = document.querySelectorAll("#filterButtons .filter-btn");

    // Toast
    function toast(msg, type='info') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast-popup ${type==='error'?'error':(type==='success'?'success':'')}`;
      const icon = type==='error'?'bi-exclamation-circle':(type==='success'?'bi-check-circle':'bi-info-circle');
      t.innerHTML = `<i class="bi ${icon}"></i> ${msg}`;
      c.appendChild(t);
      setTimeout(() => t.remove(), 4500);
    }

    function esc(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // API calls
    async function enroll(id) {
      try {
        const res = await fetch(`${API_BASE}/graduate/roadmaps/enroll`, {
          method: "POST",
          headers: { "Authorization": `Bearer ${TOKEN}`, "Content-Type": "application/json" },
          body: JSON.stringify({ roadmapId: id, stripePaymentId: "null", paymentStatus: null })
        });
        if (!res.ok) throw new Error();
        enrolledIds.add(id);
        toast("✅ Enrolled successfully!", "success");
        render();
      } catch { toast("Enroll failed", "error"); }
    }

    async function unenroll(id) {
      try {
        const res = await fetch(`${API_BASE}/graduate/roadmaps/${id}/unenroll`, {
          method: "DELETE",
          headers: { "Authorization": `Bearer ${TOKEN}` }
        });
        if (!res.ok) throw new Error();
        enrolledIds.delete(id);
        toast("Unenrolled", "success");
        render();
      } catch { toast("Unenroll failed", "error"); }
    }

    // Modals
    function showMaterials(roadmap) {
      const materials = roadmap.learningMaterials || [];
      const html = `
      <div class="modal fade" id="matModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="fw-bold"><i class="bi bi-book me-2 text-success"></i>Materials · ${esc(roadmap.title)}</h5>
              <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              ${materials.length ? materials.map(m => `
                <div class="d-flex justify-content-between align-items-center p-3 border rounded-4 mb-2">
                  <div>
                    <strong>${esc(m.titleVideos || m.titlePdf)}</strong>
                    <span class="detail-badge ms-2">${m.type}</span>
                    <span class="text-muted small ms-2">${m.duration || m.durationpdf || ''}</span>
                  </div>
                  <div class="d-flex gap-2 align-items-center">
                    <span class="detail-badge"><i class="bi bi-star-fill text-warning"></i> ${m.points || 0} pts</span>
                    ${m.filePath ? `` : ''}
                  </div>
                </div>`).join('') : '<p class="text-muted">No materials available.</p>'}
            </div>
          </div>
        </div>
      </div>`;
      document.getElementById('matModal')?.remove();
      document.body.insertAdjacentHTML('beforeend', html);
      new bootstrap.Modal(document.getElementById('matModal')).show();
    }

    function showQuizzes(roadmap) {
      const quizzes = roadmap.quizzes || [];
      const html = `
      <div class="modal fade" id="quizModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="fw-bold"><i class="bi bi-patch-question me-2 text-danger"></i>Quizzes · ${esc(roadmap.title)}</h5>
              <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              ${quizzes.length ? quizzes.map(q => `
                <div class="p-3 border rounded-4 mb-2">
                  <div class="d-flex justify-content-between">
                    <strong>${esc(q.title)}</strong>
                    <span class="detail-badge">${q.type}</span>
                  </div>
                  <div class="d-flex gap-3 mt-2 text-muted small">
                    <span><i class="bi bi-question-circle"></i> ${(q.questions || []).length} questions</span>
                    <span><i class="bi bi-star-fill text-warning"></i> ${q.points || 0} pts</span>
                  </div>
                </div>`).join('') : '<p class="text-muted">No quizzes available.</p>'}
            </div>
          </div>
        </div>
      </div>`;
      document.getElementById('quizModal')?.remove();
      document.body.insertAdjacentHTML('beforeend', html);
      new bootstrap.Modal(document.getElementById('quizModal')).show();
    }

    function showProjects(roadmap) {
      const projects = roadmap.projects || [];
      const html = `
      <div class="modal fade" id="projModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="fw-bold"><i class="bi bi-folder me-2 text-purple"></i>Projects · ${esc(roadmap.title)}</h5>
              <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              ${projects.length ? projects.map(p => `
                <div class="p-3 border rounded-4 mb-2">
                  <strong>${esc(p.title)}</strong>
                  <p class="text-muted small mt-1 mb-2">${esc(p.description || '')}</p>
                  <span class="detail-badge">${p.difficulty}</span>
                  <span class="detail-badge"><i class="bi bi-star-fill text-warning"></i> ${p.points || 0} pts</span>
                </div>`).join('') : '<p class="text-muted">No projects available.</p>'}
            </div>
          </div>
        </div>
      </div>`;
      document.getElementById('projModal')?.remove();
      document.body.insertAdjacentHTML('beforeend', html);
      new bootstrap.Modal(document.getElementById('projModal')).show();
    }

    function showFullDetails(roadmap) {
      const skills = roadmap.requiredSkills || [];
      const html = `
      <div class="modal fade" id="fullModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="fw-bold">${esc(roadmap.title)}</h5>
              <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <p><strong>Role:</strong> ${esc(roadmap.targetRole)} | <strong>Company:</strong> ${esc(roadmap.companyName)}</p>
              <p><strong>Points:</strong> ${roadmap.totalPoints} | <strong>Price:</strong> $${roadmap.price || 0}</p>
              <hr>
              <h6>Skills (${skills.length})</h6>
              <div class="d-flex flex-wrap gap-2">${skills.map(s => `<span class="detail-badge">${esc(s.skillName)} (${s.level}) - ${s.levelPoints}pts</span>`).join('')}</div>
            </div>
          </div>
        </div>
      </div>`;
      document.getElementById('fullModal')?.remove();
      document.body.insertAdjacentHTML('beforeend', html);
      new bootstrap.Modal(document.getElementById('fullModal')).show();
    }

    // Render pagination
    function renderPagination() {
      const maxButtons = 5;
      let pages = [];
      
      if (totalPages <= maxButtons) {
        for (let i = 1; i <= totalPages; i++) pages.push(i);
      } else {
        let start = Math.max(1, currentPage - 2);
        let end = Math.min(totalPages, currentPage + 2);
        
        if (currentPage <= 3) {
          start = 1;
          end = maxButtons;
        } else if (currentPage >= totalPages - 2) {
          start = totalPages - maxButtons + 1;
          end = totalPages;
        }
        
        for (let i = start; i <= end; i++) pages.push(i);
      }

      let html = `
        <button class="btn" onclick="window.goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>
          <i class="bi bi-chevron-double-left"></i>
        </button>
        <button class="btn" onclick="window.goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
          <i class="bi bi-chevron-left"></i> Prev
        </button>
      `;

      if (pages[0] > 1) {
        html += `<button class="btn" onclick="window.goToPage(1)">1</button>`;
        if (pages[0] > 2) html += `<span class="page-info">...</span>`;
      }

      pages.forEach(p => {
        html += `<button class="btn ${p === currentPage ? 'active-page' : ''}" onclick="window.goToPage(${p})">${p}</button>`;
      });

      if (pages[pages.length - 1] < totalPages) {
        if (pages[pages.length - 1] < totalPages - 1) html += `<span class="page-info">...</span>`;
        html += `<button class="btn" onclick="window.goToPage(${totalPages})">${totalPages}</button>`;
      }

      html += `
        <button class="btn" onclick="window.goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
          Next <i class="bi bi-chevron-right"></i>
        </button>
        <button class="btn" onclick="window.goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>
          <i class="bi bi-chevron-double-right"></i>
        </button>
        <span class="page-info">Page ${currentPage} of ${totalPages} (${totalCount} total)</span>
      `;

      paginationContainer.innerHTML = html;
    }

    // Render cards
    function render() {
      if (isLoading) return;
      
      if (!roadmaps.length) {
        container.innerHTML = `<div class="col-12 text-center py-5 text-muted"><i class="bi bi-compass fs-1 d-block mb-2"></i>No roadmaps found</div>`;
        paginationContainer.innerHTML = '';
        return;
      }

      container.innerHTML = roadmaps.map(r => {
        const id = r.id || r.roadmapId;
        const enrolled = enrolledIds.has(id) || r.isEnrolled;
        const img = r.coverImageUrl ? `http://smartcareerhub.runasp.net${r.coverImageUrl}` : 'https://images.unsplash.com/photo-1517245318773-b7b83ca927a0?q=80&w=2070&auto=format&fit=crop';
        const skillsCount = (r.requiredSkills || []).length;
        const projectsCount = (r.projects || []).length;
        const materialsCount = (r.learningMaterials || []).length;
        const quizzesCount = (r.quizzes || []).length;

        return `
        <div class="roadmap-card">
          <div class="card-img-wrapper">
            <img src="${esc(img)}" alt="${esc(r.title)}" onerror="this.src='https://via.placeholder.com/400x200?text=Roadmap'">
            ${enrolled ? '<div class="enrolled-ribbon">✓ Enrolled</div>' : ''}
          </div>
          <div class="card-content">
            <div class="card-title">${esc(r.title)}</div>
            <div class="card-subtitle">${esc(r.targetRole)} · ${esc(r.companyName)}</div>
            <div class="stats-row">
              <span class="stat-pill points"><i class="bi bi-star-fill"></i> ${r.totalPoints || 0} pts</span>
              <span class="stat-pill skills"><i class="bi bi-tools"></i> ${skillsCount} skills</span>
              <span class="stat-pill projects"><i class="bi bi-folder"></i> ${projectsCount} proj</span>
              <span class="stat-pill materials"><i class="bi bi-book"></i> ${materialsCount} mat</span>
              <span class="stat-pill quizzes"><i class="bi bi-patch-question"></i> ${quizzesCount} quiz</span>
            </div>
            <div class="actions-row">
              <button class="btn btn-outline-muted mat-btn" data-id="${id}"><i class="bi bi-book"></i> Materials</button>
              <button class="btn btn-outline-muted quiz-btn" data-id="${id}"><i class="bi bi-patch-question"></i> Quizzes</button>
              <button class="btn btn-outline-muted proj-btn" data-id="${id}"><i class="bi bi-folder"></i> Projects</button>
              <button class="btn btn-outline-muted full-btn" data-id="${id}"><i class="bi bi-eye"></i> Details</button>
              <button class="btn btn-primary-gradient view-btn" data-id="${id}" style="grid-column:span 2;">
                <i class="bi bi-arrow-right-circle"></i> View Content
              </button>
              ${enrolled ? 
                `<button class="btn btn-danger-outline unenroll-btn" data-id="${id}" style="grid-column:span 2;"><i class="bi bi-x-circle"></i> Unenroll</button>` :
                `<button class="btn btn-primary-gradient enroll-btn" data-id="${id}" style="grid-column:span 2;"><i class="bi bi-plus-circle"></i> Enroll Now</button>`
              }
            </div>
          </div>
        </div>`;
      }).join('');

      // Attach listeners
      document.querySelectorAll('.view-btn').forEach(b => 
        b.addEventListener('click', e => {
          const id = e.currentTarget.dataset.id;
          // نجيب الرود ماب من اللي موجودين
          const roadmap = roadmaps.find(r => (r.id || r.roadmapId) == id);
          if (!roadmap) {
            toast("Roadmap not found", "error");
            return;
          }
          // نطلع الكويزات بالأسئلة
          const quizzes = (roadmap.quizzes || []).map(q => ({
            id: q.id,
            title: q.title,
            type: q.type,
            points: q.points,
            questions: (q.questions || []).map(ques => ({
              id: ques.id,
              text: ques.text,
              type: ques.type,
              options: JSON.parse(ques.optionsJson || "[]"),
              correctAnswer: ques.correctAnswer
            }))
          }));
          //console.log(JSON.stringify(quizzes));
          // نخزن
          localStorage.setItem("currentroadexams", JSON.stringify(quizzes));
          // تقدر تبعت id في URL
          window.location.href = `RoadMapById.html?id=${id}`;
        })
      );
      document.querySelectorAll('.enroll-btn').forEach(b => b.addEventListener('click', e => enroll(parseInt(e.currentTarget.dataset.id))));
      document.querySelectorAll('.unenroll-btn').forEach(b => b.addEventListener('click', e => unenroll(parseInt(e.currentTarget.dataset.id))));
      document.querySelectorAll('.mat-btn').forEach(b => b.addEventListener('click', e => {
        const r = roadmaps.find(r => (r.id || r.roadmapId) == e.currentTarget.dataset.id);
        if (r) showMaterials(r);
      }));
      document.querySelectorAll('.quiz-btn').forEach(b => b.addEventListener('click', e => {
        const r = roadmaps.find(r => (r.id || r.roadmapId) == e.currentTarget.dataset.id);
        if (r) showQuizzes(r);
      }));
      document.querySelectorAll('.proj-btn').forEach(b => b.addEventListener('click', e => {
        const r = roadmaps.find(r => (r.id || r.roadmapId) == e.currentTarget.dataset.id);
        if (r) showProjects(r);
      }));
      document.querySelectorAll('.full-btn').forEach(b => b.addEventListener('click', e => {
        const r = roadmaps.find(r => (r.id || r.roadmapId) == e.currentTarget.dataset.id);
        if (r) showFullDetails(r);
      }));

      renderPagination();
    }

    // Navigation
    window.goToPage = function(page) {
      if (page < 1 || page > totalPages || page === currentPage) return;
      currentPage = page;
      loadRoadmaps();
    };

    // Skeletons
    function skeletons(n = 6) {
      container.innerHTML = Array(n).fill(0).map(() => `<div class="skeleton"></div>`).join('');
      paginationContainer.innerHTML = '';
    }

    // Filters
    filterBtns.forEach(b => b.addEventListener('click', () => {
      filterBtns.forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      activeFilter = b.dataset.filter;
      currentPage = 1;
      loadRoadmaps();
    }));

    searchInput.addEventListener('input', () => {
      currentPage = 1;
      loadRoadmaps();
    });

    // Load data
    async function loadRoadmaps() {
      if (!TOKEN) { 
        toast("Please log in.", "error"); 
        return; 
      }
      
      isLoading = true;
      skeletons(pageSize);
      
      try {
        const searchTerm = searchInput.value.trim();
        const categoryFilter = activeFilter !== 'all' ? activeFilter : '';
        
        let url = `${API_BASE}/graduate/roadmaps/catalog?page=${currentPage}&pageSize=${pageSize}&sortBy=createdAt&sortDirection=desc`;
        if (searchTerm) url += `&search=${encodeURIComponent(searchTerm)}`;
        if (categoryFilter) url += `&category=${encodeURIComponent(categoryFilter)}`;
        
        const [catRes, myRes] = await Promise.all([
          fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } }),
          fetch(`${API_BASE}/graduate/roadmaps/my`, { headers: { Authorization: `Bearer ${TOKEN}` } })
        ]);
        
        if (catRes.ok) {
          const data = await catRes.json();
          
          if (data && data.data && Array.isArray(data.data)) {
            roadmaps = data.data;
            totalCount = data.totalCount || data.data.length;
            totalPages = data.totalPages || Math.ceil(totalCount / pageSize);
            currentPage = data.page || currentPage;
          } else if (Array.isArray(data)) {
            roadmaps = data;
            totalCount = data.length;
            totalPages = Math.ceil(totalCount / pageSize);
          } else {
            roadmaps = [];
            totalCount = 0;
            totalPages = 1;
          }
        } else {
          throw new Error('Failed to fetch');
        }
        
        if (myRes.ok) {
          const myData = await myRes.json();
          const myList = Array.isArray(myData) ? myData : (myData.data || []);
          enrolledIds.clear();
          myList.forEach(r => { 
            const rid = r.id || r.roadmapId;
            if (rid) enrolledIds.add(rid); 
          });
        }
        
        totalCountSpan.textContent = totalCount;
        currentPageDisplay.textContent = currentPage;
        pageSizeDisplay.textContent = pageSize;
        
      } catch (e) {
        console.error(e);
        toast("Failed to load roadmaps", "error");
        roadmaps = [];
        totalCount = 0;
        totalPages = 1;
      } finally {
        isLoading = false;
        render();
        if (roadmaps.length) toast(`📄 Page ${currentPage} · ${roadmaps.length} roadmaps`, "success");
      }
    }
    // Initial load
    loadRoadmaps();
  })();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
