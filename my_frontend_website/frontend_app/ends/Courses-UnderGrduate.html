<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no, viewport-fit=cover">
  <title>Courses </title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --primary: #3498db;
      --primary-dark: #3498db;
      --success: #27ae60;
      --danger: #e74c3c;
      --warning: #f39c12;
      --bg: #f8f9fa;
      --surface: #ffffff;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e8edf5;
      --shadow-sm: 0 8px 20px rgba(0,0,0,0.04);
      --shadow-md: 0 20px 35px rgba(0,0,0,0.08);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --transition: 0.25s cubic-bezier(0.23, 1, 0.32, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image: radial-gradient(ellipse at 10% 20%, rgba(52,152,219,0.03) 0%, transparent 50%),
                        radial-gradient(ellipse at 85% 75%, rgba(46,204,113,0.04) 0%, transparent 50%);
      line-height: 1.5;
    }

    .container-main {
      padding: 32px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (min-width: 992px) {
      .container-main { padding: 48px 52px; }
    }

    /* Header */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .page-title {
      font-weight: 800;
      font-size: clamp(1.8rem, 4.5vw, 2.4rem);
      letter-spacing: -0.6px;
      background: linear-gradient(135deg, #3498db 0%, #3498db 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .page-subtitle {
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 1rem;
    }

    /* Stats Box */
    .stats-card {
      background: linear-gradient(135deg, #f4f8ff, #eef3ff);
      border: 1px solid #dbe7ff;
      border-radius: var(--radius-xl);
      padding: 28px 36px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 32px;
      box-shadow: var(--shadow-sm);
    }
    .stats-card .stat-label {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      font-size: 0.72rem;
      color: var(--text-secondary);
    }
    .stats-card .stat-value {
      font-weight: 800;
      font-size: 2rem;
      color: #2c3e50;
    }
    .stats-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 14px 24px rgba(0,0,0,0.06);
      font-size: 2rem;
      color: var(--primary);
    }

    /* Search & Filters */
    .search-filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      margin-bottom: 28px;
    }
    .search-wrapper {
      flex: 1;
      min-width: 280px;
    }
    .input-group {
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      background: var(--surface);
      border: 1.5px solid var(--border);
      transition: var(--transition);
    }
    .input-group:focus-within {
      border-color: var(--primary);
      box-shadow: 0 8px 24px rgba(52,152,219,0.1);
    }
    .input-group-text {
      background: var(--surface);
      border: none;
      padding-left: 20px;
      color: #94a3b8;
    }
    .form-control {
      border: none;
      height: 54px;
      font-size: 0.95rem;
      font-weight: 500;
      background: var(--surface);
    }
    .form-control::placeholder { color: #94a3b8; }
    .form-control:focus { box-shadow: none; }

    .filter-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .filter-btn {
      border-radius: 36px;
      padding: 10px 24px;
      font-weight: 600;
      font-size: 0.82rem;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .filter-btn.active {
      background: linear-gradient(135deg, #3498db, #3498db);
      color: white;
      border-color: transparent;
      box-shadow: 0 10px 22px rgba(52,152,219,0.35);
      transform: scale(1.03);
    }
    .filter-btn:hover:not(.active) {
      background: #f8fafc;
      border-color: #cbd5e1;
    }

    /* Course Cards */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }
    @media (max-width: 500px) {
      .courses-grid { grid-template-columns: 1fr; }
    }

    .course-card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1.5px solid transparent;
      height: 100%;
    }
    .course-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-md);
      border-color: rgba(52,152,219,0.25);
    }
    .course-img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.4s;
    }
    .course-card:hover .course-img { transform: scale(1.04); }
    .card-body {
      padding: 18px 18px 14px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .badge-outline {
      border: 1px solid #dee2e6;
      background: transparent;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 8px;
      color: #495057;
      font-size: 0.7rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .card-title {
      font-weight: 700;
      font-size: 1.2rem;
      margin-top: 10px;
      cursor: pointer;
      color: var(--text);
    }
    .card-text {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin: 8px 0 12px;
      flex: 1;
    }

    /* Stats pills inside card */
    .stats-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat-pill {
      background: #f1f5f9;
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #334155;
    }
    .stat-pill i { font-size: 0.8rem; }
    .stat-pill.points i { color: #f59e0b; }
    .stat-pill.skills i { color: #3b82f6; }
    .stat-pill.projects i { color: #155fc4; }
    .stat-pill.materials i { color: #10b981; }
    .stat-pill.quizzes i { color: #ef4444; }

    /* Action buttons grid */
    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: auto;
    }
    .action-buttons .btn {
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.7rem;
      padding: 8px 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: var(--transition);
      white-space: nowrap;
    }
    .btn-outline-muted {
      border: 1px solid #e2e8f0;
      background: var(--surface);
      color: #334155;
    }
    .btn-outline-muted:hover {
      background: #f8fafc;
      border-color: #94a3b8;
    }
    .btn-primary-action {
      background: linear-gradient(135deg, #3498db, #3498db);
      color: white;
      border: none;
      box-shadow: 0 6px 14px rgba(52,152,219,0.25);
    }
    .btn-primary-action:hover {
      box-shadow: 0 10px 20px rgba(52,152,219,0.4);
      transform: scale(1.02);
    }
    .btn-enrolled-indicator {
      background: var(--success);
      color: white;
      border: none;
      cursor: default;
    }
    .btn-danger-outline {
      border: 1px solid #fecaca;
      color: #dc2626;
      background: white;
    }
    .btn-danger-outline:hover {
      background: #fef2f2;
      border-color: #ef4444;
    }

    /* Pagination */
    .pagination-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .pagination-container .btn {
      border-radius: 12px;
      font-weight: 600;
      padding: 8px 16px;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: var(--transition);
    }
    .pagination-container .btn:hover:not(:disabled) {
      background: #f0f4ff;
      border-color: var(--primary);
      color: var(--primary);
    }
    .pagination-container .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .pagination-container .btn.active-page {
      background: linear-gradient(135deg, #3498db, #3498db);
      color: white;
      border-color: transparent;
      box-shadow: 0 6px 14px rgba(52,152,219,0.3);
      pointer-events: none;
    }
    .page-info-text {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 0.8rem;
      padding: 0 6px;
    }

    /* Toast */
    #toastContainer {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .toast-popup {
      background: #0f172a;
      color: white;
      padding: 16px 28px;
      border-radius: 50px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideUpToast 0.35s ease;
      font-size: 0.9rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .toast-popup.error { background: #dc2626; }
    .toast-popup.success { background: #059669; }
    @keyframes slideUpToast {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .loading-spinner {
      display: flex;
      justify-content: center;
      padding: 60px;
      grid-column: 1 / -1;
    }

    /* Modal styling */
    .modal-content {
      border-radius: 24px;
      border: none;
      box-shadow: 0 40px 70px rgba(0,0,0,0.2);
    }
    .modal-header {
      padding: 24px 24px 8px;
      border-bottom: none;
    }
    .modal-body {
      padding: 16px 24px 24px;
    }
  </style>
</head>
<body>
<div class="container-main">
  <!-- Header -->
  <div class="page-header">
    <div>
      <h2 class="page-title"><i class="bi bi-book me-2"></i>Courses</h2>
      <p class="page-subtitle">Explore courses from training centers and enhance your skills</p>
    </div>
  </div>

  <!-- Stats Box -->
  <div class="stats-card">
    <div>
      <div class="stat-label">Available Courses</div>
      <div class="stat-value" id="coursesCount">0</div>
    </div>
    <div class="stats-icon"><i class="bi bi-mortarboard"></i></div>
  </div>

  <!-- Search & Filters -->
  <div class="search-filter-row">
    <div class="search-wrapper">
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control" placeholder="Search by title, role, or company..." id="searchInput">
      </div>
    </div>
    <div class="filter-group" id="filterButtons">
      <button class="filter-btn active" data-filter="all">ALL</button>
      <button class="filter-btn" data-filter="ai">AI</button>
      <button class="filter-btn" data-filter="web">WEB</button>
      <button class="filter-btn" data-filter="data">DATA</button>
      <button class="filter-btn" data-filter="mobile">MOBILE</button>
    </div>
  </div>

  <!-- Courses Grid -->
  <div class="courses-grid" id="coursesContainer">
    <div class="loading-spinner">
      <div class="spinner-border text-primary" role="status"></div>
    </div>
  </div>

  <!-- Pagination -->
  <div class="pagination-container" id="paginationContainer"></div>
</div>

<!-- Toast Container -->
<div id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (function() {
    const API_BASE = "http://smartcareerhub.runasp.net/api";
    const TOKEN = localStorage.getItem("authToken") || "";

    // State
    let courses = [];
    let activeFilter = "all";
    let enrolledIds = new Set();
    let isLoading = false;
    
    let currentPage = 1;
    let pageSize = 10;
    let totalPages = 1;
    let totalCount = 0;

    const searchInput = document.getElementById("searchInput");
    const container = document.getElementById("coursesContainer");
    const coursesCountEl = document.getElementById("coursesCount");
    const paginationContainer = document.getElementById("paginationContainer");
    const filterBtns = document.querySelectorAll("#filterButtons .filter-btn");

    // Toast
    function toast(msg, type='info') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast-popup ${type==='error'?'error':(type==='success'?'success':'')}`;
      const icon = type==='error'?'bi-exclamation-circle':(type==='success'?'bi-check-circle':'bi-info-circle');
      t.innerHTML = `<i class="bi ${icon}"></i> ${msg}`;
      c.appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    function esc(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // Enroll / Unenroll
    async function enrollCourse(roadmapId, title) {
      try {
        const res = await fetch(`${API_BASE}/student/roadmaps/enroll`, {
          method: "POST",
          headers: { "Authorization": `Bearer ${TOKEN}`, "Content-Type": "application/json" },
          body: JSON.stringify({ roadmapId: roadmapId, stripePaymentId: "null", paymentStatus: null })
        });
        if (!res.ok) throw new Error();
        enrolledIds.add(roadmapId);
        toast(`✅ Enrolled in "${title}"`, "success");
        render();
      } catch { toast("Enrollment failed", "error"); }
    }

    async function unenrollCourse(roadmapId, title) {
      try {
        const res = await fetch(`${API_BASE}/student/roadmaps/${roadmapId}/unenroll`, {
          method: "DELETE",
          headers: { "Authorization": `Bearer ${TOKEN}` }
        });
        if (!res.ok) throw new Error();
        enrolledIds.delete(roadmapId);
        toast(`Unenrolled from "${title}"`, "success");
        render();
      } catch { toast("Unenroll failed", "error"); }
    }

    // Modals for materials, quizzes, projects, details
    function showMaterials(roadmap) {
      const materials = roadmap.learningMaterials || [];
      const html = `
      <div class="modal fade" id="matModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="fw-bold"><i class="bi bi-book me-2 text-success"></i>Materials · ${esc(roadmap.title)}</h5>
              <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              ${materials.length ? materials.map(m => `
                <div class="d-flex justify-content-between align-items-center p-3 border rounded-4 mb-2">
                  <div>
                    <strong>${esc(m.titleVideos || m.titlePdf)}</strong>
                    <span class="badge bg-light text-dark ms-2">${m.type}</span>
                    <span class="text-muted small ms-2">${m.duration || m.durationpdf || ''}</span>
                  </div>
                  <span class="badge bg-warning text-dark"><i class="bi bi-star-fill"></i> ${m.points || 0} pts</span>
                </div>`).join('') : '<p class="text-muted">No materials available.</p>'}
            </div>
          </div>
        </div>
      </div>`;
      document.getElementById('matModal')?.remove();
      document.body.insertAdjacentHTML('beforeend', html);
      new bootstrap.Modal(document.getElementById('matModal')).show();
    }

    function showQuizzes(roadmap) {
      const quizzes = roadmap.quizzes || [];
      const html = `
      <div class="modal fade" id="quizModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="fw-bold"><i class="bi bi-patch-question me-2 text-danger"></i>Quizzes · ${esc(roadmap.title)}</h5>
              <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              ${quizzes.length ? quizzes.map(q => `
                <div class="p-3 border rounded-4 mb-2">
                  <div class="d-flex justify-content-between">
                    <strong>${esc(q.title)}</strong>
                    <span class="badge bg-light text-dark">${q.type}</span>
                  </div>
                  <div class="d-flex gap-3 mt-2 text-muted small">
                    <span><i class="bi bi-question-circle"></i> ${(q.questions || []).length} questions</span>
                    <span><i class="bi bi-star-fill text-warning"></i> ${q.points || 0} pts</span>
                  </div>
                </div>`).join('') : '<p class="text-muted">No quizzes available.</p>'}
            </div>
          </div>
        </div>
      </div>`;
      document.getElementById('quizModal')?.remove();
      document.body.insertAdjacentHTML('beforeend', html);
      new bootstrap.Modal(document.getElementById('quizModal')).show();
    }

    function showProjects(roadmap) {
      const projects = roadmap.projects || [];
      const html = `
      <div class="modal fade" id="projModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="fw-bold"><i class="bi bi-folder me-2 text-purple" style="color:#8b5cf6;"></i>Projects · ${esc(roadmap.title)}</h5>
              <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              ${projects.length ? projects.map(p => `
                <div class="p-3 border rounded-4 mb-2">
                  <strong>${esc(p.title)}</strong>
                  <p class="text-muted small mt-1 mb-2">${esc(p.description || '')}</p>
                  <span class="badge bg-light text-dark">${p.difficulty}</span>
                  <span class="badge bg-warning text-dark ms-1"><i class="bi bi-star-fill"></i> ${p.points || 0} pts</span>
                </div>`).join('') : '<p class="text-muted">No projects available.</p>'}
            </div>
          </div>
        </div>
      </div>`;
      document.getElementById('projModal')?.remove();
      document.body.insertAdjacentHTML('beforeend', html);
      new bootstrap.Modal(document.getElementById('projModal')).show();
    }

    function showFullDetails(roadmap) {
      const skills = roadmap.requiredSkills || [];
      const html = `
      <div class="modal fade" id="fullModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="fw-bold">${esc(roadmap.title)}</h5>
              <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <p><strong>Role:</strong> ${esc(roadmap.targetRole)} | <strong>Company:</strong> ${esc(roadmap.companyName)}</p>
              <p><strong>Points:</strong> ${roadmap.totalPoints} | <strong>Price:</strong> ${roadmap.price || 0} EGP</p>
              <hr>
              <h6>Skills (${skills.length})</h6>
              <div class="d-flex flex-wrap gap-2">${skills.map(s => `<span class="badge bg-light text-dark">${esc(s.skillName)} (${s.level}) - ${s.levelPoints}pts</span>`).join('')}</div>
            </div>
          </div>
        </div>
      </div>`;
      document.getElementById('fullModal')?.remove();
      document.body.insertAdjacentHTML('beforeend', html);
      new bootstrap.Modal(document.getElementById('fullModal')).show();
    }

    function viewCourseContent(roadmap) {
      const quizzes = (roadmap.quizzes || []).map(q => ({
        id: q.id, title: q.title, type: q.type, points: q.points,
        questions: (q.questions || []).map(qq => ({
          id: qq.id, text: qq.text, type: qq.type,
          options: JSON.parse(qq.optionsJson || "[]"),
          correctAnswer: qq.correctAnswer
        }))
      }));
      localStorage.setItem("currentroadexams", JSON.stringify(quizzes));
      window.location.href = `RoadMapById.html?id=${roadmap.id || roadmap.roadmapId}`;
    }

    // Render cards
    function render() {
      if (isLoading) return;
      
      if (!courses.length) {
        container.innerHTML = `<div class="col-12 text-center py-5 text-muted" style="grid-column:1/-1;"><i class="bi bi-journal-x fs-1 d-block mb-2"></i>No courses found</div>`;
        paginationContainer.innerHTML = '';
        coursesCountEl.textContent = '0';
        return;
      }

      coursesCountEl.textContent = totalCount;

      container.innerHTML = courses.map(c => {
        const id = c.id || c.roadmapId;
        const enrolled = enrolledIds.has(id) || c.isEnrolled;
        const img = c.coverImageUrl ? `http://smartcareerhub.runasp.net${c.coverImageUrl}` : 'https://via.placeholder.com/400x200?text=Course+Image';
        const category = c.category || (c.targetRole || 'General');
        const skillsCount = (c.requiredSkills || []).length;
        const projectsCount = (c.projects || []).length;
        const materialsCount = (c.learningMaterials || []).length;
        const quizzesCount = (c.quizzes || []).length;

        return `
        <div class="course-card">
          <img src="${esc(img)}" class="course-img" alt="${esc(c.title)}" 
               onerror="this.src='https://via.placeholder.com/400x200?text=Course+Image'"
               onclick="window._viewDetails('${id}')">
          <div class="card-body">
            <div class="mb-2">
              <span class="badge-outline"><i class="bi bi-tag"></i> ${esc(category)}</span>
            </div>
            <h5 class="card-title" onclick="window._viewDetails('${id}')">${esc(c.title)}</h5>
            <p class="card-text">${esc((c.description || '').substring(0, 75))}...</p>
            
            <div class="stats-pills">
              <span class="stat-pill points"><i class="bi bi-star-fill"></i> ${c.totalPoints || 0}</span>
              <span class="stat-pill skills"><i class="bi bi-tools"></i> ${skillsCount}</span>
              <span class="stat-pill projects"><i class="bi bi-folder"></i> ${projectsCount}</span>
              <span class="stat-pill materials"><i class="bi bi-book"></i> ${materialsCount}</span>
              <span class="stat-pill quizzes"><i class="bi bi-patch-question"></i> ${quizzesCount}</span>
            </div>

            <div class="action-buttons">
              <button class="btn btn-outline-muted" onclick="window._showMaterials('${id}')"><i class="bi bi-book"></i> Materials</button>
              <button class="btn btn-outline-muted" onclick="window._showQuizzes('${id}')"><i class="bi bi-patch-question"></i> Quizzes</button>
              <button class="btn btn-outline-muted" onclick="window._showProjects('${id}')"><i class="bi bi-folder"></i> Projects</button>
              <button class="btn btn-outline-muted" onclick="window._showDetails('${id}')"><i class="bi bi-eye"></i> Details</button>
              <button class="btn btn-primary-action" style="grid-column: span 2;" onclick="window._viewContent('${id}')">
                <i class="bi bi-arrow-right-circle"></i> View Content
              </button>
              ${enrolled ? 
                `<button class="btn btn-danger-outline" style="grid-column: span 2;" onclick="window._unenroll('${id}', '${esc(c.title).replace(/'/g, "\\'")}')"><i class="bi bi-x-circle"></i> Unenroll</button>` :
                `<button class="btn btn-primary-action" style="grid-column: span 2;" onclick="window._enroll('${id}', '${esc(c.title).replace(/'/g, "\\'")}')"><i class="bi bi-plus-circle"></i> Enroll Now</button>`
              }
            </div>
          </div>
        </div>`;
      }).join('');

      renderPagination();
    }

    function renderPagination() {
      const maxButtons = 5;
      let pages = [];
      if (totalPages <= maxButtons) {
        for (let i = 1; i <= totalPages; i++) pages.push(i);
      } else {
        let start = Math.max(1, currentPage - 2);
        let end = Math.min(totalPages, currentPage + 2);
        if (currentPage <= 3) { start = 1; end = maxButtons; }
        else if (currentPage >= totalPages - 2) { start = totalPages - maxButtons + 1; end = totalPages; }
        for (let i = start; i <= end; i++) pages.push(i);
      }

      let html = `
        <button class="btn" onclick="window.goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}><i class="bi bi-chevron-double-left"></i></button>
        <button class="btn" onclick="window.goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="bi bi-chevron-left"></i> Prev</button>
      `;
      if (pages[0] > 1) {
        html += `<button class="btn" onclick="window.goToPage(1)">1</button>`;
        if (pages[0] > 2) html += `<span class="page-info-text">...</span>`;
      }
      pages.forEach(p => html += `<button class="btn ${p === currentPage ? 'active-page' : ''}" onclick="window.goToPage(${p})">${p}</button>`);
      if (pages[pages.length-1] < totalPages) {
        if (pages[pages.length-1] < totalPages-1) html += `<span class="page-info-text">...</span>`;
        html += `<button class="btn" onclick="window.goToPage(${totalPages})">${totalPages}</button>`;
      }
      html += `
        <button class="btn" onclick="window.goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next <i class="bi bi-chevron-right"></i></button>
        <button class="btn" onclick="window.goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}><i class="bi bi-chevron-double-right"></i></button>
        <span class="page-info-text">Page ${currentPage} of ${totalPages}</span>
      `;
      paginationContainer.innerHTML = html;
    }

    window.goToPage = function(page) {
      if (page < 1 || page > totalPages || page === currentPage) return;
      currentPage = page;
      loadCourses();
    };

    // Helper to find course by id
    function findCourse(id) {
      return courses.find(c => (c.id || c.roadmapId) == id);
    }

    // Expose functions to window for onclick
    window._viewDetails = (id) => { const c = findCourse(id); if(c) showFullDetails(c); };
    window._showMaterials = (id) => { const c = findCourse(id); if(c) showMaterials(c); };
    window._showQuizzes = (id) => { const c = findCourse(id); if(c) showQuizzes(c); };
    window._showProjects = (id) => { const c = findCourse(id); if(c) showProjects(c); };
    window._viewContent = (id) => { const c = findCourse(id); if(c) viewCourseContent(c); };
    window._enroll = (id, title) => { enrollCourse(parseInt(id), title); };
    window._unenroll = (id, title) => { unenrollCourse(parseInt(id), title); };

    function skeletons(n = 6) {
      container.innerHTML = Array(n).fill(0).map(() => `<div class="course-card" style="height:420px;background:#e9edf5;border-radius:28px;"></div>`).join('');
      paginationContainer.innerHTML = '';
    }

    // Filters
    filterBtns.forEach(b => b.addEventListener('click', () => {
      filterBtns.forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      activeFilter = b.dataset.filter;
      currentPage = 1;
      loadCourses();
    }));
    searchInput.addEventListener('input', () => {
      currentPage = 1;
      loadCourses();
    });

    async function loadCourses() {
      if (!TOKEN) { toast("Please log in.", "error"); return; }
      isLoading = true;
      skeletons(pageSize);
      
      try {
        const searchTerm = searchInput.value.trim();
        const categoryFilter = activeFilter !== 'all' ? activeFilter : '';
        let url = `${API_BASE}/student/roadmaps/catalog?page=${currentPage}&pageSize=${pageSize}&sortBy=createdAt&sortDirection=desc`;
        if (searchTerm) url += `&search=${encodeURIComponent(searchTerm)}`;
        if (categoryFilter) url += `&category=${encodeURIComponent(categoryFilter)}`;
        
        const [catRes, myRes] = await Promise.all([
          fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } }),
          fetch(`${API_BASE}/student/roadmaps/my`, { headers: { Authorization: `Bearer ${TOKEN}` } })
        ]);
        
        if (catRes.ok) {
          const data = await catRes.json();
          if (data && data.data && Array.isArray(data.data)) {
            courses = data.data;
            totalCount = data.totalCount || data.data.length;
            totalPages = data.totalPages || Math.ceil(totalCount / pageSize);
            currentPage = data.page || currentPage;
          } else if (Array.isArray(data)) {
            courses = data;
            totalCount = data.length;
            totalPages = Math.ceil(totalCount / pageSize);
          } else {
            courses = []; totalCount = 0; totalPages = 1;
          }
        } else throw new Error('Fetch failed');
        
        if (myRes.ok) {
          const myData = await myRes.json();
          const myList = Array.isArray(myData) ? myData : (myData.data || []);
          enrolledIds.clear();
          myList.forEach(r => { if (r.id || r.roadmapId) enrolledIds.add(r.id || r.roadmapId); });
        }
      } catch (e) {
        console.error(e);
        toast("Failed to load courses", "error");
        courses = []; totalCount = 0; totalPages = 1;
      } finally {
        isLoading = false;
        render();
      }
    }
    loadCourses();
  })();
</script>
</body>
</html>
