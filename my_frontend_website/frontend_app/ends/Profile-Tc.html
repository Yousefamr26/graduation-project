<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Training Center </title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);
      min-height: 100vh;
      padding: 30px 20px;
    }

    .container {
      max-width: 1150px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 16px;
      background: white;
      padding: 16px 24px;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
    }

    .header h2 {
      font-weight: 700;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h2 i {
      color: #3498DB;
      font-size: 1.8rem;
    }

    .edit-btn {
      background: #2e8ecf;
      color: white;
      border: none;
      padding: 12px 26px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.25s;
      box-shadow: 0 6px 16px rgba(59,130,246,0.3);
    }

    .edit-btn:hover {
      background: rgba;
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(59,130,246,0.35);
    }

    .card {
      background: white;
      padding: 25px 28px;
      border-radius: 20px;
      margin-bottom: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.04);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 34px rgba(0,0,0,0.06);
    }

    .profile-top {
      display: flex;
      gap: 32px;
      align-items: center;
      flex-wrap: wrap;
    }

    .profile-img-wrapper {
      position: relative;
    }

    .profile-img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
      background: #f1f5f9;
    }

    .verified-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: #10b981;
      color: white;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      border: 3px solid white;
    }

    .center-info h2 {
      font-size: 2rem;
      font-weight: 700;
      color: #0f172a;
    }

    .center-info .tagline {
      color: #475569;
      font-size: 1.1rem;
      margin-top: 6px;
    }

    .contact-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-top: 10px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f8fafc;
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 0.95rem;
      color: #1e293b;
    }

    .contact-item i {
      color: #3498DB;
      width: 18px;
      text-align: center;
    }

    .about-box {
      background: #f8fafc;
      padding: 18px;
      border-radius: 14px;
      line-height: 1.7;
      color: #334155;
      font-size: 1rem;
      border: 1px solid #e2e8f0;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tags span {
      background: #eff6ff;
      color: #3498DB;
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 500;
      border: 1px solid #bfdbfe;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 18px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: white;
      border-radius: 20px;
      padding: 18px 16px;
      text-align: center;
      box-shadow: 0 8px 18px rgba(0,0,0,0.03);
      transition: 0.2s;
    }

    .stat-card i {
      font-size: 2rem;
      color: #3498DB;
      margin-bottom: 8px;
    }

    .stat-card h4 {
      font-weight: 700;
      font-size: 1.8rem;
      color: #0f172a;
    }

    .stat-card small {
      color: #64748b;
      font-size: 0.8rem;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .modal-content {
      background: white;
      width: 620px;
      max-width: 92%;
      padding: 28px 32px;
      border-radius: 24px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 5px;
      display: block;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-family: inherit;
      background: #f9fafb;
      transition: 0.2s;
    }

    .input-group input:focus,
    .input-group textarea:focus {
      border-color: #3498DB;
      background: white;
      outline: none;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }

    .modal-buttons {
      display: flex;
      gap: 14px;
      margin-top: 20px;
    }

    .save {
      background: #3498DB;
      color: white;
      border: none;
      padding: 12px 22px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      flex: 1;
    }

    .cancel {
      background: #f1f5f9;
      border: none;
      padding: 12px 22px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      flex: 1;
    }

    @media (max-width: 768px) {
      .profile-top {
        flex-direction: column;
        text-align: center;
      }
      .contact-grid {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2><i class="fas fa-chalkboard-user"></i> Training Center Profile</h2>
    <button class="edit-btn" onclick="openModal()"><i class="fas fa-pen"></i> Edit Profile</button>
  </div>

  <!-- إحصائيات افتراضية -->
  <div class="stats-row">
    <div class="stat-card">
      <i class="fas fa-user-graduate"></i>
      <h4 id="statTrainees">120</h4>
      <small>Trainees</small>
    </div>
    <div class="stat-card">
      <i class="fas fa-book-open"></i>
      <h4 id="statCourses">8</h4>
      <small>Courses</small>
    </div>
    <div class="stat-card">
      <i class="fas fa-star"></i>
      <h4 id="statRating">4.8</h4>
      <small>Rating</small>
    </div>
    <div class="stat-card">
      <i class="fas fa-clock"></i>
      <h4 id="statHours">640</h4>
      <small>Training Hours</small>
    </div>
  </div>

  <!-- بطاقة الملف الشخصي -->
  <div class="card profile-top">
    <div class="profile-img-wrapper">
      <img id="centerImage" src="images/default-center.png" alt="Center Logo" class="profile-img">
      <span class="verified-badge"><i class="fas fa-check"></i></span>
    </div>
    <div style="flex:1;">
      <div class="center-info">
        <h2 id="name">Loading...</h2>
        <p class="tagline" id="tagline">Professional training programs</p>
      </div>
      <div class="contact-grid">
        <div class="contact-item"><i class="fas fa-location-dot"></i> <span id="location">—</span></div>
        <div class="contact-item"><i class="fas fa-envelope"></i> <span id="email">—</span></div>
        <div class="contact-item"><i class="fas fa-phone"></i> <span id="phone">—</span></div>
        <div class="contact-item"><i class="fas fa-globe"></i> <span id="website">—</span></div>
      </div>
    </div>
  </div>

  <div class="card">
    <h3 style="display: flex; align-items: center; gap: 8px; margin-bottom: 14px;"><i class="fas fa-info-circle" style="color:#3b82f6;"></i> About</h3>
    <div class="about-box" id="about">No description available.</div>
  </div>

  <div class="card">
    <h3 style="display: flex; align-items: center; gap: 8px; margin-bottom: 14px;"><i class="fas fa-tags" style="color:#3b82f6;"></i> Specializations</h3>
    <div class="tags" id="specializations"><span>Loading...</span></div>
  </div>
</div>

<!-- المودال -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 style="margin-bottom: 6px;"><i class="fas fa-edit" style="color:#3b82f6;"></i> Edit Training Center</h3>
    <p style="color:#64748b; margin-bottom: 20px;">Update your center information</p>
    <div class="input-group"><label>Center Name</label><input id="editName" placeholder="e.g., Tech Academy"></div>
    <div class="input-group"><label>Tagline</label><input id="editTagline" placeholder="Short description"></div>
    <div class="input-group"><label>Email</label><input id="editEmail" type="email"></div>
    <div class="input-group"><label>Phone</label><input id="editPhone"></div>
    <div class="input-group"><label>Website</label><input id="editWebsite" placeholder="https://"></div>
    <div class="input-group"><label>Location</label><input id="editLocation" placeholder="City, Country"></div>
    <div class="input-group"><label>About</label><textarea id="editAbout" rows="3"></textarea></div>
    <div class="input-group"><label>Specializations (comma separated)</label><input id="editSpecs" placeholder="Web, AI, Mobile"></div>
    <div class="modal-buttons">
      <button class="save" onclick="saveChanges()"><i class="fas fa-save me-1"></i> Save Changes</button>
      <button class="cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- بيانات افتراضية ثابتة (لأول مرة) ----------
    const DEFAULT_CENTER = {
      trainingCenterName: "TechVision Academy",
      organizationName: "TechVision Academy",
      tagline: "Empowering future engineers",
      description: "Empowering future engineers",
      email: "info@techvision.com",
      phone: "+20 111 222 3333",
      website: "https://techvision.example.com",
      location: "Cairo, Egypt",
      city: "Cairo",
      country: "Egypt",
      about: "TechVision Academy provides cutting-edge training in web development, artificial intelligence, and data science. Our programs are designed to bridge the gap between academic knowledge and industry requirements.",
      specializations: ["Web Development", "Artificial Intelligence", "Mobile Apps", "Data Science"],
      trainingCenterImage: "",
      imageUrl: "",
      // إحصائيات افتراضية
      statTrainees: 120,
      statCourses: 8,
      statRating: "4.8",
      statHours: 640
    };
    
    const imgSrc = "./images/photo-TC.jfif";

    // ============ GET DATA FROM LOCAL STORAGE ============
    function getuser() {
      const stored = localStorage.getItem('user');
      if (stored) {
        try {
          return JSON.parse(stored);
        } catch (e) {
          console.warn('Error parsing user, using default');
        }
      }
      // أول مرة: حفظ الافتراضي في localStorage
      //localStorage.setItem('user', JSON.stringify(DEFAULT_CENTER));
      return DEFAULT_CENTER;
    }

    // ============ SAVE TO LOCAL STORAGE ============
    function saveuser(data) {
      localStorage.setItem('user', JSON.stringify(data));
    }

    // ============ BUILD IMAGE URL ============
    function buildImageUrl(path) {
    return "./images/photo-TC.jfif";
}
    

    // ============ LOAD PROFILE DATA ============
    function loadProfile() {
      console.log('📝 Loading training center profile...');
      const data = getuser();

      // Name & tagline
      document.getElementById('name').textContent = data.trainingCenterName || data.organizationName || 'Training Center';
      document.getElementById('tagline').textContent = data.tagline || data.description || 'Professional training programs';

      // Contact
      document.getElementById('location').textContent = data.location || data.city || 'Not specified';
      document.getElementById('email').textContent = data.email || 'Not specified';
      document.getElementById('phone').textContent = data.phone || '+20 123 456 7890';
      document.getElementById('website').textContent = data.website || 'www.skillboost-academy.com';

      // About
      document.getElementById('about').textContent = data.about || data.description || 'SkillBoost Academy provides professional training programs in technology and business skills, empowering students and professionals to excel in their careers through hands-on learning and industry-recognized certifications.';

      // Specializations
      const specsContainer = document.getElementById('specializations');
      specsContainer.innerHTML = '';
      let specs = [];
      if (data.specializations) {
        if (typeof data.specializations === 'string') {
          specs = data.specializations.split(',').map(s => s.trim()).filter(Boolean);
        } else if (Array.isArray(data.specializations)) {
          specs = data.specializations;
        }
      }
      if (specs.length > 0) {
        specs.forEach(spec => {
          const span = document.createElement('span');
          span.textContent = spec;
          specsContainer.appendChild(span);
        });
      } else {
        specsContainer.innerHTML = '<span>Web Development</span> <span>Data Science</span> <span>UI/UX Design</span>';
      }

      // Image
      const imgPath = data.trainingCenterImage || data.profileImage || data.organizationLogoUrl || '';
      document.getElementById('centerImage').src = buildImageUrl(imgPath);

      // Statistics
      document.getElementById('statTrainees').textContent = data.statTrainees || 120;
      document.getElementById('statCourses').textContent = data.statCourses || 8;
      document.getElementById('statRating').textContent = data.statRating || '4.8';
      document.getElementById('statHours').textContent = data.statHours || 640;

    }

    // ============ OPEN MODAL & FILL FORM ============
    window.openModal = function() {
      const data = getuser();
      console.log(data);
      document.getElementById('editName').value = data.trainingCenterName || '';
      document.getElementById('editTagline').value = data.tagline || '';
      document.getElementById('editEmail').value = data.email || '';
      document.getElementById('editPhone').value = data.phone || '';
      document.getElementById('editWebsite').value = data.website || '';
      document.getElementById('editLocation').value = data.location || '';
      document.getElementById('editAbout').value = data.about || '';
      
      let specsStr = '';
      if (data.specializations) {
        if (Array.isArray(data.specializations)) {
          specsStr = data.specializations.join(', ');
        } else {
          specsStr = data.specializations;
        }
      }
      document.getElementById('editSpecs').value = specsStr;
      
      document.getElementById('modal').style.display = 'flex';
    };

    window.closeModal = function() {
      document.getElementById('modal').style.display = 'none';
    };

    // ============ SAVE CHANGES ============
    window.saveChanges = function() {
      
      const currentData = getuser();
      
      const updatedData = {
        ...currentData,
        trainingCenterName: document.getElementById('editName').value.trim(),
        organizationName: document.getElementById('editName').value.trim(),
        tagline: document.getElementById('editTagline').value.trim(),
        description: document.getElementById('editTagline').value.trim(),
        email: document.getElementById('editEmail').value.trim(),
        phone: document.getElementById('editPhone').value.trim(),
        website: document.getElementById('editWebsite').value.trim(),
        location: document.getElementById('editLocation').value.trim(),
        city: document.getElementById('editLocation').value.trim(),
        about: document.getElementById('editAbout').value.trim(),
        specializations: document.getElementById('editSpecs').value.split(',').map(s => s.trim()).filter(Boolean)
      };

      
      // Save to localStorage
      saveuser(updatedData);
      
      // Reload profile display
      loadProfile();
      
      // Close modal
      closeModal();
    };

    // ============ CLOSE MODAL ON OUTSIDE CLICK OR ESCAPE ============
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    // ============ INITIALIZATION ============
    window.addEventListener('DOMContentLoaded', function() {
      console.log('🚀 Training Center Profile Page Loaded');
      loadProfile();
    });
  })();
</script>
</body>
</html>
