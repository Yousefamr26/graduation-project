<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no, viewport-fit=cover">
    <title>Calendar Under_graduated</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --surface: #ffffff;
            --bg: #f5f7fe;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e8edf5;
            --shadow-sm: 0 4px 16px rgba(0,0,0,0.04);
            --shadow-md: 0 12px 28px rgba(0,0,0,0.06);
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 14px;
            --transition: 0.25s ease;
            --internship: #3b82f6;
            --job: #8b5cf6;
            --pending: #f59e0b;
            --accepted: #10b981;
            --rejected: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        .container-main {
            padding: 24px 20px;
            max-width: 1300px;
            margin: 0 auto;
        }
        @media (min-width: 768px) {
            .container-main { padding: 32px 36px; }
        }

        /* Header */
        .page-header {
            margin-bottom: 24px;
        }
        .page-header h4 {
            font-weight: 800;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #155fc4 0%, #4f46e5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .page-header p {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-sm);
        }
        .stat-card .stat-icon {
            width: 42px; height: 42px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; color: white;
        }
        .stat-card .stat-info small {
            font-weight: 600; text-transform: uppercase;
            font-size: 0.65rem; color: var(--text-secondary); letter-spacing: 0.5px;
        }
        .stat-card .stat-info h5 {
            font-weight: 800; font-size: 1.3rem; margin: 0; color: var(--text);
        }

        /* Calendar Navigation */
        .calendar-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .calendar-nav .btn-nav {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 30px;
            padding: 10px 20px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text);
        }
        .calendar-nav .btn-nav:hover {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
        }
        .calendar-nav .month-label {
            font-weight: 800;
            font-size: 1.2rem;
            min-width: 180px;
            text-align: center;
            color: var(--text);
        }

        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 20px;
        }
        .calendar-grid .day-header {
            text-align: center;
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--text-secondary);
            padding: 8px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .calendar-cell {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            min-height: 100px;
            padding: 6px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        .calendar-cell:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }
        .calendar-cell.empty {
            background: transparent;
            border: none;
            cursor: default;
        }
        .calendar-cell.empty:hover {
            box-shadow: none;
            border: none;
        }
        .calendar-cell .day-number {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text);
            margin-bottom: 4px;
        }
        .calendar-cell.today .day-number {
            background: var(--primary);
            color: white;
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .calendar-cell .event-dot {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            margin-bottom: 2px;
            max-width: 100%;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            cursor: pointer;
        }
        .calendar-cell .event-dot.internship {
            background: #dbeafe; color: #1e40af;
        }
        .calendar-cell .event-dot.job {
            background: #ede9fe; color: #6d28d9;
        }
        .calendar-cell .event-dot.accepted {
            border-left: 3px solid var(--accepted);
        }
        .calendar-cell .event-dot.rejected {
            border-left: 3px solid var(--rejected);
        }
        .calendar-cell .event-dot.pending {
            border-left: 3px solid var(--pending);
        }
        .calendar-cell .more-indicator {
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--text-secondary);
            cursor: pointer;
            margin-top: 2px;
        }

        /* Day Details Modal */
        .modal-content {
            border-radius: 28px;
            border: none;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .modal-header {
            padding: 24px 24px 8px;
            border-bottom: none;
        }
        .modal-body {
            padding: 16px 24px 24px;
        }
        .application-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: var(--radius-md);
            margin-bottom: 8px;
            background: #fafbfd;
            border: 1px solid #f1f4f9;
            transition: var(--transition);
        }
        .application-item:hover {
            background: #f5f7fe;
        }
        .application-item .app-icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: white; flex-shrink: 0;
        }
        .application-item .app-info {
            flex: 1; min-width: 0;
        }
        .application-item .app-title {
            font-weight: 700; font-size: 0.85rem; color: var(--text);
        }
        .application-item .app-company {
            font-size: 0.75rem; color: var(--text-secondary);
        }

        /* Toast */
        #toastContainer {
            position: fixed; bottom: 28px; right: 28px; z-index: 99999;
            display: flex; flex-direction: column; gap: 12px;
        }
        .toast-popup {
            background: #0f172a; color: white; padding: 14px 26px;
            border-radius: 50px; font-weight: 600; display: flex;
            align-items: center; gap: 10px; animation: slideUp 0.35s ease;
            font-size: 0.85rem; box-shadow: 0 18px 36px rgba(0,0,0,0.25);
        }
        .toast-popup.error { background: #dc2626; }
        .toast-popup.success { background: #059669; }
        @keyframes slideUp {
            from { transform: translateY(25px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #e9edf5 25%, #f0f4fa 50%, #e9edf5 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-lg);
            height: 100px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (max-width: 768px) {
            .calendar-cell {
                min-height: 70px;
                padding: 4px;
            }
            .calendar-cell .day-number {
                font-size: 0.7rem;
            }
            .calendar-cell .event-dot {
                font-size: 0.5rem;
                padding: 1px 4px;
            }
            .calendar-grid .day-header {
                font-size: 0.65rem;
            }
        }
        @media (max-width: 480px) {
            .calendar-cell {
                min-height: 55px;
                padding: 2px;
            }
            .calendar-cell .day-number {
                font-size: 0.65rem;
            }
            .calendar-cell .event-dot {
                font-size: 0.45rem;
                padding: 1px 3px;
            }
            .calendar-nav .btn-nav {
                padding: 8px 14px;
                font-size: 0.75rem;
            }
            .calendar-nav .month-label {
                font-size: 1rem;
                min-width: 140px;
            }
        }
    </style>
</head>
<body>

<div class="container-main">
    <!-- Header -->
    <div class="page-header">
        <h4> Calendar</h4>
        <p>Track all your internship and job applications by date</p>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
        <div class="stat-card">
            <div class="stat-icon" style="background:linear-gradient(135deg,#3b82f6,#2563eb);"><i class="bi bi-briefcase"></i></div>
            <div class="stat-info"><small>Internships</small><h5 id="internshipCount">0</h5></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed);"><i class="bi bi-building"></i></div>
            <div class="stat-info"><small>Jobs</small><h5 id="jobCount">0</h5></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background:linear-gradient(135deg,#10b981,#059669);"><i class="bi bi-check-circle"></i></div>
            <div class="stat-info"><small>Accepted</small><h5 id="acceptedCount">0</h5></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background:linear-gradient(135deg,#f59e0b,#d97706);"><i class="bi bi-hourglass-split"></i></div>
            <div class="stat-info"><small>Pending</small><h5 id="pendingCount">0</h5></div>
        </div>
    </div>

    <!-- Calendar Navigation -->
    <div class="calendar-nav">
        <button class="btn-nav" onclick="changeMonth(-1)"><i class="bi bi-chevron-left"></i> Previous</button>
        <span class="month-label" id="monthLabel">January 2026</span>
        <button class="btn-nav" onclick="changeMonth(1)">Next <i class="bi bi-chevron-right"></i></button>
    </div>

    <!-- Calendar Grid -->
    <div class="calendar-grid" id="calendarGrid">
        <div class="day-header">Sun</div>
        <div class="day-header">Mon</div>
        <div class="day-header">Tue</div>
        <div class="day-header">Wed</div>
        <div class="day-header">Thu</div>
        <div class="day-header">Fri</div>
        <div class="day-header">Sat</div>
    </div>
</div>

<!-- Day Details Modal -->
<div class="modal fade" id="dayModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="fw-bold" id="dayModalTitle"></h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="dayModalBody"></div>
        </div>
    </div>
</div>

<div id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function() {
        const API_BASE = "http://smartcareerhub.runasp.net/api";
        const TOKEN = localStorage.getItem("authToken") || "";
    
        let allApplications = [];
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
    
        let dayModal;
    
        document.addEventListener('DOMContentLoaded', () => {
            dayModal = new bootstrap.Modal(document.getElementById("dayModal"));
        });
    
        function toast(msg, type='info') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast-popup ${type==='error'?'error':(type==='success'?'success':'')}`;
            t.innerHTML = `<i class="bi bi-${type==='error'?'exclamation-circle':(type==='success'?'check-circle':'info-circle')}"></i> ${msg}`;
            c.appendChild(t);
            setTimeout(() => t.remove(), 3500);
        }
    
        function esc(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
    
        // ✅ توحيد الـ status (number + string)
        function normalizeStatus(status) {
            if (typeof status === "number") {
                switch (status) {
                    case 1: return "accepted";
                    case 2: return "rejected";
                    case 0: return "pending";
                    default: return "pending";
                }
            }
    
            const s = String(status || '').toLowerCase();
    
            if (s.includes('interview')) return "accepted";
            if (s.includes('accept') || s.includes('offer')) return "accepted";
            if (s.includes('reject') || s.includes('decline')) return "rejected";
    
            return "pending";
        }
    
        function getStatusClass(status) {
            return normalizeStatus(status);
        }
    
        function getTypeClass(type) {
            return type === 'job' ? 'job' : 'internship';
        }
    
        async function fetchAllApplications() {
            if (!TOKEN) {
                toast("Please log in to view your applications.", "error");
                return;
            }
    
            document.getElementById("calendarGrid").innerHTML = `
                <div class="day-header">Sun</div><div class="day-header">Mon</div><div class="day-header">Tue</div>
                <div class="day-header">Wed</div><div class="day-header">Thu</div><div class="day-header">Fri</div><div class="day-header">Sat</div>
                ${Array(35).fill(0).map(() => '<div class="calendar-cell"><div class="skeleton"></div></div>').join('')}
            `;
    
            try {
                const [internRes, jobRes] = await Promise.all([
                    fetch(`${API_BASE}/internships/my-applications?page=1&pageSize=1000`, {
                        headers: { "Authorization": `Bearer ${TOKEN}` }
                    }),
                    fetch(`${API_BASE}/Jobs/my-applications?page=1&pageSize=1000`, {
                        headers: { "Authorization": `Bearer ${TOKEN}` }
                    })
                ]);
    
                allApplications = [];
    
                // ✅ Internships
                if (internRes.ok) {
                    const data = await internRes.json();
                    const list = Array.isArray(data) ? data : (data.data || []);
    
                    list.forEach(item => {
                        allApplications.push({
                            id: item.applicationId,
                            title: item.internshipTitle || 'Internship',
                            company: item.companyName || 'Company',
                            type: 'internship',
                            status: item.status,
                            date: item.appliedAt,
                            location: ''
                        });
                    });
                } else {
                    console.log("Intern API error", await internRes.text());
                }
    
                // ✅ Jobs
                if (jobRes.ok) {
                    const data = await jobRes.json();
                    const list = Array.isArray(data) ? data : (data.data || []);
    
                    list.forEach(item => {
                        allApplications.push({
                            id: item.applicationId || item.jobId,
                            title: item.jobTitle || 'Job',
                            company: item.companyName || 'Company',
                            type: 'job',
                            status: item.status,
                            date: item.appliedDate,
                            location: ''
                        });
                    });
                } else {
                    console.log("Job API error", await jobRes.text());
                }
    
                console.log("ALL APPS:", allApplications);
    
                updateStats();
                renderCalendar();
            } catch (e) {
                console.error(e);
                toast("Failed to load applications", "error");
            }
        }
    
        function updateStats() {
            document.getElementById("internshipCount").textContent =
                allApplications.filter(a => a.type === 'internship').length;
    
            document.getElementById("jobCount").textContent =
                allApplications.filter(a => a.type === 'job').length;
    
            document.getElementById("acceptedCount").textContent =
                allApplications.filter(a => getStatusClass(a.status) === 'accepted').length;
    
            document.getElementById("pendingCount").textContent =
                allApplications.filter(a => getStatusClass(a.status) === 'pending').length;
        }
    
        function getApplicationsForDate(dateStr) {
            return allApplications.filter(a => {
                const d = new Date(a.date);
                const appDateStr = d.toISOString().split('T')[0]; // ✅ fix timezone
                return appDateStr === dateStr;
            });
        }
    
        function renderCalendar() {
            const grid = document.getElementById("calendarGrid");
            const monthLabel = document.getElementById("monthLabel");
    
            const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
            monthLabel.textContent = `${monthNames[currentMonth]} ${currentYear}`;
    
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
    
            let cells = '';
    
            const headers = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    
            for (let i = 0; i < firstDay; i++) {
                cells += '<div class="calendar-cell empty"></div>';
            }
    
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const appsOnDay = getApplicationsForDate(dateStr);
                const isToday = dateStr === todayStr;
    
                let eventsHtml = '';
    
                appsOnDay.slice(0, 3).forEach(app => {
                    const typeClass = getTypeClass(app.type);
                    const statusClass = getStatusClass(app.status);
    
                    eventsHtml += `
                        <div class="event-dot ${typeClass} ${statusClass}">
                            ${typeClass === 'job' ? '💼' : '📋'} ${esc(app.title.substring(0,12))}
                        </div>`;
                });
    
                if (appsOnDay.length > 3) {
                    eventsHtml += `<div class="more-indicator">+${appsOnDay.length - 3} more</div>`;
                }
    
                cells += `
                    <div class="calendar-cell ${isToday ? 'today' : ''}" onclick="openDayModal('${dateStr}')">
                        <div class="day-number">${day}</div>
                        ${eventsHtml}
                    </div>`;
            }
    
            const totalCells = firstDay + daysInMonth;
            const remaining = 42 - totalCells;
            for (let i = 0; i < remaining; i++) {
                cells += '<div class="calendar-cell empty"></div>';
            }
    
            grid.innerHTML = headers.map(h => `<div class="day-header">${h}</div>`).join('') + cells;
        }
    
        window.openDayModal = function(dateStr) {
            const apps = getApplicationsForDate(dateStr);
            const d = new Date(dateStr);
            const formattedDate = d.toDateString();
    
            document.getElementById("dayModalTitle").textContent = formattedDate;
    
            if (!apps.length) {
                document.getElementById("dayModalBody").innerHTML =
                    '<p class="text-muted text-center py-3">No applications on this day.</p>';
            } else {
                document.getElementById("dayModalBody").innerHTML = apps.map(app => {
                    const statusClass = getStatusClass(app.status);
    
                    return `
                    <div class="application-item">
                        <div class="app-info">
                            <div class="app-title">${esc(app.title)}</div>
                            <div class="app-company">${esc(app.company)}</div>
                        </div>
                        <span>${statusClass}</span>
                    </div>`;
                }).join('');
            }
    
            dayModal.show();
        };
    
        window.changeMonth = function(delta) {
            currentMonth += delta;
    
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
    
            renderCalendar();
        };
    
        fetchAllApplications();
    })();
    </script>
</body>
</html>
