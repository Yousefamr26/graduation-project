<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no">
  <title>SmartCareerHub · Internships</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f4f6fb;
      padding: 1.5rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
    }

    /* Header */
    .header {
      background: white;
      padding: 1.5rem 2rem;
      border-radius: 1.25rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
      margin-bottom: 1.5rem;
    }

    .header h2 {
      font-weight: 700;
      font-size: 1.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #1e293b;
    }

    .header p {
      color: #64748b;
      font-size: 0.95rem;
      margin-top: 0.25rem;
    }

    .btn {
      background: #3498db;
      color: white;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 15px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
      text-decoration: none;
    }

    .btn:hover {
      background: #3498db;
    }

    .btn-outline {
      background: white;
      border: 1px solid #e2e8f0;
      color: #334155;
      box-shadow: none;
      padding: 0.6rem 1.2rem;
    }

    .btn-outline:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }

    .icon-btn {
      border: 1px solid #e2e8f0;
      background: white;
      padding: 0.6rem 0.8rem;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: 0.2s;
      color: #475569;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
    }

    .delete-btn {
      color: #ef4444;
      border-color: #fee2e2;
    }

    .delete-btn:hover {
      background: #fef2f2;
    }

    /* Toolbar */
    .toolbar {
      background: white;
      padding: 1rem 1.5rem;
      border-radius: 1.25rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 6px 16px rgba(0,0,0,0.03);
      margin-bottom: 1.8rem;
    }

    .search-wrapper {
      flex: 2;
      min-width: 240px;
      position: relative;
    }

    .search-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
    }

    .search-input {
      width: 100%;
      padding: 0.7rem 1rem 0.7rem 2.5rem;
      border-radius: 2.5rem;
      border: 1px solid #e2e8f0;
      background: #f9fafb;
      font-size: 0.95rem;
    }

    select {
      padding: 0.7rem 2rem 0.7rem 1rem;
      border-radius: 2.5rem;
      border: 1px solid #e2e8f0;
      background: #f9fafb;
      font-size: 0.9rem;
      min-width: 140px;
      cursor: pointer;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .card {
  background: linear-gradient(145deg, #ffffff, #f8fbff);
  border-radius: 24px;
  padding: 22px;
  box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
  transition: all .3s ease;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  border: 1px solid #e8eef7;
  min-height: 390px;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  width: 120px;
  height: 120px;
  background: #3498db;
  opacity: .08;
  border-radius: 50%;
  top: -40px;
  right: -40px;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 20px 45px rgba(52,152,219,.18);
}


.badge {
  align-self: flex-end;
  padding: 7px 16px;
  border-radius: 30px;
  font-size: .75rem;
  font-weight: 700;
  margin-bottom: 15px;
}

.open {
  background: #dcfce7;
  color: #16a34a;
}

.closed {
  background: #fee2e2;
  color: #dc2626;
}


.card h3 {
  font-size: 1.35rem;
  font-weight: 750;
  margin-bottom: 8px;
  color:#0f172a;
}


.company {
  background:#eff6ff;
  width:fit-content;
  padding:6px 12px;
  border-radius:20px;
  color:#3498db;
  font-weight:700;
  margin-bottom:18px;
}


.detail-row {
  background:#f8fafc;
  padding:9px 12px;
  border-radius:12px;
  display:flex;
  align-items:center;
  gap:10px;
  color:#475569;
  margin:8px 0;
  font-size:.9rem;
}


.skills {
  margin-top:15px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}


.skill-tag {
  background:#e0f2fe;
  color:#0284c7;
  padding:6px 13px;
  border-radius:20px;
  font-size:.75rem;
  font-weight:600;
}


.actions {
  display:flex;
  gap:10px;
  margin-top:20px;
}


.btn-outline {
  border-radius:14px;
  flex:1;
  justify-content:center;
}


.icon-btn {
  width:42px;
  height:42px;
  border-radius:14px;
}

    .empty-message {
      text-align: center;
      color: #64748b;
      padding: 3rem;
      grid-column: 1 / -1;
      background: white;
      border-radius: 1.5rem;
    }

    /* Detail Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(5px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }

    .modal {
      background: white;
      border-radius: 2rem;
      max-width: 600px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 2rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      position: relative;
    }

    .modal h3 {
      margin-top: 1rem;
      font-size: 1.1rem;
      border-top: 1px solid #e2e8f0;
      padding-top: 1rem;
    }

    .close-modal {
      position: absolute;
      top: 1.2rem;
      right: 1.5rem;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #64748b;
      transition: color 0.2s;
    }

    .close-modal:hover {
      color: #1e293b;
    }

    /* Delete Confirmation Modal */
    .confirm-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(5px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1100;
      padding: 1rem;
    }

    .confirm-modal {
      background: white;
      border-radius: 1.5rem;
      max-width: 420px;
      width: 100%;
      padding: 2rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
      text-align: center;
      animation: slideUp 0.3s ease;
    }

    .confirm-modal i {
      font-size: 3rem;
      color: #ef4444;
      margin-bottom: 1rem;
      display: block;
    }

    .confirm-modal h3 {
      font-size: 1.2rem;
      color: #1e293b;
      margin-bottom: 0.5rem;
      border: none;
      padding: 0;
    }

    .confirm-modal p {
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .confirm-actions {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-cancel {
      background: white;
      border: 1px solid #e2e8f0;
      color: #334155;
      padding: 0.6rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-cancel:hover {
      background: #f1f5f9;
    }

    /* Toast popup */
    .popup-toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #1e293b;
      color: white;
      padding: 1rem 1.8rem;
      border-radius: 3rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 500;
      z-index: 1500;
      transform: translateY(100px);
      opacity: 0;
      transition: 0.3s ease;
    }

    .popup-toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .popup-toast.error {
      background: #b91c1c;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media (max-width: 640px) {
      body { padding: 1rem; }
      .header { flex-direction: column; align-items: flex-start; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .grid { grid-template-columns: 1fr; }
      .confirm-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h2><i class="fa fa-briefcase" style="color:#3498db;"></i> Internship Management</h2>
      <p>Manage postings, applicants, and deadlines</p>
    </div>
    <a href="create-internships.html" class="btn"><i class="fa fa-plus"></i> Create New Internship</a>
  </div>

  <div class="toolbar">
    <div class="search-wrapper">
      <i class="fa fa-search"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Search by title or company...">
    </div>
    <select id="statusFilter">
      <option value="">All Statuses</option>
      <option value="Open">Open</option>
      <option value="Closed">Closed</option>
    </select>
    <select id="typeFilter">
      <option value="">All Types</option>
      <option value="Onsite">Onsite</option>
      <option value="Remote">Remote</option>
      <option value="Hybrid">Hybrid</option>
    </select>
  </div>

  <div id="cardsContainer" class="grid"></div>
</div>

<!-- Detail Modal -->
<div id="detailModal" class="modal-overlay">
  <div class="modal" id="modalContent"></div>
</div>

<!-- Delete Confirmation Modal -->
<div id="deleteConfirmModal" class="confirm-modal-overlay">
  <div class="confirm-modal">
    <i class="fa-solid fa-trash-can"></i>
    <h3>Delete Internship?</h3>
    <p>This action cannot be undone. The internship and all related data will be permanently removed.</p>
    <div class="confirm-actions">
      <button class="btn-cancel" id="cancelDeleteBtn">Cancel</button>
      <button class="btn-danger" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<!-- Toast popup -->
<div id="toast" class="popup-toast"></div>

<script>
  (function() {
    const API_BASE_URL = "http://smartcareerhub.runasp.net/api";
    const TOKEN = localStorage.getItem("authToken") || "";

    let internships = [];
    let deleteTargetId = null;

    const cardsContainer = document.getElementById("cardsContainer");
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const typeFilter = document.getElementById("typeFilter");
    const detailModal = document.getElementById("detailModal");
    const modalContent = document.getElementById("modalContent");
    const deleteConfirmModal = document.getElementById("deleteConfirmModal");
    const toastEl = document.getElementById("toast");

    function showToast(message, isError = false) {
      toastEl.textContent = message;
      toastEl.className = `popup-toast ${isError ? 'error' : ''} show`;
      setTimeout(() => {
        toastEl.classList.remove("show");
      }, 3000);
    }

    function formatDate(dateStr) {
      if (!dateStr) return "Not set";
      return new Date(dateStr).toLocaleDateString("en-US", { year:"numeric", month:"short", day:"numeric" });
    }

    function mapType(typeValue) {
      if (typeValue === 0 || typeValue === "Onsite") return "Onsite";
      if (typeValue === 1 || typeValue === "Remote") return "Remote";
      if (typeValue === 2 || typeValue === "Hybrid") return "Hybrid";
      return typeValue || "Not specified";
    }

    function mapStatus(isOpen, deadlineStr) {
      if (isOpen === true) return "Open";
      if (isOpen === false) return "Closed";
      if (deadlineStr && new Date(deadlineStr) < new Date()) return "Closed";
      return "Open";
    }

    async function fetchInternships() {
      try {
        const response = await fetch(`${API_BASE_URL}/internships?page=1&pageSize=50&sortBy=createdAt&sortDirection=desc`, {
          headers: {
            "Authorization": `Bearer ${TOKEN}`,
            "Content-Type": "application/json"
          }
        });
        if (!response.ok) throw new Error("Failed to fetch internships");
        const data = await response.json();
        internships = Array.isArray(data) ? data : (data.data || []);
        renderCards();
      } catch (err) {
        console.error(err);
        showToast("Could not load internships. Check connection or token.", true);
        internships = [];
        renderCards();
      }
    }

    // Open delete confirmation popup
    function openDeleteConfirm(id) {
      deleteTargetId = id;
      deleteConfirmModal.style.display = "flex";
      document.body.style.overflow = "hidden";
    }

    function closeDeleteConfirm() {
      deleteConfirmModal.style.display = "none";
      document.body.style.overflow = "";
      deleteTargetId = null;
    }

    async function confirmDelete() {
      if (!deleteTargetId) return;
      try {
        const res = await fetch(`${API_BASE_URL}/internships/${deleteTargetId}`, {
          method: "DELETE",
          headers: { "Authorization": `Bearer ${TOKEN}` }
        });
        if (!res.ok) throw new Error("Delete failed");
        showToast("Internship deleted successfully");
        closeDeleteConfirm();
        await fetchInternships();
      } catch (err) {
        showToast("Failed to delete internship", true);
        closeDeleteConfirm();
      }
    }

    // Open detail modal
    function openDetailModal(internship) {
      const skills = internship.requiredSkills || [];
      const requirements = internship.requirements || [];
      const isPaid = internship.isPaid ? "Yes 💰" : "No";
      const statusText = internship.isOpen !== undefined ? (internship.isOpen ? "Open" : "Closed") : mapStatus(null, internship.applicationDeadline);

      modalContent.innerHTML = `
        <button class="close-modal" id="closeDetailBtn"><i class="fa fa-times"></i></button>
        <h2 style="margin-bottom:0.5rem;">${escapeHtml(internship.title || 'Untitled')}</h2>
        <p style="color:#3498db; font-weight:600;"><i class="fa fa-building"></i> ${escapeHtml(internship.companyName || 'Company')}</p>
        <p><strong>Status:</strong> <span class="badge ${statusText==='Open'?'open':'closed'}">${statusText}</span></p>
        <p><strong>Type:</strong> ${mapType(internship.type)}</p>
        <p><strong>Location:</strong> ${escapeHtml(internship.location || 'Remote')}</p>
        <p><strong>Duration:</strong> ${internship.durationInMonths ? internship.durationInMonths + ' months' : 'N/A'}</p>
        <p><strong>Deadline:</strong> ${formatDate(internship.applicationDeadline)}</p>
        <p><strong>Max trainees:</strong> ${internship.maxTrainees || 'N/A'}</p>
        <p><strong>Paid:</strong> ${isPaid}</p>
        <h3>Description</h3>
        <p style="color:#334155;">${escapeHtml(internship.description || 'No description provided.')}</p>
        <h3>Required Skills</h3>
        <div class="skills">${skills.length ? skills.map(s=>`<span class="skill-tag">${escapeHtml(s)}</span>`).join('') : '—'}</div>
        <h3>Requirements</h3>
        <ul style="padding-left:1.2rem; color:#334155;">${requirements.length ? requirements.map(r=>`<li>${escapeHtml(r)}</li>`).join('') : '<li>None</li>'}</ul>
      `;
      detailModal.style.display = "flex";
      document.body.style.overflow = "hidden";
      document.getElementById("closeDetailBtn")?.addEventListener("click", closeDetailModal);
    }

    function closeDetailModal() {
      detailModal.style.display = "none";
      document.body.style.overflow = "";
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      });
    }

    // Redirect to create-internships.html for editing
    function editInternship(id) {
      window.location.href = `create-internships.html?id=${id}`;
    }

    function renderCards() {
      const searchTerm = searchInput.value.toLowerCase();
      const statusVal = statusFilter.value;
      const typeVal = typeFilter.value;

      const filtered = internships.filter(intern => {
        const titleMatch = (intern.title || '').toLowerCase().includes(searchTerm);
        const companyMatch = (intern.companyName || '').toLowerCase().includes(searchTerm);
        const status = intern.isOpen !== undefined ? (intern.isOpen ? "Open" : "Closed") : mapStatus(null, intern.applicationDeadline);
        const typeStr = mapType(intern.type);
        return (titleMatch || companyMatch) &&
          (!statusVal || status === statusVal) &&
          (!typeVal || typeStr === typeVal);
      });

      if (!filtered.length) {
        cardsContainer.innerHTML = `<div class="empty-message"><i class="fa fa-folder-open"></i> No internships found</div>`;
        return;
      }

      cardsContainer.innerHTML = filtered.map(intern => {
        const status = intern.isOpen !== undefined ? (intern.isOpen ? "Open" : "Closed") : mapStatus(null, intern.applicationDeadline);
        const skills = intern.requiredSkills || [];
        return `
          <div class="card">
            <span class="badge ${status === 'Open' ? 'open' : 'closed'}">${status}</span>
            <div>
              <h3>${escapeHtml(intern.title || 'Untitled')}</h3>
              <div class="company"><i class="fa fa-building"></i> ${escapeHtml(intern.companyName || 'Company')}</div>
              <div class="detail-row"><i class="fa fa-location-dot"></i> ${escapeHtml(intern.location || 'Remote')}</div>
              <div class="detail-row"><i class="fa fa-laptop"></i> ${mapType(intern.type)}</div>
              <div class="detail-row"><i class="fa fa-clock"></i> ${intern.durationInMonths || '?'} months</div>
              <div class="detail-row"><i class="fa fa-calendar"></i> ${formatDate(intern.applicationDeadline)}</div>
              <div class="skills">${skills.slice(0,3).map(s=>`<span class="skill-tag">${escapeHtml(s)}</span>`).join('')}</div>
            </div>
            <div class="actions">
              <button class="btn btn-outline detail-btn" data-id="${intern.id}"><i class="fa fa-eye"></i> Details</button>
              <button class="icon-btn edit-btn" data-id="${intern.id}" title="Edit"><i class="fa fa-pen"></i></button>
              <button class="icon-btn delete-btn delete-action" data-id="${intern.id}" title="Delete"><i class="fa fa-trash"></i></button>
            </div>
          </div>
        `;
      }).join('');

      // Attach event listeners
      document.querySelectorAll('.detail-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          const intern = internships.find(i => i.id == id);
          if (intern) openDetailModal(intern);
        });
      });

      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          editInternship(id);
        });
      });

      document.querySelectorAll('.delete-action').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          openDeleteConfirm(id);
        });
      });
    }

    // Event listeners
    searchInput.addEventListener("input", renderCards);
    statusFilter.addEventListener("change", renderCards);
    typeFilter.addEventListener("change", renderCards);

    detailModal.addEventListener("click", (e) => {
      if (e.target === detailModal) closeDetailModal();
    });

    deleteConfirmModal.addEventListener("click", (e) => {
      if (e.target === deleteConfirmModal) closeDeleteConfirm();
    });

    document.getElementById("cancelDeleteBtn").addEventListener("click", closeDeleteConfirm);
    document.getElementById("confirmDeleteBtn").addEventListener("click", confirmDelete);

    // Keyboard support
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        if (deleteConfirmModal.style.display === "flex") {
          closeDeleteConfirm();
        } else if (detailModal.style.display === "flex") {
          closeDetailModal();
        }
      }
    });

    // Initial load
    if (!TOKEN) {
      showToast("Authentication token missing. Please log in.", true);
    } else {
      fetchInternships();
    }
  })();
</script>
</body>
</html>
