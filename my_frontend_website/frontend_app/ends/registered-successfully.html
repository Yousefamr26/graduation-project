<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Created - Smart Career Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            background: #eef2f6;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #ffffff;
            width: 480px;
            max-width: 90%;
            padding: 40px 35px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            animation: fadeIn 0.6s ease-in-out;
        }

        .logo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            color: #2c7be5;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 25px;
        }

        .logo i {
            font-size: 22px;
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: #d4f4e3;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px;
        }

        .success-icon i {
            font-size: 40px;
            color: #1bbf73;
        }

        h2 {
            font-size: 22px;
            margin-bottom: 15px;
            color: #111;
        }

        h2 i {
            color: #ffb400;
            margin-right: 8px;
        }

        p {
            color: #555;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px;
            background: #2c7be5;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #1a68d1;
        }

        .footer {
            margin-top: 25px;
            font-size: 13px;
            color: #888;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">
            <i class="fa-solid fa-brain"></i>
            <span>Smart Career Hub</span>
        </div>

        <div class="success-icon">
            <i class="fa-solid fa-check"></i>
        </div>

        <h2>
            <i class="fa-solid fa-party-horn"></i>
            Account Created Successfully!
        </h2>

        <p>
            Welcome to Smart Career Hub — your AI-powered
            career companion.
        </p>

        <button class="btn" onclick="goToLogin()">
            Go to Login
        </button>

        <div class="footer">
            © 2025 Smart Career Hub
        </div>
    </div>

    <script>
        function goToLogin() {
            // Change this URL to your login page
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
