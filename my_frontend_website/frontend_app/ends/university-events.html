<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>University Events</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --bg: #f4f7fb;
            --card: #fff;
            --accent: #3498db;
            --danger: #e74c3c;
            --success: #2ecc71;
            --warning: #f39c12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", sans-serif;
            background: var(--bg);
            padding: 20px;
        }

        .wrap {
            max-width: 1400px;
            margin: auto;
            width: 100%;
        }

        /* ===== TOP BAR ===== */
        .top {
            background: #fff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin-bottom: 25px;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .top-header h1 {
            font-size: 28px;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .top-header p {
            color: #666;
            font-size: 15px;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        input.search {
            padding: 12px 16px;
            border-radius: 10px;
            border: 1.5px solid #e0e0e0;
            min-width: 250px;
            font-size: 14px;
            transition: border-color 0.3s;
            flex: 1;
        }

        input.search:focus {
            outline: none;
            border-color: var(--accent);
        }

        select {
            padding: 12px 16px;
            border-radius: 10px;
            border: 1.5px solid #e0e0e0;
            font-size: 14px;
            cursor: pointer;
            background: white;
        }

        .create {
            background: var(--accent);
            color: #fff;
            border: 0;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .create:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 60px 20px;
            background: #fff;
            border-radius: 16px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* CARDS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            position: relative;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: capitalize;
            z-index: 1;
        }

        .published, .true {
            background: #eafff2;
            color: #0b8f46;
        }

        .draft, .false {
            background: #fff5e6;
            color: #c67a00;
        }

        .card-body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-body h3 {
            margin: 0 0 10px;
            font-size: 18px;
            color: #2c3e50;
        }

        .meta {
            color: #666;
            font-size: 13px;
            margin-bottom: 10px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-body p {
            color: #555;
            font-size: 14px;
            line-height: 1.5;
            flex: 1;
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .actions button {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            border-radius: 8px;
            border: 0;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .actions button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .btn-details {
            background: #e0f2fe;
            color: #0369a1;
        }

        .btn-edit {
            background: #eef2ff;
            color: #3730a3;
        }

        .btn-delete {
            background: #fee2e2;
            color: #b91c1c;
        }

        .btn-toggle {
            background: #fef3c7;
            color: #92400e;
        }

        /* MODAL */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #fff;
            width: 100%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 16px;
            padding: 30px;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-btn {
            background: #f3f4f6;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .close-btn:hover {
            background: #e5e7eb;
        }

        .modal-content img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 500px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }

        .detail-item {
            background: #f9fafb;
            padding: 12px;
            border-radius: 8px;
        }

        .detail-item b {
            display: block;
            color: #374151;
            margin-bottom: 5px;
            font-size: 13px;
        }

        .detail-item span {
            color: #6b7280;
            font-size: 14px;
        }

        /* TOAST */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 16px 24px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            max-width: 450px;
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }

        .toast.warning {
            background: var(--warning);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            background: #fff;
            border-radius: 16px;
            color: #666;
        }

        .empty i {
            font-size: 48px;
            color: #d1d5db;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
<div class="wrap">
    <div class="top">
        <div class="top-header">
            <div>
                <h1><i class="fa fa-calendar" style="color: #3498db;"></i> University Events</h1>
                <p style="margin-top: 10px;">Manage events with points-based eligibility and capacity control</p>
            </div>
        </div>
        <div class="controls">
            <input class="search" id="search" placeholder="Search events..." oninput="renderEvents()">
            <select id="filter" onchange="renderEvents()">
                <option value="all">All Events</option>
                <option value="true">Published</option>
                <option value="false">Draft</option>
            </select>
            <button class="create" onclick="createNew()">
                <i class="fa-solid fa-plus"></i> Create New Event
            </button>
        </div>
    </div>

    <div id="listArea">
        <div class="loading">
            <div class="spinner"></div>
            <p>Loading events...</p>
        </div>
    </div>
</div>

<!-- DETAILS MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 style="color: #2c3e50;">Event Details</h2>
            <button class="close-btn" onclick="closeModal()">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<script>
    const API_BASE_URL = "http://smartcareerhub.runasp.net/api";
    const API_Files_URL = "http://smartcareerhub.runasp.net";
    const TOKEN = localStorage.getItem("authToken");

    // Toast notification system
    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        
        const icons = {
            success: 'fa-check-circle',
            error: 'fa-exclamation-circle',
            warning: 'fa-exclamation-triangle'
        };
        
        toast.innerHTML = `
            <i class="fa-solid ${icons[type]}"></i>
            <span>${message}</span>
        `;
        
        container.appendChild(toast);
        
        setTimeout(() => {
            toast.style.animation = 'slideIn 0.3s ease reverse';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // API Helper Functions
    async function apiRequest(endpoint, options = {}) {
        const defaultHeaders = {
            'Authorization': `Bearer ${TOKEN}`,
        };

        if (!(options.body instanceof FormData)) {
            defaultHeaders['Content-Type'] = 'application/json';
        }

        const config = {
            ...options,
            headers: {
                ...defaultHeaders,
                ...options.headers,
            },
        };

        try {
            const response = await fetch(`${API_BASE_URL}${endpoint}`, config);

            if (!response.ok) {
                const errorText = await response.text(); // 👈 خليها text مش json
                throw new Error(errorText || `HTTP error! status: ${response.status}`);
            }

            // 204 أو مفيش محتوى
            if (response.status === 204 || response.headers.get('content-length') === '0') {
                return null;
            }

            // 👇 نحدد نوع الريسبونس
            const contentType = response.headers.get('content-type');

            if (contentType && contentType.includes('application/json')) {
                return await response.json();
            } else {
                return await response.text(); // 👈 هنا الحل
            }

        } catch (error) {
            console.error('API Error:', error);
            throw error;
        }
    }
    // Fetch all events
    async function fetchEvents() {
        try {
            var events = await apiRequest('/events');
            events=events["data"]
            return events || [];
        } catch (error) {
            showToast('Failed to fetch events: ' + error.message, 'error');
            return [];
        }
    }

    // Delete event
    async function deleteEventAPI(id) {
        try {
            await apiRequest(`/Events/${id}`, { method: 'DELETE' });
            showToast('Event deleted successfully!', 'success');
            await renderEvents();
        } catch (error) {
            showToast('Failed to delete event: ' + error.message, 'error');
        }
    }

    // Toggle event publish status
    async function toggleEventStatus(id, currentStatus) {
        try {
            // الحالة الجديدة (نعكس الحالية)
            const newStatus = !currentStatus;

            await apiRequest(`/Events/bulkstatus?isPublished=${newStatus}`, {
                method: 'PATCH',
                body: JSON.stringify([id]) // لازم array
            });

            showToast('Event status updated!', 'success');

            // إعادة تحميل الليست
            await renderEvents();

        } catch (error) {
            showToast('Failed to update status: ' + error.message, 'error');
        }
    }

    function createNew() {
        window.location.href = 'create-event.html';
    }

    function editEvent(id) {
        window.location.href = `create-event.html?id=${id}`;
    }
    function safeImage(base, path) {
        if (!path) return 'assets/default.png';

        return encodeURI(
            (base.replace(/\/$/, '') + '/' + path.replace(/^\//, ''))
            .replace(/['"]/g, '')
            .replace(/\\/g, '/')
        );
        }
    async function renderEvents() {
        const container = document.getElementById('listArea');
        container.innerHTML = `
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading events...</p>
            </div>
        `;

        const events = await fetchEvents();
        const q = document.getElementById('search').value.toLowerCase();
        const filter = document.getElementById('filter').value;

        let filtered = events.filter(ev => 
            ev.title && ev.title.toLowerCase().includes(q)
        );

        if (filter !== 'all') {
            filtered = filtered.filter(ev => String(ev.isPublished) === filter);
        }

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty">
                    <i class="fa-solid fa-calendar-xmark"></i>
                    <h3>No events found</h3>
                    <p>Try adjusting your search or filter criteria</p>
                </div>
            `;
            return;
        }
        const grid = document.createElement('div');
        grid.className = 'grid';

        filtered.forEach(ev => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const statusClass = ev.isPublished ? 'published' : 'draft';
            const statusText = ev.isPublished ? 'Published' : 'Draft';
            card.innerHTML = `
                <div class="status-badge ${statusClass}">
                    ${statusText}
                </div>
                <img src="data:image/jpeg;base64,${ev.bannerUrl}" 
     alt="${ev.title || ''}">
                <div class="card-body">
                    <h3>${ev.title || 'Untitled Event'}</h3>
                    <div class="meta">
                        <span><i class="fa-solid fa-tag"></i> ${ev.eventType || 'N/A'}</span>
                        <span><i class="fa-solid fa-calendar-days"></i> ${ev.startDate ? new Date(ev.startDate).toLocaleDateString() : 'N/A'}</span>
                    </div>
                    <p>${ev.description ? ev.description.slice(0, 120) + '...' : 'No description available'}</p>
                    <div class="actions">
                        <button class="btn-details" onclick="openDetails('${ev.id}')">
                            <i class="fa-solid fa-eye"></i> Details
                        </button>
                        <button class="btn-edit" onclick="editEvent('${ev.id}')">
                            <i class="fa-solid fa-pen-to-square"></i> Edit
                        </button>
                        <button class="btn-toggle" onclick="toggleEventStatus('${ev.id}', ${ev.isPublished})">
                            <i class="fa-solid fa-${ev.isPublished ? 'eye-slash' : 'eye'}"></i> 
                            ${ev.isPublished ? 'Unpublish' : 'Publish'}
                        </button>
                        <button class="btn-delete" onclick="confirmDelete('${ev.id}')">
                            <i class="fa-solid fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `;

            grid.appendChild(card);
        });

        container.innerHTML = '';
        container.appendChild(grid);
    }

    async function openDetails(id) {
        try {
            const events = await fetchEvents();
            const ev = events.find(e => String(e.id) === String(id));
            
            if (!ev) {
                showToast('Event not found', 'error');
                return;
            }

            document.getElementById('modalBody').innerHTML = `
                <img src="data:image/jpeg;base64,${ev.bannerUrl}" 
                     alt="${ev.title}">
                
                <div class="detail-grid">
                    <div class="detail-item">
                        <b>Title</b>
                        <span>${ev.title || 'N/A'}</span>
                    </div>
                    <div class="detail-item">
                        <b>Event Type</b>
                        <span>${ev.eventType || 'N/A'}</span>
                    </div>
                    <div class="detail-item">
                        <b>Mode</b>
                        <span>${ev.mode || 'N/A'}</span>
                    </div>
                    <div class="detail-item">
                        <b>Status</b>
                        <span class="status-badge ${ev.isPublished ? 'published' : 'draft'}" style="position: static; display: inline-block;">
                            ${ev.isPublished ? 'Published' : 'Draft'}
                        </span>
                    </div>
                    <div class="detail-item">
                        <b>Start Date</b>
                        <span>${ev.startDate ? new Date(ev.startDate).toLocaleDateString() : 'N/A'}</span>
                    </div>
                    <div class="detail-item">
                        <b>End Date</b>
                        <span>${ev.endDate ? new Date(ev.endDate).toLocaleDateString() : 'N/A'}</span>
                    </div>
                    <div class="detail-item">
                        <b>Start Time</b>
                        <span>${ev.startTime || 'N/A'}</span>
                    </div>
                    <div class="detail-item">
                        <b>End Time</b>
                        <span>${ev.endTime || 'N/A'}</span>
                    </div>
                    <div class="detail-item">
                        <b>Minimum Points Required</b>
                        <span>${ev.minimumRequiredPoints || '0'} pts</span>
                    </div>
                    <div class="detail-item">
                        <b>Max Capacity</b>
                        <span>${ev.maxCapacity || 'N/A'}</span>
                    </div>
                    <div class="detail-item">
                        <b>Points for Attendance</b>
                        <span>${ev.pointsForAttendance || '0'} pts</span>
                    </div>
                    <div class="detail-item">
                        <b>Points for Full Participation</b>
                        <span>${ev.pointsForFullParticipation || '0'} pts</span>
                    </div>
                </div>
                
                <div class="detail-item" style="margin-top: 15px; grid-column: 1 / -1;">
                    <b>Description</b>
                    <span>${ev.description || 'No description available'}</span>
                </div>
                
                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button class="btn-edit" onclick="editEvent('${ev.id}')" style="flex:1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600;">
                        <i class="fa-solid fa-pen-to-square"></i> Edit Event
                    </button>
                    <button class="btn-toggle" onclick="toggleEventStatus('${ev.id}')" style="flex:1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; background: #fef3c7; color: #92400e;">
                        <i class="fa-solid fa-${ev.isPublished ? 'eye-slash' : 'eye'}"></i> 
                        ${ev.isPublished ? 'Unpublish' : 'Publish'}
                    </button>
                </div>
            `;

            document.getElementById('modal').classList.add('active');
        } catch (error) {
            showToast('Failed to load event details', 'error');
        }
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
    }

    function confirmDelete(id) {
        // Create custom confirmation dialog
        const overlay = document.createElement('div');
        overlay.style.cssText = `
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
        `;
        
        overlay.innerHTML = `
            <div style="
                background: white; padding: 30px; border-radius: 16px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                animation: slideUp 0.3s ease;
                max-width: 400px; width: 90%;
            ">
                <h3 style="margin-bottom: 15px; color: #2c3e50;">
                    <i class="fa-solid fa-triangle-exclamation" style="color: #e74c3c;"></i> 
                    Confirm Delete
                </h3>
                <p style="color: #666; margin-bottom: 20px;">
                    Are you sure you want to delete this event? This action cannot be undone.
                </p>
                <div style="display: flex; gap: 10px;">
                    <button id="cancelDelete" style="
                        flex: 1; padding: 12px; border: 1.5px solid #e0e0e0; 
                        border-radius: 8px; cursor: pointer; background: white;
                        font-weight: 600; color: #666;
                    ">Cancel</button>
                    <button id="confirmDeleteBtn" style="
                        flex: 1; padding: 12px; border: none; border-radius: 8px;
                        cursor: pointer; background: #e74c3c; color: white;
                        font-weight: 600;
                    ">Delete</button>
                </div>
            </div>
        `;
        
        document.body.appendChild(overlay);
        
        document.getElementById('cancelDelete').onclick = () => overlay.remove();
        document.getElementById('confirmDeleteBtn').onclick = async () => {
            overlay.remove();
            await deleteEventAPI(id);
        };
    }
    // Close modal when clicking outside
    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeModal();
        }
    });

    // Initial render
    renderEvents();
</script>
</body>
</html>
