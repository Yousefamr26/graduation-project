<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no, viewport-fit=cover">
  <title>Roadmap Details · Smart Career Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --surface: #ffffff;
      --bg: #f5f7fe;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e8edf5;
      --shadow-sm: 0 8px 20px rgba(0,0,0,0.04);
      --shadow-md: 0 20px 35px rgba(0,0,0,0.08);
      --radius-xl: 28px;
      --radius-md: 16px;
      --transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image: radial-gradient(ellipse at 5% 15%, rgba(79,70,229,0.04) 0%, transparent 50%), radial-gradient(ellipse at 90% 80%, rgba(124,58,237,0.05) 0%, transparent 50%);
      line-height: 1.5;
    }
    .container-main {
      padding: 32px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (min-width: 992px) { .container-main { padding: 48px 52px; } }

    .page-header {
      margin-bottom: 32px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .back-btn {
      border-radius: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
      text-decoration: none;
    }
    .back-btn:hover { background: #f8fafc; border-color: var(--primary); color: var(--primary); }
    .page-header h4 {
      font-weight: 800;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      letter-spacing: -0.8px;
      background: linear-gradient(135deg, #1e293b 0%, #4f46e5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .progress-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 28px 32px;
      margin-bottom: 32px;
      box-shadow: var(--shadow-sm);
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .progress-title { font-weight: 700; font-size: 1.2rem; }
    .progress-percent {
      font-weight: 800;
      font-size: 2rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .progress { height: 14px; border-radius: 20px; background: #e9eef3; }
    .progress-bar {
      border-radius: 20px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      font-weight: 700;
      font-size: 0.75rem;
    }

    .sections-container { display: flex; flex-direction: column; gap: 24px; }

    .section-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }
    .section-card:hover { box-shadow: var(--shadow-md); }
    .section-header {
      padding: 20px 24px;
      background: #fafbfd;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }
    .section-icon {
      width: 44px; height: 44px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; color: white;
    }
    .section-icon.video { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .section-icon.pdf { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .section-icon.quiz { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .section-icon.project { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
    .section-icon.material { background: linear-gradient(135deg, #10b981, #059669); }
    .section-title { font-weight: 700; font-size: 1.1rem; flex: 1; }
    .section-count {
      background: #f1f5f9; padding: 4px 14px;
      border-radius: 30px; font-weight: 600;
      font-size: 0.75rem; color: var(--text-secondary);
    }
    .chevron { transition: transform 0.3s ease; font-size: 1.2rem; color: var(--text-secondary); }
    .chevron.open { transform: rotate(180deg); }
    .section-body { padding: 20px 24px; display: none; }
    .section-body.open { display: block; }

    .item-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-radius: var(--radius-md);
      margin-bottom: 8px; background: #fafbfd;
      border: 1px solid #f1f4f9; transition: var(--transition);
    }
    .item-row:hover { background: #f5f7fe; border-color: #d9e0f0; }
    .item-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: white; flex-shrink: 0;
    }
    .item-icon.video { background: #3b82f6; }
    .item-icon.pdf { background: #ef4444; }
    .item-icon.quiz { background: #f59e0b; }
    .item-icon.project { background: #8b5cf6; }
    .item-info { flex: 1; min-width: 0; }
    .item-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 2px; }
    .item-meta { font-size: 0.75rem; color: var(--text-secondary); display: flex; gap: 12px; flex-wrap: wrap; }
    .item-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-item {
      border-radius: 10px; font-weight: 600; font-size: 0.72rem;
      padding: 8px 14px; display: inline-flex; align-items: center;
      gap: 5px; transition: var(--transition); white-space: nowrap;
    }
    .btn-complete { background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; }
    .btn-complete:hover { opacity: 0.9; }
    .btn-open { border: 1.5px solid #e2e8f0; color: var(--text); background: var(--surface); }
    .btn-open:hover { background: #f8fafc; border-color: var(--primary); }
    .completed-badge {
      background: #dcfce7; color: #065f46;
      padding: 6px 14px; border-radius: 30px;
      font-weight: 600; font-size: 0.7rem;
      display: inline-flex; align-items: center; gap: 4px;
    }

    #toastContainer {
      position: fixed; bottom: 32px; right: 32px; z-index: 99999;
      display: flex; flex-direction: column; gap: 14px;
    }
    .toast-popup {
      background: #0f172a; color: white; padding: 16px 30px;
      border-radius: 50px; font-weight: 600; display: flex;
      align-items: center; gap: 12px; animation: slideUp 0.35s ease;
      font-size: 0.9rem; box-shadow: 0 20px 40px rgba(0,0,0,0.3); max-width: 380px;
    }
    .toast-popup.error { background: #dc2626; }
    .toast-popup.success { background: #059669; }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .skeleton {
      background: linear-gradient(90deg, #e9edf5 25%, #f0f4fa 50%, #e9edf5 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite;
      border-radius: 28px; height: 200px; margin-bottom: 20px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
<div class="container-main">
  <div class="page-header">
    <a href="javascript:history.back()" class="back-btn"><i class="bi bi-arrow-left"></i> Back</a>
    <div>
      <h4 id="roadmapTitle">📊 Roadmap Details</h4>
      <p id="roadmapDesc" class="text-muted">Loading roadmap content...</p>
    </div>
  </div>

  <div class="progress-card">
    <div class="progress-header">
      <span class="progress-title">Overall Progress</span>
      <span class="progress-percent" id="progressPercent">0%</span>
    </div>
    <div class="progress">
      <div class="progress-bar" id="progressBar" role="progressbar" style="width:0%">0%</div>
    </div>
  </div>

  <div class="sections-container" id="sectionsContainer"></div>
</div>
<div id="toastContainer"></div>

<script>
  (function() {
    const API_BASE = "http://smartcareerhub.runasp.net/api";
    const TOKEN = localStorage.getItem("authToken") || "";
    const BASE_URL = "http://smartcareerhub.runasp.net";

    let roadmapData = null;
    const roadmapId = new URLSearchParams(window.location.search).get('id') || '1';

    const sectionsContainer = document.getElementById("sectionsContainer");
    const roadmapTitle = document.getElementById("roadmapTitle");
    const roadmapDesc = document.getElementById("roadmapDesc");
    const progressPercent = document.getElementById("progressPercent");
    const progressBar = document.getElementById("progressBar");

    // Auto-refresh progress every 60 seconds
    let progressInterval;

    function toast(msg, type='info') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast-popup ${type==='error'?'error':(type==='success'?'success':'')}`;
      t.innerHTML = `<i class="bi bi-${type==='error'?'exclamation-circle':(type==='success'?'check-circle':'info-circle')}"></i> ${msg}`;
      c.appendChild(t);
      setTimeout(() => t.remove(), 4500);
    }

    function esc(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function getItemTypeClass(type) {
      const t = (type || '').toLowerCase();
      if (t.includes('video')) return 'video';
      if (t.includes('pdf')) return 'pdf';
      if (t.includes('quiz')) return 'quiz';
      if (t.includes('project')) return 'project';
      return 'material';
    }

    function getItemIcon(type) {
      const t = (type || '').toLowerCase();
      if (t.includes('video')) return 'bi-play-circle';
      if (t.includes('pdf')) return 'bi-file-pdf';
      if (t.includes('quiz')) return 'bi-patch-question';
      if (t.includes('project')) return 'bi-folder';
      return 'bi-book';
    }

    function getSectionTypeFromItems(items) {
      if (!items || !items.length) return 'material';
      const type = (items[0].type || '').toLowerCase();
      if (type.includes('video') || type.includes('pdf')) return 'video';
      if (type.includes('quiz')) return 'quiz';
      if (type.includes('project')) return 'project';
      return 'material';
    }

    function handleItemClick(item) {
      const type = (item.type || '').toLowerCase();
      const itemId = item.id;
      const url = item.url || '';

      if (type.includes('video') || type.includes('pdf')) {
        // Open file viewer
        const fullUrl = url.startsWith('http') ? url : `${BASE_URL}${url}`;
        const storageKey = `file_${itemId}`;
        localStorage.setItem(storageKey, JSON.stringify({
          url: fullUrl,
          itemId: itemId,
          itemType: item.type,
          roadmapId: roadmapId,
          title: item.title || ''
        }));

        window.location.href = `fileviewer.html?itemid=${itemId}&itemtype=${encodeURIComponent(item.type)}&roadmapId=${roadmapId}`;
      } else if (type.includes('quiz')) {
        // Navigate to quiz page
        window.location.href = `Quiz.html?quizId=${itemId}&roadmapId=${roadmapId}`;
      } else if (type.includes('project')) {
        const projectText = url || 'No project details available';
        document.getElementById("projectTextContent").innerText = projectText;
        const modal = new bootstrap.Modal(document.getElementById('projectModal'));
        modal.show();
      } else {
        // Default: open URL if exists
        if (url) {
          const fullUrl = url.startsWith('http') ? url : `${BASE_URL}${url}`;
          window.open(fullUrl, '_blank');
        }
      }
    }

    async function markProgress(itemId, itemType) {
      try {
        const res = await fetch(`${API_BASE}/student/roadmaps/progress`, {
          method: "POST",
          headers: { "Authorization": `Bearer ${TOKEN}`, "Content-Type": "application/json" },
          body: JSON.stringify({ roadmapId: parseInt(roadmapId), itemId, itemType })
        });
        if (!res.ok) throw new Error();
        toast("✅ Progress updated!", "success");
        loadRoadmapDetails();
      } catch { toast("Failed to update progress", "error"); }
    }

    function renderSections() {
      if (!roadmapData) return;

      roadmapTitle.textContent = roadmapData.title || 'Roadmap Details';
      roadmapDesc.textContent = roadmapData.description || 'Complete all sections to master this roadmap';

      const percent = roadmapData.progressPercent || 0;
      progressPercent.textContent = `${percent}%`;
      progressBar.style.width = `${percent}%`;
      progressBar.textContent = `${percent}%`;

      const sections = roadmapData.sections || [];
      if (!sections.length) {
        sectionsContainer.innerHTML = `<div class="text-center py-5 text-muted"><i class="bi bi-inbox fs-1 d-block mb-2"></i><p>No sections available yet.</p></div>`;
        return;
      }

      sectionsContainer.innerHTML = sections.map((section, index) => {
        const items = section.items || [];
        const sectionType = getSectionTypeFromItems(items);
        const completedCount = items.filter(i => i.completed).length;
        const totalPoints = items.reduce((sum, i) => sum + (i.pointsEarned || 0), 0);

        let sectionIconClass = 'bi-collection';
        if (sectionType === 'video') sectionIconClass = 'bi-play-btn';
        else if (sectionType === 'quiz') sectionIconClass = 'bi-patch-question-fill';
        else if (sectionType === 'project') sectionIconClass = 'bi-folder-fill';

        return `
        <div class="section-card">
          <div class="section-header" onclick="window.toggleSection(this)">
            <div class="section-icon ${sectionType}"><i class="bi ${sectionIconClass}"></i></div>
            <div class="section-title">${esc(section.title)}</div>
            <div class="section-count">${completedCount}/${items.length} · ${totalPoints} pts</div>
            <i class="bi bi-chevron-down chevron${index === 0 ? ' open' : ''}"></i>
          </div>
          <div class="section-body${index === 0 ? ' open' : ''}">
            ${items.length ? items.map(item => {
              const itemClass = getItemTypeClass(item.type || '');
              const itemIcon = getItemIcon(item.type || '');
              return `
              <div class="item-row">
                <div class="item-icon ${itemClass}"><i class="bi ${itemIcon}"></i></div>
                <div class="item-info">
                  <div class="item-title">${esc(item.title)}</div>
                  <div class="item-meta">
                    <span>${esc(item.type || '')}</span>
                    <span><i class="bi bi-star-fill text-warning"></i> ${item.pointsEarned || 0} pts</span>
                  </div>
                </div>
                <div class="item-actions">
                  ${item.completed ? 
                    '<span class="completed-badge"><i class="bi bi-check-circle"></i> Done</span>' :
                    `<button class="btn btn-sm btn-complete btn-item" onclick="event.stopPropagation(); window.markProgress(${item.id}, '${esc(item.type || 'material')}')"><i class="bi bi-check-lg"></i> Complete</button>`
                  }
                  <button class="btn btn-sm btn-open btn-item" onclick="event.stopPropagation(); window.handleItemClick(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                    <i class="bi bi-box-arrow-up-right"></i> Open
                  </button>
                </div>
              </div>`;
            }).join('') : '<p class="text-muted text-center py-3">No items in this section.</p>'}
          </div>
        </div>`;
      }).join('');
    }

    window.toggleSection = function(header) {
      const body = header.nextElementSibling;
      const chevron = header.querySelector('.chevron');
      body.classList.toggle('open');
      chevron.classList.toggle('open');
    };

    window.markProgress = function(itemId, itemType) {
      markProgress(itemId, itemType);
    };

    window.handleItemClick = function(item) {
      handleItemClick(item);
    };

    function skeletons() {
      sectionsContainer.innerHTML = Array(3).fill(0).map(() => `<div class="skeleton"></div>`).join('');
    }

    async function loadRoadmapDetails() {
      if (!TOKEN) { toast("Please log in.", "error"); return; }
      skeletons();
      try {
        const res = await fetch(`${API_BASE}/student/roadmaps/${roadmapId}`, {
          headers: { "Authorization": `Bearer ${TOKEN}` }
        });
        if (!res.ok) throw new Error('Failed to fetch');
        roadmapData = await res.json();
        renderSections();
      } catch (e) {
        console.error(e);
        toast("Failed to load roadmap", "error");
        sectionsContainer.innerHTML = `<div class="text-center py-5 text-muted"><i class="bi bi-exclamation-triangle fs-1 d-block mb-2"></i><p>Could not load roadmap.</p></div>`;
      }
    }

    // Start auto-refresh progress every 60 seconds
    progressInterval = setInterval(() => {
      if (roadmapId) loadRoadmapDetails();
    }, 60000);

    loadRoadmapDetails();
  })();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Project Modal -->
<div class="modal fade" id="projectModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0" style="border-radius:24px; overflow:hidden;">

      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold">
          <i class="bi bi-folder-fill text-primary me-2"></i>
          Project Details
        </h5>

        <button 
          type="button" 
          class="btn-close shadow-none" 
          data-bs-dismiss="modal">
        </button>
      </div>

      <div class="modal-body pt-2">
        <div 
          class="p-4 rounded-4"
          style="
            background:#f8fafc;
            border:1px solid #e2e8f0;
            white-space: pre-wrap;
            line-height:1.8;
            font-size:0.95rem;
            color:#334155;
          "
          id="projectTextContent"
        >
        </div>
      </div>

      <div class="modal-footer border-0 pt-0">
        <button 
          type="button"
          class="btn btn-dark rounded-3 px-4"
          data-bs-dismiss="modal"
        >
          Close
        </button>
      </div>

    </div>
  </div>
</div>
</body>
</html>
