<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',sans-serif;
  background:#f4f8fc;
  min-height:100vh;
  padding:35px 20px;
  color:#2c3e50;
}

.container{
  max-width:1150px;
  margin:auto;
}

/* ================= HEADER ================= */

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
  padding:25px 35px;
  background:white;
  border-radius:26px;
  border:1px solid #e8eef5;
  box-shadow:0 8px 25px rgba(15,23,42,0.06);
}

.header-left h1{
  font-size:30px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:12px;
  color:#1e293b;
}

.header-left h1 i{
  color:#3498db;
  font-size:34px;
}

.id-badge{
  margin-top:10px;
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:#ebf5fb;
  color:#3498db;
  padding:9px 18px;
  border-radius:30px;
  font-size:13px;
  font-weight:600;
}

/* ================= BUTTON ================= */

.edit-btn{
  border:none;
  background:linear-gradient(135deg,#3498db);
  color:white;
  padding:14px 28px;
  border-radius:14px;
  cursor:pointer;
  font-size:15px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:10px;
  transition:0.3s ease;
  box-shadow:0 8px 20px rgba(52,152,219,0.25);
}

.edit-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 28px rgba(52,152,219,0.35);
}

/* ================= GRID ================= */

.grid{
  display:grid;
  grid-template-columns:1fr 1.5fr;
  gap:25px;
  margin-bottom:25px;
}

/* ================= CARDS ================= */

.card{
  background:white;
  border-radius:26px;
  padding:32px;
  border:1px solid #e8eef5;
  box-shadow:0 8px 25px rgba(15,23,42,0.06);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 30px rgba(15,23,42,0.09);
}

/* ================= PROFILE ================= */

.profile-card{
  text-align:center;
}

.logo-container{
  width:210px;
  height:210px;
  margin:auto;
  margin-bottom:28px;
  border-radius:28px;
  overflow:hidden;
  background:white;
  border:4px solid #eef5fb;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 10px 30px rgba(52,152,219,0.15);
  position:relative;
}

.logo-container img{
  width:100%;
  height:100%;
  object-fit:contain;
  padding:18px;
  background:white;
}

.logo-placeholder{
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:75px;
  color:#3498db;
  background:#f8fbff;
}

.company-name{
  font-size:28px;
  font-weight:700;
  color:#1e293b;
  margin-bottom:14px;
}

/* ================= STATUS ================= */

.status-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:8px 18px;
  border-radius:25px;
  font-size:13px;
  font-weight:600;
  margin:5px;
}

.status-active{
  background:#eafaf1;
  color:#27ae60;
}

.status-verified{
  background:#ebf5fb;
  color:#3498db;
}

/* ================= INFO ================= */

.info-card h2,
.full-card h2{
  font-size:24px;
  margin-bottom:24px;
  display:flex;
  align-items:center;
  gap:10px;
  color:#1e293b;
}

.info-card h2 i,
.full-card h2 i{
  color:#3498db;
}

.info-list{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.info-item{
  display:flex;
  align-items:center;
  gap:15px;
  padding:18px;
  background:white;
  border-radius:18px;
  transition:0.3s;
  border:1px solid #edf2f7;
}

.info-item:hover{
  background:#f8fbff;
  border-color:#3498db33;
  transform:translateX(5px);
}

.info-icon{
  width:52px;
  height:52px;
  border-radius:14px;
  background:#f8fbff;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#3498db;
  font-size:20px;
}

.info-content{
  flex:1;
}

.info-label{
  font-size:11px;
  text-transform:uppercase;
  color:#94a3b8;
  font-weight:700;
  letter-spacing:1px;
  margin-bottom:5px;
}

.info-value{
  font-size:16px;
  font-weight:600;
  color:#1e293b;
}

/* ================= MEMBER ================= */

.member-info{
  display:flex;
  align-items:center;
  gap:20px;
  padding:28px;
  background:#f8fbff;
  border-radius:22px;
  border:1px solid #eaf2f8;
}

.member-avatar{
  width:85px;
  height:85px;
  border-radius:50%;
  background:linear-gradient(135deg,#3498db,#217dbb);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  color:white;
  font-weight:700;
  box-shadow:0 8px 20px rgba(52,152,219,0.25);
}

.member-details h3{
  font-size:23px;
  margin-bottom:6px;
  color:#1e293b;
}

.member-details p{
  margin:4px 0;
  color:#64748b;
}

.member-email{
  color:#3498db !important;
  font-weight:600;
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){

  .grid{
    grid-template-columns:1fr;
  }

  .header{
    flex-direction:column;
    text-align:center;
    gap:20px;
  }

  .header-left{
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .member-info{
    flex-direction:column;
    text-align:center;
  }

  .logo-container{
    width:170px;
    height:170px;
  }
}

</style>
</head>

<body>

<div class="container">

  <!-- Header -->
  <div class="header">

    <div class="header-left">
      <h1>
        <i class="fa-solid fa-building"></i>
        Company Profile
      </h1>

      <div class="id-badge">
        <i class="fa-solid fa-fingerprint"></i>
        <span id="userId">Loading...</span>
      </div>
    </div>

    <button class="edit-btn" onclick="goToEditPage()">
      <i class="fa-solid fa-pen-to-square"></i>
      Edit Profile
    </button>

  </div>

  <!-- Main Grid -->
  <div class="grid">

    <!-- Profile Card -->
    <div class="card profile-card">

      <div class="logo-container">
        <img id="companyLogo" src="" alt="Logo" style="display:none;">

        <div class="logo-placeholder" id="logoPlaceholder">
          <i class="fa-solid fa-building"></i>
        </div>
      </div>

      <h2 class="company-name" id="companyName">Loading...</h2>

      <div>
        <span class="status-badge status-active" id="statusBadge">
          <i class="fa-solid fa-circle-check"></i>
          Active
        </span>

        <span class="status-badge status-verified" id="emailBadge">
          <i class="fa-solid fa-envelope-circle-check"></i>
          Verified
        </span>
      </div>

    </div>

    <!-- Info Card -->
    <div class="card info-card">

      <h2>
        <i class="fa-solid fa-circle-info"></i>
        Company Information
      </h2>

      <div class="info-list">

        <div class="info-item">
          <div class="info-icon">
            <i class="fa-solid fa-building"></i>
          </div>

          <div class="info-content">
            <div class="info-label">Company Name</div>
            <div class="info-value" id="orgName">Loading...</div>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon">
            <i class="fa-solid fa-globe"></i>
          </div>

          <div class="info-content">
            <div class="info-label">Country</div>
            <div class="info-value" id="country">Loading...</div>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon">
            <i class="fa-solid fa-city"></i>
          </div>

          <div class="info-content">
            <div class="info-label">City</div>
            <div class="info-value" id="city">Loading...</div>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon">
            <i class="fa-solid fa-envelope"></i>
          </div>

          <div class="info-content">
            <div class="info-label">Email</div>
            <div class="info-value" id="email">Loading...</div>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon">
            <i class="fa-solid fa-calendar"></i>
          </div>

          <div class="info-content">
            <div class="info-label">Member Since</div>
            <div class="info-value" id="createdAt">Loading...</div>
          </div>
        </div>

      </div>

    </div>

  </div>

  <!-- Member Card -->
  <div class="card full-card">

    <h2>
      <i class="fa-solid fa-user-tie"></i>
      Account HR
    </h2>

    <div class="member-info">

      <div class="member-avatar" id="memberInitials">
        U
      </div>

      <div class="member-details">
        <h3 id="memberName">Loading...</h3>

        <p id="memberRole">
          Company HR
        </p>

        <p class="member-email" id="memberEmail">
          Loading...
        </p>
      </div>

    </div>

  </div>

</div>

<script>

function loadUserProfile(){

  const userData = localStorage.getItem('user');

  if(!userData){
    console.log('No user data found');
    return;
  }

  try{

    const user = JSON.parse(userData);

    fillProfileData(user);

  }catch(error){

    console.error(error);

  }

}

function fillProfileData(user){

  document.getElementById('userId').textContent =
  user.id || 'N/A';

  document.getElementById('companyName').textContent =
  user.organizationName || 'N/A';

  document.getElementById('orgName').textContent =
  user.organizationName || 'N/A';

  /* LOGO */

  const logoImg =
  document.getElementById('companyLogo');

  const logoPlaceholder =
  document.getElementById('logoPlaceholder');

  if(user.organizationLogoUrl){

    logoImg.src =
    "http://smartcareerhub.runasp.net" +
    user.organizationLogoUrl;

    logoImg.style.display = 'block';

    logoPlaceholder.style.display = 'none';

  }else{

    logoImg.style.display = 'none';

    logoPlaceholder.style.display = 'flex';
  }

  /* STATUS */

  const statusBadge =
  document.getElementById('statusBadge');

  if(user.isActive){

    statusBadge.innerHTML =
    '<i class="fa-solid fa-circle-check"></i> Active';

  }else{

    statusBadge.innerHTML =
    '<i class="fa-solid fa-circle-xmark"></i> Inactive';

    statusBadge.style.background='#ffebee';
    statusBadge.style.color='#c62828';
  }

  /* EMAIL VERIFIED */

  const emailBadge =
  document.getElementById('emailBadge');

  if(user.isEmailVerified){

    emailBadge.innerHTML =
    '<i class="fa-solid fa-envelope-circle-check"></i> Verified';

  }else{

    emailBadge.innerHTML =
    '<i class="fa-solid fa-envelope"></i> Unverified';

    emailBadge.style.background='#fff3e0';
    emailBadge.style.color='#e65100';
  }

  /* INFO */

  document.getElementById('country').textContent =
  user.country || 'N/A';

  document.getElementById('city').textContent =
  user.city || 'N/A';

  document.getElementById('email').textContent =
  user.email || 'N/A';

  /* DATE */

  if(user.createdAt){

    const date =
    new Date(user.createdAt);

    document.getElementById('createdAt').textContent =
    date.toLocaleDateString('en-US',{
      year:'numeric',
      month:'long',
      day:'numeric'
    });

  }else{

    document.getElementById('createdAt').textContent='N/A';
  }

  /* MEMBER */

  const fullName =
  `${user.firstName || ''} ${user.lastName || ''}`.trim() || 'User';

  document.getElementById('memberName').textContent =
  fullName;

  document.getElementById('memberEmail').textContent =
  user.email || 'N/A';

  const initials =
  fullName
  .split(' ')
  .map(word => word[0])
  .join('')
  .toUpperCase();

  document.getElementById('memberInitials').textContent =
  initials;

}

/* EDIT PAGE */

function goToEditPage(){

  window.location.href =
  'editpro-company.html';

}

window.addEventListener(
  'DOMContentLoaded',
  loadUserProfile
);

</script>

</body>
</html>
