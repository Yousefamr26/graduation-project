<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Trainee Profiles </title>
  <!-- Font Awesome 6 for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f4f6fb;
      padding: 30px 25px;
      color: #1e293b;
    }

    .container {
      max-width: 1350px;
      margin: 0 auto;
    }

    h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #0f172a;
    }

    .subtitle {
      color: #475569;
      margin-bottom: 30px;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Loading state */
    .loading-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 300px;
      flex-direction: column;
      gap: 15px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid #e2e8f0;
      border-top: 5px solid #3498DB;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      background: #fee2e2;
      color: #991b1b;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      margin: 20px 0;
    }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 35px;
    }

    .stat {
      background: white;
      padding: 20px 18px;
      border-radius: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
      transition: all 0.2s ease;
    }

    .stat:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 25px rgba(0, 0, 0, 0.06);
    }

    .stat .icon {
      font-size: 28px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eef2ff;
      border-radius: 14px;
      color: #3498DB;
    }

    .stat .info {
      text-align: right;
    }

    .stat .num {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.2;
    }

    .stat small {
      color: #64748b;
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* Cards grid */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
    }

    .card {
      background: white;
      padding: 25px 20px 20px;
      border-radius: 20px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.05);
      text-align: center;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid rgba(0, 0, 0, 0.02);
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.08);
      border-color: #e2e8f0;
    }

    .card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid #3498DB;
      object-fit: cover;
      background: #f1f5f9;
      margin-bottom: 10px;
    }

    .card h3 {
      font-size: 1.3rem;
      margin: 8px 0 5px;
      font-weight: 700;
    }

    .badge {
      background: #eef2ff;
      color: #155fc4;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
      display: inline-block;
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }

    .email {
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }

    .roadmap-count {
      background: #f1f5f9;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #1e293b;
      margin: 10px 0 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .view {
      background: #3498DB;
      color: white;
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, transform 0.1s;
      background: #3498DB;
    }

    .view:hover {
      background: #155fc4;
    }

    /* Modal styles */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-content {
      background: white;
      width: 100%;
      max-width: 550px;
      padding: 30px 25px;
      border-radius: 28px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
      position: relative;
      animation: fadeScale 0.2s ease;
      max-height: 85vh;
      overflow-y: auto;
    }

    @keyframes fadeScale {
      from { opacity: 0.7; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .close-modal {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 24px;
      cursor: pointer;
      color: #64748b;
      background: #f1f5f9;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 10;
    }

    .close-modal:hover {
      background: #e2e8f0;
      color: #0f172a;
    }

    .modal-content h2 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 15px;
      display: block;
      border: 4px solid #3498DB;
      background: #f1f5f9;
    }

    .user-detail {
      background: #f8fafc;
      padding: 12px 14px;
      border-radius: 14px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.95rem;
      flex-wrap: wrap;
    }

    .roadmap-list {
      margin-top: 15px;
      background: #ffffff;
      border: 1px solid #e9eef3;
      border-radius: 18px;
      padding: 15px;
    }

    .roadmap-list h4 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .roadmap-item {
      background: #f8fafc;
      padding: 12px 14px;
      border-radius: 14px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #edf2f7;
    }

    .roadmap-item:last-child {
      margin-bottom: 0;
    }

    .roadmap-name {
      font-weight: 600;
      color: #1e293b;
    }

    .roadmap-points {
      background: #eef2ff;
      color: #155fc4;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .modal-buttons {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .close-btn {
      background: #f1f5f9;
      border: none;
      padding: 12px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      color: #334155;
      transition: background 0.2s;
    }

    .close-btn:hover {
      background: #e2e8f0;
    }

    @media (max-width: 950px) {
      .cards {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 650px) {
      body {
        padding: 20px 15px;
      }
      .stats {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h2>
    <i class="fas fa-user-graduate" style="color:#3498DB;"></i> Trainee Profiles
  </h2>
  <div class="subtitle">
    <i class="fas fa-chart-simple"></i> Grouped by unique users
  </div>

  <!-- Dynamic stats -->
  <div class="stats" id="statsContainer"></div>

  <!-- Cards grid with unique users -->
  <div class="cards" id="cardsContainer">
    <div class="loading-container">
      <div class="spinner"></div>
      <p style="color: #64748b;">Loading candidates...</p>
    </div>
  </div>
</div>

<!-- Roadmap Details Modal -->
<div class="modal" id="roadmapModal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeRoadmapModal()">
      <i class="fas fa-times"></i>
    </span>
    <h2><i class="fas fa-id-card"></i> User Roadmaps</h2>
    <img id="modalUserImg" class="modal-img" src="" alt="User photo">
    <div class="user-detail"><b>👤 Name:</b> <span id="modalUserName"></span></div>
    <div class="user-detail"><b>✉️ Email:</b> <span id="modalUserEmail"></span></div>
    <div class="user-detail"><b>📌 Type:</b> <span id="modalUserType"></span></div>
    
    <div class="roadmap-list" id="roadmapListContainer">
      <h4><i class="fas fa-map"></i> Enrolled Roadmaps</h4>
      <div id="roadmapItems"></div>
    </div>

    <div class="modal-buttons">
      <button class="close-btn" onclick="closeRoadmapModal()">
        <i class="fas fa-times"></i> Close
      </button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ========== API CONFIGURATION ==========
    const API_BASE_URL = "http://smartcareerhub.runasp.net/api";
    const API_Files_URL = "http://smartcareerhub.runasp.net";
    const TOKEN = localStorage.getItem("authToken");

    // Grouped users data
    let groupedUsers = [];

    // ========== API HELPER FUNCTION ==========
    async function apiRequest(endpoint, method = "GET", body = null) {
      const url = `${API_BASE_URL}/${endpoint}`;
      const headers = {
        "Content-Type": "application/json",
      };

      // Add authorization token if available
      if (TOKEN) {
        headers["Authorization"] = `Bearer ${TOKEN}`;
      }

      const config = {
        method: method,
        headers: headers,
      };

      if (body) {
        config.body = JSON.stringify(body);
      }

      try {
        const response = await fetch(url, config);

        if (!response.ok) {
          if (response.status === 401) {
            throw new Error("Unauthorized: Please login again.");
          }
          throw new Error(`HTTP Error: ${response.status} ${response.statusText}`);
        }

        // Check if response has content
        const contentType = response.headers.get("content-type");
        if (contentType && contentType.includes("application/json")) {
          return await response.json();
        }
        return await response.text();
      } catch (error) {
        console.error("API Request Error:", error);
        throw error;
      }
    }

    // ========== FETCH ALL CANDIDATES ==========
    async function fetchAllCandidates() {
      try {
        const data = await apiRequest("Candidates");
        
        // Handle different API response structures
        if (Array.isArray(data)) {
          return data;
        } else if (data && data.item && Array.isArray(data.item)) {
          return data.item;
        } else if (data && Array.isArray(data.data)) {
          return data.data;
        } else {
          console.warn("Unexpected API response structure:", data);
          return [];
        }
      } catch (error) {
        console.error("Failed to fetch candidates:", error);
        throw error;
      }
    }

    /**
     * Group the flat roadmap array by userId.
     * Returns an array of unique user objects with a 'roadmaps' array.
     */
    function groupByUser(flatData) {
      const map = new Map();
      
      flatData.forEach(item => {
        const userId = item.userId;
        if (!map.has(userId)) {
          map.set(userId, {
            userId: userId,
            fullName: item.fullName || 'Unknown',
            email: item.email || '',
            userType: item.userType || 'Student',
            profileImage: item.profileImage || null,
            roadmaps: []
          });
        }
        
        // Add roadmap entry
        map.get(userId).roadmaps.push({
          roadmapId: item.roadmapId,
          roadmapName: item.roadmapName || 'Untitled',
          totalPoints: item.totalPoints || 0
        });
      });
      
      return Array.from(map.values());
    }

    /**
     * Build full image URL from relative path or return placeholder.
     */
    function getImageUrl(profileImage, fullName) {
      if (profileImage && profileImage.startsWith('/')) {
        return `${API_Files_URL}${profileImage}`;
      }
      if (profileImage && (profileImage.startsWith('http://') || profileImage.startsWith('https://'))) {
        return profileImage;
      }
      // Fallback to avatar generator
      return `https://ui-avatars.com/api/?name=${encodeURIComponent(fullName || 'User')}&background=3b82f6&color=fff&size=200`;
    }

    /**
     * Escape HTML to prevent XSS.
     */
    function escapeHTML(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    /**
     * Render statistics based on unique users.
     */
    function renderStats(users) {
      const container = document.getElementById('statsContainer');
      if (!container) return;
      
      const totalUsers = users.length;
      const totalRoadmaps = users.reduce((acc, user) => acc + user.roadmaps.length, 0);
      
      // Count user types
      const students = users.filter(u => u.userType === 'Student').length;
      const graduates = users.filter(u => u.userType === 'Graduate').length;
      
      container.innerHTML = `
        <div class="stat">
          <div class="icon"><i class="fas fa-users"></i></div>
          <div class="info">
            <div class="num">${totalUsers}</div>
            <small>Total Users</small>
          </div>
        </div>
        <div class="stat">
          <div class="icon"><i class="fas fa-map"></i></div>
          <div class="info">
            <div class="num">${totalRoadmaps}</div>
            <small>Total Enrollments</small>
          </div>
        </div>
        <div class="stat">
          <div class="icon"><i class="fas fa-user-graduate"></i></div>
          <div class="info">
            <div class="num">${students}</div>
            <small>Students</small>
          </div>
        </div>
        <div class="stat">
          <div class="icon"><i class="fas fa-briefcase"></i></div>
          <div class="info">
            <div class="num">${graduates}</div>
            <small>Graduates</small>
          </div>
        </div>
      `;
    }

    /**
     * Render unique user cards.
     */
    function renderCards(users) {
      const container = document.getElementById('cardsContainer');
      if (!container) return;
      
      if (!users || users.length === 0) {
        container.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px;">
            <i class="fas fa-user-slash" style="font-size: 48px; color: #cbd5e1; margin-bottom: 15px;"></i>
            <p style="color: #64748b; font-size: 1.1rem;">No users found</p>
          </div>
        `;
        return;
      }
      
      let html = '';
      users.forEach(user => {
        const roadmapCount = user.roadmaps.length;
        const imgSrc = getImageUrl(user.profileImage, user.fullName);
        
        html += `
          <div class="card">
            <img src="${escapeHTML(imgSrc)}" alt="${escapeHTML(user.fullName)}" loading="lazy"
                 onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(user.fullName || 'User')}&background=3b82f6&color=fff&size=200'">
            <h3>${escapeHTML(user.fullName)}</h3>
            <div class="badge">${escapeHTML(user.userType)}</div>
            <div class="email"><i class="fa fa-envelope"></i> ${escapeHTML(user.email)}</div>
            <div class="roadmap-count">
              <i class="fas fa-layer-group"></i> ${roadmapCount} Roadmap${roadmapCount !== 1 ? 's' : ''}
            </div>
            <button class="view" data-user-id="${escapeHTML(user.userId)}">
              <i class="fa fa-eye"></i> View Roadmaps
            </button>
          </div>
        `;
      });
      
      container.innerHTML = html;
      
      // Attach event listeners to view buttons
      document.querySelectorAll('.view').forEach(btn => {
        btn.addEventListener('click', function() {
          const userId = this.getAttribute('data-user-id');
          const user = users.find(u => u.userId === userId);
          if (user) {
            openRoadmapModal(user);
          }
        });
      });
    }

    /**
     * Open modal and populate with user roadmaps.
     */
    function openRoadmapModal(user) {
      const modal = document.getElementById('roadmapModal');
      if (!modal) return;
      
      // Set user details
      document.getElementById('modalUserName').innerText = user.fullName;
      document.getElementById('modalUserEmail').innerText = user.email;
      document.getElementById('modalUserType').innerText = user.userType;
      
      const imgSrc = getImageUrl(user.profileImage, user.fullName);
      const modalImg = document.getElementById('modalUserImg');
      modalImg.src = imgSrc;
      modalImg.onerror = function() {
        this.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.fullName || 'User')}&background=3b82f6&color=fff&size=200`;
      };
      
      // Build roadmap list
      const roadmapItemsContainer = document.getElementById('roadmapItems');
      if (!roadmapItemsContainer) return;
      
      if (user.roadmaps.length === 0) {
        roadmapItemsContainer.innerHTML = '<p style="color:#64748b; text-align:center; padding:10px;">No roadmaps assigned.</p>';
      } else {
        let itemsHtml = '';
        user.roadmaps.forEach(rm => {
          itemsHtml += `
            <div class="roadmap-item">
              <span class="roadmap-name"><i class="fas fa-road" style="margin-right:6px; color:#3b82f6;"></i>${escapeHTML(rm.roadmapName)}</span>
              <span class="roadmap-points">${rm.totalPoints} pts</span>
            </div>
          `;
        });
        roadmapItemsContainer.innerHTML = itemsHtml;
      }
      
      modal.style.display = 'flex';
    }

    function closeRoadmapModal() {
      document.getElementById('roadmapModal').style.display = 'none';
    }

    function showError(message) {
      const container = document.getElementById('cardsContainer');
      if (container) {
        container.innerHTML = `
          <div class="error-message" style="grid-column: 1/-1;">
            <i class="fas fa-exclamation-triangle"></i> ${escapeHTML(message)}
            <br><br>
            <button onclick="location.reload()" style="background:#3b82f6; color:white; border:none; padding:8px 16px; border-radius:8px; cursor:pointer;">
              <i class="fas fa-refresh"></i> Retry
            </button>
          </div>
        `;
      }
    }

    /**
     * Initialize the page by fetching data from API.
     */
    async function initialize() {
      try {
        // Check for token
        if (!TOKEN) {
          console.warn("No auth token found. API requests may fail.");
        }

        // Fetch data from API
        const rawData = await fetchAllCandidates();
        
        // Group the flat response by user
        groupedUsers = groupByUser(rawData);
        
        // Render UI
        renderStats(groupedUsers);
        renderCards(groupedUsers);
        
      } catch (error) {
        console.error("Initialization error:", error);
        let errorMsg = error.message || "Failed to load candidates";
        
        if (error.message.includes("Unauthorized")) {
          errorMsg = "Session expired. Please login again.";
        } else if (error.message.includes("Failed to fetch") || error.message.includes("NetworkError")) {
          errorMsg = "Unable to connect to server. Please check your connection.";
        }
        
        showError(errorMsg);
      }
    }

    // Close modal when clicking outside content
    window.addEventListener('click', function(e) {
      const modal = document.getElementById('roadmapModal');
      if (e.target === modal) {
        closeRoadmapModal();
      }
    });

    // Expose close function to global scope for inline onclick
    window.closeRoadmapModal = closeRoadmapModal;

    // Start the application
    initialize();
  })();
</script>
</body>
</html>
