<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <title>Smart Career Hub · Interactive Calendar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3498db;
            --primary-dark: #2884c1;
            --workshop: #e64a2e;
            --interview: #2c7da0;
            --internship: #2e8b57;
            --event: #f4b942;
            --job: #8b5cf6;
            --deadline: #e64a2e;
            --bg-light: #f8fafc;
            --card-white: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #475569;
            --border-soft: #e2e8f0;
            --shadow-sm: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.02);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 16px;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-light);
            padding: clamp(12px, 3vw, 28px);
            min-height: 100vh;
        }

        .dashboard {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .two-columns {
            display: grid;
            grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.8fr);
            gap: 28px;
            align-items: start;
        }

        .calendar-card {
            background: var(--card-white);
            border-radius: var(--radius-xl);
            padding: clamp(16px, 3vw, 28px);
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
            border: 1px solid var(--border-soft);
        }

        .cal-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
        }

        .month-title {
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            font-weight: 800;
            color: #3498db;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .nav-buttons button {
            background: #f1f5f9;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #3498db;
        }

        .nav-buttons button:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 700;
            color: #334155;
            padding-bottom: 16px;
            font-size: clamp(0.7rem, 2.5vw, 0.85rem);
            border-bottom: 2px solid #eef2ff;
            margin-bottom: 18px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: clamp(6px, 1.5vw, 12px);
        }

        .day-cell {
            background: #ffffff;
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-md);
            padding: clamp(8px, 2vw, 12px) clamp(4px, 1.5vw, 8px);
            min-height: 110px;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .day-cell:hover {
            border-color: var(--primary);
            background: #fafdff;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -12px rgba(0,0,0,0.1);
        }

        .day-cell.today {
            border: 2px solid var(--primary);
            background: #f0f9ff;
        }

        .day-number {
            font-weight: 700;
            font-size: clamp(0.85rem, 3vw, 1rem);
            margin-bottom: 8px;
            color: #1f2a3e;
        }

        .today .day-number {
            color: var(--primary);
            font-size: 1.1rem;
        }

        .events-stack {
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow-y: auto;
            max-height: 85px;
            scrollbar-width: thin;
        }

        .event-badge {
            font-size: clamp(0.55rem, 2vw, 0.7rem);
            padding: 4px 6px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            white-space: normal;
            word-break: break-word;
            line-height: 1.3;
            cursor: pointer;
            transition: 0.1s;
            display: inline-block;
            width: 100%;
            text-align: center;
            letter-spacing: -0.2px;
        }

        .event-badge-workshop { background: var(--workshop); }
        .event-badge-interview { background: var(--interview); }
        .event-badge-internship { background: var(--internship); }
        .event-badge-deadline { background: var(--deadline); }
        .event-badge-event { background: var(--event); color: #2d2a1f; }
        .event-badge-job { background: var(--job); }

        .sidebar-card {
            background: var(--card-white);
            border-radius: var(--radius-xl);
            padding: clamp(18px, 3vw, 26px);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-soft);
            height: fit-content;
        }

        .sidebar-title {
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #3498db;
        }

        .event-list-side {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: 460px;
            overflow-y: auto;
            padding-left: 4px;
        }

        .side-event {
            border-left: 4px solid;
            background: #fefefe;
            padding: 14px;
            border-radius: 20px;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid #f0f2f8;
            border-left-width: 5px;
        }

        .side-event:hover {
            background: #f1f5fe;
            transform: translateX(6px);
        }

        .side-event.workshop { border-left-color: var(--workshop); }
        .side-event.interview { border-left-color: var(--interview); }
        .side-event.internship { border-left-color: var(--internship); }
        .side-event.deadline { border-left-color: var(--deadline); }
        .side-event.job { border-left-color: var(--job); }
        .side-event.event { border-left-color: var(--event); }

        .side-event h4 {
            font-size: clamp(0.8rem, 2.5vw, 0.95rem);
            margin-bottom: 8px;
        }

        .side-event p {
            font-size: 0.7rem;
            color: #4b5563;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .legend-wrapper {
            margin-top: 28px;
            border-top: 1px solid #eef2ff;
            padding-top: 20px;
        }

        .legend-items {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }

        .legend-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .color-dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
        }

        .total-events-footer {
            margin-top: 18px;
            text-align: center;
            font-size: 0.75rem;
            background: #f1f5f9;
            padding: 12px;
            border-radius: 40px;
        }

        .modal-root {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-root.active { display: flex; }

        .modal-container {
            background: white;
            width: 90%;
            max-width: 500px;
            border-radius: 36px;
            padding: 24px;
            animation: fadeUp 0.2s;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: scale(0.96) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .modal-detail-row {
            background: #f8fafc;
            padding: 12px 14px;
            border-radius: 20px;
            display: flex;
            gap: 14px;
            margin-bottom: 12px;
            align-items: center;
        }

        .btn-close-modal {
            background: var(--primary);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #3498db;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 2100;
            transform: translateY(120px);
            transition: 0.25s;
            font-size: 0.85rem;
        }
        .toast-message.show { transform: translateY(0); }

        @media (max-width: 950px) {
            .two-columns {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            .day-cell {
                min-height: 90px;
            }
            .events-stack {
                max-height: 70px;
            }
            .event-badge {
                font-size: 0.6rem;
                padding: 2px 5px;
            }
        }

        @media (max-width: 680px) {
            .days-grid {
                gap: 8px;
            }
            .day-cell {
                min-height: 75px;
                padding: 6px 3px;
            }
            .event-badge {
                font-size: 0.5rem;
                padding: 2px 3px;
            }
            .events-stack {
                max-height: 58px;
                gap: 3px;
            }
            .weekdays div {
                font-size: 0.6rem;
            }
            .cal-toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .nav-buttons {
                justify-content: center;
            }
            .side-event p {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .day-cell {
                min-height: 65px;
            }
            .event-badge {
                font-size: 0.45rem;
                padding: 2px 2px;
            }
            .events-stack {
                max-height: 50px;
            }
            .day-number {
                font-size: 0.7rem;
            }
            .legend-items {
                gap: 8px;
            }
            .legend-badge {
                padding: 4px 10px;
                font-size: 0.6rem;
            }
        }

        .events-stack::-webkit-scrollbar {
            width: 3px;
        }
        .event-list-side::-webkit-scrollbar {
            width: 4px;
        }
    </style>
</head>
<body>
<div class="dashboard">
    
    <div class="two-columns">
        <!-- Calendar Section -->
        <div class="calendar-card">
            <div class="cal-toolbar">
                <div class="month-title" id="monthDisplay">May 2026</div>
                <div class="nav-buttons">
                    <button id="prevMonthBtn"><i class="fa-solid fa-chevron-left"></i> Previous</button>
                    <button id="nextMonthBtn">Next <i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="weekdays">
                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
            </div>
            <div class="days-grid" id="calendarGrid"></div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar-card">
            <div class="sidebar-title"><i class="fa-regular fa-clock"></i> Upcoming Events</div>
            <div class="event-list-side" id="upcomingList">
                <div class="loading-placeholder" style="text-align:center; padding:30px;"><i class="fa-solid fa-spinner fa-pulse"></i> Loading...</div>
            </div>
            <div class="legend-wrapper">
                <div style="font-weight: 600; margin-bottom: 8px;"><i class="fa-regular fa-rectangle-list"></i> Categories</div>
                <div class="legend-items">
                    <span class="legend-badge"><span class="color-dot" style="background:var(--workshop)"></span> workshop</span>
                    <span class="legend-badge"><span class="color-dot" style="background:var(--internship)"></span> deadline</span>
                    <span class="legend-badge"><span class="color-dot" style="background:var(--event)"></span> event</span>
                </div>
            </div>
            <div class="total-events-footer" id="totalEventsFooter">
                Total events: <span id="totalCountSpan">0</span>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal-root" id="globalModal">
    <div class="modal-container">
        <div class="modal-header">
            <h3 id="modalEventTitle">Event Details</h3>
            <button style="background:transparent; border:none; font-size:24px; cursor:pointer;" id="closeModalBtn">&times;</button>
        </div>
        <div id="modalDynamicContent"></div>
        <div style="display: flex; justify-content: flex-end; margin-top: 20px;">
            <button class="btn-close-modal" id="modalConfirmBtn">Close</button>
        </div>
    </div>
</div>
<div id="customToast" class="toast-message"></div>

<script>
    (function() {
        const API_URL = "http://smartcareerhub.runasp.net/api";
        const DEMO_TOKEN = localStorage.getItem("authToken") || "demo-bearer-token";
        let currentDate = new Date(2026, 4, 1);   // May 2026
        let masterEvents = [];

        function showToastMsg(msg, isErr = false) {
            const toastDiv = document.getElementById("customToast");
            toastDiv.innerText = msg;
            toastDiv.style.background = isErr ? "#b91c1c" : "#1e293b";
            toastDiv.classList.add("show");
            setTimeout(() => toastDiv.classList.remove("show"), 3000);
        }

        function formatDateOnly(isoString) {
            if (!isoString) return "Not specified";
            const d = new Date(isoString);
            return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }
        function formatTimeFromISO(isoString) {
            if (!isoString) return "—";
            const d = new Date(isoString);
            return isNaN(d.getTime()) ? "—" : d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        function escapeTxt(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }

        function showModal(eventObj) {
            const modal = document.getElementById("globalModal");
            const typeMap = { workshop: "Workshop", interview: "Interview", internship: "Internship", deadline: "Deadline", job: "Job", event: "Event" };
            const typeName = typeMap[eventObj.type] || "Event";
            const iconType = { workshop:"fa-screwdriver-wrench", interview:"fa-handshake", internship:"fa-laptop-code", deadline:"fa-hourglass-end", job:"fa-briefcase", event:"fa-calendar-star" };
            const icon = iconType[eventObj.type] || "fa-info-circle";
            document.getElementById("modalEventTitle").innerHTML = escapeTxt(eventObj.title) || "Event Details";
            document.getElementById("modalDynamicContent").innerHTML = `
                <div class="modal-detail-row"><i class="fa-solid ${icon} fa-fw" style="color:var(--primary)"></i><div><div style="font-size:0.7rem; color:#5b6e8c;">Type</div><div style="font-weight:600;">${typeName}</div></div></div>
                <div class="modal-detail-row"><i class="fa-regular fa-calendar"></i><div><div style="font-size:0.7rem;">Date</div><div>${formatDateOnly(eventObj.date)}</div></div></div>
                <div class="modal-detail-row"><i class="fa-regular fa-clock"></i><div><div style="font-size:0.7rem;">Time</div><div>${eventObj.time || formatTimeFromISO(eventObj.date)}</div></div></div>
                <div class="modal-detail-row"><i class="fa-solid fa-location-dot"></i><div><div style="font-size:0.7rem;">Location</div><div>${escapeTxt(eventObj.location || "Main Office")}</div></div></div>
                ${eventObj.description ? `<div class="modal-detail-row"><i class="fa-regular fa-note-sticky"></i><div><div style="font-size:0.7rem;">Notes</div><div>${escapeTxt(eventObj.description)}</div></div></div>` : ''}
            `;
            modal.classList.add("active");
        }

        function closeModalGlobal() {
            document.getElementById("globalModal").classList.remove("active");
        }
        document.getElementById("closeModalBtn").addEventListener("click", closeModalGlobal);
        document.getElementById("modalConfirmBtn").addEventListener("click", closeModalGlobal);
        document.getElementById("globalModal").addEventListener("click", (e) => { if(e.target === document.getElementById("globalModal")) closeModalGlobal(); });

        async function fetchAllCalendarData(year, month) {
            try {
                let interviews = [];
                try {
                    const resInt = await fetch(`${API_URL}/Interviews`, { headers: { "Authorization": `Bearer ${DEMO_TOKEN}` } });
                    if(resInt.ok) {
                        const dataInt = await resInt.json();
                        interviews = Array.isArray(dataInt) ? dataInt : (dataInt.data || []);
                    }
                } catch(e) { console.warn("interviews fetch error", e); }

                let calendarEventsFromApi = [];
                try {
                    const calRes = await fetch(`${API_URL}/calendar/events?month=${month}&year=${year}`, { headers: { "Authorization": `Bearer ${DEMO_TOKEN}` } });
                    if(calRes.ok) {
                        const calJson = await calRes.json();
                        calendarEventsFromApi = Array.isArray(calJson) ? calJson : (calJson.data || calJson.events || []);
                    }
                } catch(e) { console.warn("calendar events endpoint not reachable", e); }

                const mappedInterviews = interviews.map(int => ({
                    id: `int_${int.id}`,
                    title: int.studentName ? `Interview: ${int.studentName}` : "Professional Interview",
                    type: "interview",
                    date: int.scheduledDate || int.date || new Date().toISOString(),
                    time: int.scheduledDate ? formatTimeFromISO(int.scheduledDate) : (int.time || "TBD"),
                    location: int.location || (int.interviewType === 'Online' ? "Online" : "Company Office"),
                    description: int.additionalNotes || int.notes || `Interviewer: ${int.interviewerName || "N/A"}`
                }));

                const mappedCalendar = calendarEventsFromApi.map(ev => ({
                    id: `cal_${ev.id || Math.random()}`,
                    title: ev.title || "Untitled Event",
                    type: (ev.type || "event").toLowerCase(),
                    date: ev.date,
                    time: ev.date ? formatTimeFromISO(ev.date) : (ev.time || "All Day"),
                    location: ev.location || (ev.type === 'job' ? 'Job Portal' : 'Company Site'),
                    description: ev.description || `Special event: ${ev.title} (${ev.type})`,
                    originalColor: ev.color
                }));

                let combined = [...mappedInterviews, ...mappedCalendar];
                const localInterviewRaw = localStorage.getItem("interview");
                if(localInterviewRaw){
                    try {
                        const localInt = JSON.parse(localInterviewRaw);
                        if(localInt && localInt.date){
                            const localDateISO = new Date(`${localInt.date}T${localInt.time || '09:00'}`).toISOString();
                            const exists = combined.some(e => e.date === localDateISO && e.title.includes(localInt.studentName||''));
                            if(!exists){
                                combined.push({
                                    id: `local_${Date.now()}`,
                                    title: `Interview: ${localInt.studentName || 'Candidate'}`,
                                    type: "interview",
                                    date: localDateISO,
                                    time: localInt.time || "09:00",
                                    location: localInt.location || "Headquarters",
                                    description: localInt.notes || "Scheduled locally"
                                });
                            }
                        }
                    } catch(e){}
                }
                masterEvents = combined.filter(e => e && e.date).map(e => ({ ...e, parsedDate: new Date(e.date) }));
                renderFullUI();
                const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
                showToastMsg(`Loaded ${masterEvents.length} events for ${monthNames[month-1]} ${year}`, false);
            } catch(err) {
                console.error(err);
                showToastMsg("Loading error, check connection", true);
                document.getElementById("upcomingList").innerHTML = `<div style="padding:20px; text-align:center;">⚠️ Unable to load events</div>`;
            }
        }

        function renderCalendarGrid() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDayIndex = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
            document.getElementById("monthDisplay").innerHTML = `${monthNames[month]} ${year}`;
            const container = document.getElementById("calendarGrid");
            container.innerHTML = "";
            for(let i=0;i<firstDayIndex;i++){
                const emptyDiv = document.createElement("div");
                emptyDiv.className = "day-cell";
                emptyDiv.style.background = "#fcfcfc";
                emptyDiv.style.opacity = "0.5";
                emptyDiv.style.minHeight = "80px";
                container.appendChild(emptyDiv);
            }
            const todayDate = new Date();
            for(let d=1; d<=daysInMonth; d++){
                const isToday = (d === todayDate.getDate() && month === todayDate.getMonth() && year === todayDate.getFullYear());
                const cell = document.createElement("div");
                cell.className = `day-cell ${isToday ? 'today' : ''}`;
                cell.setAttribute("data-day", d);
                cell.innerHTML = `<div class="day-number">${d}</div><div class="events-stack" id="eventsStack-${d}"></div>`;
                container.appendChild(cell);
            }
        }

        function injectEventsIntoDays() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            for(let i=1; i<=31; i++){
                const stackDiv = document.getElementById(`eventsStack-${i}`);
                if(stackDiv) stackDiv.innerHTML = "";
            }
            masterEvents.forEach(ev => {
                const evDate = new Date(ev.date);
                if(!isNaN(evDate) && evDate.getFullYear() === year && evDate.getMonth() === month){
                    const dayNum = evDate.getDate();
                    const targetStack = document.getElementById(`eventsStack-${dayNum}`);
                    if(targetStack){
                        const typeKey = ev.type || "event";
                        let badgeClass = "event-badge-event";
                        if(typeKey === 'workshop') badgeClass = "event-badge-workshop";
                        else if(typeKey === 'interview') badgeClass = "event-badge-interview";
                        else if(typeKey === 'internship' || typeKey === 'deadline') badgeClass = "event-badge-deadline";
                        else if(typeKey === 'job') badgeClass = "event-badge-job";
                        else badgeClass = "event-badge-event";
                        const badge = document.createElement("div");
                        badge.className = `event-badge ${badgeClass}`;
                        badge.innerText = ev.title.length > 25 ? ev.title.slice(0,22)+'..' : ev.title;
                        badge.title = ev.title;
                        badge.onclick = (e) => { e.stopPropagation(); showModal(ev); };
                        targetStack.appendChild(badge);
                    }
                }
            });
        }

        function renderUpcomingSidebar() {
            const upcomingContainer = document.getElementById("upcomingList");
            const now = new Date();
            now.setHours(0,0,0,0);
            const upcomingEvents = masterEvents.filter(ev => new Date(ev.date) >= now)
                .sort((a,b) => new Date(a.date) - new Date(b.date))
                .slice(0, 7);
            if(upcomingEvents.length === 0){
                upcomingContainer.innerHTML = `<div style="text-align:center; padding:28px;">✨ No upcoming events</div>`;
                document.getElementById("totalCountSpan").innerText = masterEvents.length;
                return;
            }
            upcomingContainer.innerHTML = "";
            upcomingEvents.forEach(ev => {
                let typeClass = ev.type || "event";
                if (typeClass === 'internship') typeClass = 'deadline';
                const sideDiv = document.createElement("div");
                sideDiv.className = `side-event ${typeClass}`;
                sideDiv.innerHTML = `
                    <h4>${escapeTxt(ev.title)}</h4>
                    <p><i class="fa-regular fa-calendar"></i> ${formatDateOnly(ev.date)} &nbsp;|&nbsp; <i class="fa-regular fa-clock"></i> ${ev.time || formatTimeFromISO(ev.date)}</p>
                    <p><i class="fa-solid fa-location-dot"></i> ${escapeTxt(ev.location || "Remote/Office")}</p>
                `;
                sideDiv.onclick = () => showModal(ev);
                upcomingContainer.appendChild(sideDiv);
            });
            document.getElementById("totalCountSpan").innerText = masterEvents.length;
        }

        function renderFullUI() {
            renderCalendarGrid();
            injectEventsIntoDays();
            renderUpcomingSidebar();
        }

        function navigateAndFetch() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            fetchAllCalendarData(year, month);
        }

        document.getElementById("prevMonthBtn").addEventListener("click", () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            navigateAndFetch();
        });
        document.getElementById("nextMonthBtn").addEventListener("click", () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            navigateAndFetch();
        });

        window.addEventListener("DOMContentLoaded", () => {
            const initialYear = currentDate.getFullYear();
            const initialMonth = currentDate.getMonth() + 1;
            fetchAllCalendarData(initialYear, initialMonth).catch(() => {
                showToastMsg("Failed to connect to server, showing limited demo data", true);
                masterEvents = [];
                renderFullUI();
            });
        });
    })();
</script>
</body>
</html>
