<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Courses</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

body{
    background:#f8f9fa;
    font-family:'Segoe UI',sans-serif;
}

/* -------- Page Header -------- */

.page-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.page-title{
    font-weight:700;
}

.page-subtitle{
    color:#6c757d;
    margin-bottom:0;
}

/* -------- Stats Box -------- */

.course-header-box{
    background:linear-gradient(135deg,#f4f8ff,#eef3ff);
    border:1px solid #dbe7ff;
    border-radius:18px;
    padding:28px;
}

.stats-icon{
    width:60px;
    height:60px;
    border-radius:50%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* -------- Course Cards -------- */

.course-card{
    border:none;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,0.05);
    transition:.3s;
}

.course-card:hover{
    transform:translateY(-6px);
    box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

.badge-outline{
    border:1px solid #dee2e6;
    background:transparent;
    font-weight:400;
    padding:6px 10px;
    border-radius:8px;
    color:#495057;
}

.enroll-btn{
    background:linear-gradient(135deg,#3498db,#6c5ce7);
    border:none;
    border-radius:10px;
    padding:12px;
    font-weight:500;
    color:white;
    margin-top:auto;
}

/* Toast */

.toast{
    border-radius:12px;
}

</style>
</head>

<body>

<div class="container py-5">

<!-- Page Header -->
<div class="page-header">

<div>
<h2 class="page-title">Courses</h2>
<p class="page-subtitle">Explore courses from training centers and enhance your skills</p>
</div>

</div>

<!-- Stats Box -->

<div class="course-header-box mb-5 d-flex justify-content-between align-items-center">

<div>
<small class="text-muted d-block">Available Courses</small><br>

<!-- سيتم تعبئته من الباك -->
<h4 class="text-primary mb-0" id="coursesCount">-- Courses to enroll</h4>

</div>

<div class="stats-icon">
<i class="bi bi-book text-primary fs-4"></i>
</div>

</div>

<!-- Courses Section -->

<h5 class="mb-3 fw-semibold">Available Courses</h5>

<div class="row g-4" id="coursesContainer">

<!-- سيتم إضافة الكورسات هنا من الـ Backend -->

</div>

</div>


<!-- Toast Notification -->

<div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3" style="z-index:2000;">

<div id="enrollToast" class="toast align-items-center bg-white border-0 shadow-lg" role="alert">

<div class="d-flex p-2">

<div class="toast-body d-flex align-items-center">

<i class="bi bi-check-circle-fill text-success me-3 fs-5"></i>

<span id="toastMessage" class="fw-medium text-dark">
Successfully enrolled!
</span>

</div>

<button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

document.addEventListener("DOMContentLoaded",function(){

const toastEl=document.getElementById("enrollToast");
const toastMsg=document.getElementById("toastMessage");
const bsToast=new bootstrap.Toast(toastEl,{delay:3000});

document.addEventListener("click",function(e){

if(e.target.classList.contains("enroll-btn")){

const card=e.target.closest(".card-body");
const title=card?.querySelector(".card-title")?.innerText || "the course";

toastMsg.textContent=`Successfully enrolled in ${title}!`;
bsToast.show();

}

});

});

</script>

</body>
</html>
