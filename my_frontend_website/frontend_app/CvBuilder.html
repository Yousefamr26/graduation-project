<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Builder</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>
    :root {
  --primary: #3498db;
  --bg: #f6f7fb;
  --radius: 12px;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  margin: 0;
}

/* Layout */
.dashboard-layout {
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 260px;
  min-height: 100vh;
  background: #fff;
  border-right: 1px solid #e5e7eb;
  padding: 18px 14px;
  position: sticky;
  top: 0;
  display: flex;
  flex-direction: column;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.badge {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, #3498db, #2563eb);
  border-radius: 10px;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-link {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 10px;
  color: #374151;
  margin-bottom: 6px;
}

.nav-link:hover {
  background: #f3f4f6;
}

.nav-link.active {
  background: var(--primary);
  color: #fff;
}

.sidebar-divider {
  height: 1px;
  background: #e5e7eb;
  border: none;
  margin: 12px 0;
}

/* Main content */
.main-content {
  flex: 1;
  padding: 40px;
}

/* CV Cards */
.cv-card {
  padding: 2rem;
  border-radius: var(--radius);
  text-align: center;
  transition: 0.3s;
  cursor: pointer;
}

.cv-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 25px rgba(0,0,0,.15);
}

.icon-box {
  font-size: 3rem;
  margin-bottom: 1rem;
}

#cvFileName {
  margin-top: 10px;
  font-weight: 500;
  color: #555;
}

.skip-link {
  color: #0d6efd;
  font-weight: 500;
  text-decoration: none;
}
.skip-link:hover {
  text-decoration: underline;
}
</style>
</head>
<body>

<div class="dashboard-layout">

    <!-- ===== Main Content ===== -->
    <main class="main-content container">
        <h1 class="text-center mb-2">CV Builder</h1>
        <p class="text-center text-muted mb-5">
            Choose how you'd like to create your professional CV
        </p>

        <div class="row g-4 justify-content-center">
            <!-- Upload CV -->
            <div class="col-md-5">
                <div class="card cv-card">
                    <div class="icon-box text-primary">
                        <i class="fa-solid fa-upload"></i>
                    </div>
                    <p class="fw-semibold">Upload Existing CV</p>
                    <h6 class="text-muted">
                        Upload your CV and enhance it with AI.
                    </h6>

                    <button class="btn btn-primary mt-3" id="uploadCvBtn">
                        <i class="fa-solid fa-upload"></i> Upload CV
                    </button>

                    <input type="file" id="cvFileInput" hidden>
                    <div id="cvFileName"></div>
                </div>
            </div>

            <!-- Create CV -->
            <div class="col-md-5">
                <div class="card cv-card">
                    <div class="icon-box text-success">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </div>
                    <p class="fw-semibold">Download CV Templates</p>
                    <h6 class="text-muted">
                       Download Templates, fill in your info, and upload.
                    </h6>

                    <button class="btn btn-outline-success mt-3"
                        onclick="location.href='CV-Templates-graduate&undergraduate.html'">
                        View Templates
                    </button>
                </div>
            </div>
        </div>

        <div class="text-center my-5">
            <a href="Graduate-Dashboard.html" class="skip-link">Skip for now →</a>
        </div>
    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const uploadBtn = document.getElementById("uploadCvBtn");
const fileInput = document.getElementById("cvFileInput");
const fileName = document.getElementById("cvFileName");

uploadBtn.onclick = () => fileInput.click();

fileInput.onchange = e => {
    fileName.textContent = e.target.files[0]
        ? `Selected file: ${e.target.files[0].name}`
        : "";
};
</script>

</body>
</html>
