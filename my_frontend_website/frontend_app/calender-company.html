<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Calendar</title>

<link rel="stylesheet" href="styles/calender-company.css" />

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

<div class="header">
<h2>Calendar</h2>
<p>View your scheduled events and workshops</p>
</div>


<!-- MAIN CALENDAR -->

<div class="calendar">

<div class="cal-header">

<h2 id="monthTitle">Month Year</h2>

<div class="nav">

<button id="prevMonth">
<i class="fa-solid fa-chevron-left"></i>
</button>

<button id="nextMonth">
<i class="fa-solid fa-chevron-right"></i>
</button>

</div>

</div>


<div class="weekdays">

<div>Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>

</div>


<!-- DAYS WILL BE GENERATED FROM JS -->

<div class="days" id="calendarDays"></div>

</div>



<!-- RIGHT SIDEBAR -->

<aside class="sidebar">

<h3>Upcoming Events</h3>

<div id="eventsList"></div>


<h4 style="margin-top:20px;">Event Types</h4>

<ul class="legend">

<li><span class="dot workshop"></span> Workshop</li>
<li><span class="dot interview"></span> Interview</li>
<li><span class="dot course"></span> Internship</li>
<li><span class="dot event"></span> Event</li>
<li><span class="dot deadline"></span> Job</li>

</ul>

</aside>

</div>


<script>

/* LOAD EVENTS FROM BACKEND */

async function loadEvents(){

try{

let res = await fetch("/api/events")

let events = await res.json()

renderEvents(events)

}catch(err){

console.log("Error loading events",err)

}

}


/* RENDER EVENTS IN SIDEBAR */

function renderEvents(events){

let container = document.getElementById("eventsList")

container.innerHTML = ""

events.forEach(event=>{

container.innerHTML += `

<div class="event-card ${event.type}">

<span class="tag">${event.type}</span>

<h4>${event.title}</h4>

<p>

<i class="fa-solid fa-calendar"></i> ${event.date}<br><br>

<i class="fa-solid fa-clock"></i> ${event.time}<br><br>

<i class="fa-solid fa-location-dot"></i> ${event.location}<br><br>

<i class="fa fa-users"></i> ${event.organizer}

</p>

</div>

`

})

}


/* GENERATE CALENDAR */

function generateCalendar(){

const container = document.getElementById("calendarDays")

container.innerHTML = ""

for(let i=1;i<=31;i++){

container.innerHTML += `<div class="day" data-day="${i}">${i}</div>`

}

}


/* START */

generateCalendar()

loadEvents()

</script>

</body>

</html>
