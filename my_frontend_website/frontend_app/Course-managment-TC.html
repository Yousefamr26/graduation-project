<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roadmaps Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="styles/Roadmap-com.css">
</head>

<body>

<div class="topbar">
  <div class="title-box">
    <h1 style="color: black;margin-top: 10px;">
      <i class="fa fa-map" style="color: #3498db;"></i>
      &nbsp; Courses Management
    </h1>
    <p>Create and manage courses for students</p>
  </div>

  <div class="center-box">
    <input type="text" id="searchBar" placeholder="Search">
    <select id="statusFilter">
      <option value="">Filter by status</option>
      <option value="draft">Draft</option>
      <option value="published">Published</option>
    </select>
  </div>

  <button class="create-btn" onclick="startNewRoadmap()">
    <i class="fa-solid fa-plus"></i> Create New Course
  </button>
</div>

<div class="container">
  <div id="roadmapGrid" class="grid"></div>
  <div id="detailsBox" class="details-box"></div>
</div>
<!-- ===== ANALYSIS MODAL ===== -->
<div id="analysisModal" class="modal-overlay">
  <div class="modal-box">
    
    <div class="modal-header">
      <h3>Course Analysis & Details</h3>
      <button class="close-btn" onclick="closeModal()">
        <i class="fa fa-times"></i>
      </button>
    </div>

    <div id="modalContent"></div>

  </div>
</div>

<script>

/* ---------------- STORAGE ---------------- */
const STORAGE_KEY = "roadmaps";
let all = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

/* ---------------- PRICE FORMATTER ---------------- */
function formatPrice(price) {
  if (price === null || price === undefined) return "Free";

  const cleaned = String(price).trim();

  if (cleaned === "") return "Free";

  const numberValue = Number(cleaned);

  if (isNaN(numberValue)) return "Free";

  return numberValue + " EGP";
}

/* ---------------- CREATE ---------------- */
function startNewRoadmap(){
  localStorage.removeItem("roadmap_edit_id");
  window.location.href = "add-course.html";
}

/* ---------------- RENDER ---------------- */
function renderRoadmaps(list){
  const grid = document.getElementById("roadmapGrid");
  grid.innerHTML = "";

  const levels = ["Beginner", "Intermediate", "Advanced"];

  list.forEach(r => {

    // ✅ Generate Level once and save it
    if(!r.level){
      r.level = levels[Math.floor(Math.random() * levels.length)];
    }

    // ✅ Generate Students once and save
    if(!r.students){
      r.students = Math.floor(Math.random() * 900) + 50;
    }

    // ✅ Generate Completion once
    if(!r.completion){
      r.completion = Math.floor(Math.random() * 100);
    }

    // ✅ Generate Duration (Months) once
    if(!r.duration){
      const months = Math.floor(Math.random() * 12) + 1;
      r.duration = months + " months";
    }

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="card-image">
        <img src="${r.coverDataURL || "https://via.placeholder.com/600x300"}">
        <span class="badge ${r.status === 'published' ? 'published':'draft'}">
          ${r.status === 'published' ? 'Published' : 'Draft'}
        </span>
      </div>

      <div class="card-content">
        <h3>${r.title || "Untitled Course"}</h3>

        <span class="level-badge ${r.level.toLowerCase()}">
          ${r.level}
        </span>

        <div class="role">
          <i class="fa-solid fa-bullseye"></i>
          ${r.targetRole || ""}
        </div>

        <div class="meta">
          <span><i class="fa-solid fa-users"></i> ${r.students} enrolled</span>
          <span><i class="fa-solid fa-calendar"></i> ${r.duration}</span>
        </div>

        <div class="price">${formatPrice(r.price)}</div>

        <div class="progress-box">
          <div class="progress-text">
            Completion Rate
            <span>${r.completion}%</span>
          </div>
          <div class="progress">
            <div class="progress-bar" style="width:${r.completion}%"></div>
          </div>
        </div>

        <div class="card-buttons">
          <button class="btn-edit" onclick="editRoadmap(${r.id});event.stopPropagation();">
            <i class="fa-solid fa-pen"></i> Edit
          </button>

          <button class="btn-analysis" onclick="showDetails(${r.id});event.stopPropagation();">
            <i class="fa-solid fa-chart-line"></i> Details
          </button>

          <button class="btn-delete" onclick="deleteRoadmap(${r.id});event.stopPropagation();">
            <i class="fa-solid fa-trash"></i>
          </button>
        </div>
      </div>
    `;

    grid.appendChild(div);
  });

  // 🔥 Save updated values so they stay ثابتة
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
}

/* ---------------- EDIT ---------------- */
function editRoadmap(id){
  localStorage.setItem("roadmap_edit_id", id);
  window.location.href = "add-course.html";
}

/* ---------------- DELETE ---------------- */
function deleteRoadmap(id){
  if(!confirm("Delete this roadmap?")) return;

  all = all.filter(r => r.id !== id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
  renderRoadmaps(all);

  document.getElementById("detailsBox").style.display = "none";
}

/* ---------------- DETAILS ---------------- */
function showDetails(id){
  const r = all.find(x => x.id === id);
  if(!r) return;

  const modal = document.getElementById("analysisModal");
  const content = document.getElementById("modalContent");

  modal.style.display = "flex";

  content.innerHTML = `
    <img src="${r.coverDataURL || 'https://via.placeholder.com/600x300'}">

    <h2>${r.title}</h2>
    <p>${r.description || ""}</p>

    <p><strong>Role:</strong> ${r.targetRole}</p>
    <p><strong>Price:</strong> ${formatPrice(r.price)}</p>
    <p><strong>Date:</strong> ${r.startDate || ''} - ${r.endDate || ''}</p>

    <div class="modal-section">
      <strong>Skills</strong>
      ${renderItems(r.skills)}
    </div>

    <div class="modal-section">
      <strong>Videos</strong>
      ${renderItems(r.videos)}
    </div>

    <div class="modal-section">
      <strong>Materials</strong>
      ${renderItems(r.materials)}
    </div>

    <div class="modal-section">
      <strong>Projects</strong>
      ${renderItems(r.projects)}
    </div>

    <div class="modal-section">
      <strong>Quizzes</strong>
      ${renderItems(r.quizzes)}
    </div>
  `;
}

function closeModal(){
  document.getElementById("analysisModal").style.display = "none";
}
/* ---------------- ITEMS ---------------- */
function renderItems(arr){
  if(!arr || arr.length === 0) 
    return `<p style="color:#999;">No items</p>`;

  return arr.map(i => {

    let fileInfo = "";

    if (i.fileMeta) {
      fileInfo = `
        <div style="font-size:12px;color:#555;margin-top:4px">
          <strong>File:</strong> ${i.fileMeta.name || ''} 
          ${i.fileMeta.size ? " — " + (i.fileMeta.size / (1024*1024)).toFixed(2) + " MB" : ""} 
          ${i.fileMeta.type ? " — " + i.fileMeta.type : ""}
        </div>
      `;
    }

    return `
      <div class="item-row">
        <div>
          <strong>${i.title || i.name || "Untitled"}</strong>
          ${fileInfo}
        </div>
        <div>${i.points ? i.points + " pts" : ""}</div>
      </div>
    `;
  }).join("");
}

/* ---------------- FILTER ---------------- */
document.getElementById("searchBar").addEventListener("input", function(){
  let v = this.value.toLowerCase().trim();

  if(v === "publish") v = "published";

  if(v === "published" || v === "draft"){
    renderRoadmaps(all.filter(r => r.status === v));
  } else {
    renderRoadmaps(all);
  }
});

document.getElementById("statusFilter").addEventListener("change", function(){
  if(this.value){
    renderRoadmaps(all.filter(r => r.status === this.value));
  } else {
    renderRoadmaps(all);
  }
});

/* ---------------- INIT ---------------- */
renderRoadmaps(all);

</script>
</body>
</html>
