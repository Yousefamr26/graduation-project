<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Calendar</title>

<link rel="stylesheet" href="styles/calender-TC.css" />

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">
<h2>Calendar</h2>
<p>View your scheduled Courses & Interviews</p>
</div>


<!-- MAIN CALENDAR -->

<div class="calendar">

<div class="cal-header">

<h2 id="monthTitle">Month Year</h2>

<div class="nav">

<button id="prevMonth">
<i class="fa-solid fa-chevron-left"></i>
</button>

<button id="nextMonth">
<i class="fa-solid fa-chevron-right"></i>
</button>

</div>

</div>


<!-- WEEKDAYS -->

<div class="weekdays">

<div>Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>

</div>


<!-- DAYS (GENERATED FROM JS) -->

<div class="days" id="calendarDays"></div>

</div>



<!-- RIGHT SIDEBAR -->

<aside class="sidebar">

<h3>Upcoming Courses & Interviews</h3>

<!-- EVENTS WILL LOAD HERE -->

<div id="eventsList"></div>


<h4 style="margin-top:20px;">Training Center Types</h4>

<ul class="legend">

<li><span class="dot workshop"></span> Course</li>
<li><span class="dot event"></span> Interview</li>
<li><span class="dot deadline"></span> Deadline</li>

</ul>

</aside>

</div>



<script>

/* CURRENT DATE */

let currentDate = new Date()


/* GENERATE CALENDAR */

function generateCalendar(){

const daysContainer = document.getElementById("calendarDays")
const monthTitle = document.getElementById("monthTitle")

daysContainer.innerHTML = ""

let year = currentDate.getFullYear()
let month = currentDate.getMonth()

const firstDay = new Date(year, month, 1).getDay()
const lastDate = new Date(year, month + 1, 0).getDate()

const monthNames = [
"January","February","March","April","May","June",
"July","August","September","October","November","December"
]

monthTitle.innerText = `${monthNames[month]} ${year}`


/* EMPTY DAYS BEFORE MONTH */

for(let i=0;i<firstDay;i++){

daysContainer.innerHTML += `<div></div>`

}


/* MONTH DAYS */

for(let d=1; d<=lastDate; d++){

daysContainer.innerHTML += `
<div class="day" data-day="${d}">
${d}
</div>
`

}

}


/* MONTH NAVIGATION */

document.getElementById("prevMonth").onclick = () => {

currentDate.setMonth(currentDate.getMonth()-1)

generateCalendar()

}

document.getElementById("nextMonth").onclick = () => {

currentDate.setMonth(currentDate.getMonth()+1)

generateCalendar()

}



/* LOAD EVENTS FROM BACKEND */

async function loadEvents(){

try{

const res = await fetch("/api/events")

const events = await res.json()

renderEvents(events)

}catch(err){

console.log("Error loading events",err)

}

}



/* RENDER EVENTS */

function renderEvents(events){

const container = document.getElementById("eventsList")

container.innerHTML = ""

events.forEach(event=>{

container.innerHTML += `

<div class="event-card ${event.type}">

<span class="tag">${event.type}</span>

<h4>${event.title}</h4>

<p>

<i class="fa-solid fa-calendar"></i> ${event.date}<br><br>

<i class="fa-solid fa-clock"></i> ${event.time}<br><br>

<i class="fa-solid fa-location-dot"></i> ${event.location}<br><br>

<i class="fa fa-users"></i> ${event.organizer}

</p>

</div>

`

})

}



/* START */

generateCalendar()

loadEvents()

</script>


</body>
</html>
