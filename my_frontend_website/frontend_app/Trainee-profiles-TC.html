<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trainee Profiles</title>

<style>

body{
font-family:Arial;
background:#f5f6fa;
margin:0;
padding:40px;
}

h2{
margin-bottom:25px;
}

/* stats */

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:35px;
}

.stat{
background:white;
padding:20px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.stat .icon{
font-size:26px;
}

.stat .num{
font-size:24px;
font-weight:bold;
}

.stat small{
color:#666;
}

/* cards */

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.card{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 4px 14px rgba(0,0,0,.08);
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:95px;
height:95px;
border-radius:50%;
border:4px solid #4a7cff;
}

.card h3{
margin:12px 0 6px;
}

.badge{
background:#eef2ff;
color:#4a7cff;
padding:6px 12px;
border-radius:20px;
font-size:13px;
display:inline-block;
margin-bottom:8px;
}

.email{
color:#777;
font-size:14px;
margin-bottom:12px;
}

.progress-title{
display:flex;
justify-content:space-between;
font-size:14px;
}

.percent{
color:#3b82f6;
font-weight:bold;
}

.progress{
background:#eee;
height:8px;
border-radius:10px;
overflow:hidden;
margin:8px 0 12px;
}

.bar{
height:100%;
background:#3b82f6;
}

.stats-box{
display:flex;
gap:12px;
margin-top:10px;
}

.mini-box{
flex:1;
background:#f3f4f6;
padding:12px;
border-radius:10px;
text-align:center;
}

.mini-box b{
display:block;
color:#3b82f6;
}

.mini-box span{
font-size:13px;
color:#666;
}

.tags{
margin-top:10px;
}

.tags span{
background:#f1f1f1;
padding:5px 9px;
border-radius:8px;
font-size:12px;
margin:3px;
display:inline-block;
}

.view{
background:#3b82f6;
color:white;
width:100%;
margin-top:15px;
padding:11px;
border:none;
border-radius:8px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}
/* ===== MODAL ===== */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.modal-content{
background:white;
width:500px;
padding:30px;
border-radius:14px;
box-shadow:0 10px 40px rgba(0,0,0,.2);
position:relative;
}

.close-modal{
position:absolute;
top:10px;
right:15px;
font-size:22px;
cursor:pointer;
}

.modal-buttons{
margin-top:20px;
display:flex;
gap:10px;
}

.send-btn{
background:#3b82f6;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

.close-btn{
background:#e5e7eb;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<script>
function openModal(btn){

document.getElementById("profileModal").style.display="flex";

document.getElementById("modalName").innerText = btn.dataset.name;
document.getElementById("modalBatch").innerText = btn.dataset.batch;
document.getElementById("modalEmail").innerText = btn.dataset.email;
document.getElementById("modalProgress").innerText = btn.dataset.progress;
document.getElementById("modalAttendance").innerText = btn.dataset.attendance;
document.getElementById("modalAssignments").innerText = btn.dataset.assignments;

document.getElementById("modalImg").src = btn.dataset.img;

}

function closeModal(){
document.getElementById("profileModal").style.display="none";
}

function openMessage(){
document.getElementById("messageModal").style.display="flex";
}

function closeMessage(){
document.getElementById("messageModal").style.display="none";
}

function sendMessage(){

let message = document.getElementById("messageText").value;

if(message.trim() !== ""){
alert("Message Sent Successfully ✅");
}

document.getElementById("messageText").value="";
closeMessage();

}
</script>
