<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
background:#f5f7fb;
font-family:system-ui;
}

.card{
border:none;
border-radius:14px;
}

.avatar img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
}

.member-badge{
background:#7c3aed;
color:white;
font-size:12px;
padding:4px 10px;
border-radius:20px;
display:inline-block;
}

.info-list p{
font-size:14px;
color:#555;
margin-bottom:8px;
}

.history-box{
border:1px solid #e6e8ee;
border-radius:10px;
padding:15px;
margin-bottom:12px;
background:white;
}

.section-title{
font-weight:600;
font-size:16px;
margin-bottom:10px;
}

.points-bar{
height:10px;
background:#e6e8ee;
border-radius:10px;
}

.points-fill{
height:10px;
background:#0f172a;
border-radius:10px;
}

.small-muted{
font-size:13px;
color:#777;
}

/* SKILLS */

.progress{
height:8px;
border-radius:10px;
}

.progress-bar{
background:#0f172a;
}

.skill-row{
margin-bottom:18px;
}

/* modal style */

.modal-content{
border-radius:16px;
}

.input-group-text{
background:white;
}

.form-control{
border-radius:0 10px 10px 0;
}

.modal-header{
padding:20px 24px 0;
}

.modal-body{
padding:20px 24px;
}

.modal-footer{
padding:0 24px 20px;
}

</style>
</head>

<body>

<div class="container py-5">

<div class="d-flex justify-content-between align-items-center mb-4">
<h4>My Profile</h4>

<button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#editModal">
<i class="fa-regular fa-pen-to-square me-1"></i> Edit Info
</button>

</div>

<div class="row g-4">

<!-- LEFT -->

<div class="col-lg-4">

<div class="card p-4 shadow-sm">

<div class="text-center">

<div class="avatar mb-3">
<img id="avatar" src="">
</div>

<h5 id="name"></h5>
<p class="text-muted small mb-2" id="major"></p>

<span class="member-badge" id="rank"></span>

</div>

<div class="info-list mt-4">

<p id="email"><i class="fa-regular fa-envelope me-2"></i></p>
<p id="phone"><i class="fa-solid fa-phone me-2"></i></p>
<p id="location"><i class="fa-solid fa-location-dot me-2"></i></p>
<p id="joined"><i class="fa-regular fa-calendar me-2"></i></p>

</div>

<hr>

<div>

<div class="d-flex justify-content-between mb-2">
<span>Total Points</span>
<span id="points"></span>
</div>

<div class="points-bar">
<div class="points-fill" id="pointsBar" style="width:0%"></div>
</div>

<small class="text-muted" id="nextLevel"></small>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="col-lg-8">

<!-- EDUCATION -->

<div class="card p-4 shadow-sm mb-4">

<div class="section-title">
<i class="fa-solid fa-graduation-cap me-2"></i>
Education
</div>

<h6 id="university"></h6>
<p class="small-muted" id="year"></p>

</div>

<!-- SKILLS -->

<div class="card p-4 shadow-sm mb-4">

<div class="section-title">
<i class="fa-solid fa-chart-line me-2"></i>
Total Points by Skill
</div>

<div id="skillsContainer"></div>

</div>

<!-- ACHIEVEMENTS -->

<div class="card p-4 shadow-sm mb-4">

<div class="section-title">
<i class="fa-solid fa-trophy me-2"></i>
Achievements
</div>

<div id="achievementsContainer"></div>

</div>

<!-- INTERNSHIPS -->

<div class="card p-4 shadow-sm mb-4">

<div class="section-title">
<i class="fa-solid fa-briefcase me-2"></i>
Internships History
</div>

<div id="internshipsContainer"></div>

</div>

<!-- JOBS -->

<div class="card p-4 shadow-sm">

<div class="section-title">
<i class="fa-solid fa-briefcase me-2"></i>
Jobs History
</div>

<div id="jobsContainer"></div>

</div>

</div>

</div>

</div>


<!-- MODAL -->

<div class="modal fade" id="editModal">

<div class="modal-dialog modal-lg modal-dialog-centered">

<div class="modal-content border-0 shadow-lg">

<div class="modal-header border-0">

<h5 class="modal-title fw-semibold">
<i class="fa-regular fa-user me-2"></i>
Edit Profile
</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<div class="row g-3">

<div class="col-md-6">

<label class="form-label small text-muted">Full Name</label>

<div class="input-group">
<span class="input-group-text"><i class="fa-regular fa-user"></i></span>
<input class="form-control" id="editName">
</div>

</div>


<div class="col-md-6">

<label class="form-label small text-muted">Major</label>

<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-graduation-cap"></i></span>
<input class="form-control" id="editMajor">
</div>

</div>


<div class="col-md-6">

<label class="form-label small text-muted">Email</label>

<div class="input-group">
<span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
<input class="form-control" id="editEmail">
</div>

</div>


<div class="col-md-6">

<label class="form-label small text-muted">Phone</label>

<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
<input class="form-control" id="editPhone">
</div>

</div>


<div class="col-12">

<label class="form-label small text-muted">Location</label>

<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-location-dot"></i></span>
<input class="form-control" id="editLocation">
</div>

</div>

</div>

</div>

<div class="modal-footer border-0">

<button class="btn btn-light px-4" data-bs-dismiss="modal">
Cancel
</button>

<button class="btn btn-primary px-4" onclick="saveProfile()">
<i class="fa-solid fa-check me-1"></i>
Save Changes
</button>

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

let profileData={}

async function loadProfile(){

let res = await fetch("/api/profile")
let data = await res.json()

profileData=data

avatar.src=data.avatar
name.innerText=data.name
major.innerText=data.major
rank.innerText=data.rank

email.innerHTML=`<i class="fa-regular fa-envelope me-2"></i>${data.email}`
phone.innerHTML=`<i class="fa-solid fa-phone me-2"></i>${data.phone}`
location.innerHTML=`<i class="fa-solid fa-location-dot me-2"></i>${data.location}`
joined.innerHTML=`<i class="fa-regular fa-calendar me-2"></i>${data.joined}`

university.innerText=data.university
year.innerText=data.year

points.innerText=data.points
pointsBar.style.width=data.pointsPercent+"%"

nextLevel.innerText=data.nextLevelText

renderSkills(data.skills)
renderAchievements(data.achievements)
renderInternships(data.internships)
renderJobs(data.jobs)

}

/* SKILLS */

function renderSkills(list){

let container=document.getElementById("skillsContainer")

container.innerHTML=""

list.forEach(s=>{

container.innerHTML+=`
<div class="skill-row">

<div class="d-flex justify-content-between mb-1">
<span>${s.name}</span>
<span>${s.points}</span>
</div>

<div class="progress">
<div class="progress-bar" style="width:${s.percent}%"></div>
</div>

</div>
`

})

}

/* ACHIEVEMENTS */

function renderAchievements(list){

let container=document.getElementById("achievementsContainer")

container.innerHTML=""

list.forEach(a=>{

container.innerHTML+=`
<div class="history-box">
<b>${a.title}</b>
<p class="small-muted">${a.date}</p>
<p class="small-muted mb-0">${a.description}</p>
</div>
`

})

}

/* INTERNSHIPS */

function renderInternships(list){

let container=document.getElementById("internshipsContainer")

container.innerHTML=""

list.forEach(i=>{

container.innerHTML+=`
<div class="history-box">
<b>${i.title}</b>
<p class="small-muted">${i.company} • ${i.period}</p>
<p class="small-muted mb-0">${i.description}</p>
</div>
`

})

}

/* JOBS */

function renderJobs(list){

let container=document.getElementById("jobsContainer")

container.innerHTML=""

list.forEach(j=>{

container.innerHTML+=`
<div class="history-box">
<b>${j.title}</b>
<p class="small-muted">${j.company} • ${j.period}</p>
<p class="small-muted mb-0">${j.description}</p>
</div>
`

})

}

loadProfile()

</script>

</body>
</html>
