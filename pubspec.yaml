name: smart_career_hub
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.3
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.7
  permission_handler: ^12.0.1
  image_picker: ^1.2.0
  file_picker: ^10.3.3
  dropdown_button2: ^2.0.0
  intl: ^0.20.2
  dio: ^5.9.1
  cached_network_image: ^3.4.1
  syncfusion_flutter_pdf: ^31.2.18
  shared_preferences: ^2.5.4
  path_provider: ^2.1.1
  table_calendar: ^3.2.0
  fl_chart: ^1.1.1
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  uuid: ^4.4.0
  flutter_image_compress: ^2.1.0
  open_file: ^3.5.11
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#1676C4"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1676C4"
  color_dark: "#0B3D6B"
  image: assets/images/logo_splash.png
  android_gravity: center
  ios_content_mode: center
  fullscreen: true
  android: true
  ios: true
  web: false
  android_12:
    image: assets/images/logo_splash_android12.png
    icon_background_color: "#1676C4"
    icon_background_color_dark: "#0B3D6B"