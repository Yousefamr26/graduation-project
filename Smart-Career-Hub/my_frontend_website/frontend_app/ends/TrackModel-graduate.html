<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>TrackModel</title>
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #f0f4f9 0%, #e9eff5 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
      color: #0f172a;
    }

    /* main card - full height */
    .app-container {
      width: 100%;
      max-width: 100%;
      height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: none;
      border-radius: 0;
    }

    /* header */
    .header {
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid #edf2f7;
      background: white;
      flex-shrink: 0;
    }

    .logo {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.3rem;
      box-shadow: 0 8px 12px -4px rgba(59,130,246,0.25);
      flex-shrink: 0;
    }

    .header-text {
      flex: 1;
    }

    .header-text h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #0f172a;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 2px;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .clear-btn {
      background: #fee2e2;
      color: #dc2626;
      border: 1px solid #fecaca;
      padding: 0.5rem 1rem;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
      flex-shrink: 0;
    }

    .clear-btn:hover {
      background: #fecaca;
      border-color: #fca5a5;
      box-shadow: 0 4px 8px rgba(220,38,38,0.15);
    }

    .clear-btn i {
      font-size: 0.75rem;
    }

    /* skills tags area - fixed height 100px with scroll */
    .skills-panel {
      padding: 0.9rem 1.5rem;
      border-bottom: 1px solid #edf2f7;
      background: #ffffff;
      flex-shrink: 0;
    }

    .skills-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }

    .skills-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      color: #334155;
    }

    .skills-label i {
      color: #3b82f6;
    }

    .hint {
      font-size: 0.7rem;
      color: #94a3b8;
      background: #f8fafc;
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* fixed height container with scroll - 100px */
    .skills-cloud-wrapper {
      height: 100px;
      overflow-y: auto;
      overflow-x: hidden;
      border: 1px solid #f1f5f9;
      border-radius: 16px;
      background: #fafbfc;
      padding: 10px 12px;
    }

    .skills-cloud {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 8px;
    }

    .tag {
      background: #f8fafc;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #1e293b;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: white;
      white-space: nowrap;
      margin-bottom: 2px;
    }

    .tag:hover {
      background: #eff6ff;
      border-color: #3b82f6;
      color: #1d4ed8;
      transform: translateY(-1px);
      box-shadow: 0 6px 10px rgba(59,130,246,0.12);
    }

    .tag i {
      font-size: 0.75rem;
      color: #3b82f6;
    }

    /* custom scrollbar for skills cloud */
    .skills-cloud-wrapper::-webkit-scrollbar {
      width: 5px;
    }
    .skills-cloud-wrapper::-webkit-scrollbar-track {
      background: transparent;
      border-radius: 10px;
    }
    .skills-cloud-wrapper::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    .skills-cloud-wrapper::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* chat messages - takes remaining space */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: #fafbfc;
      scroll-behavior: smooth;
      min-height: 0;
    }

    .message-row {
      display: flex;
      gap: 10px;
      animation: fadeInMessage 0.2s ease-out;
    }

    .bot-avatar {
      width: 36px;
      height: 36px;
      background: #2563eb;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.95rem;
      flex-shrink: 0;
      box-shadow: 0 4px 8px rgba(37,99,235,0.15);
    }

    .user-avatar {
      background: #10b981;
      box-shadow: 0 4px 8px rgba(16,185,129,0.18);
    }

    .message-bubble {
      background: white;
      padding: 0.8rem 1.1rem;
      border-radius: 16px 16px 16px 4px;
      max-width: 85%;
      font-size: 0.88rem;
      line-height: 1.5;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      border: 1px solid #f1f5f9;
      color: #1e293b;
      word-break: break-word;
    }

    .user-message .message-bubble {
      background: #eff6ff;
      border-radius: 16px 16px 4px 16px;
      border-color: #dbeafe;
      margin-left: auto;
    }

    .empty-chat {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #94a3b8;
      gap: 0.8rem;
      text-align: center;
    }

    .empty-chat i {
      font-size: 2.5rem;
      color: #cbd5e1;
    }

    .empty-chat p {
      font-size: 0.9rem;
      font-weight: 400;
    }

    /* structured response cards */
    .track-card {
      background: linear-gradient(135deg, #eff6ff, #f0f9ff);
      border: 1px solid #bfdbfe;
      border-radius: 16px;
      padding: 1rem;
      margin-bottom: 0.8rem;
    }

    .track-title {
      font-weight: 700;
      font-size: 1.05rem;
      color: #1e40af;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0.6rem;
    }

    .track-title i {
      color: #3b82f6;
      font-size: 1.1rem;
    }

    .track-reason {
      font-size: 0.85rem;
      color: #334155;
      line-height: 1.5;
      margin-bottom: 0.8rem;
      padding-left: 0.5rem;
      border-left: 3px solid #3b82f6;
    }

    .follow-up {
      background: white;
      border-radius: 12px;
      padding: 0.7rem 1rem;
      font-size: 0.85rem;
      color: #1e293b;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 0.8rem;
      border: 1px solid #e2e8f0;
    }

    .follow-up i {
      color: #f59e0b;
      margin-top: 2px;
    }

    .roadmap-title {
      font-weight: 600;
      font-size: 0.85rem;
      color: #0f172a;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .roadmap-list {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .roadmap-list li {
      font-size: 0.82rem;
      color: #475569;
      padding: 0.4rem 0.8rem;
      background: #f8fafc;
      border-radius: 10px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      border: 1px solid #f1f5f9;
    }

    .roadmap-list li i {
      color: #10b981;
      font-size: 0.7rem;
      margin-top: 3px;
    }

    .thinking-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0.8rem 1.1rem;
      background: #ffffff;
      border-radius: 16px;
      width: fit-content;
      font-style: italic;
      color: #64748b;
      font-size: 0.85rem;
    }

    .dot-pulse {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .dot-pulse span {
      width: 5px;
      height: 5px;
      background: #94a3b8;
      border-radius: 50%;
      animation: pulseDot 1.2s infinite ease-in-out;
    }

    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulseDot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1.2); opacity: 1; background: #3b82f6; }
    }

    /* input area */
    .input-container {
      padding: 1rem 1.5rem;
      background: white;
      border-top: 1px solid #edf2f7;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }

    .input-container input {
      flex: 1;
      padding: 0.8rem 1.2rem;
      border-radius: 40px;
      border: 1px solid #e2e8f0;
      font-size: 0.9rem;
      background: #f8fafc;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .input-container input:focus {
      outline: none;
      border-color: #3b82f6;
      background: white;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }

    .send-btn {
      background: #1e293b;
      color: white;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: -0.2px;
    }

    .send-btn:hover {
      background: #0f172a;
      box-shadow: 0 8px 16px rgba(15,23,42,0.2);
    }

    .send-btn i {
      font-size: 0.9rem;
    }

    @keyframes fadeInMessage {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* scrollbar for chat */
    .chat-window::-webkit-scrollbar {
      width: 4px;
    }
    .chat-window::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 1000;
      animation: slideUp 0.3s ease-out, fadeOut 0.3s ease-out 1.7s forwards;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(20px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* responsive tweaks */
    @media (min-width: 768px) {
      .header {
        padding: 1.2rem 2rem;
      }
      .skills-panel {
        padding: 1rem 2rem;
      }
      .chat-window {
        padding: 1.5rem 2rem;
      }
      .input-container {
        padding: 1.2rem 2rem;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- Header -->
  <div class="header">
    <div class="logo"><i class="fa-solid fa-robot"></i></div>
    <div class="header-text">
      <h1>Career Path Advisor</h1>
      <p><i class="fa-solid fa-circle-check" style="color: #10b981; font-size: 0.7rem;"></i> AI-powered track matching</p>
    </div>
    <button class="clear-btn" id="clearChatBtn" title="Clear chat history">
      <i class="fa-solid fa-trash-can"></i> Clear Chat
    </button>
  </div>

  <!-- Skills tags with fixed height 100px scrollable area -->
  <div class="skills-panel">
    <div class="skills-header-row">
      <div class="skills-label"><i class="fa-solid fa-sparkles"></i> Suggested Skill Phrases</div>
      <span class="hint">click to use</span>
    </div>
    <div class="skills-cloud-wrapper">
      <div class="skills-cloud" id="skillsContainer">
        <!-- dynamic skill phrases injected here -->
      </div>
    </div>
  </div>

  <!-- Chat messages -->
  <div class="chat-window" id="chatArea">
    <!-- messages rendered from localStorage -->
  </div>

  <!-- Input -->
  <div class="input-container">
    <input type="text" id="messageInput" placeholder="Describe your skills, e.g., Python, React, AWS..." autocomplete="off">
    <button class="send-btn" id="sendButton"><i class="fa-solid fa-paper-plane"></i> Send</button>
  </div>
</div>

<script>
  (function() {
    // ---------- CONFIG ----------
    const API_BASE_URL = "http://smartcareerhub.runasp.net/api";
    const TOKEN = localStorage.getItem("authToken") || ""; 

    // DOM elements
    const chatArea = document.getElementById('chatArea');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const skillsContainer = document.getElementById('skillsContainer');
    const clearChatBtn = document.getElementById('clearChatBtn');

    // Local storage key
    const STORAGE_KEY = 'career_chat_history';

    // Extended skill phrases (more than 10 characters)
    const skillPhrases = [
      { text: "Python for data analysis and machine learning", icon: "fa-brands fa-python" },
      { text: "Full stack web development with React & Node", icon: "fa-solid fa-code" },
      { text: "Cloud architecture and AWS infrastructure", icon: "fa-brands fa-aws" },
      { text: "DevOps with Docker and Kubernetes", icon: "fa-brands fa-docker" },
      { text: "Mobile development using Flutter & Dart", icon: "fa-solid fa-mobile-screen" },
      { text: "Database design and SQL optimization", icon: "fa-solid fa-database" },
      { text: "Cybersecurity fundamentals and network defense", icon: "fa-solid fa-shield-halved" },
      { text: "UI/UX design with Figma and prototyping", icon: "fa-solid fa-pen-ruler" },
      { text: "Agile project management and Scrum methodology", icon: "fa-solid fa-list-check" },
      { text: "Artificial intelligence and deep learning models", icon: "fa-solid fa-brain" },
      { text: "Blockchain development and smart contracts", icon: "fa-solid fa-link" },
      { text: "Game development with Unity and C#", icon: "fa-solid fa-gamepad" }
    ];

    // ---------- TOAST NOTIFICATION ----------
    function showToast(message) {
      const existingToast = document.querySelector('.toast');
      if (existingToast) existingToast.remove();
      
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        if (toast.parentNode) {
          toast.remove();
        }
      }, 2000);
    }

    // ---------- LOCAL STORAGE ----------
    function loadChatHistory() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          const parsed = JSON.parse(stored);
          if (Array.isArray(parsed) && parsed.length > 0) {
            return parsed;
          }
        }
      } catch (e) {
        console.warn("Failed to parse chat history", e);
      }
      // Default welcome message
      return [
        {
          id: 'welcome-1',
          sender: 'bot',
          text: "👋 Hi! I'm your career assistant. Describe your skills (e.g., Python, cloud, design) and I'll suggest the best career track for you.",
          timestamp: new Date().toISOString(),
          type: 'text'
        }
      ];
    }

    function saveChatHistory(messages) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
    }

    function clearChatHistory() {
      // Reset to default welcome message
      messages = [
        {
          id: 'welcome-' + Date.now(),
          sender: 'bot',
          text: "👋 Hi! I'm your career assistant. Describe your skills (e.g., Python, cloud, design) and I'll suggest the best career track for you.",
          timestamp: new Date().toISOString(),
          type: 'text'
        }
      ];
      saveChatHistory(messages);
      renderChat();
      showToast('Chat history cleared successfully!');
    }

    // Current messages in memory
    let messages = loadChatHistory();

    // ---------- RENDER STRUCTURED BOT RESPONSE ----------
    function renderStructuredResponse(data) {
      const html = `
        <div class="track-card">
          <div class="track-title">
            <i class="fa-solid fa-road"></i> ${escapeHtml(data.track)}
          </div>
          <div class="track-reason">
            ${escapeHtml(data.reason)}
          </div>
          ${data.followUpQuestion ? `
          <div class="follow-up">
            <i class="fa-solid fa-circle-question"></i>
            <span>${escapeHtml(data.followUpQuestion)}</span>
          </div>` : ''}
          ${data.roadmap && data.roadmap.length > 0 ? `
          <div>
            <div class="roadmap-title">
              <i class="fa-solid fa-list-ol"></i> Your Learning Roadmap
            </div>
            <ul class="roadmap-list">
              ${data.roadmap.map(step => `
                <li>
                  <i class="fa-solid fa-circle-check"></i>
                  <span>${escapeHtml(step)}</span>
                </li>
              `).join('')}
            </ul>
          </div>` : ''}
        </div>
      `;
      return html;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ---------- RENDER CHAT ----------
    function renderChat() {
      if (!chatArea) return;
      chatArea.innerHTML = '';

      if (messages.length === 0) {
        chatArea.innerHTML = `
          <div class="empty-chat">
            <i class="fa-solid fa-comments"></i>
            <p>Start by describing your skills above</p>
          </div>
        `;
        return;
      }

      messages.forEach(msg => {
        const row = document.createElement('div');
        row.className = `message-row ${msg.sender === 'user' ? 'user-message' : ''}`;
        
        // Avatar
        const avatar = document.createElement('div');
        avatar.className = `bot-avatar ${msg.sender === 'user' ? 'user-avatar' : ''}`;
        avatar.innerHTML = msg.sender === 'user' 
          ? '<i class="fa-solid fa-user"></i>' 
          : '<i class="fa-solid fa-robot"></i>';
        
        // Bubble
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        
        if (msg.type === 'structured' && msg.structuredData) {
          bubble.innerHTML = renderStructuredResponse(msg.structuredData);
        } else {
          bubble.textContent = msg.text;
        }
        
        if (msg.sender === 'user') {
          row.appendChild(bubble);
          row.appendChild(avatar);
        } else {
          row.appendChild(avatar);
          row.appendChild(bubble);
        }
        
        chatArea.appendChild(row);
      });

      // Auto scroll to bottom
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // Add a message and save
    function addMessage(sender, text, type = 'text', structuredData = null) {
      const newMsg = {
        id: Date.now() + '-' + Math.random().toString(36),
        sender: sender,
        text: text,
        type: type,
        structuredData: structuredData,
        timestamp: new Date().toISOString()
      };
      messages.push(newMsg);
      saveChatHistory(messages);
      renderChat();
      return newMsg;
    }

    // Show thinking indicator
    function showThinking() {
      removeThinkingIndicator();
      
      const thinkingId = 'thinking-' + Date.now();
      const thinkingMsg = {
        id: thinkingId,
        sender: 'bot',
        text: 'thinking',
        type: 'thinking',
        timestamp: new Date().toISOString()
      };
      messages.push(thinkingMsg);
      renderChat();
      
      const allRows = document.querySelectorAll('.message-row');
      const lastRow = allRows[allRows.length-1];
      if (lastRow) {
        const bubble = lastRow.querySelector('.message-bubble');
        if (bubble) {
          bubble.innerHTML = `
            <div class="thinking-indicator">
              <span>Analyzing your skills</span>
              <div class="dot-pulse">
                <span></span><span></span><span></span>
              </div>
            </div>
          `;
        }
      }
      return thinkingId;
    }

    function removeThinkingIndicator() {
      const before = messages.length;
      messages = messages.filter(m => m.type !== 'thinking');
      if (before !== messages.length) {
        saveChatHistory(messages);
        renderChat();
      }
    }

    // ---------- API CALL ----------
    async function sendMessageToBackend(userMessage) {
      addMessage('user', userMessage);
      showThinking();
      
      try {
        const response = await fetch(`${API_BASE_URL}/ProgrammingTrackAnalyzer/analyze`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${TOKEN}`
          },
          body: JSON.stringify({ userDescription: userMessage })
        });

        removeThinkingIndicator();

        if (!response.ok) {
          throw new Error(`Server responded with ${response.status}`);
        }

        const data = await response.json();
        
        // Check if response has the structured format (track, reason, roadmap, followUpQuestion)
        if (data.track && data.reason) {
          addMessage('bot', data.track, 'structured', data);
        } else {
          // Fallback for plain text response
          const botReply = data.reply || data.message || data.response || 
                           "I've analyzed your skills. Based on your profile, I recommend the **Full Stack Development** track.";
          addMessage('bot', botReply, 'text');
        }
        
      } catch (error) {
        removeThinkingIndicator();
        console.error('API error:', error);
        // Fallback structured response
        const fallbackData = {
          track: "Software Engineering",
          reason: "Based on the skills you've described, a Software Engineering track would be a strong fit. This path covers building scalable applications and systems.",
          followUpQuestion: "Would you prefer frontend, backend, or full-stack development?",
          roadmap: [
            "Master programming fundamentals and data structures",
            "Learn version control with Git and GitHub",
            "Build projects with modern frameworks",
            "Understand databases and API design",
            "Practice system design and deployment"
          ]
        };
        addMessage('bot', fallbackData.track, 'structured', fallbackData);
      }
    }

    // ---------- SKILL TAGS RENDERING ----------
    function renderSkillTags() {
      if (!skillsContainer) return;
      skillsContainer.innerHTML = '';
      skillPhrases.forEach(phrase => {
        const tagEl = document.createElement('span');
        tagEl.className = 'tag';
        tagEl.innerHTML = `<i class="${phrase.icon}"></i> ${phrase.text}`;
        tagEl.addEventListener('click', () => {
          messageInput.value = phrase.text;
          messageInput.focus();
        });
        skillsContainer.appendChild(tagEl);
      });
    }

    // ---------- EVENT LISTENERS ----------
    function handleSend() {
      const text = messageInput.value.trim();
      if (text === '') return;
      
      messageInput.value = '';
      sendMessageToBackend(text);
    }

    // Initial setup
    function initialize() {
      renderSkillTags();
      renderChat();
      
      sendButton.addEventListener('click', handleSend);
      messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleSend();
        }
      });

      // Clear chat button
      clearChatBtn.addEventListener('click', () => {
        if (messages.length <= 1) {
          showToast('Chat is already empty');
          return;
        }
        clearChatHistory();
      });
    }

    initialize();
  })();
</script>
</body>
</html>
