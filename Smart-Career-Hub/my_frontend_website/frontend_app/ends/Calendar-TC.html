<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Training Center Calendar | Smart Career Hub</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        :root {
            --primary: #155fc4;
            --course-bg: #198754;
            --interview-bg: #0d6efd;
            --deadline-bg: #dc3545;
            --bg: #f6f8fb;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e9eef3;
            --radius: 16px;
            --shadow: 0 4px 18px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 20px 16px 40px;
        }

        .page-wrapper {
            max-width: 1300px;
            margin: 0 auto;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 22px;
        }

        /* Header */
        .header {
            grid-column: 1 / -1;
            margin-bottom: 8px;
        }

        .header h2 {
            margin: 0;
            color: #0f2b45;
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header p {
            color: var(--text-light);
            margin-top: 6px;
            font-size: 0.95rem;
        }

        /* Calendar Card */
        .calendar {
            background: var(--card);
            border-radius: var(--radius);
            padding: 22px 18px;
            box-shadow: var(--shadow);
            border: 1px solid #f1f5f9;
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .cal-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
            margin: 0;
        }

        .nav {
            display: flex;
            gap: 6px;
        }

        .nav button {
            background: #eef2f6;
            border: none;
            padding: 9px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            color: #334155;
            font-weight: 500;
        }

        .nav button:hover {
            background: #dde3ea;
            color: var(--primary);
        }

        .nav button:active {
            transform: scale(0.96);
        }

        /* Weekdays Row */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            color: #7a8791;
            padding-bottom: 14px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* Days Grid */
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day {
            min-height: 90px;
            background: #fafbfc;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 7px;
            position: relative;
            transition: all 0.25s;
            display: flex;
            flex-direction: column;
        }

        .day:hover {
            background: #f0f4ff;
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.06);
        }

        .day.today {
            border: 2px solid var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(21, 95, 196, 0.1);
        }

        .day strong {
            font-size: 0.8rem;
            color: #334155;
            margin-bottom: 4px;
        }

        .day.today strong {
            color: var(--primary);
            font-weight: 700;
        }

        .day-events {
            display: flex;
            flex-direction: column;
            gap: 3px;
            overflow: hidden;
            flex: 1;
        }

        /* Event Pills */
        .ev-pill {
            font-size: 0.6rem;
            padding: 2px 5px;
            border-radius: 4px;
            color: white;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 500;
            letter-spacing: 0.2px;
            cursor: pointer;
            text-decoration: none;
        }

        .ev-course {
            background: var(--course-bg);
        }
        .ev-interview {
            background: var(--interview-bg);
        }
        .ev-deadline {
            background: var(--deadline-bg);
        }

        /* Sidebar */
        .sidebar {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px 18px;
            box-shadow: var(--shadow);
            border: 1px solid #f1f5f9;
            height: fit-content;
        }

        .sidebar h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            margin-top: 28px;
            margin-bottom: 12px;
        }

        /* Event Cards */
        .event-card {
            border-left: 5px solid #ccc;
            padding: 14px 15px;
            background: #f9fafb;
            border-radius: 10px;
            margin-bottom: 12px;
            position: relative;
            transition: all 0.2s;
        }

        .event-card:hover {
            background: #f1f5f9;
            transform: translateX(3px);
        }

        .event-card.course {
            border-left-color: var(--course-bg);
        }
        .event-card.interview {
            border-left-color: var(--interview-bg);
        }
        .event-card.deadline {
            border-left-color: var(--deadline-bg);
        }

        .event-card h4 {
            margin: 0 0 8px 0;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }

        .event-card p {
            margin: 0;
            font-size: 0.8rem;
            color: var(--text-light);
            line-height: 1.7;
        }

        .event-card i {
            width: 18px;
            color: var(--primary);
            text-align: center;
            margin-right: 4px;
        }

        /* Legend */
        .legend {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .legend li {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #4a5568;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .dot.workshop {
            background: var(--course-bg);
        }
        .dot.event {
            background: var(--interview-bg);
        }
        .dot.deadline {
            background: var(--deadline-bg);
        }

        /* Loading State */
        .loading-placeholder {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .loading-placeholder i {
            font-size: 1.5rem;
            margin-bottom: 8px;
            display: block;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--card);
            border-radius: var(--radius);
            padding: 28px 24px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            margin: 0;
            padding-right: 30px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #94a3b8;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .modal-close:hover {
            background: #f1f5f9;
            color: #334155;
        }

        .modal-body {
            display: grid;
            gap: 16px;
        }

        .modal-detail {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: #f8fafc;
            border-radius: 8px;
        }

        .modal-detail i {
            width: 20px;
            color: var(--primary);
            font-size: 1.1rem;
            text-align: center;
        }

        .modal-detail .detail-label {
            font-size: 0.75rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .modal-detail .detail-value {
            font-size: 0.95rem;
            color: var(--text);
            font-weight: 500;
        }

        .modal-footer {
            margin-top: 24px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-close-modal {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-close-modal:hover {
            background: #134b9e;
            transform: translateY(-1px);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ========== RESPONSIVE STYLES ========== */
        @media screen and (max-width: 992px) {
            .container {
                grid-template-columns: 1fr;
                gap: 18px;
            }

            .day {
                min-height: 75px;
                padding: 5px;
            }

            .day strong {
                font-size: 0.7rem;
            }

            .ev-pill {
                font-size: 0.55rem;
                padding: 1px 4px;
            }

            .weekdays {
                font-size: 0.7rem;
            }

            .modal-content {
                padding: 24px 20px;
            }
        }

        @media screen and (max-width: 768px) {
            body {
                padding: 14px 10px 30px;
            }

            .header h2 {
                font-size: 1.4rem;
            }

            .header p {
                font-size: 0.85rem;
            }

            .calendar {
                padding: 16px 10px;
                border-radius: 12px;
            }

            .cal-header h2 {
                font-size: 1rem;
            }

            .nav button {
                padding: 7px 10px;
                font-size: 0.8rem;
            }

            .days {
                gap: 4px;
            }

            .day {
                min-height: 60px;
                padding: 4px;
                border-radius: 6px;
            }

            .day strong {
                font-size: 0.65rem;
            }

            .weekdays {
                font-size: 0.65rem;
                padding-bottom: 10px;
            }

            .ev-pill {
                font-size: 0.5rem;
                padding: 1px 3px;
                border-radius: 3px;
            }

            .sidebar {
                padding: 16px 14px;
            }

            .event-card h4 {
                font-size: 0.85rem;
            }

            .event-card p {
                font-size: 0.75rem;
            }

            .modal-content {
                max-width: 95%;
                padding: 20px 16px;
            }

            .modal-header h3 {
                font-size: 1.1rem;
            }
        }

        @media screen and (max-width: 480px) {
            body {
                padding: 10px 4px 25px;
            }

            .header h2 {
                font-size: 1.2rem;
            }

            .calendar {
                padding: 12px 6px;
                border-radius: 10px;
            }

            .days {
                gap: 2px;
            }

            .day {
                min-height: 48px;
                padding: 2px;
                border-radius: 4px;
            }

            .day strong {
                font-size: 0.55rem;
            }

            .weekdays {
                font-size: 0.55rem;
                padding-bottom: 8px;
            }

            .ev-pill {
                font-size: 0.45rem;
                padding: 1px 2px;
                border-radius: 2px;
            }

            .nav button {
                padding: 5px 8px;
                font-size: 0.7rem;
                border-radius: 6px;
            }

            .event-card {
                padding: 10px 12px;
            }

            .legend li {
                font-size: 0.75rem;
            }

            .modal-detail {
                padding: 8px;
            }

            .modal-detail .detail-value {
                font-size: 0.85rem;
            }
        }

        @media screen and (max-width: 380px) {
            .day {
                min-height: 38px;
            }

            .day strong {
                font-size: 0.5rem;
            }

            .weekdays {
                font-size: 0.5rem;
            }

            .ev-pill {
                font-size: 0.4rem;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="container">
            <!-- Header -->
            <div class="header">
                <h2><i class="fa-solid fa-calendar-days" style="color: var(--primary);"></i> Calendar</h2>
                <p>View your scheduled Courses & Interviews</p>
            </div>

            <!-- Calendar Section -->
            <div class="calendar">
                <div class="cal-header">
                    <h2 id="monthTitle">Month Year</h2>
                    <div class="nav">
                        <button id="prevMonth" title="Previous month"><i class="fa-solid fa-chevron-left"></i></button>
                        <button id="nextMonth" title="Next month"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>

                <div class="weekdays">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div>
                    <div>Thu</div><div>Fri</div><div>Sat</div>
                </div>

                <div class="days" id="calendarDays">
                    <!-- Dynamically filled -->
                </div>
            </div>

            <!-- Sidebar -->
            <aside class="sidebar">
                <h3><i class="fa-solid fa-list-check"></i> Upcoming</h3>
                <div id="eventsList">
                    <p style="color: #999; font-size: 14px;">No upcoming events</p>
                </div>

                <h4>Legend</h4>
                <ul class="legend">
                    <li><span class="dot workshop"></span> Course</li>
                    <li><span class="dot event"></span> Interview</li>
                    <li><span class="dot deadline"></span> Deadline</li>
                </ul>
            </aside>
        </div>
    </div>

    <!-- Event Details Modal -->
    <div class="modal-overlay" id="eventModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Event Details</h3>
                <button class="modal-close" id="modalClose" title="Close">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Dynamically filled -->
            </div>
            <div class="modal-footer">
                <button class="btn-close-modal" id="modalCloseBtn">Close</button>
            </div>
        </div>
    </div>

    <script>
        // 1. API Configuration
        const API_BASE_URL = "http://smartcareerhub.runasp.net/api";
        const AUTH_TOKEN = localStorage.getItem("authToken");

        let currentDate = new Date();
        let fetchedEvents = [];

        /**
         * GENERATE CALENDAR HTML
         */
        function generateCalendar() {
            const daysContainer = document.getElementById("calendarDays");
            const monthTitle = document.getElementById("monthTitle");

            if (!daysContainer || !monthTitle) return;

            daysContainer.innerHTML = "";

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const today = new Date();

            const monthNames = [
                "January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"
            ];
            monthTitle.innerText = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            // Empty slots for previous month
            for (let i = 0; i < firstDay; i++) {
                const emptyDiv = document.createElement('div');
                daysContainer.appendChild(emptyDiv);
            }

            // Real Days
            for (let d = 1; d <= lastDate; d++) {
                const isToday =
                    d === today.getDate() &&
                    month === today.getMonth() &&
                    year === today.getFullYear();

                const dayDiv = document.createElement('div');
                dayDiv.className = `day ${isToday ? 'today' : ''}`;
                dayDiv.id = `day-${d}`;
                dayDiv.innerHTML = `
                    <strong>${d}</strong>
                    <div class="day-events"></div>
                `;
                daysContainer.appendChild(dayDiv);
            }

            // After generating days, load events from API
            loadEvents();
        }

        /**
         * FETCH EVENTS FROM BACKEND
         */
        async function loadEvents() {
            if (!AUTH_TOKEN) {
                console.warn("No auth token found. Redirecting to login.");
                return;
            }

            const eventsListDiv = document.getElementById("eventsList");
            if (eventsListDiv) {
                eventsListDiv.innerHTML = `
                    <div class="loading-placeholder">
                        <i class="fa-solid fa-spinner fa-spin"></i>
                        Loading events...
                    </div>`;
            }

            try {
                const month = currentDate.getMonth() + 1;
                const year = currentDate.getFullYear();

                // Note: Update endpoint based on TrainingCenter controller
                const res = await fetch(
                    `${API_BASE_URL}/TrainingCenter/GetCalendarEvents?month=${month}&year=${year}`,
                    {
                        headers: { 'Authorization': `Bearer ${AUTH_TOKEN}` }
                    }
                );

                if (res.ok) {
                    fetchedEvents = await res.json();
                    renderEventsOnCalendar();
                    renderUpcomingSidebar();
                } else {
                    console.error("Failed to fetch events. Status:", res.status);
                    if (eventsListDiv) {
                        eventsListDiv.innerHTML = `<p style="color: #999; font-size: 14px;">Failed to load events.</p>`;
                    }
                }
            } catch (err) {
                console.error("Error loading events:", err);
                if (eventsListDiv) {
                    eventsListDiv.innerHTML = `<p style="color: #999; font-size: 14px;">Connection error.</p>`;
                }
            }
        }

        /**
         * RENDER PILLS ON CALENDAR DAYS
         */
        function renderEventsOnCalendar() {
            if (!fetchedEvents || fetchedEvents.length === 0) return;

            // Clear existing event pills
            document.querySelectorAll('.day-events').forEach(container => {
                container.innerHTML = '';
            });

            fetchedEvents.forEach(event => {
                if (!event.date) return;

                const eventDate = new Date(event.date);

                if (
                    eventDate.getMonth() === currentDate.getMonth() &&
                    eventDate.getFullYear() === currentDate.getFullYear()
                ) {
                    const dayBox = document.getElementById(`day-${eventDate.getDate()}`);
                    if (dayBox) {
                        const container = dayBox.querySelector(".day-events");
                        if (container) {
                            const type = (event.type || 'course').toLowerCase();
                            const typeClass = `ev-${type}`;
                            const pill = document.createElement('span');
                            pill.className = `ev-pill ${typeClass}`;
                            pill.title = event.title || 'Event';
                            pill.textContent = event.title || 'Event';
                            pill.onclick = () => showEventDetails(event);
                            container.appendChild(pill);
                        }
                    }
                }
            });
        }

        /**
         * SHOW EVENT DETAILS IN MODAL
         */
        function showEventDetails(event) {
            const eventDate = event.date
                ? new Date(event.date).toLocaleDateString('en-US', {
                      weekday: 'long',
                      year: 'numeric',
                      month: 'long',
                      day: 'numeric'
                  })
                : 'N/A';

            const eventType = (event.type || 'N/A').charAt(0).toUpperCase() + (event.type || 'N/A').slice(1);
            
            // Get type icon
            let typeIcon = 'fa-calendar-day';
            if (event.type === 'course') typeIcon = 'fa-book';
            else if (event.type === 'interview') typeIcon = 'fa-user-tie';
            else if (event.type === 'deadline') typeIcon = 'fa-clock';

            // Update modal content
            document.getElementById('modalTitle').textContent = event.title || 'Event Details';
            
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="modal-detail">
                    <i class="fa-solid ${typeIcon}"></i>
                    <div>
                        <div class="detail-label">Type</div>
                        <div class="detail-value">${eventType}</div>
                    </div>
                </div>
                <div class="modal-detail">
                    <i class="fa-solid fa-calendar"></i>
                    <div>
                        <div class="detail-label">Date</div>
                        <div class="detail-value">${eventDate}</div>
                    </div>
                </div>
                <div class="modal-detail">
                    <i class="fa-solid fa-clock"></i>
                    <div>
                        <div class="detail-label">Time</div>
                        <div class="detail-value">${event.time || 'All Day'}</div>
                    </div>
                </div>
                <div class="modal-detail">
                    <i class="fa-solid fa-location-dot"></i>
                    <div>
                        <div class="detail-label">Location</div>
                        <div class="detail-value">${event.location || 'Online'}</div>
                    </div>
                </div>
                <div class="modal-detail">
                    <i class="fa-solid fa-align-left"></i>
                    <div>
                        <div class="detail-label">Description</div>
                        <div class="detail-value">${event.description || 'No description available.'}</div>
                    </div>
                </div>
            `;

            // Show modal
            openModal();
        }

        /**
         * MODAL FUNCTIONS
         */
        function openModal() {
            const modal = document.getElementById('eventModal');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closeModal() {
            const modal = document.getElementById('eventModal');
            modal.classList.remove('active');
            document.body.style.overflow = ''; // Restore scrolling
        }

        // Close modal when clicking outside
        document.getElementById('eventModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Close modal buttons
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalCloseBtn').addEventListener('click', closeModal);

        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('eventModal');
                if (modal.classList.contains('active')) {
                    closeModal();
                }
            }
        });

        /**
         * RENDER UPCOMING EVENTS IN SIDEBAR
         */
        function renderUpcomingSidebar() {
            const container = document.getElementById("eventsList");
            if (!container) return;

            container.innerHTML = "";

            const now = new Date();
            now.setHours(0, 0, 0, 0);

            // Sort by date and show next 4 events
            const upcoming = fetchedEvents
                .filter(e => {
                    if (!e.date) return false;
                    const eventDate = new Date(e.date);
                    eventDate.setHours(0, 0, 0, 0);
                    return eventDate >= now;
                })
                .sort((a, b) => new Date(a.date) - new Date(b.date))
                .slice(0, 4);

            if (upcoming.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 20px 0;">
                        <i class="fa-solid fa-calendar-xmark" style="font-size: 2rem; color: #cbd5e1; display: block; margin-bottom: 10px;"></i>
                        <p style="color: #999; font-size: 14px;">No upcoming events found.</p>
                    </div>`;
                return;
            }

            upcoming.forEach(event => {
                const eventDate = new Date(event.date);
                const formattedDate = eventDate.toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric'
                });

                const card = document.createElement('div');
                card.className = `event-card ${(event.type || 'course').toLowerCase()}`;
                card.innerHTML = `
                    <h4>${escapeHTML(event.title || 'Untitled Event')}</h4>
                    <p>
                        <i class="fa-solid fa-calendar"></i> ${formattedDate}<br>
                        <i class="fa-solid fa-clock"></i> ${event.time || 'All Day'}<br>
                        <i class="fa-solid fa-location-dot"></i> ${event.location || 'Online'}
                    </p>
                `;
                container.appendChild(card);
            });
        }

        /**
         * ESCAPE HTML
         */
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Navigation Event Listeners
        document.getElementById("prevMonth").addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            generateCalendar();
        });

        document.getElementById("nextMonth").addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            generateCalendar();
        });

        // Keyboard navigation support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                currentDate.setMonth(currentDate.getMonth() - 1);
                generateCalendar();
            } else if (e.key === 'ArrowRight') {
                currentDate.setMonth(currentDate.getMonth() + 1);
                generateCalendar();
            }
        });

        // Initial Start
        window.addEventListener('DOMContentLoaded', () => {
            if (!AUTH_TOKEN) {
                window.location.href = "login.html";
            } else {
                generateCalendar();
            }
        });
    </script>
</body>
</html>
