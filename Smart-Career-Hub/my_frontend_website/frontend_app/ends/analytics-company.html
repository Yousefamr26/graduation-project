<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Analytics & Reports | Smart Career Hub</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3498db;
            --primary-dark: #268acd;
            --primary-light: #e8f1fd;
            --muted: #5b6e8c;
            --bg: #f8fafc;
            --card: #ffffff;
            --radius-xl: 20px;
            --radius-lg: 14px;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.05);
            --border: #eef2f8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: #1e293b;
            padding: 24px 20px 48px;
            min-height: 100vh;
        }

        .page {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
        }

        .title-section h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2f72b0, #70b5e3);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .title-section p {
            color: var(--muted);
            font-size: 0.9rem;
            margin-top: 6px;
        }

        .tabs-wrapper {
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            padding-bottom: 6px;
        }

        .tabs-flex {
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
            min-width: max-content;
        }

        .tab-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #334155;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn i {
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 6px 12px rgba(21, 95, 196, 0.2);
        }

        .tab-btn:hover:not(.active) {
            background: #e6edf6;
            color: var(--primary);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 11px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(21, 95, 196, 0.25);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 24px;
            margin-top: 8px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius-xl);
            padding: 20px 18px 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: box-shadow 0.2s;
        }

        .card-full {
            grid-column: 1 / -1;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            padding-left: 14px;
        }

        .card-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f2b45;
        }

        .card-header i {
            font-size: 1.3rem;
            color: var(--primary);
        }

        .chart-container {
            position: relative;
            height: 280px;
            width: 100%;
        }

        .metrics-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-top: 8px;
        }

        .metric-card {
            background: #f9fcff;
            border-radius: 20px;
            padding: 18px 12px;
            text-align: center;
            border: 1px solid #eef2fa;
            transition: all 0.2s;
        }

        .metric-card h4 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1.2;
        }

        .popup-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            max-width: 320px;
            background: #1e293b;
            color: white;
            padding: 14px 20px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.2);
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .popup-toast.show {
            transform: translateX(0);
        }
        .popup-toast.error {
            background: #b91c1c;
        }
        .popup-toast.success {
            background: #0f7b3a;
        }
        .popup-toast i {
            font-size: 1.2rem;
        }

        .error-placeholder {
            text-align: center;
            padding: 40px 20px;
            color: #b91c1c;
            background: #fff5f5;
            border-radius: 24px;
        }
        @media (max-width: 860px) {
            body { padding: 16px 14px 32px; }
            .dashboard-grid { grid-template-columns: 1fr; gap: 18px; }
            .chart-container { height: 240px; }
            .metric-value { font-size: 1.7rem; }
        }
        @media (max-width: 540px) {
            .header-row { flex-direction: column; align-items: stretch; }
            .btn-primary { justify-content: center; }
            .metric-value { font-size: 1.4rem; }
        }
        @media print {
            .btn-primary, .tabs-wrapper, .popup-toast { display: none; }
            body { background: white; padding: 0.5in; }
            .card { box-shadow: none; break-inside: avoid; }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="header-row">
        <div class="title-section">
            <h1><i class="fa-solid fa-chart-pie" style="margin-right: 8px;"></i> Analytics & Reports</h1>
            <p>Real-time insights • Performance metrics • Career intelligence</p>
        </div>
        <button id="pdfDownloadBtn" class="btn-primary"><i class="fa-regular fa-file-pdf"></i> Export as PDF</button>
    </div>

    <div class="tabs-wrapper">
        <div class="tabs-flex" id="tabContainer">
            <button class="tab-btn active" data-section="roadmaps"><i class="fa-solid fa-map"></i> Roadmaps</button>
            <button class="tab-btn" data-section="jobs"><i class="fa-solid fa-briefcase"></i> Jobs</button>
            <button class="tab-btn" data-section="internships"><i class="fa-solid fa-laptop-code"></i> Internships</button>
            <button class="tab-btn" data-section="workshops"><i class="fa-solid fa-chalkboard-user"></i> Workshops</button>
            <button class="tab-btn" data-section="events"><i class="fa-regular fa-calendar-check"></i> Events</button>
            <button class="tab-btn" data-section="interviews"><i class="fa-solid fa-comments"></i> Interviews</button>
            <button class="tab-btn" data-section="universities"><i class="fa-solid fa-building-columns"></i> Universities</button>
        </div>
    </div>

    <div id="analyticsContent" class="dashboard-grid">
        <div class="card card-full" style="text-align:center; padding: 50px;"><i class="fa-solid fa-spinner fa-pulse"></i> Loading analytics...</div>
    </div>
</div>
<div id="toastMessage" class="popup-toast"><i class="fa-solid fa-circle-check"></i> <span>Message</span></div>

<script>
    // ======================= PROVIDED JSON DATA =======================
    const EVENTS_DATA = {
        totalEvents: 7,
        totalRegistrations: 2,
        attendanceRate: 0.4,
        byMode: { "Hybrid": 3, "Online": 2, "Onsite": 2 }
    };
    const WORKSHOPS_DATA = {
        totalWorkshops: 7,
        totalParticipants: 4,
        attendanceRate: 0.9,
        byType: { "Online": 6, "Onsite": 1 }
    };
    const INTERVIEWS_DATA = {
        totalInterviews: 7,
        attendanceRate: 28.6,
        hiringRate: 0,
        completedCount: 0,
        scheduledCount: 0,
        completionRateOverTime: {}
    };
    const UNIVERSITIES_DATA = {
        totalActivePartners: 2,
        mostActiveCampus: "eelu",
        newPartnerships: 2
    };

    // ----------------------- MOCK DATA FOR OTHER TABS (unchanged rich visuals) -----------------------
    const MOCK_ROADMAP = {
        totalEnrolled: 124, completionRate: 68, avgProgress: 72, activeRoadmaps: 8,
        performanceLabels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'], performanceScores: [65, 70, 78, 82, 88],
        statusLabels: ['Not Started', 'In Progress', 'Completed'], statusCounts: [24, 56, 38]
    };
    const MOCK_JOBS = {
        timeLabels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'], counts: [12, 19, 25, 30],
        statusLabels: ['Applied', 'Reviewed', 'Interview', 'Rejected'], statusCounts: [145, 98, 42, 33]
    };
    const MOCK_INTERNSHIPS = { labels: ['Tech', 'Business', 'Design', 'Marketing'], counts: [42, 28, 19, 15] };

    let chartInstances = {};
    function showPopup(message, type = "success") {
        const toast = document.getElementById("toastMessage");
        const iconElem = toast.querySelector("i");
        const textSpan = toast.querySelector("span");
        if (type === "error") { iconElem.className = "fa-solid fa-circle-exclamation"; toast.classList.add("error"); toast.classList.remove("success"); }
        else { iconElem.className = "fa-solid fa-circle-check"; toast.classList.add("success"); toast.classList.remove("error"); }
        textSpan.innerText = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
    }
    function destroyChart(id) { if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; } }
    function createChart(ctx, type, labels, dataValues, labelText, color = null) {
        if (!ctx) return null;
        const defaultColors = ['#155fc4', '#38bdf8', '#818cf8', '#f97316', '#10b981', '#facc15'];
        return new Chart(ctx, {
            type: type,
            data: { labels: labels || [], datasets: [{ label: labelText, data: dataValues || [], backgroundColor: type === 'pie' ? defaultColors : (color || '#155fc4'), borderColor: '#155fc4', borderRadius: 8, tension: 0.3 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' }, tooltip: { backgroundColor: '#1e293b' } }, scales: type !== 'pie' ? { y: { beginAtZero: true }, x: { grid: { display: false } } } : {} }
        });
    }

    // --------------------------- RENDERERS (UPDATED BASED ON JSON) ---------------------------
    function renderEvents() {
        const modeLabels = Object.keys(EVENTS_DATA.byMode);
        const modeCounts = modeLabels.map(k => EVENTS_DATA.byMode[k]);
        const attendancePercent = (EVENTS_DATA.attendanceRate * 100).toFixed(1);
        return `<div class="card"><div class="card-header"><i class="fa-solid fa-chart-pie"></i><h3>Events by Mode</h3></div><div class="chart-container"><canvas id="eventsModeChart"></canvas></div></div>
                <div class="card card-full"><div class="card-header"><i class="fa-solid fa-calendar-check"></i><h3>Events Metrics</h3></div>
                <div class="metrics-row"><div class="metric-card"><h4>Total Events</h4><div class="metric-value">${EVENTS_DATA.totalEvents}</div></div>
                <div class="metric-card"><h4>Total Registrations</h4><div class="metric-value">${EVENTS_DATA.totalRegistrations}</div></div>
                <div class="metric-card"><h4>Attendance Rate</h4><div class="metric-value">${attendancePercent}%</div></div>
                <div class="metric-card"><h4>Hybrid/Online/Onsite</h4><div class="metric-value">${modeCounts.join('/')}</div></div></div></div>`;
    }
    function renderWorkshops() {
        const typeLabels = Object.keys(WORKSHOPS_DATA.byType);
        const typeCounts = typeLabels.map(k => WORKSHOPS_DATA.byType[k]);
        const attendancePercent = (WORKSHOPS_DATA.attendanceRate * 100).toFixed(1);
        return `<div class="card"><div class="card-header"><i class="fa-solid fa-chart-bar"></i><h3>Workshops by Type</h3></div><div class="chart-container"><canvas id="workshopsTypeChart"></canvas></div></div>
                <div class="card card-full"><div class="card-header"><i class="fa-solid fa-chalkboard-user"></i><h3>Workshop Performance</h3></div>
                <div class="metrics-row"><div class="metric-card"><h4>Total Workshops</h4><div class="metric-value">${WORKSHOPS_DATA.totalWorkshops}</div></div>
                <div class="metric-card"><h4>Total Participants</h4><div class="metric-value">${WORKSHOPS_DATA.totalParticipants}</div></div>
                <div class="metric-card"><h4>Attendance Rate</h4><div class="metric-value">${attendancePercent}%</div></div>
                <div class="metric-card"><h4>Online/Onsite</h4><div class="metric-value">${typeCounts[0] || 0} / ${typeCounts[1] || 0}</div></div></div></div>`;
    }
    function renderInterviews() {
        return `<div class="card"><div class="card-header"><i class="fa-solid fa-chart-line"></i><h3>Interview Success Rates</h3></div><div class="chart-container"><canvas id="interviewsRateChart"></canvas></div></div>
                <div class="card card-full"><div class="card-header"><i class="fa-solid fa-comments"></i><h3>Interview Metrics</h3></div>
                <div class="metrics-row"><div class="metric-card"><h4>Total Interviews</h4><div class="metric-value">${INTERVIEWS_DATA.totalInterviews}</div></div>
                <div class="metric-card"><h4>Attendance Rate</h4><div class="metric-value">${INTERVIEWS_DATA.attendanceRate}%</div></div>
                <div class="metric-card"><h4>Hiring Rate</h4><div class="metric-value">${INTERVIEWS_DATA.hiringRate}%</div></div>
                <div class="metric-card"><h4>Completed / Scheduled</h4><div class="metric-value">${INTERVIEWS_DATA.completedCount} / ${INTERVIEWS_DATA.scheduledCount}</div></div></div>
                <div style="margin-top:16px; background:#fef2e8; padding:12px; border-radius:16px;"><i class="fa-solid fa-chart-line"></i> Note: Completion rate over time data pending.</div></div>`;
    }
    function renderUniversities() {
        return `<div class="card"><div class="card-header"><i class="fa-solid fa-building-columns"></i><h3>Partnership Snapshot</h3></div><div class="chart-container" style="height:220px"><canvas id="universitiesChart"></canvas></div></div>
                <div class="card card-full"><div class="card-header"><i class="fa-solid fa-handshake"></i><h3>University Engagement</h3></div>
                <div class="metrics-row"><div class="metric-card"><h4>Active Partners</h4><div class="metric-value">${UNIVERSITIES_DATA.totalActivePartners}</div></div>
                <div class="metric-card"><h4>Most Active Campus</h4><div class="metric-value" style="font-size:1.5rem">${UNIVERSITIES_DATA.mostActiveCampus.toUpperCase()}</div></div>
                <div class="metric-card"><h4>New Partnerships</h4><div class="metric-value">${UNIVERSITIES_DATA.newPartnerships}</div></div></div>
                <div style="margin-top:12px; background:#eef2ff; padding:12px; border-radius:16px;"><i class="fa-regular fa-building"></i> <strong>Expansion insight:</strong> ${UNIVERSITIES_DATA.newPartnerships} new partnerships established. ${UNIVERSITIES_DATA.mostActiveCampus} leads in activity.</div></div>`;
    }
    // ---------------- LEGACY RENDERERS (roadmaps, jobs, internships) unchanged ----------------
    function renderRoadmaps() { return `<div class="card"><div class="card-header"><i class="fa-solid fa-chart-line"></i><h3>Student Performance Trend</h3></div><div class="chart-container"><canvas id="roadmapLineChart"></canvas></div></div><div class="card"><div class="card-header"><i class="fa-solid fa-chart-simple"></i><h3>Completion Status</h3></div><div class="chart-container"><canvas id="roadmapBarChart"></canvas></div></div><div class="card card-full"><div class="card-header"><i class="fa-solid fa-chart-column"></i><h3>Key Metrics</h3></div><div class="metrics-row"><div class="metric-card"><h4>Total Enrolled</h4><div class="metric-value">${MOCK_ROADMAP.totalEnrolled}</div></div><div class="metric-card"><h4>Completion Rate</h4><div class="metric-value">${MOCK_ROADMAP.completionRate}%</div></div><div class="metric-card"><h4>Avg Progress</h4><div class="metric-value">${MOCK_ROADMAP.avgProgress}%</div></div><div class="metric-card"><h4>Active Roadmaps</h4><div class="metric-value">${MOCK_ROADMAP.activeRoadmaps}</div></div></div></div>`; }
    function renderJobs() { return `<div class="card"><div class="card-header"><i class="fa-regular fa-chart-line"></i><h3>Jobs Postings Over Time</h3></div><div class="chart-container"><canvas id="jobsLineChart"></canvas></div></div><div class="card"><div class="card-header"><i class="fa-solid fa-chart-bar"></i><h3>Applications Status</h3></div><div class="chart-container"><canvas id="jobsBarChart"></canvas></div></div>`; }
    function renderInternships() { return `<div class="card card-full"><div class="card-header"><i class="fa-solid fa-laptop-code"></i><h3>Internship Distribution</h3></div><div class="chart-container"><canvas id="internBarChart"></canvas></div></div>`; }

    // --------------------------- CHART INITIALIZERS ---------------------------
    async function initChartsForSection(section) {
        Object.keys(chartInstances).forEach(k => { if(chartInstances[k]) { try{ chartInstances[k].destroy(); }catch(e){} } });
        chartInstances = {};
        if(section === "roadmaps") {
            const lineCtx = document.getElementById("roadmapLineChart")?.getContext('2d');
            const barCtx = document.getElementById("roadmapBarChart")?.getContext('2d');
            if(lineCtx) chartInstances.roadmapLine = createChart(lineCtx, 'line', MOCK_ROADMAP.performanceLabels, MOCK_ROADMAP.performanceScores, 'Performance Score', '#2b9cf5');
            if(barCtx) chartInstances.roadmapBar = createChart(barCtx, 'bar', MOCK_ROADMAP.statusLabels, MOCK_ROADMAP.statusCounts, 'Students', '#18b64b');
        }
        else if(section === "jobs") {
            const lineCtx = document.getElementById("jobsLineChart")?.getContext('2d');
            const barCtx = document.getElementById("jobsBarChart")?.getContext('2d');
            if(lineCtx) chartInstances.jobsLine = createChart(lineCtx, 'line', MOCK_JOBS.timeLabels, MOCK_JOBS.counts, 'Job Postings', '#155fc4');
            if(barCtx) chartInstances.jobsBar = createChart(barCtx, 'bar', MOCK_JOBS.statusLabels, MOCK_JOBS.statusCounts, 'Applications', '#f2b705');
        }
        else if(section === "internships") {
            const ctx = document.getElementById("internBarChart")?.getContext('2d');
            if(ctx) chartInstances.internBar = createChart(ctx, 'bar', MOCK_INTERNSHIPS.labels, MOCK_INTERNSHIPS.counts, 'Internships', '#8b5cf6');
        }
        else if(section === "workshops") {
            const wsCtx = document.getElementById("workshopsTypeChart")?.getContext('2d');
            if(wsCtx) chartInstances.workshopsType = createChart(wsCtx, 'bar', Object.keys(WORKSHOPS_DATA.byType), Object.values(WORKSHOPS_DATA.byType), 'Workshops Count', '#2b8c5e');
        }
        else if(section === "events") {
            const modeCtx = document.getElementById("eventsModeChart")?.getContext('2d');
            if(modeCtx) chartInstances.eventsMode = createChart(modeCtx, 'pie', Object.keys(EVENTS_DATA.byMode), Object.values(EVENTS_DATA.byMode), 'Event Distribution');
        }
        else if(section === "interviews") {
            const rateCtx = document.getElementById("interviewsRateChart")?.getContext('2d');
            if(rateCtx) {
                chartInstances.interviewsRate = new Chart(rateCtx, { type: 'bar', data: { labels: ['Attendance Rate (%)', 'Hiring Rate (%)'], datasets: [{ label: 'Percentage (%)', data: [INTERVIEWS_DATA.attendanceRate, INTERVIEWS_DATA.hiringRate], backgroundColor: ['#3b82f6', '#f97316'], borderRadius: 8 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100, title: { display: true, text: 'Rate (%)' } } } } });
            }
        }
        else if(section === "universities") {
            const uniCtx = document.getElementById("universitiesChart")?.getContext('2d');
            if(uniCtx) {
                chartInstances.universitiesChart = new Chart(uniCtx, { type: 'doughnut', data: { labels: ['Active Partners', 'New Partnerships'], datasets: [{ data: [UNIVERSITIES_DATA.totalActivePartners, UNIVERSITIES_DATA.newPartnerships], backgroundColor: ['#155fc4', '#10b981'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } } });
            }
        }
    }

    let currentSection = "roadmaps";
    async function loadSection(section) {
        currentSection = section;
        const contentDiv = document.getElementById("analyticsContent");
        if (!contentDiv) return;
        contentDiv.innerHTML = `<div class="card card-full" style="text-align:center;"><i class="fa-solid fa-spinner fa-pulse"></i> Loading ${section} insights...</div>`;
        let html = "";
        if (section === "roadmaps") html = renderRoadmaps();
        else if (section === "jobs") html = renderJobs();
        else if (section === "internships") html = renderInternships();
        else if (section === "workshops") html = renderWorkshops();
        else if (section === "events") html = renderEvents();
        else if (section === "interviews") html = renderInterviews();
        else if (section === "universities") html = renderUniversities();
        else html = `<div class="card card-full">Select view</div>`;
        contentDiv.innerHTML = html;
        setTimeout(() => { initChartsForSection(section); showPopup(`${section.charAt(0).toUpperCase() + section.slice(1)} dashboard updated`, "success"); }, 80);
    }

    function bindTabEvents() {
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", async () => {
                const section = btn.getAttribute("data-section");
                if (!section) return;
                document.querySelectorAll(".tab-btn").forEach(t => t.classList.remove("active"));
                btn.classList.add("active");
                await loadSection(section);
            });
        });
    }
    document.getElementById("pdfDownloadBtn")?.addEventListener("click", () => { showPopup("Preparing PDF...", "success"); setTimeout(() => window.print(), 200); });
    window.addEventListener("DOMContentLoaded", async () => { bindTabEvents(); await loadSection("roadmaps"); });
    window.addEventListener("resize", () => { Object.values(chartInstances).forEach(ch => { if(ch && typeof ch.resize === 'function') ch.resize(); }); });
</script>
</body>
</html>
