<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Training Center • Notifications</title>

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Google Font Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

   <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background:  #ffffff;
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      color: #3498DB;
    }

    .notifications-wrapper {
      max-width: 950px;
      margin: 0 auto;
    }

    /* header */
    .grad-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 1.8rem;
      gap: 1rem;
    }

    .title-section h1 {
      font-weight: 700;
      font-size: 2.3rem;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #155fc4, #3498DB);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.2rem;
    }

    .title-section h1 i {
      background: none;
      -webkit-text-fill-color: #3498DB;
      font-size: 2rem;
    }

    .alumni-sub {
      color: #3498DB;
      font-weight: 500;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .grad-badge {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      background: #e3f1ff;
      padding: 0.5rem 1.4rem;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.9rem;
      color: #155fc4;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 8px 14px rgba(0,99,188,0.12);
      border: 1px solid #b6d6ff;
    }

    /* cards grid */
    .notifications-grid {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .graduate-card {
      background: #ffffff;
      border-radius: 22px;
      padding: 1.3rem 1.6rem;
      display: flex;
      align-items: flex-start;
      gap: 1.2rem;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(138, 180, 248, 0.5);
      box-shadow: 0 15px 25px -12px rgba(0, 105, 184, 0.14);
      transition: all 0.25s ease-in-out;
      position: relative;
    }

    .graduate-card:hover {
      transform: translateY(-3px);
      border-color: #3498DB;;
      box-shadow: 0 25px 30px -15px rgba(16, 95, 181, 0.2);
      background: #ffffff;
    }

    /* icon block */
    .grad-icon-circle {
      width: 52px;
      height: 52px;
      background: #d9ecfe;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #3498DB;;
      flex-shrink: 0;
      background: linear-gradient(135deg, #e3f0ff, #c5deff);
      box-shadow: 0 8px 14px rgba(4, 112, 217, 0.18);
    }

    .content-block {
      flex: 1;
    }

    .notif-title {
      font-weight: 700;
      font-size: 1.15rem;
      color: #155fc4;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 0.35rem;
    }

    .new-chip {
      background: #3498DB;;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.25rem 0.9rem;
      border-radius: 30px;
      letter-spacing: 0.4px;
      background: linear-gradient(145deg, #3498DB, #155fc4);
      box-shadow: 0 5px 12px rgba(13, 110, 253, 0.3);
    }

    .message-body {
      color: #243e5a;
      font-weight: 500;
      margin: 0.35rem 0 0.7rem;
      line-height: 1.5;
    }

    .meta-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.8rem;
      color: #3498DB;
    }

    .meta-row i {
      color: #3498DB;
      margin-right: 0.2rem;
    }

    .alumni-tag {
      background: #e7f1ff;
      padding: 0.2rem 0.9rem;
      border-radius: 20px;
      font-weight: 600;
      color: #155fc4;
      font-size: 0.7rem;
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
    }

    hr {
      margin: 0.5rem 0 0.3rem;
      border-color: #d1e2fc;
      opacity: 0.7;
    }

    .footer-note {
      margin-top: 2.5rem;
      text-align: center;
      color: #155fc4;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(6px);
      padding: 0.5rem 1.8rem;
      border-radius: 30px;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      border: 1px solid #bcd5f5;
      margin-left: auto;
      margin-right: auto;
    }

    @media (max-width: 600px) {
      .graduate-card {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
<div class="dashboard-wrapper">
  
  <div class="training-header">
    <div class="title-area">
      <h2>
        <i class="fa-solid fa-chalkboard-user"></i> Notifications
      </h2>
      <div class="subtitle">
        <i class="fa-solid fa-chart-line"></i> Training center · courses, trainees & performance
      </div>
    </div>
    <div class="metrics-badge">
      <i class="fa-solid fa-bell"></i> <span id="newCounter">4 new alerts</span>
    </div>
  </div>

  <!-- Notifications container (static training data) -->
  <div class="noti-container" id="trainingNotificationsContainer">
    <!-- JavaScript will generate notifications here -->
  </div>

  <div class="footer-note">
    <i class="fa-solid fa-graduation-cap"></i> Training metrics & enrollments dashboard
  </div>
</div>

<script>
  (function() {
    // ---------- STATIC TRAINING CENTER NOTIFICATIONS (English) ----------
    const trainingNotifications = [
      {
        id: 201,
        title: "New Course Enrollment",
        message: "Ahmed Salah enrolled in 'Cybersecurity Essentials' – batch starts May 10.",
        icon: "fa-user-plus",
        category: "Enrollment",
        timestamp: "12 minutes ago",
        isNew: true,
        metric: "course"
      },
      {
        id: 202,
        title: "Trainee Progress Alert",
        message: "Lama Khalid completed 85% of 'Frontend Development with React' – on track.",
        icon: "fa-bullseye",
        category: "Progress",
        timestamp: "45 minutes ago",
        isNew: true,
        metric: "trainee"
      },
      {
        id: 203,
        title: "Course Completion Rate",
        message: "Data Science Bootcamp: 92% completion rate this month (above target).",
        icon: "fa-chart-pie",
        category: "Metrics",
        timestamp: "2 hours ago",
        isNew: true,
        metric: "performance"
      },
      {
        id: 204,
        title: "New Trainer Assigned",
        message: "Dr. Yara Nabil assigned to 'AI & Machine Learning' advanced track.",
        icon: "fa-chalkboard-teacher",
        category: "Staffing",
        timestamp: "3 hours ago",
        isNew: true,
        metric: "trainer"
      },
      {
        id: 205,
        title: "Assessment Submission",
        message: "Trainee Omar Fikry submitted final project for 'Digital Marketing' – pending review.",
        icon: "fa-file-check",
        category: "Assessment",
        timestamp: "Yesterday",
        isNew: false,
        metric: "trainee"
      },
      {
        id: 206,
        title: "Training Session Feedback",
        message: "Average rating 4.8/5 for 'Cloud Architecture' workshop – excellent feedback.",
        icon: "fa-star",
        category: "Feedback",
        timestamp: "Yesterday",
        isNew: false,
        metric: "performance"
      }
    ];

    const container = document.getElementById("trainingNotificationsContainer");
    const newCountSpan = document.getElementById("newCounter");

    function renderTrainingNotifications(notifications) {
      if (!container) return;

      // count new items
      const newCount = notifications.filter(n => n.isNew).length;
      if (newCountSpan) {
        newCountSpan.textContent = `${newCount} new alerts`;
      }

      let htmlString = "";
      notifications.forEach((item) => {
        const iconClass = item.icon || "fa-clipboard-list";
        const showNew = item.isNew === true;
        
        htmlString += `
          <div class="notification">
            <div class="icon-circle">
              <i class="fa-solid ${iconClass}"></i>
            </div>
            <div class="content-block">
              <div class="notif-title">
                ${item.title || "Training Update"}
                ${showNew ? '<span class="new-chip">NEW</span>' : ''}
              </div>
              <div class="message-text">
                ${item.message || ""}
              </div>
              <div class="meta-row">
                <span><i class="fa-regular fa-clock"></i> ${item.timestamp || "Recently"}</span>
                <span class="training-tag">
                  <i class="fa-solid ${item.metric === 'performance' ? 'fa-chart-simple' : (item.metric === 'trainee' ? 'fa-user-graduate' : 'fa-book-open')}"></i> 
                  ${item.category || "Training"}
                </span>
                <span><i class="fa-solid fa-arrow-up-right-dots"></i> ${item.metric || "update"}</span>
              </div>
              <hr>
              <div class="performance-hint">
                <span><i class="fa-solid fa-building-columns"></i> Training center</span>
                <span><i class="fa-solid fa-check-circle"></i> verified</span>
              </div>
            </div>
          </div>
        `;
      });

      container.innerHTML = htmlString;
    }

    // Render static training notifications
    renderTrainingNotifications(trainingNotifications);

  })();
</script>

</body>
</html>
