<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Messages</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Inter',sans-serif;
background:#f5f7fb;
color:#1f2937;
padding:30px;
}

.page-title{
font-size:28px;
font-weight:600;
margin-bottom:5px;
}

.page-sub{
color:#64748b;
margin-bottom:25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.add-chat-btn{
background:#3b82f6;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
font-size:14px;
display:flex;
align-items:center;
gap:8px;
transition: all 0.3s;
}

.add-chat-btn:hover{
background:#2563eb;
transform: translateY(-1px);
box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}

.chat-layout{
display:flex;
gap:30px;
height:620px;
}

/* LEFT PANEL */

.conversations{
width:360px;
background:white;
border-radius:14px;
padding:20px;
border:1px solid #e5e7eb;
overflow-y:auto;
display:flex;
flex-direction:column;
}

.conversations h3{
margin-bottom:20px;
font-size:18px;
color: #1f2937;
}

.search-box {
margin-bottom: 15px;
position: relative;
}

.search-box input {
width: 100%;
padding: 10px 12px 10px 35px;
border-radius: 8px;
border: 1px solid #e5e7eb;
font-size: 13px;
transition: all 0.3s;
}

.search-box input:focus {
outline: none;
border-color: #3b82f6;
box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.search-box i {
position: absolute;
left: 12px;
top: 50%;
transform: translateY(-50%);
color: #94a3b8;
font-size: 14px;
}

.conversations-list-container {
flex: 1;
overflow-y: auto;
}

.conv-item{
display:flex;
gap:12px;
padding:12px;
border-radius:12px;
cursor:pointer;
border:1px solid #e5e7eb;
margin-bottom:8px;
transition:all 0.3s;
position: relative;
}

.conv-item:hover{
border-color:#3b82f6;
background:#f8fafc;
transform: translateX(3px);
}

.conv-item.active{
background:#3b82f6;
color:white;
border-color:#3b82f6;
}

.avatar{
width:42px;
height:42px;
border-radius:50%;
background:#3b82f6;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
font-size:16px;
flex-shrink: 0;
}

.conv-item.active .avatar{
background:white;
color:#3b82f6;
}

.conv-content {
flex: 1;
min-width: 0;
}

.conv-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 3px;
}

.conv-header h4{
font-size:14px;
font-weight:600;
margin: 0;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
max-width: 150px;
}

.conv-time{
font-size:11px;
color:#94a3b8;
white-space: nowrap;
}

.conv-item.active .conv-time{
color:#e5e7eb;
}

.conv-last-message {
font-size:12px;
color:#64748b;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
margin-bottom: 4px;
}

.conv-item.active .conv-last-message {
color:#dbeafe;
}

.conv-meta {
display: flex;
justify-content: space-between;
align-items: center;
}

.applicant-name {
font-size: 11px;
color: #3b82f6;
font-weight: 500;
display: flex;
align-items: center;
gap: 4px;
}

.conv-item.active .applicant-name {
color: #bfdbfe;
}

.unread-badge {
background: #ef4444;
color: white;
font-size: 11px;
padding: 2px 8px;
border-radius: 10px;
font-weight: 600;
min-width: 20px;
text-align: center;
}

.conv-item.active .unread-badge {
background: white;
color: #ef4444;
}

/* RIGHT CHAT */

.chat-box{
flex:1;
background:white;
border-radius:14px;
border:1px solid #e5e7eb;
display:flex;
flex-direction:column;
}

.chat-header{
padding:18px 20px;
display:flex;
gap:12px;
align-items:center;
border-bottom:1px solid #e5e7eb;
background: #fafbfc;
border-radius: 14px 14px 0 0;
}

.chat-header .avatar{
width:42px;
height:42px;
background:#3b82f6;
color:white;
font-size: 18px;
}

.chat-header-info {
flex: 1;
}

.chat-header h4{
font-size:16px;
font-weight:600;
margin-bottom: 2px;
}

.chat-header p{
font-size:12px;
color:#64748b;
}

.chat-header-meta {
text-align: right;
}

.chat-header-meta .created-date {
font-size: 11px;
color: #94a3b8;
}

.chat-header-meta .applicant-label {
font-size: 11px;
color: #3b82f6;
font-weight: 500;
margin-top: 2px;
}

/* MESSAGES */

.messages{
flex:1;
padding:25px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:18px;
background: #fafbfc;
}

.message{
max-width:65%;
padding:12px 16px;
border-radius:12px;
font-size:14px;
line-height:1.5;
word-wrap:break-word;
animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}

.received{
background:white;
align-self:flex-start;
border: 1px solid #e5e7eb;
box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

.sent{
background:#3b82f6;
color:white;
align-self:flex-end;
box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);
}

.msg-time{
font-size:11px;
margin-top:6px;
opacity:.7;
text-align: right;
}

.no-chat-selected{
display:flex;
flex-direction: column;
align-items:center;
justify-content:center;
height:100%;
color:#94a3b8;
font-size:16px;
gap: 15px;
}

.no-chat-selected i {
font-size: 48px;
opacity: 0.5;
}

/* INPUT */

.chat-input{
border-top:1px solid #e5e7eb;
padding:15px 20px;
display:flex;
gap:10px;
background: white;
border-radius: 0 0 14px 14px;
}

.chat-input input{
flex:1;
padding:12px 16px;
border-radius:25px;
border:1px solid #e5e7eb;
font-size:14px;
transition: all 0.3s;
}

.chat-input input:focus{
outline:none;
border-color:#3b82f6;
box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.send-btn{
background:#3b82f6;
border:none;
color:white;
width:44px;
height:44px;
border-radius:50%;
cursor:pointer;
font-size:16px;
transition: all 0.3s;
display: flex;
align-items: center;
justify-content: center;
}

.send-btn:hover{
background:#2563eb;
transform: scale(1.05);
}

.send-btn:disabled{
background:#94a3b8;
cursor:not-allowed;
transform: none;
}

/* Error and Debug Info */
.error-message {
background: #fef2f2;
border: 1px solid #fecaca;
color: #dc2626;
padding: 12px;
border-radius: 8px;
margin: 10px 0;
font-size: 13px;
display: flex;
align-items: center;
gap: 8px;
}

.error-message i {
font-size: 16px;
}

.debug-info {
background: #fffbeb;
border: 1px solid #fde68a;
color: #92400e;
padding: 12px;
border-radius: 8px;
margin: 10px 0;
font-size: 12px;
font-family: monospace;
white-space: pre-wrap;
word-break: break-all;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:1000;
align-items:center;
justify-content:center;
animation: fadeIn 0.2s ease;
}

.modal.show{
display:flex;
}

.modal-content{
background:white;
border-radius:14px;
padding:30px;
width:420px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

.modal-content h3{
margin-bottom:8px;
font-size:20px;
}

.modal-content .modal-subtitle {
color: #64748b;
font-size: 13px;
margin-bottom: 20px;
}

.modal-content label {
display: block;
font-size: 14px;
font-weight: 500;
margin-bottom: 8px;
color: #374151;
}

.modal-content input{
width:100%;
padding:12px 14px;
border-radius:8px;
border:1px solid #e5e7eb;
margin-bottom:20px;
font-size:14px;
transition: all 0.3s;
}

.modal-content input:focus{
outline:none;
border-color:#3b82f6;
box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.modal-buttons{
display:flex;
gap:10px;
justify-content:flex-end;
}

.btn-cancel{
padding:10px 20px;
border-radius:8px;
border:1px solid #e5e7eb;
background:white;
cursor:pointer;
font-size: 14px;
transition: all 0.3s;
}

.btn-cancel:hover {
background: #f1f5f9;
}

.btn-create{
padding:10px 20px;
border-radius:8px;
border:none;
background:#3b82f6;
color:white;
cursor:pointer;
font-size: 14px;
font-weight: 500;
transition: all 0.3s;
}

.btn-create:hover{
background:#2563eb;
box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}

.btn-create:disabled {
background: #94a3b8;
cursor: not-allowed;
}

.loading{
text-align:center;
padding:20px;
color:#64748b;
font-size: 14px;
}

.loading i {
margin-right: 8px;
animation: spin 1s linear infinite;
}

@keyframes spin {
from { transform: rotate(0deg); }
to { transform: rotate(360deg); }
}

.empty-state {
text-align: center;
padding: 30px 20px;
color: #94a3b8;
}

.empty-state i {
font-size: 32px;
margin-bottom: 10px;
opacity: 0.5;
}

.empty-state p {
font-size: 13px;
}

</style>
</head>

<body>

<div class="page-title">Messages</div>
<div class="page-sub">
<span>Communicate with companies</span>
<button class="add-chat-btn" onclick="openNewChatModal()">
<i class="fa-solid fa-plus"></i> New Chat
</button>
</div>

<div class="chat-layout">

<!-- LEFT PANEL -->

<div class="conversations">

<h3>Conversations</h3>

<div class="search-box">
<i class="fa-solid fa-search"></i>
<input type="text" id="searchConversations" placeholder="Search conversations..." oninput="filterConversations()">
</div>

<div class="conversations-list-container" id="conversationsList">
<div class="loading">
<i class="fa-solid fa-spinner"></i> Loading conversations...
</div>
</div>

</div>

<!-- RIGHT CHAT -->

<div class="chat-box">

<div class="chat-header" id="chatHeader" style="display:none;">

<div class="avatar" id="chatAvatar">C</div>

<div class="chat-header-info">
<h4 id="chatCompanyName">Company Name</h4>
<p id="chatApplicantName">Applicant Name</p>
</div>

<div class="chat-header-meta">
<div class="created-date" id="chatCreatedDate"></div>
</div>

</div>

<!-- Messages container -->

<div class="messages" id="messages">
<div class="no-chat-selected">
<i class="fa-solid fa-comments"></i>
<p>Select a conversation to start chatting</p>
</div>
</div>

<!-- INPUT -->

<div class="chat-input" id="chatInput" style="display:none;">

<input id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">

<button class="send-btn" onclick="sendMessage()" id="sendButton">
<i class="fa-solid fa-paper-plane"></i>
</button>

</div>

</div>

</div>

<!-- New Chat Modal -->

<div class="modal" id="newChatModal">
<div class="modal-content">
<h3>New Conversation</h3>
<p class="modal-subtitle">Start a conversation with a company or user</p>
<label>Enter Entity ID:</label>
<input id="entityIdInput" placeholder="e.g., 50710218-a85d-43be-9c7d-ced898e6a1cc">
<div class="modal-buttons">
<button class="btn-cancel" onclick="closeNewChatModal()">Cancel</button>
<button class="btn-create" onclick="createNewChat()">Create Chat</button>
</div>
</div>
</div>

<!-- Debug Console (remove in production) -->
<div id="debugConsole" style="display:none; position:fixed; bottom:10px; right:10px; max-width:400px; max-height:300px; overflow-y:auto; background:rgba(0,0,0,0.9); color:#00ff00; padding:10px; border-radius:8px; font-size:11px; font-family:monospace; z-index:9999;"></div>

<script>
const API_BASE_URL = "http://smartcareerhub.runasp.net/api";
const TOKEN = localStorage.getItem("authToken");

let currentRoomId = null;
let currentRoomData = null;
let conversations = [];
let allConversations = []; // For search functionality
let isDebugMode = false; // Set to true to see debug info

// Debug function
function debugLog(message, data = null) {
    if (!isDebugMode) return;
    
    const debugConsole = document.getElementById('debugConsole');
    debugConsole.style.display = 'block';
    
    const timestamp = new Date().toLocaleTimeString();
    let logMessage = `[${timestamp}] ${message}`;
    
    if (data) {
        try {
            logMessage += '\n' + JSON.stringify(data, null, 2);
        } catch (e) {
            logMessage += '\n' + String(data);
        }
    }
    
    debugConsole.innerHTML += logMessage + '\n\n';
    debugConsole.scrollTop = debugConsole.scrollHeight;
}

// Decode JWT to get user info
function decodeJWT(token) {
    try {
        if (!token) return null;
        
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        const decoded = JSON.parse(jsonPayload);
        
        debugLog('JWT Decoded:', decoded);
        return decoded;
    } catch (e) {
        console.error('JWT Decode Error:', e);
        debugLog('JWT Decode Error:', e.message);
        return null;
    }
}

// Get current user ID from token
function getCurrentUserId() {
    const decoded = decodeJWT(TOKEN);
    if (!decoded) return null;
    
    // Try different possible ID fields
    const userId = decoded["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier"] ||
                   decoded.StudentId ||
                   decoded.nameid ||
                   decoded.sub;
    
    debugLog('Current User ID:', userId);
    return userId;
}

// Load all conversations
async function loadConversations() {
    try {
        debugLog('Loading conversations from:', `${API_BASE_URL}/Chat/rooms`);
        
        const response = await fetch(`${API_BASE_URL}/Chat/rooms`, {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${TOKEN}`,
                'Content-Type': 'application/json'
            }
        });

        debugLog('Conversations Response Status:', response.status);
        
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errorText}`);
        }

        const responseData = await response.json();
        
        debugLog('Conversations Raw Response:', responseData);
        
        // Handle different response formats
        if (Array.isArray(responseData)) {
            conversations = responseData;
        } else if (responseData.data && Array.isArray(responseData.data)) {
            conversations = responseData.data;
        } else if (responseData.rooms && Array.isArray(responseData.rooms)) {
            conversations = responseData.rooms;
        } else {
            conversations = [];
            console.warn('Unexpected response format:', responseData);
        }
        
        allConversations = [...conversations];
        
        debugLog('Processed Conversations:', conversations);
        
        renderConversations(conversations);
        
    } catch (error) {
        console.error('Error loading conversations:', error);
        debugLog('Error loading conversations:', error.message);
        
        document.getElementById('conversationsList').innerHTML = `
            <div class="error-message">
                <i class="fa-solid fa-exclamation-circle"></i>
                Failed to load conversations
            </div>
            <div class="debug-info">
                Error: ${error.message}
                <br><br>
                API: ${API_BASE_URL}/Chat/rooms
                <br>
                Time: ${new Date().toLocaleString()}
            </div>
        `;
    }
}

// Render conversations list
function renderConversations(convs) {
    const container = document.getElementById('conversationsList');

    if (!convs || convs.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fa-solid fa-inbox"></i>
                <p>No conversations found</p>
            </div>`;
        return;
    }

    // هات اليوزر من localStorage
    const currentUser = JSON.parse(localStorage.getItem("user") || "{}");
    const currentUserId = currentUser.id;

    debugLog('Current User From LocalStorage:', currentUser);

    const sortedConversations = [...convs].sort((a, b) => {
        const aUnread = a.unreadCount || 0;
        const bUnread = b.unreadCount || 0;

        if (aUnread > 0 && bUnread === 0) return -1;
        if (aUnread === 0 && bUnread > 0) return 1;

        const dateA = new Date(a.lastMessageAt || a.createdAt || 0);
        const dateB = new Date(b.lastMessageAt || b.createdAt || 0);

        return dateB - dateA;
    });

    container.innerHTML = sortedConversations.map(room => {

        // لو انا الـ applicant يبقا اعرض entityName
        // غير كدا اعرض applicantName
        const displayName =
            room.applicantId === currentUserId
                ? room.entityName
                : room.applicantName;

        const firstLetter = (displayName || '?')[0].toUpperCase();

        const lastMessage = room.lastMessage || 'No messages yet';

        const time = formatTime(room.lastMessageAt || room.createdAt);

        const unreadCount = room.unreadCount || 0;

        return `
            <div class="conv-item ${room.id === currentRoomId ? 'active' : ''}" 
                 onclick="selectConversation('${room.id}')"
                 data-room-id="${room.id}">

                <div class="avatar">${firstLetter}</div>

                <div class="conv-content">

                    <div class="conv-header">
                        <h4 title="${displayName}">
                            ${displayName}
                        </h4>

                        <span class="conv-time">${time}</span>
                    </div>

                    <div class="conv-last-message">
                        ${escapeHtml(lastMessage)}
                    </div>

                    <div class="conv-meta">

                        <span class="applicant-name">
                            <i class="fa-solid fa-user"></i>
                            ${displayName}
                        </span>

                        ${unreadCount > 0
                            ? `<span class="unread-badge">${unreadCount}</span>`
                            : ''
                        }

                    </div>

                </div>
            </div>
        `;
    }).join('');
}
// Filter conversations
function filterConversations() {
    const searchTerm = document.getElementById('searchConversations').value.toLowerCase();
    
    if (!searchTerm) {
        renderConversations(allConversations);
        return;
    }
    
    const filtered = allConversations.filter(room => {
        const applicantName = (room.applicantName || room.name || room.companyName || '').toLowerCase();
        const lastMessage = (room.lastMessage || '').toLowerCase();
        return applicantName.includes(searchTerm) || lastMessage.includes(searchTerm);
    });
    
    renderConversations(filtered);
}

// Select a conversation
async function selectConversation(roomId) {
    debugLog('Selecting conversation:', roomId);
    
    try {
        // Find room data from conversations array
        const roomData = conversations.find(c => c.id == roomId);
        
        if (!roomData) {
            console.error('Room not found:', roomId);
            debugLog('Room not found in conversations array. Available IDs:', conversations.map(c => c.id));
            showError('Conversation not found');
            return;
        }
        
        debugLog('Selected room data:', roomData);
        
        currentRoomId = roomId;
        currentRoomData = roomData;
        
        // Update UI
        document.getElementById('chatHeader').style.display = 'flex';
        document.getElementById('chatInput').style.display = 'flex';
        
        const applicantName = roomData.applicantName || roomData.name || roomData.companyName || 'Unknown';
        document.getElementById('chatCompanyName').textContent = applicantName;
        document.getElementById('chatApplicantName').textContent = roomData.applicantName ? `Applicant: ${roomData.applicantName}` : 'Chat Room';
        document.getElementById('chatAvatar').textContent = applicantName[0].toUpperCase();
        document.getElementById('chatCreatedDate').textContent = roomData.createdAt ? `Created: ${formatDate(roomData.createdAt)}` : '';
        
        // Update active state in conversations list
        renderConversations(allConversations);
        
        // Mark messages as read if there are unread messages
        if (roomData.unreadCount > 0) {
            debugLog('Marking messages as read. Unread count:', roomData.unreadCount);
            await markMessagesAsRead(roomId);
        }
        
        // Load messages
        await loadMessages(roomId);
        
        // Focus on input
        document.getElementById('messageInput').focus();
        
    } catch (error) {
        console.error('Error selecting conversation:', error);
        debugLog('Error selecting conversation:', error.message);
        showError('Failed to open conversation');
    }
}

// Load messages for a room
async function loadMessages(roomId) {
    try {
        debugLog('Loading messages for room:', roomId);
        
        const messagesContainer = document.getElementById('messages');
        messagesContainer.innerHTML = `
            <div class="loading">
                <i class="fa-solid fa-spinner"></i> Loading messages...
            </div>`;
        
        const url = `${API_BASE_URL}/Chat/rooms/${roomId}/messages`;
        debugLog('Messages API URL:', url);
        
        const response = await fetch(url, {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${TOKEN}`,
                'Content-Type': 'application/json'
            }
        });

        debugLog('Messages Response Status:', response.status);
        
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errorText}`);
        }

        const responseData = await response.json();
        
        debugLog('Messages Raw Response:', responseData);
        
        // Handle different response formats
        let messages = [];
        if (Array.isArray(responseData)) {
            messages = responseData;
        } else if (responseData.data && Array.isArray(responseData.data)) {
            messages = responseData.data;
        } else if (responseData.messages && Array.isArray(responseData.messages)) {
            messages = responseData.messages;
        } else {
            console.warn('Unexpected messages response format:', responseData);
        }
        
        debugLog(`Loaded ${messages.length} messages`);
        
        renderMessages(messages);
        
    } catch (error) {
        console.error('Error loading messages:', error);
        debugLog('Error loading messages:', error.message);
        
        document.getElementById('messages').innerHTML = `
            <div class="error-message">
                <i class="fa-solid fa-exclamation-circle"></i>
                Failed to load messages
            </div>
            <div class="debug-info">
                Error: ${error.message}
                <br><br>
                Room ID: ${roomId}
                <br>
                Time: ${new Date().toLocaleString()}
            </div>
        `;
    }
}

// Render messages
function renderMessages(messages) {
    const container = document.getElementById('messages');
    const currentUserId = getCurrentUserId();
    
    debugLog('Rendering messages. Current User ID:', currentUserId);
    
    if (!messages || messages.length === 0) {
        container.innerHTML = `
            <div class="no-chat-selected">
                <i class="fa-solid fa-message"></i>
                <p>No messages yet. Start the conversation!</p>
            </div>`;
        return;
    }

    container.innerHTML = messages.map(msg => {
        // Determine if message is sent by current user
        let isSent = false;
        
        if (msg.senderId === currentUserId || msg.isSender) {
            isSent = true;
        } else if (currentRoomData) {
            // Alternative check: compare with room's entity ID
            isSent = msg.senderId === currentRoomData.id;
        }
        
        debugLog(`Message from ${msg.senderId}, isSent: ${isSent}`, msg);
        
        const time = formatMessageTime(msg.timestamp || msg.sentAt || msg.createdAt);
        
        return `
            <div class="message ${isSent ? 'sent' : 'received'}">
                <div class="message-content">${escapeHtml(msg.content || msg.message || '')}</div>
                <div class="msg-time">${time}</div>
            </div>
        `;
    }).join('');
    
    // Scroll to bottom
    setTimeout(() => {
        container.scrollTop = container.scrollHeight;
    }, 100);
}

// Send message
async function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    
    if (!text || !currentRoomId) return;
    
    const sendButton = document.getElementById('sendButton');
    sendButton.disabled = true;
    
    try {
        debugLog('Sending message to room:', currentRoomId);
        
        const response = await fetch(`${API_BASE_URL}/Chat/rooms/${currentRoomId}/messages`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${TOKEN}`
            },
            body: JSON.stringify({
                content: text
            })
        });

        debugLog('Send Message Response Status:', response.status);
        
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errorText}`);
        }
        
        input.value = '';
        
        // Reload messages
        await loadMessages(currentRoomId);
        
        // Refresh conversations list to update last message
        await loadConversations();
        
    } catch (error) {
        console.error('Error sending message:', error);
        debugLog('Error sending message:', error.message);
        alert('Failed to send message. Please try again.');
    } finally {
        sendButton.disabled = false;
        document.getElementById('messageInput').focus();
    }
}

// Mark messages as read
async function markMessagesAsRead(roomId) {
    try {
        debugLog('Marking messages as read for room:', roomId);
        
        const response = await fetch(`${API_BASE_URL}/Chat/rooms/${roomId}/read`, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${TOKEN}`,
                'Content-Type': 'application/json'
            }
        });
        
        debugLog('Mark Read Response Status:', response.status);
        
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errorText}`);
        }
        
        // Refresh conversations to update unread count
        setTimeout(loadConversations, 500);
        
    } catch (error) {
        console.error('Error marking messages as read:', error);
        debugLog('Error marking messages as read:', error.message);
    }
}

// Create new chat room
async function createNewChat() {
    const entityId = document.getElementById('entityIdInput').value.trim();
    const createButton = document.querySelector('.btn-create');
    
    if (!entityId) {
        alert('Please enter an ID');
        return;
    }
    
    // Validate UUID format
    const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
    if (!uuidRegex.test(entityId)) {
        alert('Please enter a valid UUID format');
        return;
    }
    
    createButton.disabled = true;
    createButton.textContent = 'Creating...';
    
    try {
        debugLog('Creating new chat with entityId:', entityId);
        
        const response = await fetch(`${API_BASE_URL}/Chat/rooms`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${TOKEN}`
            },
            body: JSON.stringify({
                entityId: entityId
            })
        });

        debugLog('Create Chat Response Status:', response.status);
        
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(errorText || 'Failed to create chat room');
        }
        
        const responseData = await response.json();
        debugLog('Create Chat Response:', responseData);
        
        closeNewChatModal();
        
        // Reload conversations
        await loadConversations();
        
        // Try to find and select the new conversation
        setTimeout(async () => {
            const newRoom = conversations.find(c => c.entityId === entityId);
            if (newRoom) {
                await selectConversation(newRoom.id);
            }
        }, 500);
        
    } catch (error) {
        console.error('Error creating chat:', error);
        debugLog('Error creating chat:', error.message);
        alert('Failed to create chat: ' + error.message);
    } finally {
        createButton.disabled = false;
        createButton.textContent = 'Create Chat';
    }
}

// Show error in chat area
function showError(message) {
    document.getElementById('messages').innerHTML = `
        <div class="error-message">
            <i class="fa-solid fa-exclamation-triangle"></i>
            ${message}
        </div>
    `;
}

// Modal functions
function openNewChatModal() {
    document.getElementById('newChatModal').classList.add('show');
    document.getElementById('entityIdInput').value = '';
    setTimeout(() => {
        document.getElementById('entityIdInput').focus();
    }, 100);
}

function closeNewChatModal() {
    document.getElementById('newChatModal').classList.remove('show');
}

// Handle Enter key
function handleKeyPress(event) {
    if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
    }
}

// Format time for conversation list
function formatTime(timestamp) {
    if (!timestamp) return '';
    
    const date = new Date(timestamp);
    const now = new Date();
    const diff = now - date;
    const minutes = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days = Math.floor(diff / 86400000);
    
    if (minutes < 1) return 'Just now';
    if (minutes < 60) return `${minutes}m`;
    if (hours < 24) return `${hours}h`;
    if (days < 7) return `${days}d`;
    
    return date.toLocaleDateString('en-US', { 
        month: 'short', 
        day: 'numeric'
    });
}

// Format date for display
function formatDate(timestamp) {
    if (!timestamp) return '';
    
    const date = new Date(timestamp);
    return date.toLocaleDateString('en-US', { 
        year: 'numeric',
        month: 'short', 
        day: 'numeric'
    });
}

// Format time for messages
function formatMessageTime(timestamp) {
    if (!timestamp) return '';
    
    const date = new Date(timestamp);
    const now = new Date();
    const diff = now - date;
    const minutes = Math.floor(diff / 60000);
    
    if (minutes < 1) return 'Just now';
    if (minutes < 60) return `${minutes}m ago`;
    
    const isToday = now.toDateString() === date.toDateString();
    if (isToday) {
        return date.toLocaleTimeString('en-US', { 
            hour: '2-digit', 
            minute: '2-digit'
        });
    }
    
    return date.toLocaleDateString('en-US', { 
        month: 'short', 
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
}

// Escape HTML to prevent XSS
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Toggle debug mode (Press Ctrl+Shift+D)
document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.shiftKey && e.key === 'D') {
        isDebugMode = !isDebugMode;
        const debugConsole = document.getElementById('debugConsole');
        debugConsole.style.display = isDebugMode ? 'block' : 'none';
        console.log('Debug mode:', isDebugMode ? 'ON' : 'OFF');
    }
});

// Close modal on outside click
document.getElementById('newChatModal').addEventListener('click', function(e) {
    if (e.target === this) {
        closeNewChatModal();
    }
});

// Close modal on Escape key
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeNewChatModal();
    }
});

// Initialize
document.addEventListener('DOMContentLoaded', function() {
    console.log('Chat application initializing...');
    
    if (!TOKEN) {
        alert('Please login first');
        window.location.href = '/login.html';
        return;
    }
    
    debugLog('Token found:', TOKEN.substring(0, 50) + '...');
    
    // Decode and display user info
    const decoded = decodeJWT(TOKEN);
    if (decoded) {
        console.log('User info:', {
            name: decoded["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name"],
            email: decoded["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress"],
            role: decoded["http://schemas.microsoft.com/ws/2008/06/identity/claims/role"],
            userId: getCurrentUserId()
        });
    }
    
    loadConversations();
    
    // Auto-refresh conversations every 30 seconds
    setInterval(loadConversations, 30000);
    
    // Auto-refresh messages if a room is selected
    setInterval(() => {
        if (currentRoomId) {
            loadMessages(currentRoomId);
        }
    }, 10000);
});

</script>
