<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Professional CV Templates | Smart Career Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  :root {
    --primary: #3498DB;
    --primary-hover: #155fc4;
    --success: #1cc88a;
    --danger: #e74a3b;
    --warning: #f6c23e;
    --bg: #f8fafc;
    --card-bg: #ffffff;
    --text-dark: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --radius: 20px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg);
    margin: 0;
    padding: clamp(16px, 3vw, 30px) clamp(12px, 3vw, 20px);
    color: var(--text-dark);
    min-height: 100vh;
  }

  .container {
    max-width: 1200px;
    margin: clamp(30px, 5vw, 50px) auto;
    padding: 0;
  }

  /* Header Section */
  .header-section {
    text-align: center;
    margin-bottom: clamp(30px, 5vw, 40px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .header-section h1 {
    font-size: clamp(1.5rem, 5vw, 2.2rem);
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--text-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .header-section h1 i {
    color: var(--primary);
  }

  .header-section p {
    color: var(--text-muted);
    font-size: clamp(0.9rem, 2vw, 1rem);
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* Search & Filter */
  .controls-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 30px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    max-width: 500px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 12px 16px 12px 44px;
    border-radius: 12px;
    border: 1px solid var(--border);
    font-size: 0.95rem;
    outline: none;
    background: var(--card-bg);
    transition: all 0.3s;
    font-family: inherit;
  }

  .search-box input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(78, 115, 223, 0.1);
  }

  .search-box i {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
  }

  .refresh-btn {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--primary);
    padding: 12px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s;
    font-size: 0.95rem;
    min-width: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .refresh-btn:hover {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  /* Grid Layout */
  .templates-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: clamp(16px, 2.5vw, 30px);
  }

  /* Premium Card Design */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    border: 1px solid #f1f5f9;
  }

  .card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  }

  .preview-container {
    height: clamp(140px, 20vw, 180px);
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  .preview-container i {
    font-size: clamp(40px, 8vw, 60px);
    color: white;
    z-index: 2;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
  }

  .preview-overlay {
    position: absolute;
    width: 120%;
    height: 120%;
    background: rgba(255,255,255,0.15);
    transform: rotate(-15deg);
    top: -20%;
  }

  .card-content {
    padding: clamp(16px, 2.5vw, 25px);
    text-align: center;
    flex-grow: 1;
  }

  .card-content h3 {
    margin: 0 0 10px 0;
    font-size: clamp(1rem, 2vw, 1.2rem);
    font-weight: 700;
  }

  .card-content p {
    color: var(--text-muted);
    font-size: clamp(0.8rem, 1.5vw, 0.9rem);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    padding: 0 clamp(16px, 2.5vw, 25px) clamp(16px, 2.5vw, 25px);
  }

  .download-btn {
    width: 100%;
    background: var(--primary);
    color: white;
    border: none;
    padding: clamp(10px, 1.5vw, 12px);
    border-radius: 12px;
    cursor: pointer;
    font-size: clamp(0.8rem, 1.5vw, 0.9rem);
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
    transition: all 0.2s;
    font-family: inherit;
  }

  .download-btn:hover {
    background: var(--primary-hover);
    box-shadow: 0 4px 12px rgba(78, 115, 223, 0.3);
    transform: translateY(-1px);
  }

  .download-btn:active {
    transform: scale(0.98);
  }

  /* Badge */
  .file-type-badge {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(0,0,0,0.2);
    color: white;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 0.7rem;
    font-weight: 700;
    backdrop-filter: blur(4px);
    z-index: 5;
  }

  /* Loading & Empty States */
  .state-message {
    grid-column: 1 / -1;
    text-align: center;
    padding: 50px 20px;
    color: var(--text-muted);
  }

  .state-message i {
    display: block;
    font-size: 3rem;
    margin-bottom: 15px;
    color: #cbd5e1;
  }

  .state-message p {
    font-size: 1rem;
  }

  .error-state i {
    color: var(--danger);
  }

  /* ===== MODAL STYLES ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    z-index: 10000;
    animation: fadeIn 0.2s ease;
    padding: 20px;
  }

  .modal-overlay.active {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-content {
    background: var(--card-bg);
    border-radius: 16px;
    padding: clamp(20px, 4vw, 28px);
    max-width: 500px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    position: relative;
    animation: slideUp 0.3s ease;
    text-align: center;
  }

  .modal-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    display: block;
  }

  .modal-content h3 {
    margin: 0 0 10px 0;
    font-size: clamp(1.1rem, 2.5vw, 1.3rem);
    color: #1a1a1a;
    font-weight: 700;
  }

  .modal-content p {
    color: var(--text-muted);
    margin: 0 0 24px 0;
    font-size: 0.95rem;
    line-height: 1.6;
  }

  .modal-footer {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-modal {
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    transition: all 0.3s;
    min-width: 100px;
    font-family: inherit;
  }

  .btn-modal:hover {
    transform: translateY(-1px);
  }

  .btn-modal-primary {
    background: var(--primary);
    color: white;
  }

  .btn-modal-primary:hover {
    background: var(--primary-hover);
  }

  .btn-modal-success {
    background: var(--success);
    color: white;
  }

  .btn-modal-success:hover {
    background: #17a673;
  }

  .loading-spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    border-top-color: white;
    animation: spin 0.6s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from {
      transform: translateY(30px);
      opacity: 0;
    }
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  /* ===== RESPONSIVE STYLES ===== */
  @media screen and (max-width: 768px) {
    .templates-grid {
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .preview-container {
      height: 150px;
    }
  }

  @media screen and (max-width: 480px) {
    body {
      padding: 10px 8px;
    }
    .header-section {
      margin-bottom: 25px;
    }
    .controls-bar {
      margin-bottom: 20px;
    }
    .templates-grid {
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .card-actions {
      flex-direction: row;
    }
    .modal-content {
      padding: 18px 14px;
      width: 95%;
    }
    .modal-icon {
      font-size: 2.5rem;
    }
  }
</style>
</head>

<body>

<div class="container">
  <!-- Header -->
  <div class="header-section">
    <div>
      <h1>
        <i class="fa-solid fa-file-lines"></i>
        Professional CV Templates
      </h1>
      <p>Choose from our curated list of high-impact CV templates. Built for modern careers and ATS compatibility.</p>
    </div>
  </div>

  <!-- Search & Controls -->
  <div class="controls-bar">
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" placeholder="Search templates by name..." oninput="filterTemplates()">
    </div>
    <button class="refresh-btn" onclick="fetchTemplates()" title="Refresh Templates">
      <i class="fa-solid fa-arrows-rotate"></i>
    </button>
  </div>

  <!-- Templates Grid -->
  <div id="templatesContainer" class="templates-grid">
    <div class="state-message">
      <i class="fas fa-circle-notch fa-spin"></i>
      <p>Loading templates...</p>
    </div>
  </div>
</div>

<!-- Success/Error Modal -->
<div class="modal-overlay" id="notificationModal">
  <div class="modal-content">
    <i class="fa-solid fa-circle-check modal-icon" id="notificationIcon" style="color: var(--success);"></i>
    <h3 id="notificationTitle">Success</h3>
    <p id="notificationMessage">Operation completed successfully.</p>
    <div class="modal-footer">
      <button class="btn-modal btn-modal-success" id="notificationCloseBtn">
        <i class="fa-solid fa-check"></i> OK
      </button>
    </div>
  </div>
</div>

<script>
  const API_BASE_URL = "http://smartcareerhub.runasp.net/api";
  const TOKEN = localStorage.getItem("authToken");

  const container = document.getElementById("templatesContainer");
  let allTemplates = [];

  // ===== FETCH TEMPLATES (Student View) =====
  async function fetchTemplates() {
    container.innerHTML = `
      <div class="state-message">
        <i class="fas fa-circle-notch fa-spin"></i>
        <p>Loading templates...</p>
      </div>`;

    try {
      const response = await fetch(`${API_BASE_URL}/student/cv/templates`, {
        method: 'GET',
        headers: {
          'Authorization': `Bearer ${TOKEN}`,
          'Content-Type': 'application/json'
        }
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }

      const data = await response.json();
      
      // Handle different response structures
      if (Array.isArray(data)) {
        allTemplates = data;
      } else if (data && data.data && Array.isArray(data.data)) {
        allTemplates = data.data;
      } else if (data && data.templates && Array.isArray(data.templates)) {
        allTemplates = data.templates;
      } else {
        allTemplates = [];
      }

      renderTemplates(allTemplates);
    } catch (error) {
      console.error('Error fetching templates:', error);
      container.innerHTML = `
        <div class="state-message error-state">
          <i class="fa-solid fa-circle-exclamation"></i>
          <p>Failed to load templates. Please try again.</p>
          <button class="btn-modal btn-modal-primary" style="margin-top: 15px;" onclick="fetchTemplates()">
            <i class="fa-solid fa-arrows-rotate"></i> Retry
          </button>
        </div>`;
    }
  }

  // ===== DOWNLOAD TEMPLATE =====
  async function downloadTemplate(templateId, templateName) {
    if (!templateId) {
      showNotification('error', 'Download Failed', 'Invalid template ID.');
      return;
    }

    // Show loading state on the download button (optional, but good UX)
    const downloadBtn = event?.target?.closest('.download-btn');
    const originalText = downloadBtn ? downloadBtn.innerHTML : 'Downloading...';
    if (downloadBtn) {
      downloadBtn.innerHTML = '<span class="loading-spinner"></span> Downloading...';
      downloadBtn.disabled = true;
    }

    try {
      // Construct download URL as per requirement
      const downloadUrl = `${API_BASE_URL}/student/cv/download-template/${templateId}`;
      
      // Fetch the file with authorization token
      const response = await fetch(downloadUrl, {
        method: 'GET',
        headers: {
          'Authorization': `Bearer ${TOKEN}`
        }
      });

      if (!response.ok) {
        const errorText = await response.text().catch(() => '');
        throw new Error(`HTTP ${response.status}: ${errorText || response.statusText}`);
      }

      // Get the blob from response
      const blob = await response.blob();
      
      // Create a temporary URL for the blob
      const blobUrl = window.URL.createObjectURL(blob);
      
      // Create an anchor element and trigger download
      const a = document.createElement('a');
      a.href = blobUrl;
      // Extract filename from Content-Disposition header if possible, otherwise use template name
      let filename = `${templateName || 'template'}.docx`;
      const contentDisposition = response.headers.get('Content-Disposition');
      if (contentDisposition && contentDisposition.includes('filename=')) {
        const match = contentDisposition.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
        if (match && match[1]) {
          filename = match[1].replace(/['"]/g, '');
        }
      }
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      
      // Clean up the blob URL
      window.URL.revokeObjectURL(blobUrl);
      
      showNotification('success', 'Download Started', `"${templateName}" is being downloaded.`);
    } catch (error) {
      console.error('Error downloading template:', error);
      showNotification('error', 'Download Failed', error.message || 'Failed to download the template. Please try again.');
    } finally {
      if (downloadBtn) {
        downloadBtn.innerHTML = originalText;
        downloadBtn.disabled = false;
      }
    }
  }

  // ===== NOTIFICATION MODAL =====
  function showNotification(type, title, message) {
    const icon = document.getElementById('notificationIcon');
    const titleEl = document.getElementById('notificationTitle');
    const messageEl = document.getElementById('notificationMessage');
    const closeBtn = document.getElementById('notificationCloseBtn');

    if (type === 'success') {
      icon.className = 'fa-solid fa-circle-check modal-icon';
      icon.style.color = 'var(--success)';
      closeBtn.className = 'btn-modal btn-modal-success';
    } else {
      icon.className = 'fa-solid fa-circle-exclamation modal-icon';
      icon.style.color = 'var(--danger)';
      closeBtn.className = 'btn-modal btn-modal-danger';
    }

    titleEl.textContent = title;
    messageEl.textContent = message;
    
    document.getElementById('notificationModal').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeNotification() {
    document.getElementById('notificationModal').classList.remove('active');
    document.body.style.overflow = '';
  }

  // ===== RENDER TEMPLATES (Only Download Button - No Delete/Upload) =====
  function renderTemplates(templates) {
    container.innerHTML = "";
    
    if (templates.length === 0) {
      container.innerHTML = `
        <div class="state-message">
          <i class="fa-solid fa-folder-open"></i>
          <p>No templates found.</p>
        </div>`;
      return;
    }

    templates.forEach(t => {
      const card = document.createElement("div");
      card.className = "card";
      
      const templateName = t.title || t.name || 'Untitled Template';
      const templateDesc = t.description || 'A professional CV template ready to download and use.';
      const templateFormat = t.fileType || t.format || 'DOCX';
      const templateId = t.id || t.templateId;
      
      if (!templateId) {
        console.warn('Template missing ID:', t);
        return;
      }
      
      // Generate a consistent color based on template id
      const colors = ['#4e73df', '#1cc88a', '#f6c23e', '#e74a3b', '#6f42c1', '#20c9a6'];
      const colorIndex = (templateId % colors.length);
      const color = colors[colorIndex];

      card.innerHTML = `
        <div class="preview-container" style="background: ${color}">
          <div class="preview-overlay"></div>
          <span class="file-type-badge">${escapeHTML(templateFormat)}</span>
          <i class="fa-solid fa-file-word"></i>
        </div>

        <div class="card-content">
          <h3>${escapeHTML(templateName)}</h3>
          <p>${escapeHTML(templateDesc)}</p>
        </div>

        <div class="card-actions">
          <button class="download-btn" onclick="downloadTemplate(${templateId}, '${escapeHTML(templateName).replace(/'/g, "\\'")}')">
            <i class="fa-solid fa-download"></i>
            Download Template
          </button>
        </div>
      `;

      container.appendChild(card);
    });
  }

  // ===== FILTER TEMPLATES =====
  function filterTemplates() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allTemplates.filter(t => {
      const name = (t.title || t.name || '').toLowerCase();
      const desc = (t.description || '').toLowerCase();
      return name.includes(query) || desc.includes(query);
    });
    renderTemplates(filtered);
  }

  // ===== UTILITY FUNCTIONS =====
  function escapeHTML(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ===== EVENT LISTENERS =====
  document.getElementById('notificationModal').addEventListener('click', function(e) {
    if (e.target === this) closeNotification();
  });
  document.getElementById('notificationCloseBtn').addEventListener('click', closeNotification);
  
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeNotification();
    }
  });

  // ===== INITIALIZATION =====
  window.addEventListener('DOMContentLoaded', () => {
    if (!TOKEN) {
      container.innerHTML = `
        <div class="state-message error-state">
          <i class="fa-solid fa-lock"></i>
          <p>Please log in to view templates.</p>
        </div>`;
      return;
    }
    
    fetchTemplates();
  });
</script>

</body>
</html>
