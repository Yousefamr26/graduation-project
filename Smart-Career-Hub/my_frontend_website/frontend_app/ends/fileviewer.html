<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no, viewport-fit=cover">
  <title>File Viewer · Smart Career Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --surface: #ffffff;
      --bg: #f5f7fe;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e8edf5;
      --shadow-sm: 0 8px 20px rgba(0,0,0,0.04);
      --radius-xl: 28px;
      --radius-md: 16px;
      --transition: 0.3s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      flex-wrap: wrap;
      gap: 12px;
    }
    .toolbar .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toolbar .btn {
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 8px 16px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: var(--transition);
      border: 1px solid #475569;
      background: #334155;
      color: white;
    }
    .toolbar .btn:hover { background: #475569; }
    .toolbar .timer {
      font-weight: 700;
      font-size: 1.1rem;
      background: #4f46e5;
      padding: 8px 18px;
      border-radius: 30px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .iframe-container {
      flex: 1;
      width: 100%;
      position: relative;
    }
    .iframe-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    .info-bar {
      padding: 10px 24px;
      background: #1e293b;
      border-top: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.85rem;
    }
    .info-bar .badge {
      background: #4f46e5;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 600;
    }

    #toastContainer {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .toast-popup {
      background: #0f172a;
      color: white;
      padding: 14px 28px;
      border-radius: 50px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideUp 0.35s ease;
      font-size: 0.9rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      max-width: 350px;
    }
    .toast-popup.error { background: #dc2626; }
    .toast-popup.success { background: #059669; }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-left">
    <a href="javascript:history.back()" class="btn"><i class="bi bi-arrow-left"></i> Back</a>
    <span id="fileTitle" class="fw-semibold">Loading file...</span>
  </div>
  <div class="d-flex align-items-center gap-3">
    <span class="timer" id="timerDisplay"><i class="bi bi-stopwatch"></i> 00:00</span>
    <button class="btn" onclick="window.markComplete()"><i class="bi bi-check-lg"></i> Mark Complete</button>
  </div>
</div>

<div class="iframe-container">
  <iframe id="contentFrame" src="" allowfullscreen></iframe>
</div>

<div class="info-bar">
  <span>📄 <span id="fileType">-</span></span>
  <span>🔗 <span id="fileUrl" class="text-truncate" style="max-width:300px;display:inline-block;">-</span></span>
  <span class="badge" id="progressBadge">In Progress</span>
</div>

<div id="toastContainer"></div>

<script>
  (function() {
    const API_BASE = "http://smartcareerhub.runasp.net/api";
    const TOKEN = localStorage.getItem("authToken") || "";

    const params = new URLSearchParams(window.location.search);
    const itemId = params.get('itemid') || '';
    const itemType = params.get('itemtype') || 'material';
    
    const storageKey = `file_${itemId}`;
    const storedData = JSON.parse(localStorage.getItem(storageKey) || '{}');

    const fileUrl = storedData.url || '';
    const itemTypeFromStorage = storedData.itemType || itemType;
    const titleFromStorage = storedData.title || '';

    const roadmapId = params.get('roadmapId') || '';

    const iframe = document.getElementById("contentFrame");
    const fileTitle = document.getElementById("fileTitle");
    const fileTypeSpan = document.getElementById("fileType");
    const fileUrlSpan = document.getElementById("fileUrl");
    const timerDisplay = document.getElementById("timerDisplay");

    let seconds = 0;
    let timerInterval;
    let completed = false;

    function toast(msg, type='info') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast-popup ${type==='error'?'error':(type==='success'?'success':'')}`;
      t.innerHTML = `<i class="bi bi-${type==='error'?'exclamation-circle':(type==='success'?'check-circle':'info-circle')}"></i> ${msg}`;
      c.appendChild(t);
      setTimeout(() => t.remove(), 4500);
    }

    function updateTimer() {
      seconds++;
      const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
      const secs = (seconds % 60).toString().padStart(2, '0');
      timerDisplay.innerHTML = `<i class="bi bi-stopwatch"></i> ${mins}:${secs}`;
    }

    async function updateProgress() {
      if (completed) return;
      try {
        await fetch(`${API_BASE}/student/roadmaps/progress`, {
          method: "POST",
          headers: { "Authorization": `Bearer ${TOKEN}`, "Content-Type": "application/json" },
          body: JSON.stringify({ roadmapId: parseInt(roadmapId), itemId: parseInt(itemId), itemType })
        });
      } catch (e) {
        console.warn("Progress update failed", e);
      }
    }

    window.markComplete = async function() {
      if (completed) return;
      completed = true;
      try {
        const res = await fetch(`${API_BASE}/student/roadmaps/progress`, {
          method: "POST",
          headers: { "Authorization": `Bearer ${TOKEN}`, "Content-Type": "application/json" },
          body: JSON.stringify({ roadmapId: parseInt(roadmapId), itemId: parseInt(itemId), itemType })
        });
        if (res.ok) {
          toast("✅ Marked as complete!", "success");
          document.getElementById("progressBadge").textContent = "Completed";
          document.getElementById("progressBadge").style.background = "#059669";
        } else {
          toast("Failed to mark complete", "error");
          completed = false;
        }
      } catch {
        toast("Failed to mark complete", "error");
        completed = false;
      }
    };

    // Initialize
    if (!TOKEN) {
      toast("Please log in.", "error");
    } else if (!fileUrl) {
      fileTitle.textContent = "No file URL provided";
      toast("No file to display", "error");
    } else {
      iframe.src = fileUrl;
      fileTitle.textContent = fileUrl.split('/').pop() || 'File';
      fileTypeSpan.textContent = itemTypeFromStorage;
      fileTitle.textContent = titleFromStorage || fileUrl.split('/').pop() || 'File';
      fileUrlSpan.title = fileUrl;

      // Start timer
      timerInterval = setInterval(updateTimer, 1000);

      // Call progress every 60 seconds
      setInterval(() => {
        if (!completed) updateProgress();
      }, 60000);
    }
  })();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
