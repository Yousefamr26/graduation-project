<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no">
  <title>Courses Center</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --primary: #3498DB;
      --primary-dark: #155fc4;
      --success: #1cc88a;
      --warning: #f6c23e;
      --danger: #e74a3b;
      --danger-dark: #c0392b;
      --dark: #2d3748;
      --bg: #f8fafc;
      --white: #ffffff;
      --border: #e2e8f0;
      --text-muted: #7f8c8d;
      --radius: 20px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
      --transition: 0.25s ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* topbar */
    .topbar {
      background: var(--white);
      padding: clamp(12px, 2.5vw, 20px) clamp(16px, 4vw, 32px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 50;
      flex-wrap: wrap;
      gap: 16px;
    }
    .title-box h1 {
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
    }
    .title-box p {
      margin: 4px 0 0;
      color: var(--text-muted);
      font-size: clamp(0.7rem, 1.6vw, 0.85rem);
    }
    .btn-quiz {
      background: #ede9fe;
      color: #155fc4;
    }

    .btn-quiz:hover {
      background: #ddd6fe;
    }
    .center-box {
      display: flex;
      gap: 12px;
      flex-grow: 1;
      max-width: 550px;
      margin: 0 20px;
      flex-wrap: wrap;
    }
    #searchBar, #statusFilter {
      padding: 10px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 0.9rem;
      background: white;
      transition: var(--transition);
      outline: none;
      font-family: inherit;
    }
    #searchBar { flex: 2; min-width: 160px; }
    #statusFilter { flex: 1; min-width: 120px; }
    #searchBar:focus, #statusFilter:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(52,152,219,0.15);
    }
    .create-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 22px;
      border-radius: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: var(--transition);
      white-space: nowrap;
      background: linear-gradient(135deg, #3498db, #2980b9);
      box-shadow: 0 4px 10px rgba(52,152,219,0.3);
    }
    .create-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(52,152,219,0.35);
    }
    /* container & grid */
    .container {
      padding: clamp(16px, 4vw, 32px);
      flex: 1;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }
    .card {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid #edf2f7;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-sm);
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 25px -10px rgba(0,0,0,0.08);
    }
    .card-image {
      height: clamp(140px, 20vw, 170px);
      position: relative;
      background: #e9edf2;
    }
    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .badge {
      position: absolute;
      top: 14px;
      right: 14px;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      backdrop-filter: blur(4px);
    }
    .badge.published { background: #d1fae5; color: #065f46; }
    .badge.draft { background: #fef3c7; color: #92400e; }
    .card-content {
      padding: 18px 20px 20px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .level-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-bottom: 12px;
      width: fit-content;
    }
    .level-badge.beginner { background: #ebf8ff; color: #3182ce; }
    .level-badge.intermediate { background: #faf5ff; color: #155fc4; }
    .level-badge.advanced { background: #fff5f5; color: #e53e3e; }
    .card-content h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .role-text {
      color: #64748b;
      font-size: 0.85rem;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      color: #718096;
      font-size: 0.8rem;
      margin: 10px 0 8px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .price {
      font-size: 1.1rem;
      font-weight: 800;
      margin: 8px 0 12px;
    }
    .progress-box { margin-bottom: 16px; }
    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .progress {
      height: 7px;
      background: #edf2f7;
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--success);
      border-radius: 10px;
      width: 0%;
    }
    .card-buttons {
      display: flex;
      gap: 8px;
      border-top: 1px solid #f1f5f9;
      padding-top: 16px;
      margin-top: auto;
      flex-wrap: wrap;
    }
    .card-buttons button {
      flex: 1;
      min-width: 60px;
      padding: 10px 6px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
      transition: var(--transition);
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .btn-edit { background: #f1f5f9; color: #1e293b; }
    .btn-edit:hover { background: #e2e8f0; }
    .btn-analysis { background: #ebf8ff; color: var(--primary); }
    .btn-analysis:hover { background: #d6eeff; }
    .btn-delete {
      background: #fff5f5;
      color: var(--danger);
      max-width: 48px;
      flex: 0 0 48px !important;
    }
    .btn-delete:hover { background: #ffe0e0; }
    /* empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 70px 20px;
      color: #94a3b8;
    }
    .empty-state i { font-size: 3.5rem; margin-bottom: 18px; color: #cbd5e1; }
    /* modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 16px;
      animation: fadeIn 0.2s;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: white;
      width: 100%;
      max-width: 650px;
      max-height: 85vh;
      border-radius: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.25s;
    }
    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: white;
      z-index: 10;
    }
    .modal-close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #7f8c8d;
      padding: 5px 10px;
      border-radius: 8px;
    }
    .modal-close-btn:hover { background: #f1f5f9; }
    #modalContent { padding: 20px 24px 28px; }
    .modal-section {
      background: #f9fafb;
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
    }
    .item-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #e9edf2;
    }
    .item-row:last-child { border: none; }
    /* confirm popup */
    .modal-confirm {
      background: white;
      width: 90%;
      max-width: 400px;
      border-radius: 24px;
      padding: 28px 24px;
      text-align: center;
      animation: slideUp 0.25s;
    }
    .modal-icon-large { font-size: 3rem; margin-bottom: 12px; }
    .btn-modal {
      padding: 10px 22px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      margin: 8px;
      transition: var(--transition);
    }
    .btn-danger { background: #e74a3b; color: white; }
    .btn-danger:hover { background: #c0392b; }
    .btn-secondary { background: #e9edf3; color: #334155; }
    .btn-secondary:hover { background: #d1d9e6; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    /* responsive */
    @media (max-width: 700px) {
      .topbar { flex-direction: column; align-items: stretch; }
      .center-box { margin: 0; max-width: 100%; }
      .grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .card-buttons button { font-size: 0.75rem; padding: 8px 4px; }
      .btn-delete { max-width: 44px; flex: 0 0 44px !important; }
    }
  </style>
</head>
<body>
<div class="topbar">
  <div class="title-box">
    <h1><i class="fa fa-map-location-dot" style="color: var(--primary);"></i> Courses Center</h1>
    <p>Create and manage training courses for students</p>
  </div>
  <div class="center-box">
    <input type="text" id="searchBar" placeholder="Search by title or role..." oninput="filterRoadmaps()">
    <select id="statusFilter" onchange="filterRoadmaps()">
      <option value="">All Status</option>
      <option value="draft">Draft</option>
      <option value="published">Published</option>
    </select>
  </div>
  <button class="create-btn" onclick="startNewRoadmap()"><i class="fa-solid fa-plus-circle"></i> New Roadmap</button>
</div>

<div class="container">
  <div id="roadmapGrid" class="grid"></div>
</div>

<!-- Analysis Modal -->
<div class="modal-overlay" id="analysisModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Roadmap Intelligence</h3>
      <button class="modal-close-btn" onclick="closeModal('analysisModal')"><i class="fa fa-times-circle"></i></button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<!-- Delete Confirmation -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal-confirm">
    <i class="fa-solid fa-triangle-exclamation modal-icon-large" style="color: var(--danger);"></i>
    <h3>Delete Roadmap?</h3>
    <p id="deleteMessage">This action cannot be undone.</p>
    <div>
      <button class="btn-modal btn-danger" id="deleteConfirmBtn"><i class="fa-solid fa-trash"></i> Delete</button>
      <button class="btn-modal btn-secondary" id="deleteCancelBtn"><i class="fa-solid fa-xmark"></i> Cancel</button>
    </div>
  </div>
</div>

<!-- Generic toast popup (non-alert) -->
<div id="toastContainer" style="position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 12px;"></div>

<script>
  (function() {
    const API_BASE_URL = "http://smartcareerhub.runasp.net/api";
    const API_Files_URL = "http://smartcareerhub.runasp.net";
    const TOKEN = localStorage.getItem("authToken") || "";
    const STORAGE_KEY = "roadmaps_cache";
    
    let allRoadmaps = [];
    let pendingDeleteId = null;

    // ---------- Toast instead of alert ----------
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      const bg = type === 'error' ? '#e74a3b' : (type === 'success' ? '#1cc88a' : '#2d3748');
      toast.style.cssText = `
        background: ${bg}; color: white; padding: 12px 20px; border-radius: 14px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15); font-weight: 500; max-width: 320px;
        display: flex; align-items: center; gap: 12px; animation: slideUp 0.25s;
        font-size: 0.9rem;
      `;
      toast.innerHTML = `<i class="fa-solid ${type==='error'?'fa-circle-exclamation':(type==='success'?'fa-circle-check':'fa-circle-info')}"></i> ${message}`;
      container.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 4000);
    }

    // ---------- Helpers ----------
    function formatPrice(price) {
      if (!price || isNaN(price) || Number(price) === 0) return "Free";
      return Number(price).toLocaleString() + " EGP";
    }

    function escapeHTML(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ---------- Modal controls ----------
    function openModal(id) {
      document.getElementById(id).classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
      document.body.style.overflow = '';
    }

    // ---------- Render grid ----------
    function renderRoadmaps(list) {
      const grid = document.getElementById('roadmapGrid');
      if (!list.length) {
        grid.innerHTML = `<div class="empty-state"><i class="fa-solid fa-map"></i><p>No roadmaps found</p><small>Create your first roadmap!</small></div>`;
        return;
      }
      grid.innerHTML = '';
      list.forEach(r => {
        const status = (r.isPublished || r.status === 'published' || r.status === 'Published') ? 'published' : 'draft';
        const level = r.level || 'Beginner';
        const cover = r.coverImage;
        const title = r.title || 'Untitled Roadmap';
        const targetRole = r.targetRole || 'General';
        const students = r.studentsCount || r.students || 0;
        const completion = r.successRate || r.completion || 0;
        const duration = r.duration || '3 months';
        const price = r.price ?? 0;
        
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-image">
            <img src="${API_Files_URL+cover}" alt="${escapeHTML(title)}">
            <span class="badge ${status}">${status}</span>
          </div>
          <div class="card-content">
            <span class="level-badge ${level.toLowerCase()}">${level}</span>
            <h3>${escapeHTML(title)}</h3>
            <div class="role-text"><i class="fa-solid fa-briefcase"></i> ${escapeHTML(targetRole)}</div>
            <div class="meta">
              <span><i class="fa-solid fa-graduation-cap"></i> ${students}</span>
              <span><i class="fa-solid fa-clock"></i> ${escapeHTML(duration)}</span>
            </div>
            <div class="price">${formatPrice(price)}</div>
            <div class="progress-box">
              <div class="progress-text">Success Rate <span>${completion}%</span></div>
              <div class="progress"><div class="progress-bar" style="width:${completion}%"></div></div>
            </div>
            <div class="card-buttons">
              <button class="btn-edit" data-id="${r.id}"><i class="fa-solid fa-edit"></i> Edit</button>
              <button class="btn-analysis" data-id="${r.id}"><i class="fa-solid fa-chart-line"></i> Analysis</button>
              <button class="btn-quiz" data-id="${r.id}">
                <i class="fa-solid fa-wand-magic-sparkles"></i> AI Quiz
              </button>
              <button class="btn-delete" data-id="${r.id}" data-title="${escapeHTML(title).replace(/"/g, '&quot;')}"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
      document.querySelectorAll('.btn-quiz').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');

          window.location.href = `generateAIQuiz.html?id=${id}`;
        });
      });
      // Attach event listeners
      document.querySelectorAll('.btn-edit').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          window.location.href = `create-roadmap.html?id=${id}`;
        });
      });
      document.querySelectorAll('.btn-analysis').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          showAnalysis(id);
        });
      });
      document.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          const title = e.currentTarget.getAttribute('data-title') || 'this roadmap';
          confirmDelete(id, title);
        });
      });
    }

    // ---------- Analysis modal (detailed) ----------
    
    // ---------- Analysis modal (FULL DATA) ----------
    function showAnalysis(id) {
      const r = allRoadmaps.find(x => x.id == id);

      if (!r) {
        showToast('Roadmap not found', 'error');
        return;
      }

      const modalContent = document.getElementById('modalContent');

      function renderValue(value) {
        if (value === null || value === undefined || value === '') {
          return `<span style="color:#94a3b8;">N/A</span>`;
        }

        // Array
        if (Array.isArray(value)) {
          if (!value.length) {
            return `<span style="color:#94a3b8;">Empty</span>`;
          }

          return `
            <div style="display:flex;flex-direction:column;gap:10px;width:100%;">
              ${value.map((item, index) => `
                <div style="
                  background:#fff;
                  border:1px solid #e2e8f0;
                  border-radius:12px;
                  padding:12px;
                ">
                  <div style="
                    font-weight:700;
                    margin-bottom:10px;
                    color:#3498db;
                  ">
                    Item ${index + 1}
                  </div>

                  ${
                    typeof item === 'object'
                      ? Object.entries(item).map(([k, v]) => `
                          <div class="item-row">
                            <span style="font-weight:600;">${escapeHTML(k)}</span>
                            <span>${renderValue(v)}</span>
                          </div>
                        `).join('')
                      : `<span>${escapeHTML(String(item))}</span>`
                  }
                </div>
              `).join('')}
            </div>
          `;
        }

        // Object
        if (typeof value === 'object') {
          return `
            <div style="
              display:flex;
              flex-direction:column;
              gap:8px;
              width:100%;
            ">
              ${Object.entries(value).map(([k, v]) => `
                <div class="item-row">
                  <span style="font-weight:600;">${escapeHTML(k)}</span>
                  <span>${renderValue(v)}</span>
                </div>
              `).join('')}
            </div>
          `;
        }

        // Boolean
        if (typeof value === 'boolean') {
          return value
            ? `<span style="color:#1cc88a;font-weight:600;">Yes</span>`
            : `<span style="color:#e74a3b;font-weight:600;">No</span>`;
        }

        // Image URL
        if (
          typeof value === 'string' &&
          (
            value.includes('.png') ||
            value.includes('.jpg') ||
            value.includes('.jpeg') ||
            value.includes('.webp')
          )
        ) {
          const imgSrc = value.startsWith('http')
            ? value
            : API_Files_URL + value;
          return ``;
        }
        return escapeHTML(String(value));
      }

      let html = `
        <div style="
          display:flex;
          flex-direction:column;
          gap:18px;
        ">
      `;

      // Cover Image
      if (r.coverImage) {
        html += `
          <img
            src="${API_Files_URL + r.coverImage}"
            style="
              width:100%;
              height:220px;
              object-fit:cover;
              border-radius:18px;
            "
          >
        `;
      }

      // All Data
      Object.entries(r).forEach(([key, value]) => {
        html += `
          <div class="modal-section">
            <h4 style="
              margin-bottom:14px;
              color:#1e293b;
              display:flex;
              align-items:center;
              gap:8px;
              text-transform:capitalize;
            ">
              <i class="fa-solid fa-circle-info" style="color:#3498db;"></i>
              ${escapeHTML(key)}
            </h4>

            ${renderValue(value)}
          </div>
        `;
      });

      html += `</div>`;

      modalContent.innerHTML = html;

      openModal('analysisModal');
    }
    // ---------- Delete flow ----------
    function confirmDelete(id, title) {
      pendingDeleteId = id;
      document.getElementById('deleteMessage').textContent = `Are you sure you want to delete "${title}"? This cannot be undone.`;
      openModal('deleteModal');
    }

    async function executeDelete(id) {
      try {
        const response = await fetch(`${API_BASE_URL}/Roadmaps/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        if (!response.ok) throw new Error('Delete failed');
        showToast('Roadmap deleted successfully', 'success');
      } catch (err) {
        console.warn('Delete API error, removing locally', err);
        showToast('Deleted from local view (server unreachable)', 'error');
      }
      allRoadmaps = allRoadmaps.filter(r => r.id != id);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(allRoadmaps));
      renderRoadmaps(allRoadmaps);
    }

    // ---------- Filter ----------
    function filterRoadmaps() {
      const term = document.getElementById('searchBar').value.toLowerCase().trim();
      const statusFilter = document.getElementById('statusFilter').value;
      const filtered = allRoadmaps.filter(r => {
        const matchSearch = (r.title || '').toLowerCase().includes(term) || (r.targetRole || '').toLowerCase().includes(term);
        const pubStatus = (r.isPublished || r.status === 'published' || r.status === 'Published') ? 'published' : 'draft';
        const matchStatus = !statusFilter || pubStatus === statusFilter;
        return matchSearch && matchStatus;
      });
      renderRoadmaps(filtered);
    }

    window.filterRoadmaps = filterRoadmaps;

    // ---------- API: Load roadmaps ----------
    async function loadRoadmapsFromAPI() {
      try {
        const res = await fetch(`${API_BASE_URL}/Roadmaps?companyId=`, {
          headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        if (!res.ok) throw new Error('API failed');
        var data = await res.json();
        data=data["data"];
        if (Array.isArray(data)) {
          allRoadmaps = data.map((item, idx) => ({
            id: item.id || item.roadmapId || idx + 1,
            title: item.title || 'Roadmap',
            description: item.description || '',
            targetRole: item.targetRole || 'General',
            price: item.price ?? 0,
            isPublished: item.isPublished,
            status: item.isPublished ? 'published' : 'draft',
            coverImage: item.coverImageUrl || '',
            studentsCount: item.studentsCount || Math.floor(Math.random()*200+30),
            successRate: item.successRate || Math.floor(Math.random()*100),
            duration: item.duration || '4 months',
            skills: item.skills || [],
            learningMaterials: item.learningMaterials || [],
            projects: item.projects || [],
            level: item.level || (item.skills?.[0]?.level || 'Beginner')
          }));
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(allRoadmaps));
      } catch (err) {
        console.warn('Using cached roadmaps', err);
        const cached = localStorage.getItem(STORAGE_KEY);
        if (cached) {
          allRoadmaps = JSON.parse(cached);
        } else {
          showToast('Could not load roadmaps. Using demo data.', 'error');
        }
      }
      renderRoadmaps(allRoadmaps);
    }

    // ---------- Events ----------
    document.getElementById('deleteConfirmBtn').addEventListener('click', () => {
      if (pendingDeleteId !== null) {
        executeDelete(pendingDeleteId);
        pendingDeleteId = null;
      }
      closeModal('deleteModal');
    });
    document.getElementById('deleteCancelBtn').addEventListener('click', () => {
      pendingDeleteId = null;
      closeModal('deleteModal');
    });

    window.closeModal = closeModal;
    window.startNewRoadmap = () => window.location.href = 'create-roadmap.html';
    window.showAnalysis = showAnalysis;

    // Close modals on overlay click
    document.getElementById('analysisModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal('analysisModal');
    });
    document.getElementById('deleteModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal('deleteModal');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal('analysisModal');
        closeModal('deleteModal');
      }
    });

    // Start
    loadRoadmapsFromAPI();
  })();
</script>
</body>
</html>
