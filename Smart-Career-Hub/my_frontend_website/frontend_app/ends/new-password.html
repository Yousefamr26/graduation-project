<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create New Password</title>
<link rel="stylesheet" href="styles/new-password.css">
<link rel="stylesheet" href="styles/all.css">
<link rel="stylesheet" href="webfonts/">

<style>
    .error {
        color: red;
        font-size: 14px;
        margin-bottom: 10px;
        text-align: center;
    }
    .success {
        color: green;
        font-size: 15px;
        display: none;
        text-align: center;
        margin-top: 10px;
    }
    input.invalid {
        border: 1px solid red !important;
    }
</style>
</head>

<body>

<div class="card">
<div class="back-btn" onclick="goBackToOTP()">← Back</div>
    <div class="logo">
        <img src="images/forget-password.png" width="180px" height="145px">
    </div>

    <h2>Create New Password</h2>

    <p id="errorMsg" class="error"></p>

    <input type="password" id="newPassword" placeholder="New Password">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">

    <button onclick="savePassword()">Save Password</button>

    <p id="successMsg" class="success">Password reset successfully!</p>

<div class="footer">© 2025 Smart Career Hub</div>
</div>

<script>
// -----------------------------------
// Password Validation Function
// -----------------------------------
function savePassword() {
    const newPass = document.getElementById("newPassword");
    const confirmPass = document.getElementById("confirmPassword");
    const errorMsg = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");

    // Reset previous styles
    newPass.classList.remove("invalid");
    confirmPass.classList.remove("invalid");
    errorMsg.textContent = "";
    successMsg.style.display = "none";

    // Validation: Not empty
    if (newPass.value.trim() === "") {
        newPass.classList.add("invalid");
        errorMsg.textContent = "Please enter your new password.";
        return;
    }

    // Validation: Minimum 8 characters
    if (newPass.value.length < 8) {
        newPass.classList.add("invalid");
        errorMsg.textContent = "Password must be at least 8 characters.";
        return;
    }

    // Validation: confirm password not empty
    if (confirmPass.value.trim() === "") {
        confirmPass.classList.add("invalid");
        errorMsg.textContent = "Please confirm your password.";
        return;
    }

    // Validation: match passwords
    if (newPass.value !== confirmPass.value) {
        newPass.classList.add("invalid");
        confirmPass.classList.add("invalid");
        errorMsg.textContent = "Passwords do not match.";
        return;
    }

    // If valid → show success message
    successMsg.style.display = "block";

    // Redirect to login page after 1 second
    setTimeout(() => {
        window.location.href = "login.html";
    }, 1000);
}

function goBackToOTP() {
    window.location.href = "otp.html";
}

</script>

</body>
</html>
