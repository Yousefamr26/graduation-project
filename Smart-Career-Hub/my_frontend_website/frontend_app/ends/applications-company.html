<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Applications - Smart Career Hub</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        :root {
            --primary: #3498db;
            --primary-dark: #2c7da0;
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e9eef3;
            --radius: 14px;
            --shadow: 0 2px 10px rgba(0, 0, 0, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            padding: 24px 18px 40px;
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .page-header {
            margin-bottom: 8px;
        }

        h1 {
            margin: 0;
            font-size: 1.9rem;
            font-weight: 700;
            color: #0f2b45;
        }

        .sub {
            color: var(--text-light);
            margin-top: 5px;
            margin-bottom: 22px;
            font-size: 0.95rem;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 20px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            max-width: 400px;
            font-size: 0.9rem;
        }

        .toast.success {
            background: #1db954;
        }

        .toast.error {
            background: #ea4335;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Stats Cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 22px;
        }

        .stat-card {
            background: var(--card);
            padding: 18px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid #f1f5f9;
        }

        .stat-card .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-card .stat-label {
            color: var(--text-light);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        /* Search Box */
        .searchBox {
            background: var(--card);
            padding: 14px 18px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #f1f5f9;
        }

        .searchBox i {
            color: #94a3b8;
            font-size: 1rem;
        }

        .searchBox input {
            flex: 1;
            padding: 11px 8px;
            border: none;
            background: transparent;
            font-size: 0.95rem;
            outline: none;
            color: var(--text);
        }

        .searchBox input::placeholder {
            color: #a0aec0;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 10px 20px;
            border-radius: 25px;
            background: #e9edf3;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.25s;
            white-space: nowrap;
            border: none;
            color: #4a5568;
        }

        .tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 14px rgba(52, 152, 219, 0.3);
            font-weight: 600;
        }

        .tab:hover:not(.active) {
            background: #dde2ea;
        }

        /* Table Wrapper */
        .tableWrap {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid #f1f5f9;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 900px;
            white-space: nowrap;
        }

        th,
        td {
            padding: 15px 16px;
            border-bottom: 1px solid #f1f5f9;
            text-align: left;
        }

        th {
            background: #fafbfe;
            color: #64748b;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            position: sticky;
            top: 0;
        }

        tbody tr {
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: #f8fafd;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* Avatar */
        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            margin-right: 10px;
            text-transform: uppercase;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .name-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Status Badges */
        .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: white;
            font-weight: 600;
            display: inline-block;
            letter-spacing: 0.3px;
        }

        .status-pending {
            background: #f4b400;
        }

        .status-accepted {
            background: #1db954;
        }

        .status-rejected {
            background: #ea4335;
        }

        /* Action buttons */
        .action-btns {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .viewBtn {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .viewBtn:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .acceptBtn, .rejectBtn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .acceptBtn {
            background: #e8f5e9;
            color: #1db954;
        }

        .acceptBtn:hover {
            background: #1db954;
            color: white;
        }

        .rejectBtn {
            background: #fce4ec;
            color: #ea4335;
        }

        .rejectBtn:hover {
            background: #ea4335;
            color: white;
        }

        .acceptBtn:disabled, .rejectBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Status Actions Dropdown */
        .status-actions {
            position: relative;
            display: inline-block;
        }

        .status-dropdown-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text);
        }

        .status-dropdown-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .status-dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 6px;
            z-index: 100;
            min-width: 160px;
            display: none;
        }

        .status-dropdown-menu.show {
            display: block;
        }

        .status-dropdown-item {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            color: var(--text);
        }

        .status-dropdown-item:hover {
            background: #f1f5f9;
        }

        .status-dropdown-item.accept-item {
            color: #1db954;
        }

        .status-dropdown-item.accept-item:hover {
            background: #e8f5e9;
        }

        .status-dropdown-item.reject-item {
            color: #ea4335;
        }

        .status-dropdown-item.reject-item:hover {
            background: #fce4ec;
        }

        /* Pagination */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text);
            transition: all 0.2s;
        }

        .page-btn:hover:not(.active):not(:disabled) {
            background: #f1f5f9;
        }

        .page-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            color: var(--text-light);
            font-size: 0.85rem;
            padding: 0 12px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .modal h3 {
            margin-bottom: 12px;
            font-size: 1.2rem;
        }

        .modal p {
            color: var(--text-light);
            margin-bottom: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .modal-btn.cancel {
            background: #f1f5f9;
            color: var(--text);
        }

        .modal-btn.cancel:hover {
            background: #e2e8f0;
        }

        .modal-btn.confirm-accept {
            background: #1db954;
            color: white;
        }

        .modal-btn.confirm-accept:hover {
            background: #169c46;
        }

        .modal-btn.confirm-reject {
            background: #ea4335;
            color: white;
        }

        .modal-btn.confirm-reject:hover {
            background: #d33828;
        }

        /* Loading & Empty States */
        .loading {
            text-align: center;
            padding: 50px 20px;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .loading i {
            margin-right: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #94a3b8;
        }

        .empty-state i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 12px;
            color: #cbd5e1;
        }

        .error-state {
            text-align: center;
            padding: 40px 20px;
            color: #e53e3e;
            font-weight: 500;
        }

        /* ========== RESPONSIVE STYLES ========== */
        @media screen and (max-width: 768px) {
            body {
                padding: 16px 10px 30px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .sub {
                font-size: 0.85rem;
                margin-bottom: 16px;
            }

            .stats-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .stat-card .stat-number {
                font-size: 1.4rem;
            }

            .searchBox {
                padding: 10px 14px;
            }

            .tabs {
                gap: 6px;
            }

            .tab {
                padding: 8px 15px;
                font-size: 0.8rem;
            }

            table {
                font-size: 0.8rem;
                min-width: 750px;
            }

            th,
            td {
                padding: 12px 10px;
            }

            .avatar {
                width: 28px;
                height: 28px;
                font-size: 0.75rem;
                margin-right: 6px;
            }

            .action-btns {
                flex-direction: column;
                gap: 4px;
            }
        }

        @media screen and (max-width: 480px) {
            body {
                padding: 12px 6px 25px;
            }

            h1 {
                font-size: 1.3rem;
            }

            .stats-row {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .stat-card {
                padding: 12px;
            }

            .stat-card .stat-number {
                font-size: 1.2rem;
            }

            .tabs {
                flex-direction: row;
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 4px;
                -webkit-overflow-scrolling: touch;
            }

            .tab {
                flex-shrink: 0;
                padding: 8px 14px;
                font-size: 0.75rem;
            }

            .searchBox input {
                font-size: 0.85rem;
            }

            table {
                min-width: 600px;
            }

            th,
            td {
                padding: 10px 8px;
                font-size: 0.75rem;
            }

            .badge {
                padding: 4px 10px;
                font-size: 0.7rem;
            }

            .viewBtn {
                font-size: 0.75rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Page Header -->
        <div class="page-header">
            <h1><i class="fa-solid fa-file-signature" style="color: #3498db; margin-right: 8px;"></i> Applications</h1>
            <p class="sub">View and manage all applications across your positions</p>
        </div>

        <!-- Stats Cards -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card">
                <div class="stat-number" id="totalApplicants">-</div>
                <div class="stat-label">Total Applicants</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalPositions">-</div>
                <div class="stat-label">Active Positions</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingCount" style="color: #f4b400;">-</div>
                <div class="stat-label">Pending Review</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="shortlistedCount" style="color: #1db954;">-</div>
                <div class="stat-label">Shortlisted</div>
            </div>
        </div>

        <!-- Search Box -->
        <div class="searchBox">
            <i class="fa-solid fa-search"></i>
            <input id="searchInput" type="text" placeholder="Search by applicant name, email, or position..." oninput="handleSearch()" />
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('internships', this)">
                <i class="fa-solid fa-graduation-cap"></i> Internship Applications
            </div>
            <div class="tab" onclick="switchTab('jobs', this)">
                <i class="fa-solid fa-briefcase"></i> Job Applications
            </div>
        </div>

        <!-- Table -->
        <div class="tableWrap">
            <div class="table-responsive">
                <table id="applicationsTable">
                    <thead>
                        <tr id="tableHeader"></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="pagination-container" id="paginationContainer"></div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <h3 id="modalTitle">Confirm Action</h3>
            <p id="modalMessage">Are you sure?</p>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-btn confirm-accept" id="modalConfirmBtn" onclick="confirmStatusChange()">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        // ========== API Configuration ==========
        const API_BASE_URL = "http://smartcareerhub.runasp.net/api";
        const TOKEN = localStorage.getItem("authToken");
        const COMPANY_ID = localStorage.getItem("companyId");

        let allData = [];
        let currentTab = 'internships';
        let currentPage = 1;
        let pageSize = 10;
        let totalCount = 0;
        let positionsList = [];

        // Modal state
        let pendingStatusChange = {
            positionId: null,
            applicationId: null,
            newStatus: null,
            applicantName: ''
        };

        // ========== Toast Notification ==========
        function showToast(message, type = 'success') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fa-solid fa-${type === 'success' ? 'circle-check' : 'circle-exclamation'}"></i> ${message}`;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ========== Modal Functions ==========
        function openModal(title, message, confirmClass, confirmText) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            const confirmBtn = document.getElementById('modalConfirmBtn');
            confirmBtn.className = `modal-btn ${confirmClass}`;
            confirmBtn.textContent = confirmText;
            document.getElementById('confirmModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('confirmModal').classList.remove('show');
            pendingStatusChange = { positionId: null, applicationId: null, newStatus: null, applicantName: '' };
        }

        // ========== Fetch Positions ==========
        async function fetchPositions() {
            const endpoint = currentTab === 'internships'
                ? `${API_BASE_URL}/Internships?companyId=${COMPANY_ID}`
                : `${API_BASE_URL}/Jobs?companyId=${COMPANY_ID}`;

            try {
                const response = await fetch(endpoint, {
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const result = await response.json();
                    
                    if (Array.isArray(result)) {
                        positionsList = result;
                    } else if (result && result.data && Array.isArray(result.data)) {
                        positionsList = result.data;
                    } else if (result && result.items && Array.isArray(result.items)) {
                        positionsList = result.items;
                    } else {
                        positionsList = [];
                    }
                    
                    return positionsList;
                } else {
                    console.error(`Failed to fetch positions: ${response.status}`);
                    return [];
                }
            } catch (error) {
                console.error("Error fetching positions:", error);
                return [];
            }
        }

        // ========== Fetch Applicants for a Position ==========
        async function fetchApplicantsForPosition(positionId, page = 1, size = 100) {
            const endpoint = currentTab === 'internships'
                ? `${API_BASE_URL}/Internships/${positionId}/applicants?page=${page}&pageSize=${size}`
                : `${API_BASE_URL}/Jobs/${positionId}/applicants?page=${page}&pageSize=${size}`;

            try {
                const response = await fetch(endpoint, {
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'accept': '*/*'
                    }
                });

                if (response.ok) {
                    const result = await response.json();
                    return result;
                } else {
                    console.error(`Failed to fetch applicants for position ${positionId}: ${response.status}`);
                    return null;
                }
            } catch (error) {
                console.error(`Error fetching applicants for position ${positionId}:`, error);
                return null;
            }
        }

        // ========== Update Applicant Status ==========
        async function updateApplicantStatus(positionId, applicationId, status) {
            // status: 0 for rejected, 1 for accepted/shortlisted
            const endpoint = currentTab === 'internships'
                ? `${API_BASE_URL}/internships/${positionId}/applicants/${applicationId}/status`
                : `${API_BASE_URL}/Jobs/${positionId}/applicants/${applicationId}/status`;

            try {
                const response = await fetch(endpoint, {
                    method: 'PATCH',
                    headers: {
                        'accept': '*/*',
                        'Authorization': `Bearer ${TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: status })
                });

                if (response.ok) {
                    return { success: true };
                } else {
                    const errorText = await response.text();
                    return { success: false, error: errorText || `Status ${response.status}` };
                }
            } catch (error) {
                console.error("Error updating status:", error);
                return { success: false, error: error.message };
            }
        }

        // ========== Handle Status Change ==========
        function handleStatusChange(positionId, applicationId, newStatus, applicantName) {
            pendingStatusChange = {
                positionId,
                applicationId,
                newStatus,
                applicantName
            };

            const statusText = newStatus === 1 ? 'accept' : 'reject';
            const title = newStatus === 1 ? 'Accept Application' : 'Reject Application';
            const message = `Are you sure you want to ${statusText} the application from "${applicantName}"?`;
            const confirmClass = newStatus === 1 ? 'confirm-accept' : 'confirm-reject';
            const confirmText = newStatus === 1 ? 'Accept' : 'Reject';

            openModal(title, message, confirmClass, confirmText);
        }

        async function confirmStatusChange() {
            const { positionId, applicationId, newStatus, applicantName } = pendingStatusChange;
            console.log(pendingStatusChange);
            if (!positionId || !applicationId) {
                showToast('Invalid application data', 'error');
                closeModal();
                return;
            }

            closeModal();

            // Show loading state
            const actionText = newStatus === 1 ? 'Accepting' : 'Rejecting';
            showToast(`${actionText} application...`, 'success');

            const result = await updateApplicantStatus(positionId, applicationId, newStatus);

            if (result.success) {
                // Update local data
                const applicantIndex = allData.findIndex(a => 
                    (a.id === applicationId || a.studentId === applicationId || a.applicationId === applicationId) &&
                    a._positionId === positionId
                );

                if (applicantIndex !== -1) {
                    const newStatusText = newStatus === 1 ? 'shortlisted' : 'rejected';
                    allData[applicantIndex].status = newStatusText;
                }

                // Refresh the table
                const filteredData = getFilteredData();
                renderTablePaginated(filteredData, currentPage);
                updateStats();

                const successText = newStatus === 1 ? 'accepted' : 'rejected';
                showToast(`Application ${successText} successfully!`, 'success');
                setTimeout(() => {
                        window.location.reload();
                    }, 1000);
            } else {
                showToast(`Failed to update status: ${result.error}`, 'error');
            }
        }

        // ========== Fetch All Applicants ==========
        async function fetchAllApplicants() {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = `
                <tr>
                    <td colspan="8" class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Loading positions...
                    </td>
                </tr>`;

            const positions = await fetchPositions();

            if (!positions || positions.length === 0) {
                allData = [];
                updateStats();
                renderTable([]);
                return;
            }

            tbody.innerHTML = `
                <tr>
                    <td colspan="8" class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Loading applicants for ${positions.length} positions...
                    </td>
                </tr>`;

            const allApplicants = [];
            
            for (let i = 0; i < positions.length; i++) {
                const position = positions[i];
                const positionId = position.id || position.internshipId || position.jobId;
                const positionTitle = position.title || position.name || position.positionName || 'Untitled';
                const companyName = position.companyName || position.company || 'N/A';

                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="loading">
                            <i class="fas fa-spinner fa-spin"></i> Loading applicants for "${escapeHTML(positionTitle)}" (${i + 1}/${positions.length})...
                        </td>
                    </tr>`;

                let page = 1;
                let hasMore = true;
                const positionApplicants = [];

                while (hasMore) {
                    const result = await fetchApplicantsForPosition(positionId, page, 100);
                    
                    if (result) {
                        let applicants = [];
                        let totalItems = 0;
                        
                        if (Array.isArray(result)) {
                            applicants = result;
                            totalItems = result.length;
                        } else if (result.data && Array.isArray(result.data)) {
                            applicants = result.data;
                            totalItems = result.totalCount || result.total || 0;
                        } else if (result.items && Array.isArray(result.items)) {
                            applicants = result.items;
                            totalItems = result.totalCount || result.total || 0;
                        }

                        applicants.forEach(applicant => {
                            applicant._positionTitle = positionTitle;
                            applicant._companyName = companyName;
                            applicant._positionId = positionId;
                            applicant._type = currentTab;
                        });

                        positionApplicants.push(...applicants);

                        if (applicants.length === 0 || positionApplicants.length >= totalItems) {
                            hasMore = false;
                        } else {
                            page++;
                        }
                    } else {
                        hasMore = false;
                    }
                }

                allApplicants.push(...positionApplicants);
            }

            allData = allApplicants;
            totalCount = allData.length;
            updateStats();
            renderTablePaginated(allData, 1);
        }

        // ========== Update Statistics ==========
        function updateStats() {
            const total = allData.length;
            const uniquePositions = new Set(allData.map(a => a._positionId)).size;
            const pending = allData.filter(a => {
                const status = (a.status || '').toLowerCase();
                return status === 'pending' || status === 'under review' || status === 'submitted';
            }).length;
            const shortlisted = allData.filter(a => {
                const status = (a.status || '').toLowerCase();
                return status === 'accepted' || status === 'approved' || status === 'shortlisted';
            }).length;

            document.getElementById('totalApplicants').textContent = total;
            document.getElementById('totalPositions').textContent = uniquePositions;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('shortlistedCount').textContent = shortlisted;
        }

        // ========== Render Table with Pagination ==========
        function renderTablePaginated(data, page) {
            currentPage = page;
            const startIndex = (page - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const paginatedData = data.slice(startIndex, endIndex);
            
            totalCount = data.length;
            renderTable(paginatedData);
            renderPagination(data.length, page);
        }

        // ========== Render Table ==========
        function renderTable(data) {
            const thead = document.getElementById("tableHeader");
            const tbody = document.getElementById("tableBody");

            thead.innerHTML = `
                <th>Applicant</th>
                <th>Email</th>
                <th>Position</th>
                <th>Company</th>
                <th>Applied Date</th>
                <th>Status</th>
                <th>Actions</th>
            `;

            tbody.innerHTML = "";

            if (!data || data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7">
                            <div class="empty-state">
                                <i class="fa-solid fa-inbox"></i>
                                <p>No applications found.</p>
                            </div>
                        </td>
                    </tr>`;
                return;
            }

            data.forEach(app => {
                const name = app.studentName || app.fullName || app.applicantName || app.name || "N/A";
                const email = app.studentEmail || app.email || app.applicantEmail || "N/A";
                const position = app._positionTitle || app.title || app.positionName || "Position";
                const company = app._companyName || app.companyName || app.company || "N/A";
                const status = (app.status || "pending").toLowerCase();
                const date = app.appliedAt || app.applicationDate || app.appliedDate || app.createdAt;
                const applicationId = app.id || app.studentId || app.applicationId || '';
                const positionId = app._positionId || '';

                const formattedDate = date ? new Date(date).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                }) : "N/A";

                const isAccepted = status === 'accepted' || status === 'approved' || status === 'shortlisted';
                const isRejected = status === 'rejected' || status === 'declined';

                const row = document.createElement('tr');
                row.className = 'applicant-row';
                row.setAttribute('data-id', applicationId);

                row.innerHTML = `
                    <td>
                        <div class="name-cell">
                            <span class="avatar" style="background:${getAvatarColor(name)}">${name.charAt(0).toUpperCase()}</span>
                            <span>${escapeHTML(name)}</span>
                        </div>
                    </td>
                    <td>${escapeHTML(email)}</td>
                    <td>${escapeHTML(position)}</td>
                    <td>${escapeHTML(company)}</td>
                    <td>${formattedDate}</td>
                    <td>${getStatusBadge(status)}</td>
                    <td>
                        <div class="action-btns">
                            <span class="viewBtn" onclick="viewProfile('${applicationId}')">
                                <i class="fa-solid fa-eye"></i> View
                            </span>
                            ${!isAccepted ? `
                                <button class="acceptBtn" onclick="handleStatusChange('${positionId}', '${applicationId}', 1, '${escapeHTML(name).replace(/'/g, "\\'")}')" title="Accept">
                                    <i class="fa-solid fa-check"></i> Accept
                                </button>
                            ` : ''}
                            ${!isRejected ? `
                                <button class="rejectBtn" onclick="handleStatusChange('${positionId}', '${applicationId}', 0, '${escapeHTML(name).replace(/'/g, "\\'")}')" title="Reject">
                                    <i class="fa-solid fa-xmark"></i> Reject
                                </button>
                            ` : ''}
                        </div>
                    </td>
                `;

                tbody.appendChild(row);
            });
        }

        // ========== Render Pagination ==========
        function renderPagination(totalItems, currentPage) {
            const container = document.getElementById('paginationContainer');
            const totalPages = Math.ceil(totalItems / pageSize);

            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            
            html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                <i class="fa-solid fa-chevron-left"></i> Prev
            </button>`;

            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
            if (endPage - startPage < maxVisiblePages - 1) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }
            if (startPage > 1) {
                html += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
                if (startPage > 2) html += `<span class="page-info">...</span>`;
            }
            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += `<span class="page-info">...</span>`;
                html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }

            html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                Next <i class="fa-solid fa-chevron-right"></i>
            </button>`;

            html += `<span class="page-info">Page ${currentPage} of ${totalPages} (${totalItems} total)</span>`;

            container.innerHTML = html;
        }

        function goToPage(page) {
            const totalPages = Math.ceil(allData.length / pageSize);
            if (page < 1 || page > totalPages) return;
            
            currentPage = page;
            const filteredData = getFilteredData();
            renderTablePaginated(filteredData, page);
            document.querySelector('.tableWrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function getFilteredData() {
            const query = document.getElementById("searchInput").value.toLowerCase().trim();
            if (!query) return allData;
            
            return allData.filter(app => {
                const name = (app.studentName || app.fullName || app.applicantName || app.name || "").toLowerCase();
                const email = (app.studentEmail || app.email || app.applicantEmail || "").toLowerCase();
                const position = (app._positionTitle || app.title || app.positionName || "").toLowerCase();
                const company = (app._companyName || app.companyName || app.company || "").toLowerCase();
                return name.includes(query) || email.includes(query) || position.includes(query) || company.includes(query);
            });
        }

        // ========== Helper Functions ==========
        function escapeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function getAvatarColor(name) {
            const colors = ["#1e88e5", "#43a047", "#fb8c00", "#8e24aa", "#e91e63", "#00acc1", "#ff7043"];
            const charCode = name && name.length > 0 ? name.charCodeAt(0) : 0;
            return colors[charCode % colors.length];
        }

        function getStatusBadge(status) {
            switch (status) {
                case 'accepted':
                case 'approved':
                case 'shortlisted':
                    return '<span class="badge status-accepted">Shortlisted</span>';
                case 'rejected':
                case 'declined':
                    return '<span class="badge status-rejected">Rejected</span>';
                case 'pending':
                case 'under review':
                case 'submitted':
                    return '<span class="badge status-pending">Under Review</span>';
                default:
                    return `<span class="badge status-pending">${escapeHTML(status)}</span>`;
            }
        }

        function switchTab(type, element) {
            currentTab = type;
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            element.classList.add("active");
            document.getElementById("searchInput").value = "";
            currentPage = 1;
            allData = [];
            fetchAllApplicants();
        }

        function handleSearch() {
            const filteredData = getFilteredData();
            currentPage = 1;
            renderTablePaginated(filteredData, 1);
            updateStats();
        }

        function viewProfile(id) {
            if (id) {
                window.location.href = `student-profile.html?id=${id}`;
            } else {
                alert("Profile ID not available.");
            }
        }

        // Initial Load
        window.addEventListener('DOMContentLoaded', () => {
            if (!TOKEN) {
                alert("Session expired. Please login again.");
                window.location.href = "login.html";
                return;
            }
            fetchAllApplicants();
        });
    </script>
</body>
</html>
